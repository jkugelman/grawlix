name: Test and deploy

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.js'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Cache Playwright browser binaries. Key on package-lock (Playwright
      # version → browser ABI) AND playwright.config.js (the browser list
      # lives there, so adding/removing a project should cache-bust).
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json', 'playwright.config.js') }}

      # Always run install — it's idempotent (skips already-cached binaries,
      # ~5s on cache hit) and self-healing if the cache key ever lies about
      # what's actually in the cache. System deps aren't cached and always
      # need apt-get, so --with-deps stays on every run.
      - name: Install Playwright browsers + system deps
        run: npx playwright install --with-deps

      - name: Run tests
        run: npm test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./site
      - id: deployment
        uses: actions/deploy-pages@v5
