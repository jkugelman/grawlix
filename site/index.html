  { t: 2/3, bg: '--score-3-bg', fg: '--score-3-fg' },
  { t: 5/6, bg: '--score-4-bg', fg: '--score-4-fg' },
  { t: 1,   bg: '--score-5-bg', fg: '--score-5-fg' },
];

// Out-of-range scores clamp to the nearest endpoint. With no data loaded,
// falls back to the middle stop (a gradient is meaningless without a range).
function scoreColor(score) {
  const { min, max } = getHistogramLayout();
  if (min == null || max == null || max <= min) {
    const s = SCORE_COLOR_STOPS[Math.floor(SCORE_COLOR_STOPS.length / 2)];
    return { bg: `var(${s.bg})`, fg: `var(${s.fg})` };
  }
  const t = Math.max(0, Math.min(1, (score - min) / (max - min)));
  let i = 0;
  while (i < SCORE_COLOR_STOPS.length - 1 && SCORE_COLOR_STOPS[i + 1].t < t) i++;
  const lo = SCORE_COLOR_STOPS[i];
  const hi = SCORE_COLOR_STOPS[i + 1];
  const localT = (t - lo.t) / (hi.t - lo.t);
  const pct = (localT * 100).toFixed(1);
  return {
    bg: `color-mix(in lch, var(${lo.bg}), var(${hi.bg}) ${pct}%)`,
    fg: `color-mix(in lch, var(${lo.fg}), var(${hi.fg}) ${pct}%)`,
  };
}

// ─── Search ───────────────────────────────────────────────────────────────────

const CONSONANTS = 'bcdfghjklmnpqrstvwxyz';
const VOWELS = 'aeiou';

function segmentToPat(str) {
  let pat = '';
  for (let i = 0; i < str.length; i++) {
    const ch = str[i];
    if (ch === '?')      { pat += '.'; }
    else if (ch === '#') { pat += `[${CONSONANTS}]`; }
    else if (ch === '@') { pat += `[${VOWELS}]`; }
    else if (ch === '[') {
      const end = str.indexOf(']', i);
      if (end === -1) { pat += '\\['; }
      else {
        const inner = str.slice(i + 1, end)
          .replace(/#/g, CONSONANTS)
          .replace(/@/g, VOWELS);
        pat += `[${inner}]`;
        i = end;
      }
    } else {
      pat += ch.replace(/[.+^${}()|[\]\\]/g, '\\$&');
    }
  }
  return pat;
}

function buildSearchPattern(query, wholeWord = false) {
  const q = query.toLowerCase();
  const segs    = q.split('*');
  const segPats = segs.map(segmentToPat);
  const hlParts = segPats.map(p => p ? '(' + p + ')' : '');
  const joined  = segPats.join('.*');
  const hlRe = new RegExp(hlParts.join('.*'), 'id');
  return {
    filterRe: new RegExp(wholeWord ? '^' + joined + '$' : joined),
    // Returns search-hit ranges (one per non-wildcard segment that matched)
    // in the same `{ start, end, kind }` shape that tools emit. Lets the
    // renderer merge search and tool highlights in one pass.
    searchRanges: text => searchRangesFor(text, hlRe),
  };
}

function searchRangesFor(text, hlRe) {
  const m = hlRe.exec(text);
  if (!m?.indices) return [];
  const ranges = [];
  let colorIdx = 0;
  for (let g = 1; g < m.indices.length; g++) {
    if (!m.indices[g]) continue;
    const [start, end] = m.indices[g];
    ranges.push({ start, end, kind: `search:${colorIdx % 5}` });
    colorIdx++;
  }
  return ranges;
}

// Render a string with a set of highlight ranges. Each range is
// `{ start, end, kind }`; search hits use `search:N` (rendered as `<mark>`),
// tool-emitted highlights use one of the kinds in the registry below
// (rendered as `<span class="hl-<kind>">`). Overlapping ranges are resolved
// by skipping later ranges entirely — simple and predictable; the visual
// loss is bounded to the rare case where a tool highlight overlaps a search
// match exactly. Entries are inserted unescaped to match the rest of the
// app's "trust the wordlist file" assumption.
function renderHighlightedText(text, ranges) {
  if (!ranges || !ranges.length) return text;
  const sorted = [...ranges].sort((a, b) => a.start - b.start);
  let result = '';
  let pos = 0;
  for (const r of sorted) {
    if (r.start < pos || r.end <= r.start) continue;
    result += text.slice(pos, r.start);
    const content = text.slice(r.start, r.end);
    if (r.kind.startsWith('search:')) {
      result += `<mark class="search-match search-match-${r.kind.slice(7)}">${content}</mark>`;
    } else {
      result += `<span class="hl-${r.kind}">${content}</span>`;
    }
    pos = r.end;
  }
  return result + text.slice(pos);
}

// ─── Tool stack ───────────────────────────────────────────────────────────────
// Tools are catalog records ({ name, icon, category, desc, example, params,
// kind, inputHighlights, outputHighlights, glyph?, run?, isInert? }). A tool
// without a `run` is transparent in the pipeline — its row still renders, the
// URL still serializes it, but `executePipeline` skips over it. That lets the
// catalog list a tool in the gallery before its run function lands.
//
// `isInert(params)` is an optional second transparency gate: a tool that has a
// `run` but is a no-op for the given params (an empty Search query) reports
// `true` and is skipped just like a run-less tool — so an empty search bar
// neither filters nor contributes a highlight lens.
//
// `kind` is 'filter' (keeps/drops an entry), 'transform' (emits 0+ new entries
// per input), or 'group' (clusters all input rows into GroupRow[] via `group`).
// `inputHighlights` / `outputHighlights` are static booleans: each one means
// the tool highlights the atom it reads / the atom it creates. `currentAtomCount`
// reads them to derive the static atom count; transforms also carry a relation
// `glyph`.
//
// An optional `async prepare(params, ctx)` runs once per stage, after every
// upstream stage has finished; its return value is handed to `run` in place of
// `params` (so a tool can compile a regex or pre-sort letters once instead of
// per row, or build an index over `ctx.input`). It must yield cooperatively
// for any non-trivial work — see docs/planned/tools.md § The prepare context.
// Tools without a `prepare` get the normalized params object.
//
// `run(entry, prepared, wordlist)` is a per-row pure function — the system
// owns the outer loop, cooperative yielding, abort, atom construction, and
// chain bookkeeping. Filters return `null`/`false` (drop), `true` (keep), or a
// `Range[]` (keep + highlights). Transforms return `TransformOutput[]`, each
// `{ entry, inputHighlights?, outputHighlights? }` where `entry` is a string
// or `[string, score]` for a tool-synthesized entry not in the wordlist.

const TOOL_CATEGORIES = [
  { id: 'anagrams', label: 'Anagrams & letter banks' },
  { id: 'patterns', label: 'Letter patterns' },
  { id: 'pairs',    label: 'Pairs' },
];

const TOOLS = {
  anagram: {
    name: 'Anagram', icon: '🔤', category: 'anagrams',
    desc: 'Same letters, rearranged',
    example: 'LINDSEY → SNIDELY',
    params: [{ key: 'entry', label: 'entry' }],
    kind: 'filter', inputHighlights: false, outputHighlights: false,
    prepare(params) { return sortLetters(params.entry); },
    run(entry, target, wordlist) {
      if (!target) return true;
      return sortLetters(entry) === target;
    },
  },
  subanagram: {
    name: 'Subanagram', icon: '🔡', category: 'anagrams',
    desc: 'Words made from any subset of letters',
    example: 'PARENTAL → PLANE, RENT, …',
    params: [{ key: 'letters', label: 'letters' }],
    kind: 'transform', inputHighlights: false, outputHighlights: false, glyph: '→',
  },
  search: {
    name: 'Search', icon: '<svg width="16" height="16" aria-hidden="true"><use href="#icon-search"/></svg>', category: 'patterns',
    desc: 'Match entries by text, with wildcards',
    example: 'un*ed · c?t',
    params: [
      { key: 'query', label: 'pattern' },
      { key: 'whole-word', label: 'Whole word', type: 'checkbox' },
    ],
    kind: 'filter', inputHighlights: true, outputHighlights: false,
    // An empty query is a no-op: the row is transparent — no filtering, no
    // lens — so an empty permanent search bar costs nothing.
    isInert: params => !((params && params.query || '').trim()),
    // Compiled once per run. `whole-word` is a checkbox param, so both the
    // permanent search bar and a gallery-added Search row supply it. Returns
    // null for an empty query so `run` keeps all.
    prepare(params) {
      const query = (params.query || '').trim();
      if (!query) return null;
      return buildSearchPattern(query, !!params['whole-word']);
    },
    run(entry, pattern, wordlist) {
      if (!pattern) return true;
      if (!pattern.filterRe.test(entry)) return null;
      const ranges = pattern.searchRanges(entry);
      return ranges.length ? ranges : true;
    },
  },
  regex: {
    name: 'Regex', icon: '🪄', category: 'patterns',
    desc: 'Match by regular expression',
    example: '^un.*ed$',
    params: [{ key: 'pattern', label: 'pattern' }],
    kind: 'filter', inputHighlights: false, outputHighlights: false,
  },
  palindrome: {
    name: 'Palindrome', icon: '🔄', category: 'patterns',
    desc: 'Reads the same forwards and back',
    example: 'RACECAR · KAYAK',
    params: [],
    kind: 'filter', inputHighlights: false, outputHighlights: false,
  },
  behead: {
    name: 'Behead', icon: '🪓', category: 'pairs',
    desc: 'Drop the first letter to get a new word',
    example: 'SLING → LING',
    params: [],
    kind: 'transform', inputHighlights: true, outputHighlights: false, glyph: '→',
    run(entry, params, wordlist) {
      if (entry.length < 2) return [];
      const beheaded = entry.slice(1);
      if (!wordlist.byEntry.has(beheaded)) return [];
      return [{ entry: beheaded, inputHighlights: [{ kind: 'removed', start: 0, end: 1 }] }];
    },
  },
  curtail: {
    name: 'Curtail', icon: '✂️', category: 'pairs',
    desc: 'Drop the last letter to get a new word',
    example: 'PARTY → PART',
    params: [],
    kind: 'transform', inputHighlights: true, outputHighlights: false, glyph: '→',
    run(entry, params, wordlist) {
      if (entry.length < 2) return [];
      // Skip plural → singular.
      if (entry.endsWith('s') && !entry.endsWith('ss')) return [];
      const curtailed = entry.slice(0, -1);
      if (!wordlist.byEntry.has(curtailed)) return [];
      return [{ entry: curtailed, inputHighlights: [{ kind: 'removed', start: entry.length - 1, end: entry.length }] }];
    },
  },
  semordnilap: {
    name: 'Semordnilap', icon: '↔️', category: 'pairs',
    desc: 'Reverse to get a different word',
    example: 'STRESSED → DESSERTS',
    params: [],
    kind: 'transform', inputHighlights: false, outputHighlights: false, glyph: '→',
    run(entry, params, wordlist) {
      // Bidirectional emit — a row whenever the reverse is also an entry, in
      // both directions. The post-executor `unify` pass collapses
      // the matched mirror pair into one row with a ↔ glyph; a downstream
      // transform breaks the symmetry and the two directions stay separate.
      // Palindromes are skipped — reversing them yields the same word.
      const reversed = reverseString(entry);
      if (reversed === entry) return [];
      if (!wordlist.byEntry.has(reversed)) return [];
      return [{ entry: reversed }];
    },
  },
  letter_clusters: {
    name: 'Letter clusters', icon: '🧩', category: 'anagrams',
    desc: 'Words built from the same distinct letters',
    example: 'POSTOP · STOOPS · OPTS',
    params: [{ key: 'size', label: 'Distinct letters', type: 'number' }],
    kind: 'group', inputHighlights: false, outputHighlights: false,
    isInert: params => !((params && params.size || '').toString().trim()),
    prepare(params) { return parseInt(params.size, 10); },
    async group(rows, size, ctx) {
      const buckets = new Map();
      await ctx.forEach(rows, row => {
        const wlEntry = rowLastEntry(row);
        const key = [...new Set(wlEntry.entry)].sort().join('');
        if (key.length !== size) return;
        let bucket = buckets.get(key);
        if (!bucket) buckets.set(key, bucket = []);
        bucket.push(wlEntry);
      });
      const groups = [];
      for (const [key, words] of buckets) {
        // The 2+ rule is letter_clusters' own — a downstream tool may legitimately
        // thin a line to one word, so the executor never enforces it.
        if (words.length < 2) continue;
        words.sort((a, b) => b.score - a.score || a.entry.localeCompare(b.entry));
        const cells = words.map(w => ({ wlEntry: w, highlights: null }));
        groups.push({ key, lines: [{ cells, slot: false }] });
      }
      return groups;
    },
  },
};

function reverseString(s) {
  let out = '';
  for (let i = s.length - 1; i >= 0; i--) out += s[i];
  return out;
}

// Sort the letters of an already-canonical string. Tools that need letter-bank
// equivalence call this on `entry` (and on user-supplied params, which the
// runtime normalizes the same way before passing in). Non-letters survive and
// participate in the comparison — for letter-only wordlists they're a no-op,
// for the rare punctuation-bearing entry they make the match stricter.
function sortLetters(s) {
  if (!s) return '';
  return s.split('').sort().join('');
}

// Normalize tool param strings: lowercase only. Same rule as wlEntry.entry —
// the executor runs this on every param before handing to `run`, so tools see
// canonical-lowercase input on both sides without per-call ceremony.
function normalizeParams(params) {
  const out = {};
  for (const [k, v] of Object.entries(params || {})) {
    out[k] = typeof v === 'string' ? v.toLowerCase() : v;
  }
  return out;
}

// The chain shape is derivable from the catalog records alone — no per-row
// runtime inspection. Simulate the executor's emit-then-unify on the active
// tools (run-having, not inert): the originator is one atom; each highlighting
// tool emits a same-word atom that the unifier folds into the tail unless the
// tail is itself a highlight slot, in which case it stays its own atom; each
// transform emits a new-word output atom that never folds. This keys off the
// tools' static highlight flags, exactly as `collapseRepeatAtoms` keys off the
// atoms' slot-ness, so the two always agree. `atomCount` is the resulting
// count — the row's height in `ROW_HEIGHT` units, read by the renderer and the
// scroller's stride math.
function currentAtomCount(stack) {
  let count = 1;          // originator
  let tailSlot = false;   // is the tail atom a highlight slot?
  for (const row of stack) {
    const tool = TOOLS[row.tool];
    if (!tool?.run || tool.isInert?.(row.params)) continue;   // transparent rows
    if (tool.kind === 'transform') {
      if (tool.inputHighlights && tailSlot) count++;   // input mark can't fold into a slot tail
      count++;                                         // output atom (new word)
      tailSlot = !!tool.outputHighlights;
    } else if (tool.inputHighlights) {                 // highlighting filter (search)
      if (tailSlot) count++;
      tailSlot = true;
    }
  }
  return count;
}

// True when no active transform sits in the stack — every row is then a single
// merged-wordlist entry (plus same-word highlight atoms), so the count is per
// entry and the sort axes stay in their single-atom tier. Drives the stats-bar
// count label (Entries vs Results) and the sort tier.
function isFilterOnlyChain(stack) {
  return !stack.some(row => {
    const tool = TOOLS[row.tool];
    return tool?.kind === 'transform' && tool.run && !tool.isInert?.(row.params);
  });
}

function isGroupChain(stack) {
  return stack.some(row => {
    const tool = TOOLS[row.tool];
    return tool?.kind === 'group' && tool.group && !tool.isInert?.(row.params);
  });
}

function workshopCountLabel(stack) {
  if (isGroupChain(stack)) return 'Groups';
  return isFilterOnlyChain(stack) ? 'Entries' : 'Results';
}

// Gates the `unify` skip: a transform or a highlighting filter is what makes
// `unify` do real work. With neither active, every row is a lone atom and
// `unify` would only copy them, so the executor returns its rows as-is.
function chainProducesMultiAtom(stack) {
  return stack.some(row => {
    const tool = TOOLS[row.tool];
    if (!tool?.run || tool.isInert?.(row.params)) return false;
    return tool.kind === 'transform' || !!tool.inputHighlights;
  });
}

// `ctx.input` — chain tail entries as strings, resolved lazily so a tool that
// ignores it pays nothing and the O(N)-per-stage materialization stays avoided.
function makeWorkingSetView(rows) {
  return {
    get length() { return rows.length; },
    at(i) { return rowLastEntry(rows[i]).entry; },
    *[Symbol.iterator]() { for (const row of rows) yield rowLastEntry(row).entry; },
  };
}

// The executor's seed — one single-atom row per merged entry. Cached on the
// merged-wordlist cache because nothing downstream mutates these rows or atoms;
// a structural change to `cache.entries` must null `_initialRows` (see
// patchCachesForEditsChange) or stale rows render.
async function buildInitialRows(mergedWordlist, y) {
  if (mergedWordlist._initialRows) return mergedWordlist._initialRows;
  const { entries } = mergedWordlist;
  const rows = new Array(entries.length);
  for (let i = 0; i < entries.length; i++) {
    rows[i] = { atoms: [{ wlEntry: entries[i], highlights: null, glyph: null }] };
    if (y.due()) await y.yield();
  }
  mergedWordlist._initialRows = rows;
  return rows;
}

// The `prepare` context — see docs/planned/tools.md § The prepare context.
// Rebuilt per stage so `ctx.input` reflects that stage's input rows.
function makeCtx(mergedWordlist, rows, signal, y) {
  return {
    wordlist: mergedWordlist,
    input: makeWorkingSetView(rows),
    throwIfAborted: () => throwIfAborted(signal),
    due: y.due,
    yield: y.yield,
    async forEach(iterable, fn) {
      let i = 0;
      for (const item of iterable) {
        fn(item, i++);
        if (y.due()) await y.yield();
      }
    },
    async times(n, fn) {
      for (let i = 0; i < n; i++) {
        fn(i);
        if (y.due()) await y.yield();
      }
    },
  };
}

// Run the tool stack against the merged wordlist, returning
// `{ rows, atomCount }`. Each row is a ChainRow — `{ atoms: Atom[] }` — where
// an Atom is `{ wlEntry, highlights, glyph }`, where `highlights` is a flat
// list of ranges — or `null` when the atom is not a highlight slot (the
// originator, a plain transform output). Seeded one-atom-per-merged-entry;
// each transform branches a row into one new row per output (appending an
// output atom, plus a same-word input-mark atom when it highlights its input),
// each highlighting filter appends a same-word atom carrying its match. Tools
// emit unconditionally — `unify` folds the redundant same-word atoms
// afterward. Run-less and inert tools are transparent. The executor owns the
// per-row loop, cooperative yielding, and abort: `signal` aborts a superseded
// run at the next yield.
async function executePipeline(mergedWordlist, stack, signal) {
  const y = makeYielder(signal);
  let rows = await buildInitialRows(mergedWordlist, y);
  let grouped = false;
  for (const stackRow of stack) {
    const tool = TOOLS[stackRow.tool];
    if (!tool) continue;

    if (tool.kind === 'group') {
      if (!tool.group || tool.isInert?.(stackRow.params)) continue;
      throwIfAborted(signal);
      const params = normalizeParams(stackRow.params);
      const ctx = makeCtx(mergedWordlist, rows, signal, y);
      const prepared = tool.prepare ? await tool.prepare(params, ctx) : params;
      rows = await tool.group(rows, prepared, ctx);
      grouped = true;
      continue;
    }

    if (!tool.run || tool.isInert?.(stackRow.params)) continue;
    throwIfAborted(signal);
    const params = normalizeParams(stackRow.params);

    if (grouped) {
      // A group is a stack of word-set lines; a chained tool maps the tail
      // line to the next one (appendGroupLine), per group.
      const flat = rows.flatMap(g =>
        g.lines[g.lines.length - 1].cells.map(c => ({ atoms: [{ wlEntry: c.wlEntry }] })));
      const prepared = tool.prepare
        ? await tool.prepare(params, makeCtx(mergedWordlist, flat, signal, y))
        : params;
      for (const g of rows) {
        appendGroupLine(g, tool, prepared, mergedWordlist);
        if (y.due()) await y.yield();
      }
    } else {
      const prepared = tool.prepare
        ? await tool.prepare(params, makeCtx(mergedWordlist, rows, signal, y))
        : params;
      rows = await runToolStage(rows, tool, prepared, mergedWordlist, y);
    }
  }

  if (grouped) {
    return {
      rows: rows.filter(g => g.lines[g.lines.length - 1].cells.length > 0),
      atomCount: currentGroupLineCount(stack),
      grouped: true,
    };
  }
  const multiAtom = chainProducesMultiAtom(stack);
  return {
    rows: multiAtom ? await unify(rows, y) : rows,
    atomCount: currentAtomCount(stack),
    grouped: false,
  };
}

async function runToolStage(rows, tool, prepared, mergedWordlist, y) {
  const next = [];
  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    const tail = row.atoms[row.atoms.length - 1];
    const result = tool.run(tail.wlEntry.entry, prepared, mergedWordlist);
    if (tool.kind === 'filter') {
      if (result) {
        // A highlighting filter (search) appends a same-word atom carrying
        // its ranges (an empty array when it matched without producing any)
        // — `unify` folds it into the tail unless the tail is itself a
        // highlight slot. A plain filter just keeps the row.
        if (tool.inputHighlights) {
          next.push({ atoms: [...row.atoms,
            { wlEntry: tail.wlEntry, highlights: Array.isArray(result) ? result : [], glyph: null }] });
        } else {
          next.push(row);
        }
      }
    } else {
      for (const out of (result || [])) {
        // Atoms are immutable once created, so branches share the existing
        // atoms and only append their own.
        const atoms = row.atoms.slice();
        // A transform that marks its input appends a same-word input-mark
        // atom before the output atom; `unify` folds it into the input
        // unless the input is itself a highlight slot.
        if (tool.inputHighlights) {
          atoms.push({ wlEntry: tail.wlEntry, highlights: out.inputHighlights || [], glyph: null });
        }
        const synthetic = Array.isArray(out.entry);
        const text = synthetic ? out.entry[0] : out.entry;
        const wlEntry = synthetic
          ? { entry: text, score: out.entry[1], comment: '', wordlist: null }
          : (mergedWordlist.byEntry.get(text)
             || { entry: text, score: 0, comment: '', wordlist: null });
        atoms.push({
          wlEntry,
          // A non-`outputHighlights` transform's output is not a highlight
          // slot — `null`, not `[]` — so `unify` may fold it like any atom.
          highlights: tool.outputHighlights ? (out.outputHighlights || []) : null,
          glyph: tool.glyph || '→',
        });
        next.push({ atoms });
      }
    }
    if (y.due()) await y.yield();
  }
  return next;
}

// Run one tool over a group's tail line, appending the next line(s). Input
// marks fold into the tail line when it carries no marks yet, or take a line
// of their own when it does — two tools' highlights never share a line.
function appendGroupLine(group, tool, prepared, wordlist) {
  const tail = group.lines[group.lines.length - 1];
  if (tool.kind === 'filter') {
    const cells = [];
    for (const cell of tail.cells) {
      const result = tool.run(cell.wlEntry.entry, prepared, wordlist);
      if (!result) continue;
      cells.push({
        wlEntry: cell.wlEntry,
        highlights: tool.inputHighlights ? (Array.isArray(result) ? result : []) : null,
      });
    }
    group.lines.push({ cells, slot: !!tool.inputHighlights });
    return;
  }
  const outMap = new Map();        // output entry → cell (deduped)
  const inputMarks = new Map();    // input entry → its inputHighlights
  for (const cell of tail.cells) {
    const result = tool.run(cell.wlEntry.entry, prepared, wordlist) || [];
    if (tool.inputHighlights && result.length) {
      inputMarks.set(cell.wlEntry.entry, result[0].inputHighlights || []);
    }
    for (const out of result) {
      const synthetic = Array.isArray(out.entry);
      const text = synthetic ? out.entry[0] : out.entry;
      if (outMap.has(text)) continue;
      const wlEntry = synthetic
        ? { entry: text, score: out.entry[1], comment: '', wordlist: null }
        : (wordlist.byEntry.get(text) || { entry: text, score: 0, comment: '', wordlist: null });
      outMap.set(text, {
        wlEntry,
        highlights: tool.outputHighlights ? (out.outputHighlights || []) : null,
      });
    }
  }
  if (tool.inputHighlights) {
    const markCells = tail.cells.map(c => ({
      wlEntry: c.wlEntry,
      highlights: inputMarks.get(c.wlEntry.entry) || [],
    }));
    if (tail.slot) group.lines.push({ cells: markCells, slot: true });
    else { tail.cells = markCells; tail.slot = true; }
  }
  group.lines.push({ cells: [...outMap.values()], slot: !!tool.outputHighlights });
}

// How many lines a group row carries — read by the scroller for its stride,
// so it must stay in lockstep with what appendGroupLine actually produces.
function currentGroupLineCount(stack) {
  let lines = 1;
  let tailSlot = false;
  for (const row of stack) {
    const tool = TOOLS[row.tool];
    if (!tool?.run || tool.isInert?.(row.params)) continue;
    if (tool.kind === 'filter') {
      lines++;
      tailSlot = !!tool.inputHighlights;
    } else {
      if (tool.inputHighlights && tailSlot) lines++;
      lines++;
      tailSlot = !!tool.outputHighlights;
    }
  }
  return lines;
}

// Post-executor unification — two collapses that turn the executor's
// emit-everything output into the displayed chain rows.
//
// Within a row, `collapseRepeatAtoms` folds adjacent atoms for the same word:
// the originator and a search's same-word atom become one, while two searches'
// atoms stay distinct — the rule is "fold unless both carry highlights."
//
// Across rows, a transform like semordnilap emits both directed halves of a
// pair (STRESSED→DESSERTS and DESSERTS→STRESSED). Exact reverses — same
// entries mirrored, same scores — collapse to one row, its relation glyphs
// promoted to ↔. A downstream transform breaks the symmetry, so those rows
// fail the mirror test and stay separate with their directed → glyphs. The
// survivor is whichever direction's entry chain sorts lexicographically
// smaller — picked explicitly, so it's deterministic regardless of emit order
// — and it keeps its own highlights; the dropped direction's are not carried
// over.
async function unify(rows, y) {
  const seen = new Map();   // entry-chain key → { row, index } of its slot in `out`
  const out = [];
  for (let i = 0; i < rows.length; i++) {
    const row = { atoms: collapseRepeatAtoms(rows[i].atoms) };
    const entries = row.atoms.map(a => a.wlEntry.entry);
    const fwd = entries.join('\0');
    const rev = [...entries].reverse().join('\0');
    let folded = false;
    if (fwd !== rev) {
      const mirror = seen.get(rev);
      if (mirror) {
        const mScores = mirror.row.atoms.map(a => a.wlEntry.score);
        const rScores = row.atoms.map(a => a.wlEntry.score).reverse();
        if (mScores.every((s, j) => s === rScores[j])) {
          const survivor = fwd < rev ? row : mirror.row;
          survivor.atoms = survivor.atoms.map(a => a.glyph ? { ...a, glyph: '↔' } : a);
          out[mirror.index] = survivor;
          folded = true;
        }
      }
    }
    if (!folded) {
      seen.set(fwd, { row, index: out.length });
      out.push(row);
    }
    if (y.due()) await y.yield();
  }
  return out;
}

// Fold adjacent same-word atoms in a row into one. An atom is a *highlight
// slot* when its `highlights` is an array (a search's atom, a transform's
// input/output mark) and not a slot when `highlights` is `null` (the
// originator, a plain transform output). Two slot atoms for the same word stay
// distinct — that's how three searches render as three lines; any other
// same-word pair folds. Keying on slot-ness, not on whether the array is
// non-empty, keeps the row's atom count matched to `currentAtomCount` even
// when a tool highlights only conditionally (a wildcard-only search matches
// without producing ranges, yet still holds its slot).
function collapseRepeatAtoms(atoms) {
  const out = [atoms[0]];
  for (let i = 1; i < atoms.length; i++) {
    const prev = out[out.length - 1];
    const cur = atoms[i];
    if (prev.wlEntry.entry === cur.wlEntry.entry &&
        !(prev.highlights !== null && cur.highlights !== null)) {
      // Survivor keeps `prev`'s glyph (a repeat atom has none) and takes the
      // highlight slot when one side is one.
      if (cur.highlights !== null) out[out.length - 1] = { ...prev, highlights: cur.highlights };
    } else {
      out.push(cur);
    }
  }
  return out;
}

// Flatten the chain rows to their atoms' wlEntries, row order. Feeds the stats
// aggregates / histogram — a chain row contributes each distinct word's score.
// Atoms that merely repeat the previous atom's word (a multi-search row stacks
// the same word under several highlights) are skipped so one entry isn't
// counted once per highlight.
function flattenAtoms(rows) {
  const out = [];
  const pushChain = chain => {
    let prev = null;
    for (const atom of chain.atoms) {
      if (atom.wlEntry.entry === prev) continue;
      out.push(atom.wlEntry);
      prev = atom.wlEntry.entry;
    }
  };
  for (const row of rows) {
    if (row.lines) { for (const line of row.lines) for (const c of line.cells) out.push(c.wlEntry); }
    else pushChain(row);
  }
  return out;
}

function* rowSetAtoms(rows) {
  for (const row of rows) {
    if (row.lines) { for (const line of row.lines) yield* line.cells; }
    else yield* row.atoms;
  }

// ─── Pipeline runtime ─────────────────────────────────────────────────────────
// The runtime wraps `executePipeline` with supersession (a new run aborts the
// in-flight one) and a slow-pipeline indicator that dims the results table
// when the whole run exceeds ~100ms.

const SLOW_PIPELINE_THRESHOLD_MS = 100;
// Yield budget — when an in-helper loop has consumed this much CPU since its
// last yield, it gives the browser a turn. ~6ms is roughly half a 60Hz frame,
// leaving the other half for input handling and paint. Iteration-count chunking
// blows up at small body sizes: 1K iterations of ~1μs work yields every ~1ms,
// burning hundreds of ms of pure yield overhead on a 500K filter. Time-based
// chunking keeps yield count proportional to wall-clock cost.
const YIELD_INTERVAL_MS = 6;
// scheduler.yield is the modern primitive (Chrome 129+); the setTimeout fallback
// is universal and lands the browser back on the macrotask queue, which is what
// we want — input events and paints get a turn before the tool resumes.
const _yieldImpl = (typeof scheduler !== 'undefined' && typeof scheduler.yield === 'function')
  ? () => scheduler.yield()
  : () => new Promise(r => setTimeout(r, 0));

function throwIfAborted(signal) {
  if (signal?.aborted) throw signal.reason ?? new DOMException('Aborted', 'AbortError');
}

// Cooperative-yield gate, one per run. `due()` is a cheap synchronous check;
// when true the caller `await`s `yield()`. `due()` can't read the clock every
// iteration, so it samples once per `stride` calls and retunes `stride` to keep
// those samples ~YIELD_CLOCK_TARGET_MS apart whatever the per-iteration cost.
const YIELD_CLOCK_TARGET_MS = 1;
const YIELD_STRIDE_MAX = 1 << 16;
function makeYielder(signal) {
  let stride = 1, sinceCheck = 0;
  let lastClock = performance.now(), lastYield = lastClock;
  return {
    due() {
      if (++sinceCheck < stride) return false;
      const now = performance.now();
      const elapsed = now - lastClock;
      if (elapsed > 0) stride = Math.max(1, Math.min(YIELD_STRIDE_MAX, Math.round(stride * YIELD_CLOCK_TARGET_MS / elapsed)));
      lastClock = now;
      sinceCheck = 0;
      return now - lastYield >= YIELD_INTERVAL_MS;
    },
    async yield() {
      await _yieldImpl();
      throwIfAborted(signal);
      lastYield = lastClock = performance.now();
    },
  };
}

// Single-flight controller — every runPipeline call aborts the previous one's
// signal before starting its own run. In-flight tools observe the abort at
// their next `ctx.yield()` (or at the executor's per-row check, for sync tools)
// and bail out; the aborted run's resolved value is discarded by its caller.
let _pipelineController = null;
let _pipelineRunning = 0;
const _pipelineIdleWaiters = [];

// Resolves the next time no pipeline run is in flight. Used by the test bridge
// to await async runs triggered by keystroke / setStack before reading the DOM.
function pipelineIdle() {
  if (_pipelineRunning === 0) return Promise.resolve();
  return new Promise(r => _pipelineIdleWaiters.push(r));
}

// Run the current stack against the merged wordlist. Returns
// `{ rows, atomCount }` on completion, or `{ aborted: true }` if a newer call
// superseded this one. Callers drop their result on `aborted` rather than
// touching the scroller — the superseding caller will produce the next update.
//
// The slow-pipeline indicator is one global signal: a timer dims the results
// table when the whole run total crosses the threshold (not per-step — a long
// pipeline of individually-fast tools still trips it).
async function runPipeline(mergedWordlist, stack) {
  _pipelineController?.abort();
  const ac = new AbortController();
  _pipelineController = ac;
  _pipelineRunning++;

  const panel = document.getElementById('entries-table-panel');
  const slowTimer = setTimeout(() => panel?.classList.add('pipeline-running'), SLOW_PIPELINE_THRESHOLD_MS);

  try {
    const result = await executePipeline(mergedWordlist, stack, ac.signal);
    return { ...result, aborted: false };
  } catch (e) {
    if (ac.signal.aborted) return { aborted: true };
    throw e;
  } finally {
    clearTimeout(slowTimer);
    panel?.classList.remove('pipeline-running');
    if (_pipelineController === ac) _pipelineController = null;
    _pipelineRunning--;
    if (_pipelineRunning === 0) {
      const waiters = _pipelineIdleWaiters.splice(0);
      waiters.forEach(fn => fn());
    }
  }
}

const ToolStack = (() => {
  // The user's pipeline. The last row is always the permanent Search bar —
  // rendered with .search-bar chrome, undeletable; user tools sit above it.
  // [{ tool: 'anagram', params: {…} }, …, { tool: 'search', params: {…} }]
  let stack = [{ tool: 'search', params: {} }];

  // The permanent Search bar (always the last row) and the user tools above
  // it. getStack() is the full pipeline — what the executor and URL consume.
  function getSearchBarRow() { return stack[stack.length - 1]; }
  function getUserStack() { return stack.slice(0, -1); }

  function paramsHTML(tool, idx, valuesByKey) {
    if (!tool.params.length) return '';
    const inputs = tool.params.map((p, i) => {
      if (p.type === 'checkbox') {
        const checked = valuesByKey?.[p.key] ? ' checked' : '';
        return `<span class="tool-row-param"><label><input type="checkbox" data-row="${idx}" data-key="${p.key}"${checked}> ${esc(p.label)}</label></span>`;
      }
      const value = esc(valuesByKey?.[p.key] || '');
      // The first text param's value rides on the tool-name key, so it needs
      // no label; a number param is too terse to read bare, so it keeps one.
      const labelHTML = p.type === 'number' ? `<label>${esc(p.label)}</label>`
                      : i === 0 ? ''
                      : `<label>${esc(p.label)}:</label>`;

        return `<span class="tool-row-param">${labelHTML}<input type="number" min="1" class="tool-row-num" placeholder="any" value="${value}" data-row="${idx}" data-key="${p.key}"></span>`;
      }
      return `<span class="tool-row-param">${labelHTML}<input type="text" placeholder="${esc(p.label)}" value="${value}" data-row="${idx}" data-key="${p.key}"></span>`;
    }).join('');
    return `<span class="tool-row-params">${inputs}</span>`;
  }

  // A gallery-added Search tool row reuses the search bar's input chrome
  // (input + clear + whole-word + wildcard help) rather than the generic
  // param fields, so every Search surface looks and behaves identically.
  // Wired via delegated data-row/data-key, like any other tool row.
  function searchRowParamsHTML(idx, row) {
    return buildSearchInputRowHTML({
      query: row.params.query || '', wholeWord: !!row.params['whole-word'],
      inputAttrs: `data-row="${idx}" data-key="query"`,
      clearAttrs: `data-row="${idx}"`,
      wholeWordAttrs: `data-row="${idx}" data-key="whole-word"`,
      wholeWordTitle: 'Whole word',
    });
  }

  function buildRowHTML(idx, row) {
    // The last row is the permanent Search bar — its own chrome, no remove
    // button (undeletable). Everything above it is an ordinary tool row.
    if (idx === stack.length - 1) return buildSearchBarHTML();
    const tool = TOOLS[row.tool];
    if (!tool) return '';
    const params = row.tool === 'search'
      ? searchRowParamsHTML(idx, row)
      : paramsHTML(tool, idx, row.params);
    return `<div class="tool-row">
      ${buildDragHandleHTML()}
      <div class="tool-row-body">
        ${buildToolLabelHTML(tool)}
        ${params}
      </div>
      <button type="button" class="tool-row-remove" data-remove="${idx}" title="Remove" aria-label="Remove ${esc(tool.name)}"><svg width="12" height="12"><use href="#icon-x"/></svg></button>
    </div>`;
  }

  function buildGalleryCardHTML(toolKey, tool) {
    return `<div class="gallery-card" data-tool="${esc(toolKey)}">
      <div class="gallery-card-name">${buildToolLabelHTML(tool)}</div>
      <div class="gallery-card-desc">${esc(tool.desc)}</div>
      <div class="gallery-card-example">${esc(tool.example)}</div>
    </div>`;
  }

  function buildGalleryHTML() {
    const byCategory = new Map(TOOL_CATEGORIES.map(c => [c.id, []]));
    Object.entries(TOOLS).forEach(([key, tool]) => {
      byCategory.get(tool.category)?.push([key, tool]);
    });
    return TOOL_CATEGORIES.map(cat => {
      const cards = byCategory.get(cat.id) || [];
      if (!cards.length) return '';
      return `<div class="gallery-section-label">${esc(cat.label)}</div>` +
             cards.map(([key, tool]) => buildGalleryCardHTML(key, tool)).join('');
    }).join('');
  }

  // Used by mountWorkshopPanel for the initial render. Mutations after that
  // re-render the user tool rows via rerenderRows, which leaves the Search
  // bar's DOM in place. The hover insertion cursor is purely transient and
  // lives only in the DOM, so it's not serialized here.
  function buildHTML() {
    const rows = stack.map((row, idx) => buildRowHTML(idx, row)).join('');
    return `<div id="tool-stack">${rows}</div>`;
  }

  function stackEl() { return document.getElementById('tool-stack'); }
  function panelEl() { return document.getElementById('detail-panel'); }

  function rowEls() {
    const e = stackEl();
    if (!e) return [];
    return Array.from(e.querySelectorAll('.tool-row'));
  }

  function focusRowInput(idx) {
    // First text/number input in the row — the first param of an ordinary
    // tool, or the query field of a Search row (.search-input-wrap chrome).
    rowEls()[idx]?.querySelector('input[type="text"], input[type="number"]')?.focus();
  }

  function flashRow(idx) {
    rowEls()[idx]?.classList.add('flash');
  }

  function refreshGalleryActive() {
    // The permanent Search bar isn't a "tool the user added" — gallery-active
    // marks only the user tools above it.
    const active = new Set(getUserStack().map(r => r.tool));
    const groupTaken = stack.some(r => TOOLS[r.tool]?.kind === 'group');
    document.querySelectorAll('.gallery-card[data-tool]').forEach(card => {
      card.classList.toggle('active', active.has(card.dataset.tool));
      const tool = TOOLS[card.dataset.tool];
      const blocked = groupTaken && tool?.kind === 'group';
      card.classList.toggle('disabled', blocked);
      if (blocked) card.title = 'A pipeline can have only one group tool';
      else card.removeAttribute('title');
    });
  }

  function searchBarEl() { return panelEl()?.querySelector('.search-bar'); }
  function removeCursor() { document.querySelector('.tool-stack-cursor')?.remove(); }

  // Hovering a gallery card shows a .tool-stack-cursor — an insertion caret

  // tool row and the permanent Search bar, or the top of the stack when no
  // user tools exist yet. Parented in .search-bar, absolutely positioned so
  // it adds zero vertical space. Every click appends, so there's nothing
  // destructive to preview — the cursor is the whole hover affordance.

    const sbar = searchBarEl();
    if (sbar && !sbar.querySelector('.tool-stack-cursor')) {

  // inside it survive a tool add/remove. The wildcard-help popups are then
  // re-attached, since a rebuilt Search tool row gets a fresh input anchor.
  // A full re-render (which does rebuild the bar) happens only via
  // mountWorkshopPanel.
  function rerenderRows() {
    const e = stackEl();
    if (!e) return;
    removeCursor();
    const bar = e.querySelector('.search-bar');
    e.querySelectorAll('.tool-row').forEach(r => r.remove());
    getUserStack().forEach((row, i) => {
      const tmp = document.createElement('div');
      tmp.innerHTML = buildRowHTML(i, row);
      e.insertBefore(tmp.firstElementChild, bar);
    });

  }

  function add(toolKey) {
    if (!TOOLS[toolKey]) return;
    if (TOOLS[toolKey].kind === 'group' && stack.some(r => TOOLS[r.tool]?.kind === 'group')) return;
    const idx = stack.length - 1;            // insert just above the Search bar
    stack.splice(idx, 0, { tool: toolKey, params: {} });
    rerenderRows();
    focusRowInput(idx);
    flashRow(idx);
    refreshGalleryActive();
    refreshWorkshopMergedScroller();
    Router.navigate();
  }

  function removeAt(idx) {
    // The permanent Search bar (last row) is undeletable.
    if (idx < 0 || idx >= stack.length - 1) return;
    stack.splice(idx, 1);
    rerenderRows();
    refreshGalleryActive();
    refreshWorkshopMergedScroller();
    Router.navigate();
  }

  function reorderAt(fromIdx, toIdx) {
    const lastUser = stack.length - 1;
    if (fromIdx === toIdx ||
        fromIdx < 0 || fromIdx >= lastUser ||
        toIdx < 0 || toIdx >= lastUser) return;
    const [row] = stack.splice(fromIdx, 1);
    stack.splice(toIdx, 0, row);
    rerenderRows();
    refreshWorkshopMergedScroller();
    Router.navigate();
  }

  function init() {
    const galleryBody = document.querySelector('.gallery-body');
    if (galleryBody) galleryBody.innerHTML = buildGalleryHTML();
    galleryBody?.addEventListener('click', (e) => {
      const card = e.target.closest('.gallery-card[data-tool]');
      if (!card || card.classList.contains('disabled')) return;
      const toolKey = card.dataset.tool;
      if (!TOOLS[toolKey]) return;
      add(toolKey);
    });

    document.querySelectorAll('.gallery-card[data-tool]').forEach(card => {
      card.addEventListener('mouseenter', () => {
        if (!card.classList.contains('disabled')) showInsertCursor();
      });
      card.addEventListener('mouseleave', () => removeCursor());
    });

    const p = panelEl();
    p?.addEventListener('click', (e) => {
      const removeBtn = e.target.closest('.tool-row-remove[data-remove]');
      if (removeBtn) {
        removeAt(parseInt(removeBtn.dataset.remove, 10));
        return;
      }
      // A Search tool row's clear button — empties its query and re-renders.
      const clearBtn = e.target.closest('.tool-row .clear-btn[data-row]');
      if (clearBtn) {
        const idx = parseInt(clearBtn.dataset.row, 10);
        if (stack[idx]) {
          stack[idx].params.query = '';
          rerenderRows();
          focusRowInput(idx);
          refreshWorkshopMergedScroller();
          Router.navigate();
        }
        return;
      }
    });
    p?.addEventListener('input', (e) => {
      const input = e.target.closest('input[data-row]');
      if (!input) return;
      const idx = parseInt(input.dataset.row, 10);
      const key = input.dataset.key;
      if (stack[idx]) {
        stack[idx].params[key] = input.type === 'checkbox' ? input.checked : input.value;
        // A Search tool row's clear button tracks whether its query is empty.
        const clearBtn = input.closest('.search-input-wrap')?.querySelector('.clear-btn');
        if (clearBtn) clearBtn.hidden = !input.value;
        refreshWorkshopMergedScroller();
        Router.navigate();
      }
    });

    // ── Drag-to-reorder tool rows ─────────────────────────────────────────
    // The drag handle is the drag source (not the whole row) so dragging
    // inside a param input still selects text. rowEls() lists only the user
    // tool rows — the .search-bar isn't a .tool-row — so its indices line up
    // with the user portion of `stack`, and a drop onto the bar is ignored.
    let _dragIdx = null;
    p?.addEventListener('dragstart', e => {
      const handle = e.target.closest('.tool-row .drag-handle[draggable]');
      if (!handle) return;
      const row = handle.closest('.tool-row');
      _dragIdx = rowEls().indexOf(row);
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', '');
      e.dataTransfer.setDragImage(row, 0, 0);
      setTimeout(() => row.classList.add('dragging'), 0);
    });
    p?.addEventListener('dragend', () => {
      stackEl()?.querySelectorAll('.tool-row.dragging, .tool-row.drag-over')
        .forEach(r => r.classList.remove('dragging', 'drag-over'));
      _dragIdx = null;
    });
    p?.addEventListener('dragover', e => {
      if (_dragIdx === null) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const row = e.target.closest('.tool-row');
      if (!row || rowEls().indexOf(row) === _dragIdx) return;
      stackEl()?.querySelectorAll('.tool-row.drag-over').forEach(r => r.classList.remove('drag-over'));
      row.classList.add('drag-over');
    });
    p?.addEventListener('dragleave', e => {
      const row = e.target.closest('.tool-row');
      if (row && !row.contains(e.relatedTarget)) row.classList.remove('drag-over');
    });
    p?.addEventListener('drop', e => {
      if (_dragIdx === null) return;
      const row = e.target.closest('.tool-row');
      if (!row) return;
      e.preventDefault();
      reorderAt(_dragIdx, rowEls().indexOf(row));
    });

    refreshGalleryActive();
  }

  // setStack replaces the internal stack without animation or URL roundtrip —
  // used by Router.applyURL on init. The decoded rows are the full pipeline;
  // their trailing Search row (if any) is the permanent bar — append an empty
  // one when absent so the invariant "last row = Search bar" always holds.
  // The next mountWorkshopPanel call (in renderAll) renders the rows; init()
  // attaches handlers afterwards.
  function setStack(newStack) {
    const rows = Array.isArray(newStack) ? newStack.slice() : [];
    if (!rows.length || rows[rows.length - 1].tool !== 'search') {
      rows.push({ tool: 'search', params: {} });
    }
    stack = rows;
  }
  function getStack() { return stack; }

  return { buildHTML, refreshGalleryActive, init, getStack, setStack, getSearchBarRow, getUserStack };
})();

// ─── Input helpers ────────────────────────────────────────────────────────────

function blockSemicolon(e) {
  if (!e.data?.includes(';')) return;
  e.preventDefault();
  const el = e.target;
  el.classList.remove('shake');
  void el.offsetWidth; // force reflow so re-triggering restarts the animation
  el.classList.add('shake');
  el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
  showToast('Semicolons are not allowed');
}

// ─── Virtual Scroller ─────────────────────────────────────────────────────────

// Workshop sort axes, split by sort tier — filter-only chains (empty stack or
// searches) sort by Entry / Length / Score; chains with a transform swap Score
// for Min score / Max score. Entry and Length project off the *first* atom —
// the merged-wordlist entry the row grew from — so the table keeps its order when
// a tool is added: a filter or 1-output transform leaves every first atom in
// place, so the rows can't reshuffle. Min/Max project across every atom.
//
// Each axis declares its primary projection and a fixed-direction tiebreaker
// chain — when the primary ties, fall to whichever direction surfaces the
// most interesting rows first (longer > shorter, higher score > lower), with
// alphabetical asc as the final stable tiebreaker. Flipping the user-level
// asc/desc toggle reverses only the primary; tiebreakers keep their declared
// direction, so "score asc" still shows the longest among the lowest-scoring
// rows first instead of letting short junk float to the top of a tied bucket.
//
// A multi-output transform (anagram) branches one input into rows that share
// their whole first atom; rowChainTail breaks those ties by the later atoms.
const rowFirstEntry = r => r.atoms[0].wlEntry;
const rowLastEntry  = r => r.atoms[r.atoms.length - 1].wlEntry;

// atom-by-atom, since every row in a run carries the same atom count.

const groupMaxScore = g => Math.max(...groupScores(g));
const groupCount    = g => g.lines[0].cells.length;
const WORKSHOP_SORT_AXES = {
  single: {
    entry: {
      label: 'Entry',
      primary: r => rowFirstEntry(r).entry,
      tiebreakers: [
        { project: r => rowFirstEntry(r).entry.length, dir: 'desc' },
        { project: r => rowFirstEntry(r).score,        dir: 'desc' },
      ],
    },
    length: {
      label: 'Length',
      primary: r => rowFirstEntry(r).entry.length,
      tiebreakers: [
        { project: r => rowFirstEntry(r).score, dir: 'desc' },
        { project: r => rowFirstEntry(r).entry, dir: 'asc'  },
      ],
    },
    score: {
      label: 'Score',
      primary: r => rowFirstEntry(r).score,
      tiebreakers: [
        { project: r => rowFirstEntry(r).entry.length, dir: 'desc' },
        { project: r => rowFirstEntry(r).entry,        dir: 'asc'  },
      ],
    },
  },
  multi: {
    entry: {
      label: 'Entry',
      primary: r => rowFirstEntry(r).entry,
      // First-atom entries are unique per input, so the only ties are a
      // multi-output transform's branches — settled by the chain tail.
      tiebreakers: [
        { project: rowChainTail, dir: 'asc' },
      ],
    },
    length: {
      label: 'Length',
      primary: r => rowFirstEntry(r).entry.length,
      // First-atom score then entry replays the tool-less Length order; the
      // chain tail then separates a multi-output transform's branches.
      tiebreakers: [
        { project: r => rowFirstEntry(r).score, dir: 'desc' },
        { project: r => rowFirstEntry(r).entry, dir: 'asc'  },
        { project: rowChainTail,                dir: 'asc'  },
      ],
    },
    'min-score': {
      label: 'Min score',
      primary: rowMinScore,
      tiebreakers: [
        { project: r => rowLastEntry(r).entry.length, dir: 'desc' },
        { project: r => rowLastEntry(r).entry,        dir: 'asc'  },
      ],
    },
    'max-score': {
      label: 'Max score',
      primary: rowMaxScore,
      tiebreakers: [
        { project: r => rowLastEntry(r).entry.length, dir: 'desc' },
        { project: r => rowLastEntry(r).entry,        dir: 'asc'  },
      ],
    },
  },
  group: {
    entry: {
      label: 'Entry',
      // The cluster cells as displayed — _sortGroupCells alphabetizes them
      // for this axis, so rows order by the whole word list, not g.key.

      tiebreakers: [{ project: groupCount, dir: 'desc' }],
    },
    count: {
      label: 'Count',
      primary: groupCount,
      tiebreakers: [{ project: g => g.key, dir: 'asc' }],
    },
    'min-score': {
      label: 'Min score',
      primary: groupMinScore,
      tiebreakers: [
        { project: groupCount, dir: 'desc' },
        { project: g => g.key, dir: 'asc'  },
      ],
    },
    'max-score': {
      label: 'Max score',
      primary: groupMaxScore,
      tiebreakers: [
        { project: groupCount, dir: 'desc' },
        { project: g => g.key, dir: 'asc'  },
      ],
    },
  },

const WORKSHOP_DEFAULT_SORT_BY_TIER = { single: 'entry', multi: 'min-score', group: 'entry' };

const SORT_AXIS_TIER_MAP = {

function chainSortTier(stack) {

}
// Library entries sort by the same three axes over plain wlEntries; the
// LibraryEntriesScroller owns its own comparison, so only the labels matter.
const LIBRARY_SORT_AXES = { entry: { label: 'Entry' }, length: { label: 'Length' }, score: { label: 'Score' } };
// Entry sorts ascending (alphabetical reads naturally A→Z). Every other axis
// sorts descending — top-down reads as "best first".
function defaultSortDir(key) {
  return key === 'entry' ? 'asc' : 'desc';
}

// Run synchronously on stack mutation and URL load: the sort tier follows
// the stack, and settling it lazily in the async render let the URL builder
// read a stale axis. A real cross-tier counterpart (Score ⇄ Min score) keeps
// the user's direction; a fallback to the tier default resets it too.
function reconcileSort(stack) {
  const tier = chainSortTier(stack);
  const axes = workshopSortAxes(tier);
  let key = WorkshopView.sortKey;
  let dir = WorkshopView.sortDir;
  if (!(key in axes)) {
    const mapped = SORT_AXIS_TIER_MAP[key];
    if (mapped && mapped in axes) {
      key = mapped;
    } else {
      key = WORKSHOP_DEFAULT_SORT_BY_TIER[tier];
      dir = defaultSortDir(key);
    }
  }
  WorkshopView.setSort(key, dir);
}

// Compare two items along an axis, falling through tiebreakers when the
// primary projection is equal. Primary direction is the user's pick;
// tiebreakers keep their declared direction regardless.
function compareItems(a, b, axis, primaryDir) {
  const primCmp = compareValues(axis.primary(a), axis.primary(b)) * (primaryDir === 'asc' ? 1 : -1);
  if (primCmp !== 0) return primCmp;
  for (const tb of axis.tiebreakers) {
    const cmp = compareValues(tb.project(a), tb.project(b)) * (tb.dir === 'asc' ? 1 : -1);
    if (cmp !== 0) return cmp;
  }
  return 0;
}

function compareValues(a, b) {
  if (Array.isArray(a) && Array.isArray(b)) {
    for (let i = 0; i < Math.min(a.length, b.length); i++) {
      const c = compareValues(a[i], b[i]);
      if (c !== 0) return c;
    }
    return a.length - b.length;
  }
  if (typeof a === 'number' && typeof b === 'number') return a - b;
  return String(a).localeCompare(String(b));
}
const ENTRY_SLOT_CAP = 21;

// Off-screen pixel width of `text` rendered in style class `className`
// (.text-probe positioning is layered on automatically). Memoized per
// text+class, so callers measure freely without caching themselves.
const _textWidths = new Map();
function measureTextWidth(text, className) {
  const key = `${className}\0${text}`;
  let w = _textWidths.get(key);
  if (w === undefined) {
    const probe = document.createElement('span');
    probe.className = `text-probe ${className}`;
    probe.textContent = text;
    document.body.appendChild(probe);
    w = probe.getBoundingClientRect().width;
    probe.remove();
    _textWidths.set(key, w);
  }
  return w;
}

function measureMonoChPx() {
  return measureTextWidth('0'.repeat(100), 'entry-row-font') / 100;
}

// Arrow glyphs render from a fallback face wider than one `ch` — measure them.
function measureAtomGlyphPx() {
  return Math.max(...['→ ', '↔ ', '⊃ '].map(g => measureTextWidth(g, 'entry-row-font')));
}

// Two sample widths separate the badge's per-char width from its fixed padding.
function badgeWidthPx(chars) {
  const w1 = measureTextWidth('0', 'score-badge');
  const chPx = (measureTextWidth('0000000000', 'score-badge') - w1) / 9;
  return Math.max(chars, 1) * chPx + (w1 - chPx);
}

function headerLabelPx(text) {
  return measureTextWidth(text, 'entry-headers-font');
}

// Capture-mode scroll listener catches events from any ancestor — the app's
// scroll container is <main>, not the window, and scroll events don't bubble.
class BaseVirtualScroller {
  constructor(host, sizerClassName) {
    this.host = host;
    this.sizer = document.createElement('div');
    this.sizer.className = sizerClassName;
    host.innerHTML = '';
    host.appendChild(this.sizer);

    this._onWinScroll = () => this._onScroll();
    this._onWinResize = () => this._render();
    window.addEventListener('scroll', this._onWinScroll, { capture: true, passive: true });
    window.addEventListener('resize', this._onWinResize);
    this._resizeObserver = new ResizeObserver(() => this._render());
    this._resizeObserver.observe(host);
  }

  // Subclasses can override to react to scroll (e.g., close any open popover).
  _onScroll() { this._render(); }

  // Per-item vertical stride. Subclasses with variable-height row kinds
  // (pair-stacked on mobile) override this; the value flips on viewport
  // crossings because the base's resize handler re-renders on resize.
  _rowStride() { return ROW_HEIGHT; }

  // Visible item-index range [start, end) for a list of `itemCount` rows. Same
  // viewport-relative math whether the scroll container is <main> or document.
  _visibleRange(itemCount) {
    const stride = this._rowStride();
    const rect = this.host.getBoundingClientRect();
    const viewH = window.innerHeight;
    const visTop = Math.max(0, -rect.top);
    const visBottom = Math.max(0, Math.min(rect.height, viewH - rect.top));
    const start = Math.max(0, Math.floor(visTop / stride) - VS_BUFFER);
    const end   = Math.min(itemCount, Math.ceil(visBottom / stride) + VS_BUFFER);
    return { start, end };
  }

  _clearSizer() {
    while (this.sizer.firstChild) this.sizer.removeChild(this.sizer.firstChild);
  }

  destroy() {
    window.removeEventListener('scroll', this._onWinScroll, { capture: true });
    window.removeEventListener('resize', this._onWinResize);
    this._resizeObserver.disconnect();
  }

  _render() { throw new Error('subclass must implement _render'); }
}

class WorkshopEntriesScroller extends BaseVirtualScroller {
  constructor(host) {
    super(host, 'entries-table-rows');
    this.toolbar = document.getElementById('search-bar-sort');
    // `allEntries` / `entries` hold ChainRow[] — `{ atoms: Atom[] }`, where an
    // Atom is `{ wlEntry, highlights, glyph }`. `atomCount` is the (static,
    // catalog-derived) atom count every row in the pipeline shares — the row's
    // height in lines. `sortTier` ('single' | 'multi') picks the sort axes.
    this.atomCount = 1;
    this.sortTier = 'single';
    this.allEntries = [];
    this.entries = [];
    this.sortKey = WorkshopView.sortKey;
    this.sortDir = WorkshopView.sortDir;
    this.showSource = false;
    this.showDeleteCol = false;
    this.showEditDeleteCol = false;
    this.editsWordlist = null;
    this.currentWordlist = null;
    this._onCellEdit = null;
    this._onDeleteRow = null;
    this.onFilterChange = null;
    // Sorted view of allEntries cached across keystrokes. Filter preserves
    // order, so a sorted source means the filter result is already sorted —
    // no per-keystroke re-sort needed. Invalidated when allEntries change.
    this._sortedSource = null;
    this._sortedSourceKey = null;
    this._sortedSourceDir = null;

    this.sizer.addEventListener('click', e => {
      const target = e.target.closest('.atom-entry, .atom-score, .atom-comment');
      if (!target) return;
      let row, atom;
      const groupRow = target.closest('.group-row');
      if (groupRow) {
        const cellEl = target.closest('.group-cell');
        if (!cellEl) return;
        row = groupRow;
        const g = this.entries[parseInt(groupRow.dataset.idx, 10)];
        atom = g?.lines[parseInt(cellEl.dataset.line, 10)]
                ?.cells[parseInt(cellEl.dataset.cell, 10)];
      } else {
        row = target.closest('.entry-row');
        const atomEl = target.closest('.atom');
        if (!row || !atomEl) return;
        atom = this.entries[parseInt(row.dataset.idx, 10)]?.atoms[parseInt(atomEl.dataset.atom, 10)];
      }
      if (!atom) return;
      // Synthetic atoms (a tool-supplied entry not in any wordlist) have a
      // null `wordlist` — editing their score wouldn't write back anywhere.
      if (atom.wlEntry.wordlist === null) return;
      const field = target.classList.contains('atom-score') ? 'score'
                  : target.classList.contains('atom-comment') ? 'comment'
                  : null;
      AtomPopover.open(atom.wlEntry, row, this, target, field);
    });

    this._buildToolbar();
  }

  // Scroll closes the click-driven AtomPopover so it doesn't anchor to a row
  // that's scrolling out from under it — but only when the popover isn't the
  // focus owner. On iOS, focusing the popover's input scroll-into-views it
  // above the soft keyboard, which fires this handler; closing then would
  // tear down the popover one frame after open.
  _onScroll() {
    this._render();
    if (AtomPopover.containsFocus()) return;
    AtomPopover.close();
  }

  // atomCount / sortTier default to the current values so callers that only
  // update the rows (e.g. display-case re-render) don't need to know the
  // pipeline shape. Search is a pipeline tool now; the scroller only filters
  // by score range.
  setEntries(allEntries, atomCount = this.atomCount, sortTier = this.sortTier) {
    AtomPopover.close();
    this._setChainShape(atomCount, sortTier);
    this.allEntries = allEntries;
    this._invalidateSortCache();
    this._buildToolbar();
    this._sortAndRender();
  }

  updateEntries(allEntries, atomCount = this.atomCount, sortTier = this.sortTier) {
    // An edit committed from inside the popover triggers this re-render;
    // closing then would drop focus mid-tab. _render rebinds the active row.
    if (!AtomPopover.containsFocus()) AtomPopover.close();
    const tierChanged = this._setChainShape(atomCount, sortTier);
    this.allEntries = allEntries;
    this._invalidateSortCache();
    if (tierChanged) { this._buildToolbar(); rebuildEntryHeaders(); }
    this._sortAndRender();
    AtomPopover.rebindEntry(this);
  }

  _setChainShape(atomCount, sortTier) {
    const tierChanged = sortTier !== this.sortTier;
    this.atomCount = atomCount;
    this.sortTier = sortTier;
    this.sortKey = WorkshopView.sortKey;
    this.sortDir = WorkshopView.sortDir;
    return tierChanged;
  }

  _invalidateSortCache() {
    this._sortedSource = null;
  }

  _buildToolbar() {
    if (!this.toolbar) return;
    const arrow = this.sortDir === 'asc' ? '↑' : '↓';
    const options = Object.entries(workshopSortAxes(this.sortTier))
      .map(([key, { label }]) => `<option value="${key}"${key === this.sortKey ? ' selected' : ''}>${label}</option>`)
      .join('');
    this.toolbar.innerHTML = `
      Sort by
      <select class="sort-axis-select">${options}</select>
      <button class="sort-dir-btn" type="button" title="Toggle direction" aria-label="Toggle direction">${arrow}</button>`;
    this.toolbar.querySelector('.sort-axis-select').addEventListener('change', e => {
      const key = e.target.value;
      if (this.sortKey !== key) {
        this.sortKey = key;
        this.sortDir = defaultSortDir(key);
        WorkshopView.setSort(this.sortKey, this.sortDir);
        this._buildToolbar();
        this._sortAndRender();
        Router.navigate();
      }
    });
    this.toolbar.querySelector('.sort-dir-btn').addEventListener('click', () => {
      this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
      WorkshopView.setSort(this.sortKey, this.sortDir);
      this._buildToolbar();
      this._sortAndRender();
      Router.navigate();
    });
  }

  _sortAndRender() {
    this.entries = this._getSortedSource();
    this._computeSlotWidths();
    this._render();
    this.onFilterChange?.();
  }

  _getSortedSource() {
    if (this._sortedSource
        && this._sortedSourceKey === this.sortKey
        && this._sortedSourceDir === this.sortDir) {
      return this._sortedSource;
    }

    let sorted;
    const axis = workshopSortAxes(this.sortTier)[this.sortKey];
    if (!axis) {
      sorted = this.allEntries;
    } else {
      if (this.sortTier === 'group') this._sortGroupCells();
      const dir = this.sortDir;
      sorted = [...this.allEntries].sort((a, b) => compareItems(a, b, axis, dir));
    }

    this._sortedSource = sorted;
    this._sortedSourceKey = this.sortKey;
    this._sortedSourceDir = this.sortDir;
    return sorted;
  }

  // Order the cells within every group line: the Entry axis alphabetizes
  // them ascending (direction reverses the rows, not the words — else the
  // Entry row projection, which reads cell order, double-negates), other
  // axes use score-descending. Runs before the row sort, which projects
  // off cells.
  _sortGroupCells() {
    const byEntry = (a, b) => a.wlEntry.entry.localeCompare(b.wlEntry.entry);
    const byScore = (a, b) => b.wlEntry.score - a.wlEntry.score || byEntry(a, b);
    const cmp = this.sortKey === 'entry' ? byEntry : byScore;
    for (const g of this.allEntries) {
      for (const line of g.lines) line.cells.sort(cmp);
    }
  }

  // Slot widths derived from the longest values across the full result set, then
  // fixed during scroll. Capping the entry slot at ENTRY_SLOT_CAP keeps one outlier
  // from blowing out layout for every other row; longer entries truncate with an
  // ellipsis (full text in the atom's title attribute). Min widths floor each
  // track to its column-header label so the sticky headers fit. Vars are written
  // to #detail-panel so both .entry-row and the .entry-headers (which lives in
  // .sticky-stack, a sibling of the scroller's host) inherit the same values.
  _computeSlotWidths() {
    if (this.sortTier === 'group') { this._computeGroupSlotWidths(); return; }
    // Count and entry slot widths track the unfiltered result so columns
    // don't shift sideways when a search or score filter cuts the visible
    // set down. Len/score slots stay tied to the filtered view since their
    // widths are tiny and effectively constant in practice. Every atom of
    // every row measures against the same tracks so the eye reads down them.
    const total = this.allEntries.length;
    const countDigits = total > 0 ? String(total).length : 1;
    const ch = measureMonoChPx();
    // A glyph atom renders `<glyph> ` ahead of its entry, so its slot need is
    // entry chars + the glyph prefix. Cap the entry text at ENTRY_SLOT_CAP but
    // let the glyph spill past the cap — it's fixed overhead, not entry text.
    const glyphCh = measureAtomGlyphPx() / ch;
    let maxLen = 0, maxLenDigits = 1, maxScoreDigits = 1, hasHighlight = false;
    for (const row of this.allEntries) {
      for (const atom of row.atoms) {
        const len = atom.wlEntry.entry.length + (atom.glyph ? glyphCh : 0);
        if (len > maxLen) maxLen = len;
        if (!hasHighlight && atom.highlights?.length) hasHighlight = true;
      }
    }
    for (const row of this.entries) {
      for (const atom of row.atoms) {
        const d = String(atom.wlEntry.entry.length).length;
        if (d > maxLenDigits) maxLenDigits = d;
        const sd = String(atom.wlEntry.score).length;
        if (sd > maxScoreDigits) maxScoreDigits = sd;
      }
    }
    // A `<mark>` highlight splits the entry into separate text runs, each
    // rounded to a whole pixel independently — the rounding can accumulate
    // past a column sized to the bare text. Reserve a character of slack
    // whenever the result carries highlights so it never clips a fitting entry.
    const entryContentW = Math.min(maxLen, ENTRY_SLOT_CAP + glyphCh) * ch
      + (hasHighlight ? ch : 0);
    const target = this.host.closest('#detail-panel') || this.sizer;
    target.style.setProperty('--count-w', `${(countDigits + 1) * ch}px`);
    // Floored to the header label so it never overflows its column.
    target.style.setProperty('--entry-w', `${Math.max(entryContentW, headerLabelPx('Entry'))}px`);
    target.style.setProperty('--len-w', `${Math.max(maxLenDigits * ch, headerLabelPx('Len'))}px`);
    target.style.setProperty('--score-w', `${Math.max(badgeWidthPx(maxScoreDigits), headerLabelPx('Score'))}px`);
    target.style.setProperty('--source-max', `${22 * ch}px`);
  }

  _statsViewEntries() {
    return flattenAtoms(this.entries);
  }

  // The full merged distribution, not the result rows — the histogram is the
  // score-range drag-select surface, so it must show the scores the range
  // trims away, not only the survivors.
  _histogramViewEntries() {
    return buildMergedWordlist().entries;
  }

  _rowStride() {
    return this.atomCount * ROW_HEIGHT;
  }

  _render() {
    if (this.sortTier === 'group') return this._renderGroups();
    this.host.querySelector('.entries-empty')?.remove();
    const n = this.entries.length;
    const stride = this._rowStride();
    this.sizer.style.height = (n * stride) + 'px';

    const { start, end } = this._visibleRange(n);
    this._clearSizer();

    const tierFor = makeTierLookup();
    const activeEntry = AtomPopover.activeEntry(this);
    let nextActiveRow = null;
    const frag = document.createDocumentFragment();
    for (let i = start; i < end; i++) {
      const row = this._renderChainRow(this.entries[i], i, tierFor, activeEntry);
      row.style.top = (i * stride) + 'px';
      if (row.classList.contains('active')) nextActiveRow = row;
      frag.appendChild(row);
    }
    this.sizer.appendChild(frag);
    if (nextActiveRow) AtomPopover.rebindRow(nextActiveRow);
  }

  // A chain row: a leading row count, then one `.atom` (display:contents) per
  // atom, each contributing an entry / length / score line that stacks
  // vertically and shares column widths with the atoms above it. An atom that
  // merely repeats the word above it (a search's same-word highlight atom)
  // renders entry-only — repeating its length / score / comment / source
  // cells would just be noise.
  _renderChainRow(chainRow, i, tierFor, activeEntry) {
    const atoms = chainRow.atoms;
    let isActive = false;
    let html = `<span class="atom-count">${i + 1}.</span>`;
    atoms.forEach((atom, ai) => {
      const { wlEntry, highlights, glyph } = atom;
      const { entry, score } = wlEntry;
      if (activeEntry && entry === activeEntry) isActive = true;
      const displayed = displayEntry(entry);
      const glyphHTML = glyph ? `<span class="atom-glyph">${glyph} </span>` : '';
      const truncTitle = displayed.length > ENTRY_SLOT_CAP ? ` title="${esc(displayed)}"` : '';
      const entryCell =
        `<span class="atom-entry"${truncTitle}>${glyphHTML}${renderHighlightedText(displayed, highlights)}</span>`;
      // A repeat atom (same word as the one above it) renders bare — entry
      // cell only — so its grid row carries just the re-highlighted word.
      if (ai > 0 && entry === atoms[ai - 1].wlEntry.entry) {
        html += `<span class="atom" data-atom="${ai}">${entryCell}</span>`;
        return;
      }
      const scoreInner = buildScoreBadgeHTML(score);
      const tierLabel = tierFor(score);
      const scoreTitle = tierLabel ? ` title="${esc(tierLabel)}"` : '';
      // Comment + source cells render on every full line; CSS gates their
      // column visibility by viewport width. A synthetic atom (no sourcing
      // wordlist) gets empty cells.
      const commentText = wlEntry.comment || '';
      const sourceWl = wlEntry.wordlist;
      const sourceHTML = sourceWl ? buildWordlistNameHTML(sourceWl, { bold: false }) : '';
      const sourceTitle = sourceWl ? ` title="${esc(sourceWl.name)}"` : '';
      html += `<span class="atom" data-atom="${ai}">` +
        entryCell +
        `<span class="atom-len">${entry.length}</span>` +
        `<span class="atom-score"${scoreTitle}>${scoreInner}</span>` +
        `<span class="atom-comment"${commentText ? ` title="${esc(commentText)}"` : ''}>${esc(commentText)}</span>` +
        `<span class="atom-source"${sourceTitle}>${sourceHTML}</span>` +
        `</span>`;
    });

    const row = document.createElement('div');
    row.className = isActive ? 'entry-row entry-row-font active' : 'entry-row entry-row-font';
    row.dataset.idx = i;
    row.dataset.entry = rowLastEntry(chainRow).entry;
    row.innerHTML = html;
    return row;
  }

  _renderGroups() {
    const n = this.entries.length;
    const stride = this.atomCount * ROW_HEIGHT;
    this.sizer.style.height = (n * stride) + 'px';
    this._renderEmptyState(n);
    const { start, end } = this._visibleRange(n);
    this._clearSizer();
    const activeEntry = AtomPopover.activeEntry(this);
    let nextActiveRow = null;
    const frag = document.createDocumentFragment();
    for (let i = start; i < end; i++) {
      const g = this.entries[i];
      const row = document.createElement('div');
      row.className = 'group-row entry-row-font';
      row.dataset.idx = i;
      row.style.top = (i * stride) + 'px';
      row.innerHTML = g.lines.map((line, li) => this._renderGroupLineHTML(line, li, i)).join('');
      if (activeEntry && g.lines.some(l => l.cells.some(c => c.wlEntry.entry === activeEntry))) {
        row.classList.add('active');
        nextActiveRow = row;
      }
      frag.appendChild(row);
    }
    this.sizer.appendChild(frag);
    // Overflowing lines get `.group-overflow` so CSS fades their right edge —
    // the scroll affordance, since the scrollbar is hidden.
    for (const lineEl of this.sizer.querySelectorAll('.group-entries')) {
      lineEl.classList.toggle('group-overflow', lineEl.scrollWidth > lineEl.clientWidth + 1);
    }
    if (nextActiveRow) AtomPopover.rebindRow(nextActiveRow);
  }

  _renderGroupLineHTML(line, li, rowIdx) {
    const cells = line.cells.map((cell, ci) => {
      const { wlEntry, highlights } = cell;
      const text = renderHighlightedText(displayEntry(wlEntry.entry), highlights);
      const noedit = wlEntry.wordlist === null ? ' atom-noedit' : '';
      return `<span class="group-cell" data-line="${li}" data-cell="${ci}">` +
        `<span class="atom-entry${noedit}">${text}</span>` +
        `<span class="atom-score${noedit}">${buildScoreBadgeHTML(wlEntry.score)}</span></span>`;
    }).join('<span class="group-sep">·</span>');
    return `<div class="group-line">` +
      `<span class="group-rownum">${li === 0 ? (rowIdx + 1) + '.' : ''}</span>` +
      `<span class="group-count">${line.cells.length}</span>` +
      `<span class="group-entries">${cells}</span>` +
      `</div>`;
  }

  _renderEmptyState(n) {
    let emptyEl = this.host.querySelector('.entries-empty');
    if (n === 0) {
      if (!emptyEl) {
        emptyEl = document.createElement('div');
        emptyEl.className = 'entries-empty';
        emptyEl.textContent = 'No groups match.';
        this.host.appendChild(emptyEl);
      }
    } else if (emptyEl) {
      emptyEl.remove();
    }
  }

  _computeGroupSlotWidths() {
    let maxCount = 0;
    for (const g of this.allEntries) {
      for (const line of g.lines) {
        if (line.cells.length > maxCount) maxCount = line.cells.length;
      }
    }
    const target = this.host.closest('#detail-panel') || this.sizer;
    target.style.setProperty('--group-count-w', `${Math.max(
      measureTextWidth(String(maxCount), 'entry-headers-font'),
      headerLabelPx('Count'))}px`);
    target.style.setProperty('--group-rownum-w',
      `${measureTextWidth(this.allEntries.length + '.', 'entry-headers-font')}px`);
  }
}

// Library column-width cache. Computed once across every source's data and
// every rescore rule's effect, so the entry and score columns stay the same
// width as the user navigates between wordlists. Invalidated whenever caches
// bump (rescore rules, source order, imports, etc.).
let _libraryColumnWidthsCache = null;
let _libraryColumnWidthsCacheVersion = -1;

function libraryEntryColumnWidths() {
  const cv = cacheVersion$.peek();
  if (_libraryColumnWidthsCache && _libraryColumnWidthsCacheVersion === cv) {
    return _libraryColumnWidthsCache;
  }
  let maxEntryLen = 0;
  let maxScoreChars = 0;
  for (const wl of state.sources) {
    const rules = wl.rescoreRules || [];
    for (const wlE of wl.rawEntries) {
      if (wlE.entry.length > maxEntryLen) maxEntryLen = wlE.entry.length;
      const inLen = String(wlE.score).length;
      let scoreChars = inLen;
      if (rules.length) {
        const r = rescoreEntry(wlE, rules);
        // Ignored rows render just the input score (struck through via CSS),
        // so they don't expand the score column.
        if (r.kept && r.score !== wlE.score) scoreChars = inLen + 3 + String(r.score).length;
      }
      if (scoreChars > maxScoreChars) maxScoreChars = scoreChars;
    }
  }
  // Also consider the merged All view, in case it carries entries (or scores)
  // wider than any single source after override resolution.
  const merged = buildMergedWordlist().entries;
  for (const wlE of merged) {
    if (wlE.entry.length > maxEntryLen) maxEntryLen = wlE.entry.length;
    const inLen = String(wlE.score).length;
    if (inLen > maxScoreChars) maxScoreChars = inLen;
  }
  _libraryColumnWidthsCache = {
    entryChars: Math.max(Math.min(maxEntryLen, ENTRY_SLOT_CAP), 4),
    scoreChars: Math.max(maxScoreChars, 5),
  };
  _libraryColumnWidthsCacheVersion = cv;
  return _libraryColumnWidthsCache;
}

// Library entries scroller — read-only counterpart to WorkshopEntriesScroller,
// used in the Library view to show a wordlist's contents alongside its
// rescore-rules editor. Renders monospace text-flavored rows with inline `→`
// annotations rather than the Workshop's atom-grid layout, and has no click-
// to-edit / popover / override-resolution machinery. Shares scrolling
// mechanics via BaseVirtualScroller.
class LibraryEntriesScroller extends BaseVirtualScroller {
  constructor(host, opts = {}) {
    super(host, 'lib-entries-rows');
    this.wordlist = opts.wordlist ?? null;         // null = merged All view
    this.mode = opts.mode ?? 'rescored';           // 'rescored' | 'original'
    this.sortKey = opts.sortKey ?? 'entry';
    this.sortDir = opts.sortDir ?? 'asc';
    this.query = opts.query ?? '';
    this.wholeWord = !!opts.wholeWord;
    this.allRows = [];
    this.rows = [];
    this._searchRanges = null;
    // Row-rescore output cached across keystrokes — only the search query is
    // changing as the user types, and rows don't depend on the query. Sorted
    // view is similarly memoized so `.filter()` preserves order and the
    // post-filter sort can be skipped on every keystroke.
    this._baseRows = null;
    this._sortedBaseRows = null;
    this._sortedBaseRowsKey = null;
    this._sortedBaseRowsDir = null;
    this._applyFilterAndSort();
  }

  // wordlist = null => merged-all view. Otherwise the focused source wordlist.
  setWordlist(wordlist) {
    this.wordlist = wordlist;
    this._invalidateRowsCache();
    this._applyFilterAndSort();
  }

  setMode(mode) {
    if (this.mode === mode) return;
    this.mode = mode;
    this._invalidateRowsCache();
    this._applyFilterAndSort();
  }

  // Live rescore preview as the user types in the rules editor — rules come
  // straight from the DOM, not from the (uncommitted) wordlist. Cleared by
  // the next renderPane, which rebuilds the scroller from committed rules.
  setRescorePreview(rules) {
    this._previewRules = rules;
    this._invalidateRowsCache();
    this._applyFilterAndSort();
  }

  setQuery(query, wholeWord) {
    this.query = query || '';
    this.wholeWord = !!wholeWord;
    this._applyFilterAndSort();
  }

  setSort(key, dir) {
    this.sortKey = key;
    this.sortDir = dir;
    this._applyFilterAndSort();
  }

  _invalidateRowsCache() {
    this._baseRows = null;
    this._sortedBaseRows = null;
  }

  // Produce the unfiltered row data. For source wordlists, walks rawEntries
  // and (in rescored mode) applies rescoreEntry to get the transformation.
  // Three states per row: unchanged (input only), rescored (input → output),
  // ignored (input → ✕).
  _buildRows() {
    const wl = this.wordlist;
    if (!wl) {
