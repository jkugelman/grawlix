function ingestFile(file, wordlist, nameOverride) {
  const reader = new FileReader();
  reader.onerror = () => showToast('Error reading file');
  reader.onabort = () => showToast('File read cancelled');
  reader.onload = async e => {
    const text = e.target.result;
    if (!wordlist) return;

    const entries = parseWordlist(text);
    if (!entries.length && text.trim()) {
      showToast('No valid wordlist entries found — check the file format');
      return;
    }

    // My Edits: always combine instead of replace
    if (wordlist.type === 'edits' && wordlist.rawEntries.length > 0) {
      const existingMap = new Map(wordlist.rawEntries.map(e => [e.word.toUpperCase(), e]));
      const newEntries = [], conflicts = [];
      let unchanged = 0;

      for (const entry of entries) {
        const existing = existingMap.get(entry.word.toUpperCase());
        if (!existing) {
          newEntries.push(entry);
        } else if (existing.score !== entry.score || existing.comment !== entry.comment) {
          conflicts.push({ existing, incoming: entry });
        } else {
          unchanged++;
        }
      }

      let conflictResolution = null;
      if (conflicts.length > 0) {
        conflictResolution = await showMergeConflict(conflicts.length);
        if (conflictResolution === null) return; // cancelled

        if (conflictResolution === 'file') {
          for (const { existing, incoming } of conflicts) {
            existing.score   = incoming.score;
            existing.comment = incoming.comment;
          }
        }
      }

      wordlist.rawEntries.push(...newEntries);
      wordlist.lastUpdated = Date.now();
      invalidateWordlistCaches(wordlist);
      updateCatchAll(wordlist);

      await persistData(wordlist.dbKey, entriesToText(wordlist.rawEntries));
      persistMeta();

      renderSources();
      if (state.selected === wordlist) {
        if (scroller) scroller.updateEntries(wordlist.rawEntries);
        else renderDetail(wordlist);
      }
      if (state.selected === MERGED_ID) renderMergedDetail();

      const parts = [];
      if (newEntries.length) parts.push(`${newEntries.length.toLocaleString()} new`);
      if (conflicts.length) parts.push(`${conflicts.length.toLocaleString()} ${conflictResolution === 'file' ? 'updated from file' : 'conflicts kept'}`);
      if (unchanged)        parts.push(`${unchanged.toLocaleString()} unchanged`);
      showToast(parts.length ? `Merged — ${parts.join(', ')}` : 'File already merged — no changes');
      return;
    }

    await applyWordlistText(wordlist, text, { originalFilename: file.name, nameOverride, source: file.name });
  };
  reader.readAsText(file);
}

const ADD_WORD_TRIGGER_HTML = '<div class="add-row-trigger" onclick="openAddWordBar()">＋ Add word</div>';

function openAddWordBar() {
  const footer = document.getElementById('add-row-footer');
  if (!footer || footer.querySelector('.add-word-bar')) return;

  footer.innerHTML = '';
  const bar = document.createElement('div');
  bar.className = 'add-word-bar';
  bar.tabIndex = -1;
  bar.innerHTML = `
    <input class="aw-word"    placeholder="Word"    autocomplete="off" spellcheck="false">
    <input class="aw-score"   placeholder="Score"   type="number" min="0">
    <input class="aw-comment" placeholder="Comment (optional)">
    <span class="aw-hint">Enter to save · Esc to cancel</span>`;
  footer.appendChild(bar);

  const wordInput    = bar.querySelector('.aw-word');
  const scoreInput   = bar.querySelector('.aw-score');
  const commentInput = bar.querySelector('.aw-comment');
  wordInput.addEventListener('beforeinput', blockSemicolon);
  commentInput.addEventListener('beforeinput', blockSemicolon);
  wordInput.focus();

  const allEmpty = () => !wordInput.value.trim() && !scoreInput.value.trim() && !commentInput.value.trim();

  function restoreTrigger() {
    bar.remove();
    footer.innerHTML = ADD_WORD_TRIGGER_HTML;
  }

  bar.addEventListener('focusout', e => {
    if (e.relatedTarget && bar.contains(e.relatedTarget)) return;
    if (allEmpty()) restoreTrigger();
  });

  function commit() {
    const word = wordInput.value.trim().toUpperCase();
    const score = parseInt(scoreInput.value.trim(), 10);
    const comment = commentInput.value.trim();

    wordInput.classList.toggle('invalid', !word || word.includes(';'));
    commentInput.classList.toggle('invalid', comment.includes(';'));
    scoreInput.classList.toggle('invalid', isNaN(score) || score < 0);
    if (wordInput.classList.contains('invalid') || commentInput.classList.contains('invalid') || scoreInput.classList.contains('invalid')) return;

    const edits = getEditsWordlist();

    const existing = edits.rawEntries.find(e => e.word.toUpperCase() === word);
    let entry;
    if (existing) {
      existing.score = score;
      existing.comment = comment;
      entry = existing;
      showToast(`Updated ${displayWord(word)}`);
    } else {
      entry = { word: word.toLowerCase(), score, comment };
      edits.rawEntries.push(entry);
      showToast(`Added ${displayWord(word)}`);
    }

    patchCachesForEditsChange(word, entry);
    updateCatchAll(edits);
    persistEdits(edits);
    refreshDerivedDisplays();

    if (state.selected === edits && scroller) {
      scroller._sortScores = null;
      scroller._applyFilterAndSort(false);
    }
    restoreTrigger();
  }

  bar.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') restoreTrigger();
  });
}

function deleteFromEdits(word, refreshFn) {
  const edits = getEditsWordlist();
  const idx = edits.rawEntries.findIndex(e => e.word.toUpperCase() === word.toUpperCase());
  if (idx === -1) return;

  const upperWord = word.toUpperCase();
  const refresh = refreshFn ?? (() => {
    scroller._sortScores = null;
    scroller._applyFilterAndSort(false);
  });

  const [deleted] = edits.rawEntries.splice(idx, 1);
  patchCachesForEditsChange(upperWord, null);
  updateCatchAll(edits);
  persistEdits(edits);
  refresh();
  refreshDerivedDisplays();

  showUndoToast(`Deleted ${esc(displayWord(deleted.word))} from ${buildWordlistNameHTML(edits)}`, () => {
    edits.rawEntries.splice(idx, 0, deleted);
    patchCachesForEditsChange(upperWord, deleted);
    updateCatchAll(edits);
    persistEdits(edits);
    refresh();
    refreshDerivedDisplays();
  });
}

async function deleteWordlist(wordlist, event) {
  if (event) event.stopPropagation();
  if (!wordlist) return;
  if (!await showConfirm('', { confirmText: 'Delete', html: `Delete ${buildWordlistNameHTML(wordlist)}?` })) return;
  // Invalidate first so any reactive subscribers re-rendering on the
  // `state.sources` change below don't read a stale merged cache.
  invalidateWordlistCaches(wordlist);
  state.sources = state.sources.filter(l => l !== wordlist);
  await idbDel('data_' + wordlist.dbKey);
  persistMeta();
  if (state.selected === wordlist) {
    state.selected = MERGED_ID;
    scroller = null;
  }
  renderAll();
}

function toggleWordlist(wordlist, event) {
  if (event) event.stopPropagation();
  if (!wordlist || !wordlist.populated) return;
  setWordlistEnabled(wordlist, !wordlist.enabled);
}

function addNewWordlist(wordlistDef) {
  const wordlist = wrapWordlist({ rescoreRules: [], ...wordlistDef, rawEntries: [], lastUpdated: null, _loading: false });
  updateCatchAll(wordlist);
  state.sources.push(wordlist);
  invalidateSourceCounts();
  invalidateStatsCache(_mergedStatsKey);
  persistMeta();
  sources$.bump();              // notify cosmetic effect with fresh caches
  return wordlist;
}

  // ── Auto-update URL / file areas ─────────────────────────────────────────────


  // ── URL guardrail check ───────────────────────────────────────────────────────

  let _urlCheckTimer = null;
  let _urlCheckAbort = null;

  const HTTP_REASON = { 400:'Bad Request', 401:'Unauthorized', 403:'Forbidden', 404:'Not Found',
    405:'Method Not Allowed', 410:'Gone', 429:'Too Many Requests', 500:'Internal Server Error',
    502:'Bad Gateway', 503:'Service Unavailable', 504:'Gateway Timeout' };

  function setUrlCheckError(msg) {
    urlCheckIcon.innerHTML = '<span class="url-check-err-icon">✗</span>';
    urlCheckIcon.hidden = false;
    urlMetaEl.innerHTML = `<span class="url-check-error">${msg}</span>`;

  }
  function setUrlCheckWarn(msg) {
    urlCheckIcon.textContent = '⚠️';
    urlCheckIcon.hidden = false;
    urlMetaEl.innerHTML = `<span class="url-check-warn">${msg}</span>`;
    urlMetaEl.classList.add('visible');
  }
  function setUrlCheckOk() {
    urlCheckIcon.innerHTML = '<span class="url-check-ok-icon">✓</span>';
    urlCheckIcon.hidden = false;
    urlMetaEl.classList.remove('visible');
  }

  async function checkUrl(url, signal) {
    // Step 1: HEAD — reachability + content-length (needed for update checking)
    let hasContentLength = false;
    try {
      const headResp = await fetch(url, { method: 'HEAD', signal });
      if (!headResp.ok) {
        const reason = headResp.statusText || HTTP_REASON[headResp.status] || '';
        setUrlCheckError(`Server returned ${headResp.status}${reason ? ' ' + esc(reason) : ''}`);
        return;
      }
      hasContentLength = !!headResp.headers.get('content-length');
    } catch (err) {
      if (err.name === 'AbortError') return;
      setUrlCheckError('Unreachable — possible CORS restriction');
      return;
    }

    // Step 2: Range GET — fetch first 1 KB and validate content
    let chunkText = '';
    try {
      const rangeResp = await fetch(url, { method: 'GET', headers: { 'Range': 'bytes=0-1023' }, signal });
      if (rangeResp.body) {
        const reader = rangeResp.body.getReader();
        try {
          const { value } = await reader.read();
          if (value) chunkText = new TextDecoder().decode(value);
        } finally {
          reader.cancel();
        }
      }
    } catch (err) {
      if (err.name === 'AbortError') return;
      setUrlCheckWarn("Can't verify content");
      return;
    }

    if (!validateWordlistChunk(chunkText)) {
      setUrlCheckError('Not a wordlist file');
      return;
    }

    if (hasContentLength) {
      setUrlCheckOk();
    } else {
      setUrlCheckWarn('Update checking unavailable (no content-length)');
    }
  }

  urlInput.addEventListener('input', () => {
    clearTimeout(_urlCheckTimer);
    if (_urlCheckAbort) { _urlCheckAbort.abort(); _urlCheckAbort = null; }
    const url = urlInput.value.trim();
    if (!url) { urlCheckIcon.hidden = true; urlMetaEl.classList.remove('visible'); return; }
    urlCheckIcon.innerHTML = '<div class="url-check-spinner"></div>';
    urlCheckIcon.hidden = false;
    urlMetaEl.classList.remove('visible');
    _urlCheckTimer = setTimeout(() => {
      _urlCheckAbort = new AbortController();
      checkUrl(url, _urlCheckAbort.signal);
    }, 600);
  });

  bindDropZone(el.querySelector('#cfg-drop-zone'), el.querySelector('#cfg-file-input'), file => {
    _pendingFile = file;
    importZoneLabel.textContent = file.name;
    if (!nameInput.value.trim()) {
      _pendingName = nameFromPath(file.name);
      nameInput.value = _pendingName;
      if (!_pendingIcon) iconPreview.innerHTML = buildInitialsIconHTML(_pendingName, colorSeed(colorSeedObj()));
    }
  });

  // ── Save / Add ────────────────────────────────────────────────────────────────

  function computeRulesToApply() {
    if (!_selectedPublisher) return _mode === 'add' ? [] : null;
    if (_rulesOption === 'recommended') return JSON.parse(JSON.stringify(_selectedPublisher.defaultRules || []));
    if (_rulesOption === 'levels')      return _selectedPublisher.defaultRules.map(r => ({ ...r, output: '' }));
    return _mode === 'add' ? [] : null;
  }

  btnSave.onclick = () => {
    const name = nameInput.value.trim();
    if (!name) { nameInput.focus(); nameInput.classList.add('invalid'); return; }
    const rules = computeRulesToApply();
    const url   = urlInput.value.trim() || null;

    if (_mode === 'add') {
      const wordlist = addNewWordlist({
        dbKey: crypto.randomUUID(), icon: _pendingIcon, name,
        url, enabled: false, populated: false,
        ...(_selectedPublisher ? { publisherId: _selectedPublisher.id } : {}),
        rescoreRules: rules || [],
      });
      el.close();
      if (WordlistsDialog.isOpen()) WordlistsDialog.focus(wordlist);
      if (url) {
        fetchWordlist(wordlist);
      } else if (_pendingFile) {
        ingestFile(_pendingFile, wordlist, name);
      }
    } else {
      batchUpdate(() => {
        setWordlistName(_wordlist, name);
        setWordlistIcon(_wordlist, _pendingIcon);
        setWordlistUrl(_wordlist, url);
        setWordlistPublisher(_wordlist, _selectedPublisher?.id ?? null);
        if (rules !== null) setWordlistRescoreRules(_wordlist, rules);
      });
      el.close();
    }
  };

  // ── Cancel / close ────────────────────────────────────────────────────────────

  el.addEventListener('cancel', e => { if (_pickerOpen) { e.preventDefault(); closePicker(); } });
  el.addEventListener('close',  () => {
    closePicker();
    clearTimeout(_urlCheckTimer);
    if (_urlCheckAbort) { _urlCheckAbort.abort(); _urlCheckAbort = null; }
  });

  // ── open (configure mode) ─────────────────────────────────────────────────────

  function open(wordlist) {
    _mode           = 'configure';
    _wordlist           = wordlist;
    _pickerOpen     = false;
    _selectedPublisher = getPublisher(wordlist);
    _originalPublisher = _selectedPublisher;
    _pendingIcon    = wordlist.icon || null;
    _pendingName    = wordlist.name || '';
    _pendingFile    = null;
    _rulesOption    = 'none';

    titleEl.textContent = 'Configure Wordlist';
    btnSave.textContent = 'Save';
    pickerPopup.hidden = true;
    nameInput.classList.remove('invalid');
    iconPreview.innerHTML = buildIconHTML(wordlist.icon, wordlist.name, colorSeed(wordlist));
    nameInput.value = wordlist.name || '';
    urlInput.value  = wordlist.url  || '';

    renderPublisherChips();
    updateRulesOptionRow();
    updateRulesPreview();
    if (wordlist.url) {
      urlCheckIcon.innerHTML = '<div class="url-check-spinner"></div>';
      urlCheckIcon.hidden = false;
      urlMetaEl.classList.remove('visible');
      _urlCheckAbort = new AbortController();
      checkUrl(wordlist.url, _urlCheckAbort.signal);
    } else {
      urlCheckIcon.hidden = true;
      urlMetaEl.classList.remove('visible');
    }
    importSection.hidden = true;

    showDialog(el);
  }

  // ── openAdd (add mode) ────────────────────────────────────────────────────────

  function openAdd() {
    _mode           = 'add';
    _wordlist           = null;
    _pickerOpen     = false;
    _selectedPublisher = null;
    _originalPublisher = null;
    _pendingIcon    = null;
    _pendingName    = '';
    _pendingFile    = null;
    _rulesOption    = 'none';

    titleEl.textContent = 'Add Wordlist';
    btnSave.textContent = 'Add';
    pickerPopup.hidden = true;
    nameInput.classList.remove('invalid');
    iconPreview.innerHTML = buildInitialsIconHTML('', colorSeed({ name: '' }));
    nameInput.value = '';
    urlInput.value  = '';
    urlCheckIcon.hidden = true;
    urlMetaEl.classList.remove('visible');
    importZoneLabel.textContent = 'Drop file here or click to browse';

    renderPublisherChips();
    updateRulesOptionRow();
    updateRulesPreview();

    importSection.hidden = false;

    showDialog(el);
  }

  return { open, openAdd };
})();

// ─── Event wiring ─────────────────────────────────────────────────────────────

function bindEvents() {
  // Header chrome
  document.querySelector('.header-logo-link').href = location.pathname;

  ToolStack.init();

    if (e.altKey && !e.ctrlKey && !e.metaKey && !e.shiftKey) {
      const k = e.key.toLowerCase();
      if (k === 's') {
        const el = document.getElementById('search-input');
        if (el) { e.preventDefault(); el.focus(); el.select(); }
      } else if (k === 'w') {
        const el = document.getElementById('search-whole-word');

      } else if (k === 'l') {

  });
}

function nameFromPath(str) {
  return str.split('/').pop().replace(/\.[^.]+$/, '');
}

// ─── Utility ──────────────────────────────────────────────────────────────────

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function pluralize(n, singular, plural = singular + 's') {
  return `${n.toLocaleString()} ${n === 1 ? singular : plural}`;
}

function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60)  return 'just now';
  const m = Math.floor(s / 60);
  if (m < 60)  return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24)  return `${h}h ago`;
  const d = Math.floor(h / 24);
  if (d < 30)  return `${d} day${d === 1 ? '' : 's'} ago`;
  const mo = Math.floor(d / 30);
  if (mo < 12) return `${mo} month${mo === 1 ? '' : 's'} ago`;
  const yr = Math.floor(d / 365);
  return `${yr} year${yr === 1 ? '' : 's'} ago`;
}

const _toastContainer = (() => {
  const el = document.createElement('div');
  el.id = 'toast-container';
  document.body.appendChild(el);
  return el;
})();
function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = msg;
  el.onclick = () => _dismissToast(el);
  _toastContainer.appendChild(el);
  el.offsetWidth; // force reflow so opacity transition fires
  el.classList.add('show');
  el._timer = setTimeout(() => _dismissToast(el), 5000);
}
function showUndoToast(msg, onUndo) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = msg + `<span class="undo-link">Undo</span>`;
  el.onclick = () => _dismissToast(el);
  el.querySelector('.undo-link').onclick = e => {
    e.stopPropagation();
    _dismissToast(el);
    onUndo();
  };
  _toastContainer.appendChild(el);
  el.offsetWidth; // force reflow so opacity transition fires
  el.classList.add('show');
  el._timer = setTimeout(() => _dismissToast(el), 10000);
}
function _dismissToast(el) {
  clearTimeout(el._timer);
  el.classList.remove('show');
  el.addEventListener('transitionend', () => el.remove(), { once: true });
}

// ─── Publisher lookup ─────────────────────────────────────────────────────────

function getPublisher(wordlist) {
  return wordlist.publisherId ? WORDLIST_PUBLISHERS.find(p => p.id === wordlist.publisherId) ?? null : null;
}

// ─── Wordlist icons ───────────────────────────────────────────────────────────────

function nameToInitials(name) {
  const words = name.trim().split(/\s+/).map(w => w.replace(/[^a-zA-Z0-9]/g, '')).filter(Boolean);
  if (!words.length) return '?';
  if (words.length === 1) return words[0].slice(0, 2).toUpperCase();
  return (words[0][0] + words[words.length - 1][0]).toUpperCase();
}

function nameColorIndex(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (Math.imul(31, h) + name.charCodeAt(i)) | 0;
  return Math.abs(h) % INITIALS_PALETTE.length;
}

function buildInitialsIconHTML(name, colorSeed = name) {
  const initials = esc(nameToInitials(name));
  const ci = nameColorIndex(colorSeed);
  return `<svg class="wordlist-icon wordlist-icon-initials ic-${ci}" viewBox="0 0 16 16" aria-hidden="true"><rect width="16" height="16" rx="3"/><text x="8" y="8" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-weight="700" font-size="8" letter-spacing="-0.02em">${initials}</text></svg>`;
}

function buildEmojiIconHTML(emoji) {
  return `<svg class="wordlist-icon wordlist-icon-emoji" viewBox="0 0 16 16" aria-hidden="true"><text x="8" y="8" text-anchor="middle" dominant-baseline="central" font-size="13">${esc(emoji)}</text></svg>`;
}

function buildImgIconHTML(url) {
  return `<img src="${esc(url)}" class="wordlist-icon wordlist-icon-img" onerror="this.style.display='none'" alt="">`;
}

// descriptor: null | { type: 'emoji', value } | { type: 'img', url }
function buildIconHTML(descriptor, name, seed) {
  if (descriptor?.type === 'emoji') return buildEmojiIconHTML(descriptor.value);
  if (descriptor?.type === 'img')   return buildImgIconHTML(descriptor.url);
  return buildInitialsIconHTML(name, seed);
}

function colorSeed(obj) {
  return obj.url || obj.originalFilename || obj.dbKey || obj.name;
}

function getWordlistIcon(wordlist) {
  return buildIconHTML(wordlist.icon, wordlist.name, colorSeed(wordlist));
}

// ─── Rescore rule management ──────────────────────────────────────────────────

function afterRuleChange(wordlist) {
  applyRescoreRulesChange(wordlist);
  // Dialog-only: refresh the rule editor and the live preview while the
  // Wordlists dialog is open. No-ops when the dialog isn't mounted.
  renderRescoreSection();
  updateRescorePreview();
}

// Per-source rescore rules now live in the Wordlists dialog right pane only.
// These handlers target the focused wordlist there, falling back to the main-pane
// selection only if the dialog isn't open (defensive — there should be no other
// callers).
function getRescoreContextWordlist() {
  return WordlistsDialog?.getFocusedWordlist?.() ?? getSelected();
}

function deleteRule(idx) {
  const wordlist = getRescoreContextWordlist();
  if (!wordlist) return;
  const [deleted] = wordlist.rescoreRules.splice(idx, 1);
  afterRuleChange(wordlist);
  showUndoToast('Deleted rescore rule', () => {
    wordlist.rescoreRules.push(deleted);
    afterRuleChange(wordlist);
  });
}

function saveRuleField(idx, field, value) {
  const wordlist = getRescoreContextWordlist();
  if (!wordlist || !wordlist.rescoreRules[idx]) return;
  if (field === 'length' && value.trim().toLowerCase() === 'any') value = '';
  if (field === 'output' && value.trim().toLowerCase() === 'unchanged') value = '';
  wordlist.rescoreRules[idx][field] = value;
  // User explicitly edited this rule — promote it from catch-all to regular rule
  delete wordlist.rescoreRules[idx]._catchAll;
  afterRuleChange(wordlist);
}

function noteDisplayHTML(note) {
  return `<span class="rule-note-text">${esc(note)}</span><span class="edit-hint rule-note-pencil" aria-hidden="true">✏️</span>`;
}

function startNoteEdit(wrapEl) {
  if (wrapEl.querySelector('.rule-note-input')) return;
  const i = parseInt(wrapEl.closest('.rule-row').dataset.i, 10);
  const isScoring = !!wrapEl.closest('#scoring-rules');

  let currentNote, onSave;
  if (isScoring) {
    const edits = getEditsWordlist();
    if (!edits?.scoring[i]) return;
    currentNote = edits.scoring[i].note || '';
    onSave = note => saveScoringField(i, 'note', note);
  } else {
    const wordlist = getRescoreContextWordlist();
    if (!wordlist?.rescoreRules[i]) return;
    currentNote = wordlist.rescoreRules[i].note || '';
    onSave = note => saveRuleField(i, 'note', note);
  }

  wrapEl.innerHTML = `<input class="rule-note-input" value="${esc(currentNote)}" placeholder="note…">`;
  const input = wrapEl.querySelector('input');
  input.focus();
  input.select();

  let committed = false;
  function commit() {
    if (committed) return;
    committed = true;
    const newNote = input.value;
    onSave(newNote);
    if (wrapEl.isConnected) {
      wrapEl.innerHTML = noteDisplayHTML(newNote);
      wrapEl.classList.toggle('has-note', !!newNote.trim());
    }
  }
  input.addEventListener('blur', commit, { once: true });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { input.blur(); }
    if (e.key === 'Escape') {
      committed = true;
      if (wrapEl.isConnected) {
        wrapEl.innerHTML = noteDisplayHTML(currentNote);
        wrapEl.classList.toggle('has-note', !!currentNote.trim());
      }
    }
  });
}

function isRuleOutputInvalid(inputVal, outputVal) {
  const v = (outputVal || '').trim();
  if (!v) return false;
  const parsed = parseRuleOutput(v);
  if (parsed === null) return true;
  if (parsed && typeof parsed === 'object') {
    const iv = parseRange((inputVal || '').trim())?.[0];
    if (parsed.max === null) {
      // N+ output requires N+ input
      if (!iv || iv.max !== null) return true;
    } else {
      // Bounded range output requires bounded non-degenerate input range
      if (!iv || iv.min === null || iv.max === null || iv.min === iv.max) return true;
    }
  }
  return false;
}

function validateRulesContainer(container) {
  if (!container) return;
  container.querySelectorAll('.rule-in').forEach(inp => {
    inp.classList.toggle('invalid', parseRange(inp.value.trim()) === null);
  });
  container.querySelectorAll('.rule-len').forEach(inp => {
    const v = inp.value.trim();
    inp.classList.toggle('invalid', v !== '' && parseRange(v) === null);
  });
  container.querySelectorAll('.rule-out').forEach(inp => {
    const inEl = inp.closest('.rule-row')?.querySelector('.rule-in');
    inp.classList.toggle('invalid', isRuleOutputInvalid(inEl?.value, inp.value));
  });
}

function onRuleInput(el) {
  if (el.classList.contains('rule-len') && el.value.trim().toLowerCase() === 'any') el.value = '';
  if (el.classList.contains('rule-out') && el.value.trim().toLowerCase() === 'unchanged') el.value = '';
  const container = el.closest('#rescore-rules, #scoring-rules');
  if (!container) return;
  validateRulesContainer(container);
  if (container.id === 'rescore-rules') updateRescorePreview();
}

function updateRescorePreview() {
  if (!scroller) return;
  // Live preview only makes sense when the rules being typed belong to the wordlist
  // the main-pane scroller is showing. From inside the Wordlists dialog the
  // focused wordlist usually differs from the main-pane selection, so skip.
  if (WordlistsDialog.isOpen() && WordlistsDialog.getFocusedWordlist() !== getSelected()) return;
  const rules = Array.from(document.querySelectorAll('#rescore-rules .rule-row')).map(row => ({
    input:  row.querySelector('.rule-in')?.value  || '',
    length: row.querySelector('.rule-len')?.value || '',
    output: row.querySelector('.rule-out')?.value || '',
  }));
  scroller.setRescore(rules);
}

// ─── Rename ───────────────────────────────────────────────────────────────────

function startInlineRename(inputEl, originalName, { onCommit, onCancel, onInput }) {
  let done = false;
  function commit() {
    if (done) return;
    done = true;
    onCommit(inputEl.value.trim() || originalName);
  }
  function cancel() {
    if (done) return;
    done = true;
    onCancel();
  }
  if (onInput) inputEl.oninput = () => onInput(inputEl.value || originalName);
  inputEl.onblur = commit;
  inputEl.onkeydown = e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { inputEl.onblur = null; cancel(); }
  };
}

// ─── Merge & Download ─────────────────────────────────────────────────────────

// Wordlist order determines merge priority: higher-priority wordlists appear earlier in state.sources; the loop breaks at the target wordlist's position.
// Cached on `wordlist._overrideMap` and invalidated by `invalidateSourceCounts` whenever any source's content, ordering, enabled flag, or rescore rules change.
function buildOverrideMap(wordlist) {
  if (wordlist._overrideMap) return wordlist._overrideMap;
  const map = new Map();
  for (const l of state.sources) {
    if (l === wordlist) break;
    if (!l.enabled) continue;
    for (const { word, score, comment } of getRescoredEntries(l)) {
      const w = word.toUpperCase();
      if (!map.has(w)) map.set(w, { wordlist: l, score, comment: comment || '' });
    }
  }
  wordlist._overrideMap = map;
  return map;
}

// In-place cache patch for a single My Edits change to `word`.
//   newEditsEntry  → ADD or UPDATE (entry now in edits.rawEntries)
//   null           → DELETE (entry just removed from edits.rawEntries)
// Caller has already mutated edits.rawEntries.
function patchCachesForEditsChange(word, newEditsEntry) {
  const edits = getEditsWordlist();
  if (!edits) return;

  // edits's own derived caches are now stale; lazy rebuild on next access.
  invalidateRescoredCache(edits);
  _statsCache.delete(edits);
  _statsCache.delete(_mergedStatsKey);

  // If edits is disabled or a higher-priority wordlist already has `word`,
  // edits never contributed for `word` — caches don't reference it.
  if (!edits.enabled) return;
  if (buildOverrideMap(edits).has(word)) return;

  const editsIdx = state.sources.indexOf(edits);
  const cache = _mergedWordlistCache;

  if (newEditsEntry) {
    // ADD or UPDATE: edits is now the contributor for `word` from editsIdx down.
    const ovEntry = { wordlist: edits, score: newEditsEntry.score, comment: newEditsEntry.comment || '' };
    for (let i = editsIdx + 1; i < state.sources.length; i++) {
      const m = state.sources[i]._overrideMap;
      if (m) m.set(word, ovEntry);
    }
    if (cache) {
      const existing = cache.byWord.get(word);
      if (existing) {
        // UPDATE, or ADD that took over from a below-edits contributor.
        if (existing.wordlist !== edits) {
          adjustSourceCount(cache, existing.wordlist, -1);
          adjustSourceCount(cache, edits, 1);
          existing.wordlist = edits;
        }
        existing.score = newEditsEntry.score;
        existing.comment = newEditsEntry.comment || '';
      } else {
        // ADD: brand-new word, no other wordlist has it.
        const merged = {
          word: newEditsEntry.word,
          score: newEditsEntry.score,
          comment: newEditsEntry.comment || '',
          wordlist: edits,
        };
        cache.byWord.set(word, merged);
        insertSortedByWord(cache.entries, merged);
        adjustSourceCount(cache, edits, 1);
      }
    }
  } else {
    // DELETE: edits was the contributor (no higher-priority list has `word`).
    // Walk down to find the next enabled wordlist with `word`.
    let nextIdx = -1;
    for (let i = editsIdx + 1; i < state.sources.length; i++) {
      const l = state.sources[i];
      if (!l.enabled) continue;
      if (getRescoredMap(l).has(word)) { nextIdx = i; break; }
    }

    // Override maps for L below edits: at L_pos > nextIdx, next wins; at L_pos ≤ nextIdx, no contributor in range → delete.
    if (nextIdx === -1) {
      for (let i = editsIdx + 1; i < state.sources.length; i++) {
        const m = state.sources[i]._overrideMap;
        if (m) m.delete(word);
      }
    } else {
      const nextList = state.sources[nextIdx];
      const nextRaw = getRescoredMap(nextList).get(word);
      const ovEntry = { wordlist: nextList, score: nextRaw.score, comment: nextRaw.comment || '' };
      for (let i = editsIdx + 1; i < state.sources.length; i++) {
        const m = state.sources[i]._overrideMap;
        if (!m) continue;
        if (i <= nextIdx) m.delete(word);
        else m.set(word, ovEntry);
      }
    }

    if (cache) {
      const existing = cache.byWord.get(word);
      if (existing) {
        adjustSourceCount(cache, edits, -1);
        if (nextIdx === -1) {
          cache.byWord.delete(word);
          const idx = cache.entries.indexOf(existing);
          if (idx !== -1) cache.entries.splice(idx, 1);
        } else {
          const nextList = state.sources[nextIdx];
          const nextEntry = getRescoredMap(nextList).get(word);
          adjustSourceCount(cache, nextList, 1);
          existing.wordlist = nextList;
          existing.score = nextEntry.score;
          existing.comment = nextEntry.comment || '';
        }
      }
    }
  }
}

function adjustSourceCount(cache, wordlist, delta) {
  const i = cache.sourceCounts.findIndex(s => s.wordlist === wordlist);
  if (i >= 0) {
    cache.sourceCounts[i].count += delta;
    // Mirror buildMergedWordlist's filter: drop wordlists that are now empty.
    if (cache.sourceCounts[i].count <= 0 && wordlist.rawEntries.length === 0) {
      cache.sourceCounts.splice(i, 1);
    }
  } else if (delta > 0) {
    cache.sourceCounts.push({ wordlist, count: delta });
  }
}

function insertSortedByWord(entries, entry) {
  let lo = 0, hi = entries.length;
  while (lo < hi) {
    const mid = (lo + hi) >>> 1;
    if (entries[mid].word.localeCompare(entry.word) < 0) lo = mid + 1;
    else hi = mid;
  }
  entries.splice(lo, 0, entry);
}

// Display-side refresh: repaint the Wordlists-dialog rail meta and the
// scoring legend to match current data. The main detail panel's stats bar
// is repainted via the scroller's onFilterChange callback — every caller
// of refreshDerivedDisplays also runs a scroller filter pass, so the bar
// stays in sync without needing to be touched here.
// Used by both the render effect's cache branch (after refreshSourceCounts)
// and the patch path (which mutates caches in place without bumping).
function refreshDerivedDisplays() {
  if (_sourceCountsCache) {
    const contribMap = new Map(_sourceCountsCache.map(s => [s.wordlist, s.count]));
    WordlistsDialog.updateRailMeta(contribMap);
  }
  renderScoringRules();
}

function buildMergedWordlist() {
  if (_mergedWordlistCache) return _mergedWordlistCache;

  const mergedMap = new Map(); // UPPERCASE_KEY → {word, score}
  const sourceCounts = [];

  for (const wordlist of state.sources) {
    if (!wordlist.enabled) continue;
    let count = 0;
    for (const { word, score, comment } of getRescoredEntries(wordlist)) {
      const key = word.toUpperCase();
      if (!mergedMap.has(key)) {
        mergedMap.set(key, { word: word.toLowerCase(), score, comment: comment || '', wordlist });
        count++;
      }
    }
    sourceCounts.push({ wordlist, count });
  }

  const entries = [...mergedMap.values()]
    .sort((a, b) => a.word.localeCompare(b.word));

  // byWord shares object identity with entries — patching via byWord updates entries.
  _mergedWordlistCache = { entries, sourceCounts, byWord: mergedMap };
  return _mergedWordlistCache;
}


function triggerDownload(text, filename) {
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function downloadOriginalWordlist(wordlist) {
  if (!wordlist || !wordlist.rawEntries.length) return;
  const withComments = getDownloadComments();
  const text = wordlist.rawEntries.map(e =>
    (withComments && e.comment) ? `${e.word};${e.score};${e.comment}` : `${e.word};${e.score}`
  ).join('\n') + '\n';
  const filename = wordlist.originalFilename || `${wordlist.name}.txt`;
  triggerDownload(text, filename);
  showToast(`Downloaded ${pluralize(wordlist.rawEntries.length, 'entry', 'entries')}`);
}

async function downloadIndividualWordlistRescored(wordlist) {
  if (!wordlist || !wordlist.rawEntries.length) return;
  await downloadWithDialog(`Grawlix ${wordlist.name}`, wordlist, getRescoredEntries(wordlist), 'Download Rescored Wordlist');
}

function toggleSplitMenu(event) {

// ─── Mutation helpers ─────────────────────────────────────────────────────────
//
// State mutations bundled with the right invalidation/persistence/cache bump,
// so call sites don't have to remember the sequence. Cosmetic changes write
// the signal and persist; the cosmetic effect handles repaint. Cache-affecting
// changes also call `repaintAfterCacheChange()` to bump `cacheVersion$` and
// let the render effect dispatch the right scroller update.
// `batchUpdate(fn)` coalesces multiple mutations: signal writes queue their
// subscribers, a single deferred `cacheVersion$` bump fires once at the end
// of the batch, and `persistMeta()` is deferred to one call at the end too.

let _batchDepth = 0;
let _cacheBumpPending = false;
let _persistPending = false;

function batchUpdate(fn) {
  const owner = _batchedEffects === null;
  if (owner) _batchedEffects = new Set();
  _batchDepth++;
  try { fn(); }
  finally {
    _batchDepth--;
    if (_batchDepth === 0) {
      if (_persistPending) { _persistPending = false; _persistMetaNow(); }
      if (_cacheBumpPending) { _cacheBumpPending = false; bumpCacheVersion(); }
    }
    if (owner) {
      const queued = _batchedEffects;
      _batchedEffects = null;
      [...queued].forEach(s => s());
    }
  }
}

function repaintAfterCacheChange() {
  if (_batchDepth > 0) { _cacheBumpPending = true; return; }
  bumpCacheVersion();
}

// Cosmetic setters: write the signal and persist. The cosmetic effect
// re-renders the rail/dropdown/dialog and visible scroller rows; no explicit
// repaint call needed.
function setWordlistName(wordlist, name) {
  if (wordlist.name === name) return;
  wordlist.name = name;
  persistMeta();
}

function setWordlistIcon(wordlist, icon) {
  wordlist.icon = icon;
  persistMeta();
}

function setWordlistUrl(wordlist, url) {
  if ((wordlist.url ?? null) === (url ?? null)) return;
  wordlist.url = url;
  persistMeta();
}

function setWordlistPublisher(wordlist, publisherId) {
  const newVal = publisherId || null;
  if ((wordlist.publisherId ?? null) === newVal) return;
  wordlist.publisherId = newVal;
  persistMeta();
}

// Cache-affecting setters: bump cacheVersion$ so the render effect refreshes
// derived state (merged cache, override maps, scroller).
function setWordlistEnabled(wordlist, enabled) {
  if (wordlist.enabled === enabled) return;
  wordlist.enabled = enabled;
  persistMeta();
  repaintAfterCacheChange();
}

function setWordlistRescoreRules(wordlist, rules) {
  wordlist.rescoreRules = rules;
  applyRescoreRulesChange(wordlist);
}

// For rescore-rule mutations done in place (splice/push). Caller has already
// mutated wordlist.rescoreRules; this clears derived caches and repaints. Stats
// and merged caches must clear too, since histograms now show rescored entries
// and the histogram layout depends on the union of every source's rescored set.
function applyRescoreRulesChange(wordlist) {
  updateCatchAll(wordlist);
  invalidateWordlistCaches(wordlist);
  persistMeta();
  repaintAfterCacheChange();
}

function reorderSources(fromIdx, toIdx) {
  if (fromIdx === toIdx ||
      fromIdx < 0 || toIdx < 0 ||
      fromIdx >= state.sources.length || toIdx >= state.sources.length) return;
  const [item] = state.sources.splice(fromIdx, 1);
  state.sources.splice(toIdx, 0, item);
  persistMeta();
  // The cache effect already covers the order change (refreshSourceCounts
  // rebuilds derived caches from state.sources). No separate sources$ bump
  // is needed — repaintAfterCacheChange routes through the render effect.
  repaintAfterCacheChange();
}

  document.addEventListener('keydown', e => {
    if (e.key === '?' && !e.target.closest('input, textarea, [contenteditable]')) open();
  });
  dialog.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); next(); }
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prev(); }
    else if (e.key === 'Home') { e.preventDefault(); goTo(0); }
    else if (e.key === 'End') { e.preventDefault(); goTo(totalSlides - 1); }
  });
  dialog.addEventListener('close', stopDemo);
  dialog.querySelector('.help-prev').addEventListener('click', prev);
  dialog.querySelector('.help-next').addEventListener('click', next);
  dialog.querySelectorAll('.help-dot').forEach((dot, i) => dot.addEventListener('click', () => goTo(i)));

  return { open, close, goTo };
})();

// ─── Boot ─────────────────────────────────────────────────────────────────────

document.addEventListener('click', () => document.querySelectorAll('.split-btn.open').forEach(b => b.classList.remove('open')));
// Hide the busy overlay immediately if no wordlists have data.
{ let _m; try { _m = JSON.parse(lsLoad('meta') || '[]'); } catch { _m = []; }
  if (!_m.some(l => l.lastUpdated)) document.getElementById('busy-overlay').remove(); }

// --sticky-top tracks the brand header's height so the in-card sticky
// stack (search + tool rows) anchors directly under it. ResizeObserver
// keeps it accurate across viewport-width changes that wrap header text.
{
  const header = document.querySelector('header');
  const setStickyTop = () => document.documentElement.style.setProperty('--sticky-top', header.offsetHeight + 'px');
  setStickyTop();
  new ResizeObserver(setStickyTop).observe(header);
}

init();
</script>
