const Collapsible = (() => {
  function buildHTML({ id = '', className = '', labelHTML, contentHTML, collapsed = false }) {
    const cls = ['collapsible', className, collapsed && 'collapsed'].filter(Boolean).join(' ');
    const idAttr = id ? ` id="${id}"` : '';
    return `<div${idAttr} class="${cls}">
        <button type="button" class="collapsible-toggle" aria-expanded="${!collapsed}">
          <span class="collapsible-chevron" aria-hidden="true">▾</span>
          ${labelHTML}
        </button>
        <div class="collapsible-content">${contentHTML}</div>
      </div>`;
  }

  // Caller wires persistence (localStorage, signal, etc.) by listening for
  // `collapsible:toggle` on the wrapper or any ancestor.
  document.addEventListener('click', e => {
    const toggle = e.target.closest('.collapsible-toggle');
    if (!toggle) return;
    const wrapper = toggle.closest('.collapsible');
    if (!wrapper) return;
    const collapsed = !wrapper.classList.contains('collapsed');
    wrapper.classList.toggle('collapsed', collapsed);
    toggle.setAttribute('aria-expanded', String(!collapsed));
    wrapper.dispatchEvent(new CustomEvent('collapsible:toggle', { detail: { collapsed }, bubbles: true }));
  });

  return { buildHTML };
})();

// ─── Router ───────────────────────────────────────────────────────────────────
// Keeps location.search in sync with the tool stack via history.replaceState.
// Encoded: each user-added tool row in pipeline order, then the permanent
// Search row (search/whole-word/score). See docs/design.md § URL state.
const Router = (() => {
  let _navTimer = null;

  function buildQuery() {
    const parts = [];
    // Tool stack rows in pipeline order. Single-param tools today; multi-input
    // encoding is deferred. Empty values are kept (`anagram=`) so a row the
    // user has added but not filled in survives reload.
    for (const row of ToolStack.getStack()) {
      const tool = TOOLS[row.tool];
      if (!tool) continue;
      const slug = encodeURIComponent(row.tool);
      if (tool.params.length === 0) {
        parts.push(slug);
      } else {
        const value = row.params[tool.params[0].key] || '';
        parts.push(slug + '=' + encodeURIComponent(value));
      }
    }
    // Permanent Search row last. Empty Search drops out — the UI re-adds an
    // empty Search bar at the bottom regardless, so the URL stays minimal.
    if (state.searchQuery)     parts.push('search=' + encodeURIComponent(state.searchQuery));
    if (state.searchWholeWord) parts.push('whole-word');
    if (state.scoreRange)      parts.push('score=' + encodeURIComponent(state.scoreRange));
    return parts.join('&');
  }

  function _replace() {
    _navTimer = null;
    const query  = buildQuery();
    const target = query ? location.pathname + '?' + query : location.pathname;
    if (location.pathname + location.search !== target) {
      history.replaceState(null, '', target);
    }
  }

  // Debounce input-tweak callers (typing) so the URL bar doesn't flicker per
  // keystroke; structural toggles (whole-word, add/remove tool, clear) replace
  // instantly.
  function navigate({ debounce = false } = {}) {
    if (_navTimer) { clearTimeout(_navTimer); _navTimer = null; }
    if (debounce) _navTimer = setTimeout(_replace, 250);
    else          _replace();
  }

  function applyURL() {
    const params = new URLSearchParams(location.search);
    const stack = [];
    let searchValue = '';
    let wholeWord = false;
    let scoreValue = null;
    let droppedUnknown = false;
    // The UI today supports only one Search row (permanent, at the bottom), so
    // any `search=` we encounter is treated as that row — a chained Search
    // earlier in the pipeline collapses into the permanent one. Last value
    // wins.
    for (const [key, value] of params) {
      if (key === 'whole-word') { wholeWord = true; continue; }
      if (key === 'score')      { scoreValue = value || ''; continue; }
      if (key === 'search')     { searchValue = value || ''; continue; }
      const tool = TOOLS[key];
      if (!tool) { droppedUnknown = true; continue; }
      const row = { tool: key, params: {}, col: 'to' };
      if (tool.params.length > 0) {
        row.params[tool.params[0].key] = value || '';
      }
      stack.push(row);
    }
    state.searchQuery     = searchValue;
    state.searchWholeWord = wholeWord;
    if (scoreValue !== null) {
      state.scoreRange = parseRange(scoreValue) ? scoreValue : '';
    }
    ToolStack.setStack(stack);
    if (droppedUnknown) {
      // Defer: showToast appends to the toast container which may not be in
      // the DOM yet during initial load.
      setTimeout(() => showToast("That link references a tool that's no longer available."), 0);
    }
  }

  return { navigate, applyURL };
})();

// ─── State ────────────────────────────────────────────────────────────────────

// Default tier labels. Lives on My Edits' `scoring` field; shown both there and
// as a legend on the merged All view.
const DEFAULT_SCORING = [
  { input: '60', note: 'Great (colorful phrases, sayings, people, etc.)' },
  { input: '50', note: 'Good (dictionary words, phrases)' },
  { input: '40', note: 'Fine but watch crosses (proper names, abbreviations, prepositional phrases)' },
  { input: '30', note: 'Not good (plural names, crosswordese, contrived inflections)' },
  { input: '20', note: 'Junk (partials, variant spellings, Roman numerals)' },
  { input: '10', note: 'Offensive' },
  { input: '0',  note: 'Gibberish' },
];

// Top-level state. Two signal-backed reactive fields drive the rendering
// pipeline; the rest are plain properties used imperatively.
//
//   `sources$`  — array of wordlists. The cosmetic effect subscribes; reorder/
//                 add/remove call `sources$.bump()` after splicing (signal
//                 equality is by reference, so plain mutation needs a bump).
//   `selected$` — `MERGED_ID` | wordlist object | null. The render effect
//                 subscribes so selection changes trigger a panel re-render.
//
// Search/score-range state is plain on `state` — there's no subscriber for
// it; the search bar is updated imperatively by the input handlers. (If a
// future view wants to react to query changes, lift them back to signals.)
const sources$  = signal([]);
const selected$ = signal(null);

// `cacheVersion$` is bumped whenever the imperative caches change (full
// invalidation or in-place patch). The render effect subscribes to it so
// cache-impacting changes trigger a repaint without manual dispatch.
const cacheVersion$ = signal(0);
function bumpCacheVersion() { cacheVersion$.set(cacheVersion$.peek() + 1); }

// Reads through `state.sources` / `state.selected` are non-subscribing (peek).
// Effects that need to re-run on changes read the underlying signal explicitly
// with `.get()`. This keeps the imperative call sites unchanged while
// preventing accidental over-subscription from incidental reads inside effects.
const state = {
  get sources()  { return sources$.peek(); },
  set sources(v) { sources$.set(v); },
  get selected() { return selected$.peek(); },
  set selected(v){ selected$.set(v); },
  searchQuery: '',
  searchWholeWord: false,
  scoreRange: '',
};

// Per-wordlist cosmetic fields are signal-backed: each wordlist exposes both
// `wl.name`/`wl.icon`/etc. (peek getter, set setter) and `wl.name$`/`wl.icon$`
// for explicit subscriptions. The cosmetic effect subscribes to all four
// across every wordlist.
//
// Cache-affecting fields (`enabled`, `rescoreRules`, `rawEntries`) and
// transient fields (`_loading`, `_updateAvailable`, `lastUpdated`, etc.) are
// plain properties: their mutation goes through a helper that handles the
// invalidation/persistence/dispatch explicitly. See "Mutation helpers" below.
const REACTIVE_WORDLIST_FIELDS = ['name', 'icon', 'url', 'publisherId'];

function wrapWordlist(wl) {
  if (wl.name$) return wl;  // already wrapped
  for (const field of REACTIVE_WORDLIST_FIELDS) {
    const sig = signal(wl[field]);
    delete wl[field];
    Object.defineProperty(wl, field + '$', { value: sig });
    Object.defineProperty(wl, field, {
      get() { return sig.peek(); },
      set(v) { sig.set(v); },
      enumerable: true,
      configurable: false,
    });
  }
  return wl;
}

// ─── Parsing ─────────────────────────────────────────────────────────────────

function parseWordlistLine(line) {
  if (!line) return null;
  const semi = line.indexOf(';');
  if (semi === -1) return null;
  const word = line.slice(0, semi);
  if (!word || word.includes(';')) return null;
  const rest = line.slice(semi + 1);
  const semi2 = rest.indexOf(';');
  const score = parseInt(semi2 === -1 ? rest : rest.slice(0, semi2), 10);
  if (isNaN(score)) return null;
  const comment = semi2 === -1 ? '' : rest.slice(semi2 + 1).trim();
  return { word, score, comment };
}

function parseWordlist(text) {
  const entries = [];
  for (const line of text.split('\n')) {
    const entry = parseWordlistLine(line);
    if (entry) entries.push(entry);
  }
  return entries;
}

// Validates a chunk of wordlist text (e.g., from a Range GET).
// Drops the last line (may be truncated at a Range boundary).
// Lines without semicolons are skipped (comments/headers). Returns false if
// there are no data lines, or any semicolon-containing line fails to parse.
function validateWordlistChunk(text) {
  const lines = text.split('\n').slice(0, -1).filter(l => l.length > 0);
  if (!lines.length) return false;
  const dataLines = lines.filter(l => l.includes(';'));
  if (!dataLines.length) return false;
  return dataLines.every(l => parseWordlistLine(l) !== null);
}

// ─── Storage ──────────────────────────────────────────────────────────────────

function lsSave(key, value) {
  try { localStorage.setItem(LS_PREFIX + key, value); return true; }
  catch { return false; }
}
function lsLoad(key) { return localStorage.getItem(LS_PREFIX + key); }
function lsDel(key)  { localStorage.removeItem(LS_PREFIX + key); }

// Bump when the shape of stored data (localStorage `meta`, IDB entries) changes
// in a way that older code can't read. Mismatch on load triggers a reset prompt.
//   v4 — drop state.outputScoring; tier labels live exclusively on My Edits' `scoring`.
const SCHEMA_VERSION = 4;

function readMergedSettings() {
  try { return JSON.parse(lsLoad('mergedSettings')) || {}; } catch { return {}; }
}
function writeMergedSettings(s) { lsSave('mergedSettings', JSON.stringify(s)); }

// IndexedDB for large wordlist data (localStorage has ~5MB limit)
const IDB_NAME  = 'grawlix';
const IDB_STORE = 'data';
let _db = null;

async function resetAllData() {
  Object.keys(localStorage).filter(k => k.startsWith(LS_PREFIX)).forEach(k => localStorage.removeItem(k));
  if (_db) { _db.close(); _db = null; }
  await new Promise(resolve => {
    const req = indexedDB.deleteDatabase(IDB_NAME);
    req.onsuccess = resolve;
    req.onerror   = resolve;
    req.onblocked = resolve;
  });
}

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess = e => { _db = e.target.result; resolve(); };
    req.onerror   = () => reject(req.error);
  });
}

function idbPut(key, val) {
  return new Promise(resolve => {
    const tx = _db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(val, key);
    tx.oncomplete = resolve;
    tx.onerror    = resolve;
  });
}

function idbGet(key) {
  return new Promise(resolve => {
    const tx  = _db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => resolve(req.result ?? null);
    req.onerror   = () => resolve(null);
  });
}

function idbDel(key) {
  return new Promise(resolve => {
    const tx = _db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete = resolve;
    tx.onerror    = resolve;
  });
}

function persistMeta() {
  if (_batchDepth > 0) { _persistPending = true; return; }
  _persistMetaNow();
}

function _persistMetaNow() {
  lsSave('meta', JSON.stringify(state.sources.map(l => ({
    ...(l.type ? { type: l.type } : {}),
    dbKey: l.dbKey,
    ...(l.icon ? { icon: l.icon } : {}),
    ...(l.publisherId ? { publisherId: l.publisherId } : {}),
    name: l.name, url: l.url || null,
    enabled: l.enabled, populated: l.populated, lastUpdated: l.lastUpdated || null,
    fetchedSize: l.fetchedSize || null,
    rescoreRules: l.rescoreRules || [],
    originalFilename: l.originalFilename || null,
    ...(l.scoring ? { scoring: l.scoring.filter(r => !r._catchAll) } : {}),
    ...(l.downloadCase ? { downloadCase: l.downloadCase } : {}),
    ...(l.downloadExt  ? { downloadExt:  l.downloadExt  } : {}),
    ...(l.downloadStem ? { downloadStem: l.downloadStem } : {}),
  }))));
}

async function persistData(dbKey, text) {
  await idbPut('data_' + dbKey, text);
}

// ─── Dark mode ────────────────────────────────────────────────────────────────

function applyDarkMode(val) {
  const dark = val === 'dark' || (val !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.classList.toggle('dark-mode', dark);
  document.documentElement.classList.toggle('light-mode', !dark);
}

// ─── Display case ─────────────────────────────────────────────────────────────

function getDisplayCase() { return lsLoad('displayCase') || 'lower'; }

function getDownloadComments() { return lsLoad('downloadComments') !== 'no'; }

function displayWord(word) {
  return getDisplayCase() === 'upper' ? word.toUpperCase() : word.toLowerCase();
}

function enableDismissClicks(el) {
  el.addEventListener('click', e => {
    if (e.target === el || e.target.closest('.dialog-close-btn, .dialog-cancel-btn')) el.close();
  });
}

function showDialog(el, onClose = null) {
  const opener = document.activeElement;
  el.returnValue = '';
  el.addEventListener('close', () => {
    opener?.focus();
    onClose?.();
  }, { once: true });
  el.showModal();
  if (!el.querySelector('[autofocus]')) {
    el.tabIndex = -1;
    el.focus();
  }
}

function createDialog(id, { labelledby, label } = {}) {
  const el = document.createElement('dialog');
  el.id = id;
  if (labelledby) el.setAttribute('aria-labelledby', labelledby);
  if (label)      el.setAttribute('aria-label', label);
  enableDismissClicks(el);
  const body = document.createElement('div');
  body.className = 'dialog-body';
  el.appendChild(body);
  document.body.appendChild(el);
  return { el, body };
}

// ─── Wordlists dialog ────────────────────────────────────────────────────────

const WordlistsDialog = (() => {
  // Replace the body wrapper with a flex layout — this dialog needs full control
  // over its inner structure, not the standard 22px-padded body.
  const el = document.createElement('dialog');
  el.id = 'wordlists-dialog';
  el.setAttribute('aria-labelledby', 'wordlists-dialog-title');
  enableDismissClicks(el);
  el.innerHTML = `
    <div class="wld-header">
      <h2 id="wordlists-dialog-title">Wordlists</h2>
      <button class="dialog-close-btn" aria-label="Close">✕</button>
    </div>
    <div class="wld-body">
      <aside class="wld-rail">
        <div class="wld-onboarding" id="wld-onboarding" hidden></div>
        <input type="file" id="wld-onboarding-file" accept=".txt,.dict" hidden>
        <div class="wld-rail-wordlist" id="wld-rail-wordlist"></div>
        <div class="add-wordlist-row" id="wld-add-wordlist">${buildDragHandleHTML()}<span class="add-wordlist-icon">＋</span>Add wordlist</div>
      </aside>
      <section class="wld-pane" id="wld-pane"></section>
    </div>`;
  document.body.appendChild(el);

  const onboarding = el.querySelector('#wld-onboarding');
  const onboardingFile = el.querySelector('#wld-onboarding-file');
  let _onboardingPage = lsLoad('onboarded')
    ? null
    : (parseInt(lsLoad('onboardingPage'), 10) || 1);

  function setOnboardingPage(page) {
    _onboardingPage = page;
    if (page === null) lsDel('onboardingPage');
    else               lsSave('onboardingPage', String(page));
  }

  function getXwiWordlist() {
    return state.sources.find(l => l.publisherId === 'xwi');
  }

  function buildOnboardingPageHTML(page) {
    const xwi = getXwiWordlist();
    const visiblePages = [1, 2];
    if (xwi && xwi.rawEntries.length === 0) visiblePages.push(3);
    const dots = visiblePages.map(n =>
      `<span${n === page ? ' class="active"' : ''}></span>`).join('');
    const dotsHTML = `<div class="wld-onboarding-dots">${dots}</div>`;

    if (page === 1) {
      return `
        <button class="dialog-close-btn" aria-label="Dismiss" data-onboard-action="dismiss">✕</button>
        <p>Some popular wordlists have been set up with suggested scoring rules.</p>
        <div class="wld-onboarding-actions">
          <button class="link-btn" data-onboard-action="blank">No thanks, remove them</button>
          <button class="primary" data-onboard-action="next">Sounds good</button>
        </div>
        ${dotsHTML}`;
    }
    if (page === 2) {
      return `
        <button class="dialog-close-btn" aria-label="Dismiss" data-onboard-action="dismiss">✕</button>
        <p>Got a personal wordlist? Import it into ${buildWordlistNameHTML(getEditsWordlist())}.</p>
        <div class="wld-onboarding-actions">
          <button class="link-btn" data-onboard-action="next">Skip</button>
          <button class="primary" data-onboard-action="pick-file">Choose file…</button>
        </div>
        ${dotsHTML}`;
    }
    // page 3 — XWI
    return `
      <button class="dialog-close-btn" aria-label="Dismiss" data-onboard-action="dismiss">✕</button>
      <p>XWord Info subscriber? Import your ${buildWordlistNameHTML(getXwiWordlist())} wordlist.</p>
      <div class="wld-onboarding-actions">
        <button class="link-btn" data-onboard-action="next">Skip</button>
        <button class="primary" data-onboard-action="pick-file">Choose file…</button>
      </div>
      ${dotsHTML}`;
  }

  function renderOnboarding() {
    if (_onboardingPage === null) { onboarding.hidden = true; return; }

    // Auto-advance: relevant wordlist already populated.
    if (_onboardingPage === 2 && (getEditsWordlist()?.rawEntries.length ?? 0) > 0) {
      setOnboardingPage(3);
    }
    // Page 3 requires XWI to exist and be unpopulated; otherwise end onboarding.
    if (_onboardingPage === 3) {
      const xwi = getXwiWordlist();
      if (!xwi || xwi.rawEntries.length > 0) {
        finishOnboarding();
        return;
      }
    }

    onboarding.hidden = false;
    onboarding.innerHTML = buildOnboardingPageHTML(_onboardingPage);
  }

  function finishOnboarding() {
    setOnboardingPage(null);
    onboarding.hidden = true;
    lsSave('onboarded', '1');
  }

  function advanceOnboarding() {
    if (_onboardingPage === 1)      setOnboardingPage(2);
    else if (_onboardingPage === 2) setOnboardingPage(3);
    else                            { finishOnboarding(); return; }
    renderOnboarding();
  }

  async function onboardingGoBlank() {
    const toRemove = state.sources.filter(l => l.type !== 'edits');
    // Invalidate first so the cosmetic effect that fires on the
    // `state.sources = …` assignment doesn't read a stale merged cache that
    // still references the wordlists we're removing.
    toRemove.forEach(l => invalidateWordlistCaches(l));
    state.sources = state.sources.filter(l => l.type === 'edits');
    if (state.selected !== MERGED_ID && toRemove.includes(state.selected)) {
      state.selected = MERGED_ID;
    }
    const edits = getEditsWordlist();
    if (edits) edits.scoring = [];
    persistMeta();
    await Promise.all(toRemove.map(l => idbDel('data_' + l.dbKey)));
    renderAll();
    advanceOnboarding();
  }

  function pickOnboardingFile() {
    const targetPage = _onboardingPage;
    onboardingFile.value = '';
    onboardingFile.onchange = () => {
      const file = onboardingFile.files[0];
      if (!file) return;
      const target = targetPage === 2 ? getEditsWordlist() : getXwiWordlist();
      if (!target) { advanceOnboarding(); return; }
      ingestFile(file, target);
      // ingestFile triggers renderAll → refresh → renderOnboarding,
      // which auto-advances once the import lands.
    };
    onboardingFile.click();
  }

  onboarding.addEventListener('click', e => {
    const action = e.target.closest('[data-onboard-action]')?.dataset.onboardAction;
    if (action === 'dismiss')        finishOnboarding();
    else if (action === 'next')      advanceOnboarding();
    else if (action === 'blank')     onboardingGoBlank();
    else if (action === 'pick-file') pickOnboardingFile();
  });

  const railWordlist = el.querySelector('#wld-rail-wordlist');
  const pane     = el.querySelector('#wld-pane');
  const addBtn   = el.querySelector('#wld-add-wordlist');

  let _focusedWordlist = null;
  let _dateTimer   = null;

  // ── Rendering ─────────────────────────────────────────────────────────────────

  function renderRail() {
    if (!_sourceCountsCache) _sourceCountsCache = buildMergedWordlist().sourceCounts;
    const contribMap = new Map(_sourceCountsCache.map(s => [s.wordlist, s.count]));

    railWordlist.innerHTML = state.sources.map(wordlist => {
      const icon = getWordlistIcon(wordlist);
      const meta = wordlistCardMeta(wordlist, contribMap);
      return buildWordlistCardHTML(icon, wordlist.name, meta, {
        selected:    _focusedWordlist === wordlist,
        enabled:     wordlist.enabled,
        populated:   wordlist.populated,
        hasUpdate:   !!wordlist._updateAvailable,
        interactive: true,
      });
    }).join('');

    const cards = railWordlist.querySelectorAll('.wordlist-card[data-wordlist]');
    state.sources.forEach((wordlist, i) => { if (cards[i]) cards[i]._wordlist = wordlist; });
  }

  function renderPane() {
    if (_dateTimer) { clearInterval(_dateTimer); _dateTimer = null; }
    if (!_focusedWordlist) {
      pane.innerHTML = '<div class="wld-pane-empty">Select a wordlist to configure</div>';
      return;
    }
    const wordlist = _focusedWordlist;
    const isEdits = wordlist.type === 'edits';
    const hasData = wordlist.rawEntries.length > 0;

    const { stats, entries: histEntries } = statsForWordlist(wordlist);

    // Action row shape is unified across all wordlists: date slot, primary action,
    // Download, more menu. Only the contents differ — sources have Update/Fetch
    // and a rescored/original Download split; My Edits has Import and a plain
    // Download (no rescoring), and Clear stands in for Delete in the more menu.
    let actionBtn, dlBtn, moreMenu;
    if (isEdits) {
      // Primary slot: Download when there's something to export, otherwise Import.
      actionBtn = `<button class="${hasData ? '' : 'primary'}" onclick="WordlistsDialog.action('import')" ${wordlist._loading ? 'disabled' : ''}>${wordlist._loading ? 'Importing…' : 'Import'}</button>`;
      dlBtn = hasData ? `<button class="primary" onclick="WordlistsDialog.action('download')">Download</button>` : '';
      // Rename is the F2 affordance on the rail card; not duplicated here.
      moreMenu = hasData ? buildMoreMenuHTML([
        ['Clear', `WordlistsDialog.action('clear')`],
      ]) : '';
    } else {
      const dot = wordlist._updateAvailable && !wordlist._loading ? ` <span class="update-dot"></span>` : '';
      const updateTitle = wordlist._updateAvailable && !wordlist._loading ? 'Update available' : '';
      const label = hasData ? 'Update' : (wordlist.url ? 'Fetch' : 'Import');

      if (wordlist.url) {
        const loadingLabel = hasData ? 'Updating…' : 'Fetching…';
        const btnLabel = `${wordlist._loading ? loadingLabel : label}${dot}`;
        actionBtn = buildSplitBtn(btnLabel, `WordlistsDialog.action('fetch')`,
          [['Import', `WordlistsDialog.action('import')`]],
          { primary: true, disabled: !!wordlist._loading, title: updateTitle });
      } else {
        actionBtn = `<button class="primary"${updateTitle ? ` title="${updateTitle}"` : ''} onclick="WordlistsDialog.action('import')" ${wordlist._loading ? 'disabled' : ''}>${wordlist._loading ? 'Importing…' : 'Import'}${dot}</button>`;
      }

      dlBtn = hasData ? buildSplitBtn('Download', `WordlistsDialog.action('downloadRescored')`,
        [['Download rescored wordlist', `WordlistsDialog.action('downloadRescored')`],
         ['Download original',      `WordlistsDialog.action('downloadOriginal')`]]) : '';

      // Rename is the F2 affordance on the rail card; Configure also lets you
      // rename. Not duplicated here.
      moreMenu = buildMoreMenuHTML([
        ['Configure wordlist', `WordlistsDialog.action('configure')`],
        ['Delete wordlist',    `WordlistsDialog.action('delete')`],
      ]);
    }

    const dateSlot = (hasData && wordlist.lastUpdated) ? '<span class="detail-date"></span>' : '';
    const actionsHTML = [dateSlot, actionBtn, dlBtn, moreMenu].filter(Boolean).join('\n');

    // My Edits gets a scoring rules editor (tier labels). Every other source
    // gets a rescoring rules editor. Same shape, different rule semantics.
    const rulesHTML = isEdits
      ? `<div class="wld-pane-rescore" id="wld-scoring-section">${buildScoringSectionHTML()}</div>`
      : `<div class="wld-pane-rescore" id="wld-rescore-section">${buildRescoreSectionHTML(wordlist)}</div>`;

    // No icon/name in the top bar — the focused wordlist is already highlighted in
    // the rail. The bar carries actions only. Rename happens in-place on the
    // rail card via the more menu.
    pane.innerHTML = `
      <div class="wld-pane-header">
        <div class="wld-pane-actions">${actionsHTML}</div>
      </div>
      <div class="wld-pane-stats">${buildStatsBarHTML(stats, { entries: histEntries, ignoredCount: stats.ignoredCount }, getHistogramLayout())}</div>
      ${rulesHTML}`;
    repositionAllHistogramRects();

    if (hasData && wordlist.lastUpdated) {
      const setDate = () => {
        const dEl = pane.querySelector('.detail-date');
        if (!dEl) return;
        dEl.textContent = `Last updated ${timeAgo(wordlist.lastUpdated)}`;
        dEl.title = new Date(wordlist.lastUpdated).toLocaleString();
      };
      setDate();
      _dateTimer = setInterval(setDate, 60_000);
    }
  }

  function refresh() {
    if (!el.open) return;
    if (_focusedWordlist && !state.sources.includes(_focusedWordlist)) {
      _focusedWordlist = state.sources[0] ?? null;
    }
    renderOnboarding();
    renderRail();
    renderPane();
  }

  function focus(wordlist) {
    _focusedWordlist = wordlist;
    renderRail();
    renderPane();
  }

  // ── Actions (called from inline onclick handlers in pane HTML) ───────────────

  const ACTIONS = {
    fetch:            () => fetchWordlist(_focusedWordlist),
    import:           () => importToWordlist(_focusedWordlist),
    delete:           async () => { await deleteWordlist(_focusedWordlist); },
    configure:        () => ConfigureWordlistDialog.open(_focusedWordlist),
    download:         () => downloadEdits(),
    downloadRescored: () => downloadIndividualWordlistRescored(_focusedWordlist),
    downloadOriginal: () => downloadOriginalWordlist(_focusedWordlist),
    clear:            () => clearEdits(),
  };

  function action(name) {
    const fn = ACTIONS[name];
    if (fn) fn();
  }

  function startRailRename(wordlist) {
    if (!wordlist) return;
    // Find the rail card for this wordlist and put an input over its name.
    const card = [...railWordlist.querySelectorAll('.wordlist-card[data-wordlist]')].find(c => c._wordlist === wordlist);
    const nameEl = card?.querySelector('.card-name');
    if (!nameEl || nameEl.querySelector('input')) return;
    const originalName = wordlist.name;
    nameEl.textContent = '';
    const input = document.createElement('input');
    input.className = 'card-name-edit';
    input.value = originalName;
    nameEl.appendChild(input);
    input.focus();
    input.select();
    input.onclick = e => e.stopPropagation();
    startInlineRename(input, originalName, {
      onCommit(newName) {
        setWordlistName(wordlist, newName);
        nameEl.textContent = newName;
      },
      onCancel() {
        nameEl.textContent = originalName;
      },
    });
  }

  // ── Rail event delegation ─────────────────────────────────────────────────────

  railWordlist.addEventListener('click', e => {
    const toggleLabel = e.target.closest('label.toggle');
    if (toggleLabel) {
      const card = toggleLabel.closest('.wordlist-card[data-wordlist]');
      if (card?._wordlist && !card._wordlist.populated) {
        e.stopPropagation();
        triggerImportForWordlist(card._wordlist, e);
      }
      return;
    }
    const card = e.target.closest('.wordlist-card[data-wordlist]');
    if (!card?._wordlist) return;
    focus(card._wordlist);
  });

  railWordlist.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    const card = e.target.closest('.wordlist-card[data-wordlist]');
    if (!card?._wordlist) return;
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      focus(card._wordlist);
    } else if (e.key === 'F2') {
      e.preventDefault();
      startRailRename(card._wordlist);
    }
  });

  railWordlist.addEventListener('change', e => {
    const toggle = e.target.closest('.toggle input[type="checkbox"]');
    if (!toggle) return;
    const card = toggle.closest('.wordlist-card[data-wordlist]');
    if (!card?._wordlist) return;
    toggleWordlist(card._wordlist, e);
  });

  // Drag-to-reorder (mouse)
  let _dragWordlist = null;
  railWordlist.addEventListener('dragstart', e => {
    const card = e.target.closest('.wordlist-card[data-wordlist]');
    if (!card?._wordlist) return;
    _dragWordlist = card._wordlist;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', '');
    setTimeout(() => card.classList.add('dragging'), 0);
  });
  railWordlist.addEventListener('dragend', () => {
    railWordlist.querySelectorAll('.wordlist-card.dragging, .wordlist-card.drag-over')
      .forEach(c => c.classList.remove('dragging', 'drag-over'));
    _dragWordlist = null;
  });
  railWordlist.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const card = e.target.closest('.wordlist-card[data-wordlist]');
    if (!card || card._wordlist === _dragWordlist) return;
    railWordlist.querySelectorAll('.wordlist-card.drag-over').forEach(c => c.classList.remove('drag-over'));
    card.classList.add('drag-over');
  });
  railWordlist.addEventListener('dragleave', e => {
    const card = e.target.closest('.wordlist-card');
    if (card && !card.contains(e.relatedTarget)) card.classList.remove('drag-over');
  });
  railWordlist.addEventListener('drop', e => {
    e.preventDefault();
    const card = e.target.closest('.wordlist-card[data-wordlist]');
    const toWordlist = card?._wordlist;
    if (!_dragWordlist || !toWordlist || _dragWordlist === toWordlist) return;
    const fromIdx = state.sources.indexOf(_dragWordlist);
    const toIdx   = state.sources.indexOf(toWordlist);
    reorderSources(fromIdx, toIdx);
  });

  // ── + Add wordlist ────────────────────────────────────────────────────────────────

  addBtn.addEventListener('click', () => ConfigureWordlistDialog.openAdd());

  // ── Open / close ──────────────────────────────────────────────────────────────

  el.addEventListener('close', () => {
    if (_dateTimer) { clearInterval(_dateTimer); _dateTimer = null; }
  });

  function open(wordlist = null) {
    _focusedWordlist = wordlist ?? (state.selected !== MERGED_ID ? state.selected : null) ?? state.sources[0] ?? null;
    renderOnboarding();
    renderRail();
    renderPane();
    showDialog(el);
  }

  function getFocusedWordlist() { return _focusedWordlist; }

  // Re-render only the rescore rule editor for the focused wordlist, in place — used
  // by afterRuleChange so the user's pending edit doesn't blow away the whole pane.
  function refreshRescoreSection() {
    const section = el.querySelector('#wld-rescore-section');
    if (section) section.innerHTML = buildRescoreSectionHTML(_focusedWordlist);
  }

  // Counterpart for the scoring (tier-label) editor on My Edits.
  function refreshScoringSection() {
    const section = el.querySelector('#wld-scoring-section');
    if (section) section.innerHTML = buildScoringSectionHTML();
  }

  // Update the "X used" meta text on each rail card in place. Avoids rebuilding
  // the whole rail (which would lose drag/hover state mid-interaction).
  function updateRailMeta(contribMap) {
    for (const card of railWordlist.querySelectorAll('.wordlist-card[data-wordlist]')) {
      const wordlist = card._wordlist;
      if (!wordlist) continue;
      const metaEl = card.querySelector('.card-meta');
      if (metaEl) metaEl.textContent = wordlistCardMeta(wordlist, contribMap);
    }
  }

  return {
    open, refresh, focus, action, getFocusedWordlist,
    refreshRescoreSection, refreshScoringSection, updateRailMeta,
    isOpen: () => el.open,
  };
})();

// ─── Source dropdown (header) ─────────────────────────────────────────────────

const SourceDropdown = (() => {
  const trigger    = document.getElementById('source-dropdown-btn');
  const iconSlot   = trigger.querySelector('.source-dropdown-icon');
  const nameSlot   = trigger.querySelector('.source-dropdown-name');

  const menu = document.createElement('div');
  menu.id = 'source-dropdown-menu';
  menu.setAttribute('role', 'listbox');
  menu.setAttribute('aria-label', 'Wordlists');
  menu.hidden = true;
  document.body.appendChild(menu);

  function isMerged() { return state.selected === MERGED_ID; }

  // Keyboard nav helpers: roving tabindex + type-ahead.
  let typeahead = '';
  let typeaheadTimer = 0;
  // Snapshot of state.selected at open() time, so Escape can revert
  // arrow-key live-selections to the value from before the listbox opened.
  let initialSelection = null;
  function options() { return [...menu.querySelectorAll('.dropdown-item')]; }
  function focusItem(item) {
    if (!item) return;
    menu.querySelectorAll('.dropdown-item[tabindex="0"]').forEach(el => el.setAttribute('tabindex', '-1'));
    item.setAttribute('tabindex', '0');
    item.focus();
  }
  // Apply selection (state + ARIA + visual) and focus the option.
  function liveSelect(item) {
    if (item.dataset.target === 'merged') selectMergedWordlist();
    else if (item._wordlist) selectWordlist(item._wordlist);
    options().forEach(el => {
      const isThis = el === item;
      el.classList.toggle('selected', isThis);
      el.setAttribute('aria-selected', String(isThis));
    });
    focusItem(item);
  }

  function renderTrigger() {
    if (isMerged()) {
      iconSlot.innerHTML = MERGED_ICON;
      nameSlot.textContent = MERGED_NAME;
      trigger.classList.remove('disabled');
    } else {
      const wordlist = state.selected;
      iconSlot.innerHTML = wordlist ? getWordlistIcon(wordlist) : '';
      nameSlot.textContent = wordlist ? wordlist.name : '';
      trigger.classList.toggle('disabled', !!wordlist && !wordlist.enabled);
    }
  }

  function renderMenu() {
    // Roving tabindex: only the selected option is in the tab sequence; arrow
    // keys move focus among the others. `role="presentation"` on the divider
    // because listbox children must be options or groups (not separators).
    const parts = [];
    const mergedSel = isMerged();
    parts.push(`<div class="dropdown-item${mergedSel ? ' selected' : ''}" data-target="merged" role="option" tabindex="${mergedSel ? '0' : '-1'}" aria-selected="${mergedSel}">${MERGED_ICON}<span>${MERGED_NAME}</span></div>`);
    parts.push(`<div class="dropdown-divider" role="presentation"></div>`);
    state.sources.forEach(wordlist => {
      const sel = !mergedSel && state.selected === wordlist;
      parts.push(`<div class="dropdown-item${sel ? ' selected' : ''}${wordlist.enabled ? '' : ' disabled'}" data-wordlist role="option" tabindex="${sel ? '0' : '-1'}" aria-selected="${sel}">${getWordlistIcon(wordlist)}<span>${esc(wordlist.name)}</span></div>`);
    });

    menu.innerHTML = parts.join('');

    const wordlistEls = [...menu.querySelectorAll('.dropdown-item[data-wordlist]')];
    state.sources.forEach((wordlist, i) => { if (wordlistEls[i]) wordlistEls[i]._wordlist = wordlist; });

    // Fallback: nothing was selected — make the first option focusable.
    if (!menu.querySelector('.dropdown-item[tabindex="0"]')) {
      menu.querySelector('.dropdown-item')?.setAttribute('tabindex', '0');
    }
  }

  function position() {
    const r = trigger.getBoundingClientRect();
    menu.style.left = r.left + 'px';
    menu.style.top  = (r.bottom + 6) + 'px';
    menu.style.minWidth = Math.max(r.width, 280) + 'px';
  }

  function open() {
    initialSelection = state.selected;
    renderMenu();
    position();
    menu.hidden = false;
    trigger.setAttribute('aria-expanded', 'true');
  }

  function close() {
    initialSelection = null;
    menu.hidden = true;
    trigger.setAttribute('aria-expanded', 'false');
  }

  // Restore selection to what it was when the listbox opened (Escape behavior).
  function cancelAndClose() {
    if (initialSelection !== null && state.selected !== initialSelection) {
      if (initialSelection === MERGED_ID) selectMergedWordlist();
      else selectWordlist(initialSelection);
    }
    close();
  }

  trigger.addEventListener('click', e => {
    e.stopPropagation();
    menu.hidden ? open() : close();
  });

  // Step selection through [merged, ...sources] like a native <select>:
  // clamp at both ends, no wrap-around.
  function stepSelection(delta) {
    const items = [MERGED_ID, ...state.sources];
    let idx = 0;
    if (!isMerged()) {
      const i = state.sources.indexOf(state.selected);
      idx = i >= 0 ? i + 1 : 0;
    }
    const nextIdx = Math.max(0, Math.min(items.length - 1, idx + delta));
    if (nextIdx === idx) return;
    const next = items[nextIdx];
    if (next === MERGED_ID) selectMergedWordlist();
    else selectWordlist(next);
  }

  trigger.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
      e.preventDefault();
      // Closed: cycle the selection in place, like a native <select>.
      // Open: move focus into the listbox.
      if (menu.hidden) stepSelection(e.key === 'ArrowDown' ? 1 : -1);
      else focusItem(menu.querySelector('.dropdown-item[tabindex="0"]') ?? menu.querySelector('.dropdown-item'));
    } else if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      if (menu.hidden) openWithFocus();
      else focusItem(menu.querySelector('.dropdown-item[tabindex="0"]') ?? menu.querySelector('.dropdown-item'));
    } else if (menu.hidden && e.key.length === 1 && /\S/.test(e.key) && !e.ctrlKey && !e.metaKey && !e.altKey) {
      // Type-ahead while closed: jump to the next option whose name starts
      // with the typed prefix, like a native <select>.
      e.preventDefault();
      clearTimeout(typeaheadTimer);
      typeahead += e.key.toLowerCase();
      typeaheadTimer = setTimeout(() => { typeahead = ''; }, 500);

      const items = [MERGED_ID, ...state.sources];
      let idx = 0;
      if (!isMerged()) {
        const i = state.sources.indexOf(state.selected);
        idx = i >= 0 ? i + 1 : 0;
      }
      for (let i = 1; i <= items.length; i++) {
        const j = (idx + i) % items.length;
        const name = items[j] === MERGED_ID ? MERGED_NAME : items[j].name;
        if (name.toLowerCase().startsWith(typeahead)) {
          if (items[j] === MERGED_ID) selectMergedWordlist();
          else selectWordlist(items[j]);
          return;
        }
      }
    }
  });

  document.addEventListener('click', e => {
    if (menu.hidden) return;
    if (menu.contains(e.target) || trigger.contains(e.target)) return;
    close();
  });

  document.addEventListener('keydown', e => {
    if (!menu.hidden && e.key === 'Escape') { e.preventDefault(); cancelAndClose(); trigger.focus(); }
  });

  menu.addEventListener('click', e => {
    const item = e.target.closest('.dropdown-item');
    if (!item) return;
    liveSelect(item);
    close();
    trigger.focus();
  });

  menu.addEventListener('keydown', e => {
    const list = options();
    if (list.length === 0) return;
    const current = e.target.closest('.dropdown-item');
    const idx = list.indexOf(current);

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      const nextIdx = idx >= 0 ? Math.min(idx + 1, list.length - 1) : 0;
      if (nextIdx !== idx) liveSelect(list[nextIdx]);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      const nextIdx = idx > 0 ? idx - 1 : 0;
      if (nextIdx !== idx) liveSelect(list[nextIdx]);
    } else if (e.key === 'Home') {
      e.preventDefault();
      liveSelect(list[0]);
    } else if (e.key === 'End') {
      e.preventDefault();
      liveSelect(list[list.length - 1]);
    } else if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      // Selection is already committed via arrow nav; just close.
      close();
      trigger.focus();
    } else if (e.key === 'Tab') {
      // Tab leaves the listbox — close (selection already committed) and let
      // focus move naturally.
      close();
    } else if (e.key.length === 1 && /\S/.test(e.key) && !e.ctrlKey && !e.metaKey && !e.altKey) {
      // Type-ahead: jump to the next option whose name starts with the typed
      // prefix and live-select it.
      clearTimeout(typeaheadTimer);
      typeahead += e.key.toLowerCase();
      typeaheadTimer = setTimeout(() => { typeahead = ''; }, 500);
      const start = idx >= 0 ? idx : -1;
      for (let i = 1; i <= list.length; i++) {
        const j = (start + i + list.length) % list.length;
        const text = (list[j].textContent ?? '').trim().toLowerCase();
        if (text.startsWith(typeahead)) { e.preventDefault(); liveSelect(list[j]); break; }
      }
    }
  });

  window.addEventListener('resize', () => { if (!menu.hidden) position(); });

  // Open the menu and move keyboard focus into it (selected item if any, else first).
  function openWithFocus() {
    open();
    focusItem(menu.querySelector('.dropdown-item[tabindex="0"]') ?? menu.querySelector('.dropdown-item'));
  }

  return { renderTrigger, open, close, openWithFocus };
})();
