// ─── Init ─────────────────────────────────────────────────────────────────────

async function init() {
  const storedSchema = parseInt(lsLoad('schemaVersion'), 10);
  const hasOldData   = lsLoad('meta') !== null;
  if (hasOldData && storedSchema !== SCHEMA_VERSION) {
    const reset = await showConfirm(
      `Grawlix's data format has changed since your last visit. The site may not work correctly until reset.`,
      { confirmText: 'Reset', cancelText: 'I\'ll take my chances' }
    );
    if (reset) {
      await resetAllData();
      lsSave('schemaVersion', String(SCHEMA_VERSION));
    }
  } else if (!hasOldData) {
    lsSave('schemaVersion', String(SCHEMA_VERSION));
  }

  await openDB();

  const raw = lsLoad('meta');
  if (raw) {
    try {
      const meta = JSON.parse(raw);
      state.sources = await Promise.all(meta.map(async m => {
        const dbKey = m.dbKey || crypto.randomUUID();
        const text = await idbGet('data_' + dbKey) ?? await idbGet('data_' + m.id);
        const wordlist = wrapWordlist({
          ...(m.type     ? { type: m.type }         : {}),
          dbKey,
          icon:            m.icon || null,
          publisherId:     m.publisherId || null,
          name: m.name, url: m.url || null,
          enabled: !!m.enabled,
          populated: !!(m.populated || m.type === 'edits' || text || m.lastUpdated),
          lastUpdated: m.lastUpdated || null,
          fetchedSize: m.fetchedSize || null,
          rescoreRules: (m.rescoreRules || []).map(r => ({ length: '', ...r })),
          originalFilename: m.originalFilename || null,
          ...(m.scoring      ? { scoring: m.scoring }           : {}),
          ...(m.downloadCase ? { downloadCase: m.downloadCase } : {}),
          ...(m.downloadExt  ? { downloadExt:  m.downloadExt  } : {}),
          ...(m.downloadStem ? { downloadStem: m.downloadStem } : {}),
          rawEntries: text ? parseWordlist(text) : [],
          _loading: false,
        });
        updateCatchAll(wordlist);
        return wordlist;
      }));
    } catch { state.sources = defaultSources(); }
  } else {
    state.sources = defaultSources();
    persistMeta();
  }

  const rawScoreRange = lsLoad('scoreRange');
  if (rawScoreRange !== null && parseRange(rawScoreRange.trim()) !== null) {
    state.scoreRange = rawScoreRange.trim();
  }

  // URL wins over localStorage for shared/deep-linked state.
  Router.applyURL();

  state.selected = MERGED_ID;

  ensureEdits();
  renderAll();
  const _overlay = document.getElementById('busy-overlay');
  if (_overlay) {
    _overlay.classList.add('done');
    _overlay.addEventListener('transitionend', () => _overlay.remove(), { once: true });
  }
  bindEvents();
  checkForUpdates();
  setInterval(checkForUpdates, UPDATE_CHECK_INTERVAL);

  state.sources
    .filter(l => l.url && !l.populated)
    .forEach(l => fetchWordlist(l, null, { silent: true }));

  if (!lsLoad('visited')) {
    lsSave('visited', '1');
    HelpModal.open();
  }
  // The "popular wordlists pre-loaded" banner now lives inside the Wordlists dialog;
  // it shows there until the user dismisses it (lsLoad('onboarded')).
}

function defaultSources() {
  return WORDLIST_PUBLISHERS.map(t => {
    const wordlist = wrapWordlist({
      dbKey: crypto.randomUUID(),
      icon: t.icon ? { ...t.icon } : null,
      publisherId: t.id,
      name: t.name,
      url: t.url || null,
      enabled: false,
      populated: false,
      rawEntries: [],
      lastUpdated: null,
      _loading: false,
      rescoreRules: t.defaultRules ? JSON.parse(JSON.stringify(t.defaultRules)) : [],
    });
    updateCatchAll(wordlist);
    return wordlist;
  });
}

// ─── My Edits helpers ─────────────────────────────────────────────────────────

function getEditsWordlist() {
  return state.sources.find(l => l.type === 'edits');
}

function ensureEdits() {
  const edits = getEditsWordlist();
  if (edits) {
    if (!edits.scoring) edits.scoring = DEFAULT_SCORING.map(r => ({ ...r }));
    if (!edits.icon) edits.icon = EDITS_ICON;
  } else {
    const newEdits = wrapWordlist({
      type: 'edits',
      dbKey: crypto.randomUUID(),
      icon: EDITS_ICON,
      name: 'My Edits',
      url: null,
      enabled: true,
      populated: true,
      rawEntries: [],
      lastUpdated: null,
      _loading: false,
      rescoreRules: [],
      scoring: DEFAULT_SCORING.map(r => ({ ...r })),
    });
    updateCatchAll(newEdits);
    state.sources.unshift(newEdits);
    sources$.bump();
    persistMeta();
  }
}

function entriesToText(entries) {
  return entries.map(e => e.comment ? `${e.word};${e.score};${e.comment}` : `${e.word};${e.score}`).join('\n') + (entries.length ? '\n' : '');
}

function entriesToDownloadText(entries, { upper, comments }) {
  return entries.map(e => {
    const w = upper ? e.word.toUpperCase() : e.word.toLowerCase();
    return (comments && e.comment) ? `${w};${e.score};${e.comment}` : `${w};${e.score}`;
  }).join('\n') + '\n';
}

async function downloadWithDialog(defaultStem, wordlist, entries, title = 'Download') {
  const result = await showDownloadDialog(defaultStem, wordlist, title);
  if (!result) return;
  const { stem, ext, caseMode, comments } = result;
  triggerDownload(entriesToDownloadText(entries, { upper: caseMode === 'upper', comments }), `${stem}.${ext}`);
  showToast(`Downloaded ${pluralize(entries.length, 'entry', 'entries')}`);
}

async function persistEdits(edits) {
  await persistData(edits.dbKey, entriesToText(edits.rawEntries));
  persistMeta();
}

async function downloadEdits() {
  const edits = getEditsWordlist();
  await downloadWithDialog(edits.name, edits, edits.rawEntries);
}

async function clearEdits() {
  const edits = getEditsWordlist();
  if (!edits.rawEntries.length) return;
  if (!await showConfirm(`Clear all ${pluralize(edits.rawEntries.length, 'entry', 'entries')} from "${esc(edits.name)}"?`, { confirmText: 'Clear' })) return;
  batchUpdate(() => {
    edits.rawEntries = [];
    invalidateWordlistCaches(edits);
    updateCatchAll(edits);
    repaintAfterCacheChange();
  });
  await persistEdits(edits);
}

// ─── Stats ────────────────────────────────────────────────────────────────────

const _statsCache = new WeakMap();
const _mergedStatsKey = {};
let _sourceCountsCache = null;
let _mergedWordlistCache = null;

function invalidateRescoredCache(wordlist) { wordlist._rescored = null; wordlist._rescoredMap = null; invalidateHistogramLayout(); }
function invalidateStatsCache(key) { _statsCache.delete(key); }
function invalidateSourceCounts() {
  _sourceCountsCache = null;
  _mergedWordlistCache = null;
  invalidateHistogramLayout();
  for (const l of state.sources) l._overrideMap = null;
}
function invalidateWordlistCaches(wordlist) {
  invalidateRescoredCache(wordlist);
  invalidateStatsCache(wordlist);
  invalidateSourceCounts();
  invalidateStatsCache(_mergedStatsKey);
}

function computeStatsRaw(entries, ignoredCount = 0) {
  // Empty state: return an all-zero shape so buildStatsBarHTML can render the
  // bar with dashes and an empty histogram.
  if (!entries.length) {
    return { count: 0, min: 0, max: 0, mean: 0, median: 0, mode: 0, distinctScores: [], ignoredCount };
  }
  let min = Infinity, max = -Infinity;
  const freq = {};
  const scores = [];
  for (const { score } of entries) {
    if (score < min) min = score;
    if (score > max) max = score;
    scores.push(score);
    freq[score] = (freq[score] || 0) + 1;
  }
  scores.sort((a, b) => a - b);
  const mid = Math.floor(scores.length / 2);
  const median = scores.length % 2 === 0 ? (scores[mid - 1] + scores[mid]) / 2 : scores[mid];
  let mode = null, modeCount = 0;
  for (const [s, c] of Object.entries(freq)) {
    if (c > modeCount) { modeCount = c; mode = +s; }
  }
  const mean = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
  const distinctScores = Object.keys(freq).map(Number).sort((a, b) => a - b);
  return { count: entries.length, min, max, mean, median, mode, distinctScores, ignoredCount };
}

function computeStats(key, entries, ignoredCount = 0) {
  if (_statsCache.has(key)) return _statsCache.get(key);
  const result = computeStatsRaw(entries, ignoredCount);
  _statsCache.set(key, result);
  return result;
}

function statsForWordlist(wordlist) {
  const isEdits = wordlist.type === 'edits';
  const entries = isEdits ? wordlist.rawEntries : getRescoredEntries(wordlist);
  const ignoredCount = isEdits ? 0 : wordlist.rawEntries.length - entries.length;
  return { stats: computeStats(wordlist, entries, ignoredCount), entries };
}

// ─── Histogram layout ─────────────────────────────────────────────────────────

const HIST_DISCRETE_THRESHOLD = 12;
const HIST_BINNED_BUCKETS = 11;

let _layoutCache = null;
function invalidateHistogramLayout() { _layoutCache = null; }

function getHistogramLayout() {
  if (_layoutCache) return _layoutCache;
  const distinct = new Set();
  let min = Infinity, max = -Infinity;
  for (const wl of state.sources) {
    for (const { score } of getRescoredEntries(wl)) {
      distinct.add(score);
      if (score < min) min = score;
      if (score > max) max = score;
    }
  }
  if (!distinct.size) {
    // No data → empty layout. Don't cache: as soon as data arrives, the next
    // call should recompute. (Caching here would also burn the cache if
    // anything calls into the layout before sources finish loading.)
    return { mode: 'empty', slots: [], min: null, max: null };
  }
  const distinctScores = [...distinct].sort((a, b) => a - b);
  if (distinctScores.length <= HIST_DISCRETE_THRESHOLD) {
    _layoutCache = {
      mode: 'discrete',
      slots: distinctScores.map(s => ({ score: s, lo: s, hi: s, label: String(s) })),
      min, max,
    };
    return _layoutCache;
  }
  const N = HIST_BINNED_BUCKETS;
  const bucketSize = Math.max(1, Math.ceil((max - min + 1) / N));
  const slots = [];
  for (let i = 0; i < N; i++) {
    const lo = min + i * bucketSize;
    if (lo > max) break;
    const hi = Math.min(max, lo + bucketSize - 1);
    slots.push({ lo, hi, label: lo === hi ? String(lo) : `${lo}–${hi}` });
  }
  _layoutCache = { mode: 'binned', slots, min, max };
  return _layoutCache;
}

function bucketCounts(entries, layout) {
  const counts = layout.slots.map(() => 0);
  if (layout.mode === 'discrete') {
    const idxByScore = new Map(layout.slots.map((s, i) => [s.score, i]));
    for (const { score } of entries) {
      const idx = idxByScore.get(score);
      if (idx !== undefined) counts[idx]++;
    }
  } else if (layout.slots.length) {
    const min0 = layout.slots[0].lo;
    const bs = layout.slots[0].hi - layout.slots[0].lo + 1;
    const last = layout.slots.length - 1;
    for (const { score } of entries) {
      const idx = Math.min(last, Math.max(0, Math.floor((score - min0) / bs)));
      counts[idx]++;
    }
  }
  return counts;
}

function slotIntersectsRange(lo, hi, intervals) {
  for (const { min, max } of intervals) {
    const m = max === null ? Infinity : max;
    const n = min === null ? -Infinity : min;
    if (lo <= m && hi >= n) return true;
  }
  return false;
}

// ─── Search ───────────────────────────────────────────────────────────────────

const CONSONANTS = 'bcdfghjklmnpqrstvwxyz';
const VOWELS = 'aeiou';

function markSpan(text, colorIdx) {
  return `<mark class="search-match search-match-${colorIdx % 5}">${text}</mark>`;
}

function segmentToPat(str) {
  let pat = '';
  for (let i = 0; i < str.length; i++) {
    const ch = str[i];
    if (ch === '?')      { pat += '.'; }
    else if (ch === '#') { pat += `[${CONSONANTS}]`; }
    else if (ch === '@') { pat += `[${VOWELS}]`; }
    else if (ch === '[') {
      const end = str.indexOf(']', i);
      if (end === -1) { pat += '\\['; }
      else { pat += str.slice(i, end + 1); i = end; }
    } else {
      pat += ch.replace(/[.+^${}()|[\]\\]/g, '\\$&');
    }
  }
  return pat;
}

function buildSearchPattern(query, wholeWord = false) {
  const q = query.toLowerCase();
  const segs    = q.split('*');
  const segPats = segs.map(segmentToPat);
  const hlParts = segPats.map(p => p ? '(' + p + ')' : '');
  const joined  = segPats.join('.*');
  return {
    filterRe: new RegExp(wholeWord ? '^' + joined + '$' : joined),
    highlight: w => highlightSegments(w, new RegExp(hlParts.join('.*'), 'id')),
  };
}

function highlightSegments(word, hlRe) {
  const m = hlRe.exec(word);
  if (!m?.indices) return word;
  let result = '', pos = 0, colorIdx = 0;
  for (let g = 1; g < m.indices.length; g++) {
    if (!m.indices[g]) continue;
    const [start, end] = m.indices[g];
    result += word.slice(pos, start) + markSpan(word.slice(start, end), colorIdx++);
    pos = end;
  }
  return result + word.slice(pos);
}

// ─── Tool stack ───────────────────────────────────────────────────────────────
// Chrome-only mockup: rows render but don't yet transform the wordlist.

// Single source of truth for tool metadata. The gallery, the tool stack rows, the help tour,
// and any future surface that names a tool all read from here. Adding a new tool means adding
// one entry; everything that lists tools picks it up automatically.
const TOOL_CATEGORIES = [
  { id: 'anagrams', label: 'Anagrams & letter banks' },
  { id: 'patterns', label: 'Letter patterns' },
  { id: 'pairs',    label: 'Pairs' },
];

const TOOLS = {
  anagram: {
    name: 'Anagram', icon: '🔤', category: 'anagrams',
    desc: 'Same letters, rearranged',
    example: 'LINDSEY → SNIDELY',
    params: [{ key: 'word', label: 'word' }],
    output: 'single',
  },
  subanagram: {
    name: 'Subanagram', icon: '🔡', category: 'anagrams',
    desc: 'Words made from any subset of letters',
    example: 'PARENTAL → PLANE, RENT, …',
    params: [{ key: 'letters', label: 'letters' }],
    output: 'single',
  },
  regex: {
    name: 'Regex', icon: '🪄', category: 'patterns',
    desc: 'Match by regular expression',
    example: '^un.*ed$',
    params: [{ key: 'pattern', label: 'pattern' }],
    output: 'single', polymorphic: true,
  },
  palindrome: {
    name: 'Palindrome', icon: '🔄', category: 'patterns',
    desc: 'Reads the same forwards and back',
    example: 'RACECAR · KAYAK',
    params: [],
    output: 'single',
  },
  beheadments: {
    name: 'Beheadments', icon: '🪓', category: 'pairs',
    desc: 'Drop the first letter to get a new word',
    example: 'SLING → LING',
    params: [],
    output: 'pair',
  },
  curtailments: {
    name: 'Curtailments', icon: '✂️', category: 'pairs',
    desc: 'Drop the last letter to get a new word',
    example: 'CARTS → CART',
    params: [],
    output: 'pair',
  },
  semordnilaps: {
    name: 'Semordnilaps', icon: '↔️', category: 'pairs',
    desc: 'Reverse to get a different word',
    example: 'STRESSED → DESSERTS',
    params: [],
    output: 'pair',
  },
};

const ToolStack = (() => {
  // [{ tool: 'anagram', params: { word: 'LINDSEY' }, col: 'to' }, ...]
  let stack = [];

  function paramsHTML(tool, idx, valuesByKey) {
    if (!tool.params.length) return '';
    const single = tool.params.length === 1;
    const inputs = tool.params.map(p => {
      const labelHTML = single ? '' : `<label>${esc(p.label)}:</label>`;
      return `<span class="tool-row-param">${labelHTML}<input type="text" placeholder="${esc(p.label)}" value="${esc(valuesByKey?.[p.key] || '')}" data-row="${idx}" data-key="${p.key}"></span>`;
    }).join('');
    return `<span class="tool-row-params">${inputs}</span>`;
  }

  function buildRowHTML(idx, row) {
    const tool = TOOLS[row.tool];
    if (!tool) return '';
    const prev = idx === 0 ? null : stack[idx - 1];
    const prevPair = prev && TOOLS[prev.tool]?.output === 'pair';
    const showToggle = prevPair && !tool.polymorphic;
    const altCol = row.col === 'to' ? 'from' : 'to';

    const toggleHTML = showToggle
      ? `<span class="tool-toggle">on <span class="tool-toggle-link" data-toggle="${idx}" title="Click to use ${altCol}">${row.col}</span></span>`
      : '';

    return `<div class="tool-row">
      <div class="tool-row-body">
        ${buildToolLabelHTML(tool)}
        ${toggleHTML}
        ${paramsHTML(tool, idx, row.params)}
      </div>
      <button type="button" class="tool-row-remove" data-remove="${idx}" title="Remove" aria-label="Remove ${esc(tool.name)}"><svg width="10" height="10"><use href="#icon-x"/></svg></button>
    </div>`;
  }

  function buildGalleryCardHTML(toolKey, tool) {
    return `<div class="gallery-card" data-tool="${esc(toolKey)}">
      <div class="gallery-card-name">${buildToolLabelHTML(tool)}</div>
      <div class="gallery-card-desc">${esc(tool.desc)}</div>
      <div class="gallery-card-example">${esc(tool.example)}</div>
      <button class="gallery-card-add" type="button" aria-label="Add ${esc(tool.name)} to stack" title="Add to stack">+</button>
    </div>`;
  }

  function buildGalleryHTML() {
    const byCategory = new Map(TOOL_CATEGORIES.map(c => [c.id, []]));
    Object.entries(TOOLS).forEach(([key, tool]) => {
      byCategory.get(tool.category)?.push([key, tool]);
    });
    return TOOL_CATEGORIES.map(cat => {
      const cards = byCategory.get(cat.id) || [];
      if (!cards.length) return '';
      return `<div class="gallery-section-label">${esc(cat.label)}</div>` +
             cards.map(([key, tool]) => buildGalleryCardHTML(key, tool)).join('');
    }).join('');
  }

  // Used by mountDetailPanel for the initial render. Mutations after that go
  // through direct DOM manipulation in add/replace/removeAt. Preview state is
  // purely transient and lives only in the DOM (.doomed class +
  // .tool-stack-cursor element), so it's not serialized here.
  function buildHTML() {
    if (!stack.length) return '';
    const rows = stack.map((row, idx) => buildRowHTML(idx, row)).join('');
    return `<div id="tool-stack">${rows}</div>`;
  }

  function stackEl() { return document.getElementById('tool-stack'); }
  function panelEl() { return document.getElementById('detail-panel'); }

  function ensureStackEl() {
    let e = stackEl();
    if (e) return e;
    const p = panelEl();
    if (!p) return null;
    e = document.createElement('div');
    e.id = 'tool-stack';
    // Inserts into the .sticky-stack ahead of the search bar when present;
    // falls back to the word-list panel's parent on the empty-panel path.
    const searchBar = p.querySelector('.search-bar');
    const wordListPanel = p.querySelector('#word-list-panel');
    const anchor = searchBar || wordListPanel;
    if (anchor) anchor.parentNode.insertBefore(e, anchor);
    else p.appendChild(e);
    return e;
  }

  function rowEls() {
    const e = stackEl();
    if (!e) return [];
    return Array.from(e.querySelectorAll('.tool-row'));
  }

  function focusRowInput(idx) {
    rowEls()[idx]?.querySelector('.tool-row-param input')?.focus();
  }

  function flashRow(idx) {
    const row = rowEls()[idx];
    if (!row) return;
    // Reflow trick re-triggers the animation when the same row is re-clicked
    // (self-replace) before a previous flash has finished.
    row.classList.remove('flash');
    void row.offsetWidth;
    row.classList.add('flash');
  }

  function refreshGalleryActive() {
    const active = new Set(stack.map(r => r.tool));
    document.querySelectorAll('.gallery-card[data-tool]').forEach(card => {
      card.classList.toggle('active', active.has(card.dataset.tool));
    });
    document.body.classList.toggle('tools-empty', stack.length === 0);
    const lastTool = stack.length > 0 ? TOOLS[stack[stack.length - 1].tool] : null;
    document.body.classList.toggle('tools-multi-word', lastTool?.output === 'pair');
  }

  function searchBarEl() { return panelEl()?.querySelector('.search-bar'); }
  function removeCursor() { document.querySelector('.tool-stack-cursor')?.remove(); }

  // Hovering a gallery card previews the click outcome via:
  //   - .doomed on every existing row in replace mode (in-place dim, no
  //     collapse — keeps stack height stable so rapid scrubbing across the
  //     gallery never jitters).
  //   - .tool-stack-cursor at the boundary between #tool-stack and
  //     .search-bar in both modes (parented in .search-bar so the caret can
  //     extend across that boundary unclipped). Absolutely positioned so
  //     it adds zero vertical space.
  // No preview when stack is empty: the click is unambiguous (just adds the
  // tool) and there's nothing to dim.
  function setPreview(mode) {
    if (stack.length === 0) return;
    const e = stackEl();
    if (e) {
      const isReplace = mode === 'replace';
      e.querySelectorAll('.tool-row').forEach(r => r.classList.toggle('doomed', isReplace));
    }
    const sbar = searchBarEl();
    if (sbar && !sbar.querySelector('.tool-stack-cursor')) {
      const cursor = document.createElement('div');
      cursor.className = 'tool-stack-cursor';
      sbar.appendChild(cursor);
    }
  }

  function clearPreview() {
    stackEl()?.querySelectorAll('.tool-row.doomed').forEach(r => r.classList.remove('doomed'));
    removeCursor();
  }

  function add(toolKey) {
    if (!TOOLS[toolKey]) return;
    const idx = stack.length;
    stack.push({ tool: toolKey, params: {}, col: 'to' });

    const e = ensureStackEl();
    if (e) {
      e.querySelectorAll('.tool-row.doomed').forEach(r => r.classList.remove('doomed'));
      removeCursor();
      const tmp = document.createElement('div');
      tmp.innerHTML = buildRowHTML(idx, stack[idx]);
      e.appendChild(tmp.firstElementChild);
    }
    focusRowInput(idx);
    flashRow(idx);
    refreshGalleryActive();
    Router.navigate();
  }

  function replace(toolKey) {
    if (!TOOLS[toolKey]) return;
    // Self-replace = no-op (still drop any preview state in place).
    if (stack.length === 1 && stack[0].tool === toolKey) {
      clearPreview();
      focusRowInput(0);
      flashRow(0);
      return;
    }
    stack = [{ tool: toolKey, params: {}, col: 'to' }];

    const e = ensureStackEl();
    if (e) {
      removeCursor();
      e.querySelectorAll('.tool-row').forEach(r => r.remove());
      const tmp = document.createElement('div');
      tmp.innerHTML = buildRowHTML(0, stack[0]);
      e.appendChild(tmp.firstElementChild);
    }
    focusRowInput(0);
    flashRow(0);
    refreshGalleryActive();
    Router.navigate();
  }

  function removeAt(idx) {
    if (idx < 0 || idx >= stack.length) return;
    stack.splice(idx, 1);

    const e = stackEl();
    if (e) {
      removeCursor();
      // Rebuild rows from current stack so indices and toggle visibility
      // reflect the new positions.
      e.querySelectorAll('.tool-row').forEach(r => r.remove());
      stack.forEach((row, i) => {
        const tmp = document.createElement('div');
        tmp.innerHTML = buildRowHTML(i, row);
        e.appendChild(tmp.firstElementChild);
      });
      if (!stack.length) e.remove();
    }
    refreshGalleryActive();
    Router.navigate();
  }

  function toggleColAt(idx) {
    if (!stack[idx]) return;
    stack[idx].col = stack[idx].col === 'to' ? 'from' : 'to';
    const rowEl = rowEls()[idx];
    const toggle = rowEl?.querySelector('.tool-toggle-link');
    if (toggle) {
      toggle.textContent = stack[idx].col;
      toggle.setAttribute('title', `Click to use ${stack[idx].col === 'to' ? 'from' : 'to'}`);
    }
  }

  function init() {
    const galleryBody = document.querySelector('.gallery-body');
    if (galleryBody) galleryBody.innerHTML = buildGalleryHTML();
    galleryBody?.addEventListener('click', (e) => {
      const card = e.target.closest('.gallery-card[data-tool]');
      if (!card) return;
      const toolKey = card.dataset.tool;
      if (!TOOLS[toolKey]) return;
      if (e.target.closest('.gallery-card-add')) {
        add(toolKey);
      } else {
        replace(toolKey);
      }
    });

    document.querySelectorAll('.gallery-card[data-tool]').forEach(card => {
      const addBtn = card.querySelector('.gallery-card-add');
      card.addEventListener('mouseenter', () => setPreview('replace'));
      card.addEventListener('mouseleave', () => clearPreview());
      if (addBtn) {
        addBtn.addEventListener('mouseenter', () => setPreview('chain'));
        addBtn.addEventListener('mouseleave', () => setPreview('replace'));
      }
    });

    const p = panelEl();
    p?.addEventListener('click', (e) => {
      const removeBtn = e.target.closest('.tool-row-remove[data-remove]');
      if (removeBtn) {
        removeAt(parseInt(removeBtn.dataset.remove, 10));
        return;
      }
      const toggle = e.target.closest('.tool-toggle-link[data-toggle]');
      if (toggle) {
        toggleColAt(parseInt(toggle.dataset.toggle, 10));
        return;
      }
    });
    p?.addEventListener('input', (e) => {
      const input = e.target.closest('input[data-row]');
      if (!input) return;
      const idx = parseInt(input.dataset.row, 10);
      const key = input.dataset.key;
      if (stack[idx]) {
        stack[idx].params[key] = input.value;
        Router.navigate({ debounce: true });
      }
    });

    refreshGalleryActive();
  }

  // setStack replaces the internal stack without animation or URL roundtrip —
  // used by Router.applyURL on init. The next mountDetailPanel call (in
  // renderAll) renders the rows; init() attaches handlers afterwards.
  function setStack(newStack) { stack = Array.isArray(newStack) ? newStack : []; }
  function getStack() { return stack; }

  return { buildHTML, refreshGalleryActive, init, getStack, setStack };
})();

// ─── Input helpers ────────────────────────────────────────────────────────────

function blockSemicolon(e) {
  if (!e.data?.includes(';')) return;
  e.preventDefault();
  const el = e.target;
  el.classList.remove('shake');
  void el.offsetWidth; // force reflow so re-triggering restarts the animation
  el.classList.add('shake');
  el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
  showToast('Semicolons are not allowed');
}

// ─── Virtual Scroller ─────────────────────────────────────────────────────────

// Gradient stops at hand-picked t positions. Six distinct colors (0=dark red
// → 5=blue) with color 0 duplicated across t=0 and t=1/6 to create a small
// "deep" plateau at the very bottom (10/0 read solidly darker than 20), and
// color 1 anchored at t=1/3 so 20 is still pure red. The remaining stops are
// evenly spaced from t=1/2 through t=1 so that on the canonical 0–60 default
// scale, scores 30/40/50/60 land directly on stops (orange/yellow/green/blue).
const SCORE_COLOR_STOPS = [
  { t: 0,   bg: '--score-0-bg', fg: '--score-0-fg' },
  { t: 1/6, bg: '--score-0-bg', fg: '--score-0-fg' },
  { t: 1/3, bg: '--score-1-bg', fg: '--score-1-fg' },
  { t: 1/2, bg: '--score-2-bg', fg: '--score-2-fg' },
  { t: 2/3, bg: '--score-3-bg', fg: '--score-3-fg' },
  { t: 5/6, bg: '--score-4-bg', fg: '--score-4-fg' },
  { t: 1,   bg: '--score-5-bg', fg: '--score-5-fg' },
];

// Map a score to interpolated bg/fg colors based on the current min/max from
// the histogram layout. Out-of-range scores clamp to the nearest endpoint.
// When no data has been loaded, falls back to the middle stop (the gradient
// is meaningless without a range — don't fabricate one).
function scoreColor(score) {
  const { min, max } = getHistogramLayout();
  if (min == null || max == null || max <= min) {
    const s = SCORE_COLOR_STOPS[Math.floor(SCORE_COLOR_STOPS.length / 2)];
    return { bg: `var(${s.bg})`, fg: `var(${s.fg})` };
  }
  const t = Math.max(0, Math.min(1, (score - min) / (max - min)));
  let i = 0;
  while (i < SCORE_COLOR_STOPS.length - 1 && SCORE_COLOR_STOPS[i + 1].t < t) i++;
  const lo = SCORE_COLOR_STOPS[i];
  const hi = SCORE_COLOR_STOPS[i + 1];
  const localT = (t - lo.t) / (hi.t - lo.t);
  const pct = (localT * 100).toFixed(1);
  return {
    bg: `color-mix(in lch, var(${lo.bg}), var(${hi.bg}) ${pct}%)`,
    fg: `color-mix(in lch, var(${lo.fg}), var(${hi.fg}) ${pct}%)`,
  };
}

const SORT_AXES = {
  word:   { label: 'Word' },
  length: { label: 'Length' },
  score:  { label: 'Score' },
};
const WORD_SLOT_CAP = 20;

// Width of one `0` glyph in the row's mono 13px font, in CSS pixels. Cached
// after first measurement; the row's font and size are fixed so the value
// doesn't drift. Used by VirtualScroller._computeSlotWidths to emit slot
// widths in px (rather than `ch`) so the header's sans font sees the same
// track widths as the row's mono font.
let _monoChPx = null;
function measureMonoChPx() {
  if (_monoChPx !== null) return _monoChPx;
  const probe = document.createElement('span');
  probe.style.cssText = 'position:absolute;visibility:hidden;font-family:var(--font-mono);font-size:13px;white-space:pre;';
  probe.textContent = '0'.repeat(100);
  document.body.appendChild(probe);
  _monoChPx = probe.getBoundingClientRect().width / 100;
  probe.remove();
  return _monoChPx;
}

class VirtualScroller {
  constructor(container) {
    this.container = container;
    this.toolbar = document.getElementById('search-bar-sort');
    this.allEntries = [];
    this.entries = [];
    this.sortKey = 'word';
    this.sortDir = 'asc';
    this._lastQuery = '';
    this._wholeWord = false;
    this._scoreIntervals = null;
    this._highlight = null;
    this.rescoreRules = [];
    this.overrideMap = new Map();
    this.showSource = false;
    this.showDeleteCol = false;
    this.showEditDeleteCol = false;
    this.editsWordlist = null;
    this.currentWordlist = null;
    this._onCellEdit = null;
    this._onDeleteRow = null;
    this.onFilterChange = null;
    this._sortScores = null;

    this.sizer = document.createElement('div');
    this.sizer.className = 'word-list-rows';
    container.innerHTML = '';
    container.appendChild(this.sizer);

    // Window-driven: the page scroll is the only scroll container. The host
    // sizer has its natural full height (entries × ROW_HEIGHT) and we slice
    // a window of rows out of it based on getBoundingClientRect().
    this._onWinScroll = () => {
      this._render();
      AtomPopover.close();
    };
    this._onWinResize = () => this._render();
    window.addEventListener('scroll', this._onWinScroll, { passive: true });
    window.addEventListener('resize', this._onWinResize);
    this._resizeObserver = new ResizeObserver(() => this._render());
    this._resizeObserver.observe(container);

    this.sizer.addEventListener('click', e => {
      const target = e.target.closest('.atom-word, .atom-score, .atom-comment');
      if (!target) return;
      const row = target.closest('.word-row');
      if (!row) return;
      const i = parseInt(row.dataset.idx, 10);
      const entry = this.entries[i];
      if (!entry) return;
      const field = target.classList.contains('atom-score') ? 'score'
                  : target.classList.contains('atom-comment') ? 'comment'
                  : null;
      AtomPopover.open(entry, row, this, target, field);
    });

    this._buildToolbar();
  }

  setEntries(allEntries, query, rescoreRules, overrideMap, wholeWord = false, scoreRange = '') {
    AtomPopover.close();
    this.allEntries = allEntries;
    this.rescoreRules = rescoreRules || [];
    this.overrideMap = overrideMap || new Map();
    this.sortKey = 'word';
    this.sortDir = 'asc';
    this._sortScores = null;
    this._buildToolbar();
    this.filter(query, wholeWord, scoreRange);
  }

  updateEntries(allEntries) {
    AtomPopover.close();
    this.allEntries = allEntries;
    this._sortScores = null;
    this._applyFilterAndSort();
  }

  setRescore(rules) {
    AtomPopover.close();
    this.rescoreRules = rules || [];
    this._sortScores = null;
    this._applyFilterAndSort();
  }

  filter(query, wholeWord = false, scoreRange = '') {
    AtomPopover.close();
    this._lastQuery = query || '';
    this._wholeWord = wholeWord;
    this._scoreIntervals = scoreRange ? parseRange(scoreRange) : null;
    this._applyFilterAndSort();
  }

  _buildToolbar() {
    if (!this.toolbar) return;
    const arrow = this.sortDir === 'asc' ? '↑' : '↓';
    const options = Object.entries(SORT_AXES)
      .map(([key, { label }]) => `<option value="${key}"${key === this.sortKey ? ' selected' : ''}>${label}</option>`)
      .join('');
    this.toolbar.innerHTML = `
      Sort by
      <select class="sort-axis-select">${options}</select>
      <button class="sort-dir-btn" type="button" title="Toggle direction" aria-label="Toggle direction">${arrow}</button>`;
    this.toolbar.querySelector('.sort-axis-select').addEventListener('change', e => {
      const key = e.target.value;
      if (this.sortKey !== key) {
        this.sortKey = key;
        this.sortDir = (key === 'score') ? 'desc' : 'asc';
        this._buildToolbar();
        this._applyFilterAndSort();
      }
    });
    this.toolbar.querySelector('.sort-dir-btn').addEventListener('click', () => {
      this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
      this._buildToolbar();
      this._applyFilterAndSort();
    });
  }

  _applyFilterAndSort() {
    const q = this._lastQuery.toLowerCase();
    let entries;
    if (!q) {
      this._highlight = null;
      entries = this.allEntries;
    } else {
      const { filterRe, highlight } = buildSearchPattern(q, this._wholeWord);
      this._highlight = highlight;
      entries = this.allEntries.filter(e => filterRe.test(e.word.toLowerCase()));
    }

    this._entriesPreScoreRange = entries;

    if (this._scoreIntervals) {
      const intervals = this._scoreIntervals;
      entries = entries.filter(e => {
        if (this.rescoreRules.length) {
          const r = rescoreEntry(e, this.rescoreRules);
          if (!r.kept) return false;
          const ov = this.overrideMap.get(e.word.toUpperCase());
          return matchesRange(ov ? ov.score : r.score, intervals);
        }
        const ov = this.overrideMap.get(e.word.toUpperCase());
        return matchesRange(ov ? ov.score : e.score, intervals);
      });
    }

    if (this.sortKey) {
      const key = this.sortKey;
      const dir = this.sortDir === 'asc' ? 1 : -1;
      if (key === 'score' && (this.rescoreRules.length || this.overrideMap.size)) {
        if (!this._sortScores) this._buildSortScores();
        entries = [...entries].sort((a, b) => dir * (this._sortScores.get(a) - this._sortScores.get(b)));
      } else {
        entries = [...entries].sort((a, b) => {
          const av = key === 'length' ? a.word.length : (a[key] ?? '');
          const bv = key === 'length' ? b.word.length : (b[key] ?? '');
          if (typeof av === 'number' && typeof bv === 'number') return dir * (av - bv);
          return dir * String(av).localeCompare(String(bv));
        });
      }
    }

    this.entries = entries;
    this._computeSlotWidths();
    this._render();
    this.onFilterChange?.();
  }

  // Slot widths derived from the longest values across the full result set, then
  // fixed during scroll. Capping the word slot at WORD_SLOT_CAP keeps one outlier
  // from blowing out layout for every other row; longer words truncate with an
  // ellipsis (full text in the row's title attribute). Min widths floor each
  // track to its column-header label so the sticky headers fit ("Word", "Len",
  // "Score"). Widths are emitted in pixels (measured against the row's mono
  // 13px font) instead of `ch` so they resolve identically in the header's
  // sans font and the row's mono font — different fonts have different `ch`
  // sizes, which would make column tracks misalign. Vars are written to
  // #detail-panel so both .word-row and the .word-headers (which lives in
  // .sticky-stack, a sibling of the scroller's host) inherit the same values.
  _computeSlotWidths() {
    const n = this.entries.length;
    const countDigits = n > 0 ? String(n).length : 1;
    let maxLen = 0, maxLenDigits = 1, maxScoreDigits = 1;
    for (const e of this.entries) {
      if (e.word.length > maxLen) maxLen = e.word.length;
      const d = String(e.word.length).length;
      if (d > maxLenDigits) maxLenDigits = d;
      const sd = String(e.score).length;
      if (sd > maxScoreDigits) maxScoreDigits = sd;
    }
    const wordChars = Math.max(Math.min(maxLen, WORD_SLOT_CAP), 4);
    const lenChars = Math.max(maxLenDigits, 3);
    const scoreChars = Math.max(maxScoreDigits, 5);
    const ch = measureMonoChPx();
    const target = this.container.closest('#detail-panel') || this.sizer;
    target.style.setProperty('--count-w', `${(countDigits + 1) * ch}px`);
    target.style.setProperty('--len-w', `${lenChars * ch}px`);
    target.style.setProperty('--word-w', `${wordChars * ch}px`);
    // +12px covers the score badge's 5px-each-side padding plus a bit of safety.
    target.style.setProperty('--score-w', `${scoreChars * ch + 12}px`);
    target.style.setProperty('--source-max', `${22 * ch}px`);
  }

  // Walks the post-filter entries, applies rescore + override per entry, and
  // returns a synthetic { score } list of entries that survived rescore plus
  // a count of those dropped. The synthetic list is what buildStatsBarHTML
  // and computeStatsRaw need to recompute the stats bar against the currently
  // visible (filter-aware) set.
  _filteredStatsViewEntries() {
    return this._statsViewEntriesFrom(this.entries);
  }

  // Same shape as _filteredStatsViewEntries, but walks the pre-score-range
  // set so the histogram keeps showing the full distribution while the score
  // range is shown via the rect overlay. Without this, bars outside the
  // selection collapse to zero and "disappear."
  _histogramViewEntries() {
    return this._statsViewEntriesFrom(this._entriesPreScoreRange || this.entries);
  }

  _statsViewEntriesFrom(source) {
    const cache = new Map();
    const effective = [];
    let ignoredCount = 0;
    for (const e of source) {
      const d = this._entryDisplayState(e, cache);
      if (d.ignored) ignoredCount++;
      else effective.push({ score: d.effectiveScore });
    }
    return { entries: effective, ignoredCount };
  }

  _buildSortScores() {
    if (!this.rescoreRules.length && !this.overrideMap.size) { this._sortScores = null; return; }
    const map = new Map();
    const rescoreCache = new Map();
    for (const e of this.allEntries) {
      const d = this._entryDisplayState(e, rescoreCache);
      map.set(e, d.ignored ? -1 : d.effectiveScore);
    }
    this._sortScores = map;
  }

  _entryDisplayState(entry, rescoreCache) {
    let rescoredScore = entry.score;
    let wasRescored = false;
    let ignored = false;
    if (this.rescoreRules.length) {
      const cacheKey = rescoreCache !== undefined ? `${entry.score}:${entry.word.length}` : null;
      let r;
      if (cacheKey !== null) {
        r = rescoreCache.get(cacheKey);
        if (r === undefined) { r = rescoreEntry(entry, this.rescoreRules); rescoreCache.set(cacheKey, r); }
      } else {
        r = rescoreEntry(entry, this.rescoreRules);
      }
      if (!r.kept) {
        ignored = true;
      } else {
        rescoredScore = r.score;
        wasRescored = r.score !== entry.score;
      }
    }
    const ov = !ignored && this.overrideMap.get(entry.word.toUpperCase());
    const effectiveScore = ov ? ov.score : rescoredScore;
    const effectiveComment = (ov && ov.comment) ? ov.comment : (entry.comment || '');
    return { ignored, rescoredScore, wasRescored, ov, effectiveScore, effectiveComment };
  }

  _render() {
    const n = this.entries.length;
    this.sizer.style.height = (n * ROW_HEIGHT) + 'px';

    // Visible slice in container coords. rect.top is the host's offset from
    // the viewport top — negative when the user has scrolled past the host's
    // start, positive when the host is still below the fold.
    const rect = this.container.getBoundingClientRect();
    const viewH = window.innerHeight;
    const visTop = Math.max(0, -rect.top);
    const visBottom = Math.max(0, Math.min(rect.height, viewH - rect.top));

    const start = Math.max(0, Math.floor(visTop / ROW_HEIGHT) - VS_BUFFER);
    const end   = Math.min(n, Math.ceil(visBottom / ROW_HEIGHT) + VS_BUFFER);

    while (this.sizer.firstChild) this.sizer.removeChild(this.sizer.firstChild);

    const activeWord = AtomPopover.activeWord(this);
    const tierFor = makeTierLookup();
    let nextActiveRow = null;
    const frag = document.createDocumentFragment();
    for (let i = start; i < end; i++) {
      const entry = this.entries[i];
      const { word, score } = entry;
      const displayed = displayWord(word);
      const wordHtml = this._highlight ? this._highlight(displayed) : displayed;
      const { ignored, rescoredScore, wasRescored, ov, effectiveScore, effectiveComment } = this._entryDisplayState(entry);
      const scoreOv = ov && ov.score !== rescoredScore;

      const displayScore = ignored ? score : effectiveScore;
      let scoreInner = buildScoreBadgeHTML(displayScore);
      if (!ignored && (wasRescored || scoreOv)) scoreInner += `<sup class="effective-asterisk">*</sup>`;

      const tierLabel = ignored ? '' : tierFor(displayScore);
      const scoreTitle = tierLabel ? ` title="${esc(tierLabel)}"` : '';

      const commentText = ignored ? (entry.comment || '') : effectiveComment;
      const sourceWl = ov?.wordlist || entry.wordlist;
      const sourceHTML = sourceWl ? buildWordlistNameHTML(sourceWl, { bold: false }) : '';
      const sourceTitle = sourceWl ? ` title="${esc(sourceWl.name)}"` : '';

      const row = document.createElement('div');
      let cls = 'word-row';
      if (ignored) cls += ' entry-ignored';
      if (activeWord && word === activeWord) { cls += ' active'; nextActiveRow = row; }
      row.className = cls;
      row.dataset.word = word;
      row.dataset.idx = i;
      row.style.top = (i * ROW_HEIGHT) + 'px';
      if (displayed.length > WORD_SLOT_CAP) row.title = displayed;
      row.innerHTML =
        `<span class="atom-count">${i + 1}.</span>` +
        `<span class="atom-word">${wordHtml}</span>` +
        `<span class="atom-len">${word.length}</span>` +
        `<span class="atom-score"${scoreTitle}>${scoreInner}</span>` +
        `<span class="atom-comment"${commentText ? ` title="${esc(commentText)}"` : ''}>${esc(commentText)}</span>` +
        `<span class="atom-source"${sourceTitle}>${sourceHTML}</span>`;
      frag.appendChild(row);
    }
    this.sizer.appendChild(frag);
    if (nextActiveRow) AtomPopover.rebindRow(nextActiveRow);
  }

  destroy() {
    window.removeEventListener('scroll', this._onWinScroll);
    window.removeEventListener('resize', this._onWinResize);
    this._resizeObserver.disconnect();
  }
}

// ─── Atom popover ─────────────────────────────────────────────────────────────
// Click-driven editor anchored to the clicked word atom. Universal editing
// surface: shows source wordlist + rescore/override info, edits score + comment,
// and (on My Edits-sourced rows) deletes. Edits route through the scroller's
// _onCellEdit (which lands them in My Edits regardless of the active wordlist).

const AtomPopover = (() => {
  let el = null;
  let activeRow = null;
  let activeEntry = null;
  let activeScroller = null;

  function ensureElement() {
    if (el) return el;
    el = document.createElement('div');
    el.id = 'atom-popover';
    el.setAttribute('hidden', '');
    el.addEventListener('click', e => {
      if (e.target.closest('.dialog-close-btn')) close();
    });
    document.body.appendChild(el);
    return el;
  }

  function isOpen() { return el && !el.hasAttribute('hidden'); }

  function close() {
    if (!el || el.hasAttribute('hidden')) return;
    el.setAttribute('hidden', '');
    if (activeRow) activeRow.classList.remove('active');
    activeRow = null;
    activeEntry = null;
    activeScroller = null;
    document.removeEventListener('mousedown', onDocMouseDown, true);
    document.removeEventListener('keydown', onKeydown, true);
    window.removeEventListener('resize', close);
  }

  function onDocMouseDown(e) {
    if (!isOpen()) return;
    if (el.contains(e.target)) return;
    if (activeRow && activeRow.contains(e.target)) return;
    close();
  }

  function onKeydown(e) {
    if (e.key === 'Escape') { e.preventDefault(); close(); }
  }

  function open(entry, rowEl, scroller, anchorEl, focusField = 'score') {
    const popover = ensureElement();
    if (activeRow) activeRow.classList.remove('active');
    activeEntry = entry;
    activeRow = rowEl;
    activeScroller = scroller;
    rowEl.classList.add('active');

    popover.innerHTML = renderHTML(entry, scroller);
    popover.removeAttribute('hidden');
    position(anchorEl ?? rowEl);
    wireFields();
    const focusSel = focusField === 'comment' ? '.comment-input' : '.score-input';
    const input = popover.querySelector(focusSel);
    input?.focus();
    if (focusField !== null) input?.select();

    document.addEventListener('mousedown', onDocMouseDown, true);
    document.addEventListener('keydown', onKeydown, true);
    window.addEventListener('resize', close);
  }

  function renderSourceLinesHTML(entry, scroller, d) {
    const rowWordlist = entry.wordlist || scroller.currentWordlist;
    let sourceLines = '';
    if (rowWordlist) {
      const label = buildWordlistNameHTML(rowWordlist, { bold: false });
      const rescNote = d.wasRescored ? ` <span class="rescore-note">(${entry.score} rescored to ${d.rescoredScore})</span>` : '';
      sourceLines += `<div>${label}: <b>${d.ignored ? entry.score : d.rescoredScore}</b>${rescNote}</div>`;
    }
    if (d.ov) {
      const ovLabel = buildWordlistNameHTML(d.ov.wordlist, { bold: false });
      sourceLines += `<div>${ovLabel}: <b>${d.ov.score}</b> takes precedence</div>`;
    }
    if (d.ignored) sourceLines += `<div><i>Ignored by rescore rules</i></div>`;
    return sourceLines;
  }

  function renderFooterHTML(entry, scroller) {
    const rowWordlist = entry.wordlist || scroller.currentWordlist;
    const editsWordlist = scroller.editsWordlist || getEditsWordlist();
    const rowIsEdits = rowWordlist === editsWordlist;
    const showDelete = scroller.showDeleteCol || (scroller.showEditDeleteCol && rowIsEdits);
    const deleteBtn = showDelete ? `<button class="atom-pop-delete" type="button">Delete edit</button>` : '';
    const editsName = editsWordlist ? buildWordlistNameHTML(editsWordlist, { bold: false }) : 'My Edits';
    const isEditsView = scroller.currentWordlist === editsWordlist;
    const savesNote = isEditsView ? `Editing ${editsName}` : `Saves to ${editsName}`;
    return `<span class="atom-pop-saves">${savesNote}</span>${deleteBtn}`;
  }

  function renderHTML(entry, scroller) {
    const d = scroller._entryDisplayState(entry);
    const scoreVal = d.ignored ? entry.score : d.effectiveScore;
    return `
      <button class="dialog-close-btn" type="button" aria-label="Close">✕</button>
      <div class="atom-pop-source">${renderSourceLinesHTML(entry, scroller, d)}</div>
      <div class="atom-pop-fields">
        <label for="atom-pop-score">Score</label>
        <input id="atom-pop-score" class="score-input" type="number" min="0" value="${scoreVal}">
        <label for="atom-pop-comment">Comment</label>
        <input id="atom-pop-comment" class="comment-input" type="text" value="${esc(d.effectiveComment)}">
      </div>
      <div class="atom-pop-foot">${renderFooterHTML(entry, scroller)}</div>`;
  }

  // Re-render after an edit/delete commits so the popover reflects the new
  // state. If the entry has been fully removed from the underlying data (e.g.
  // deleting a word that only My Edits had, or any delete from the My Edits
  // view), there's nothing left to show — close.
  //
  // `resetInputs: true` re-renders everything (including the score/comment
  // inputs) — used after Delete, where the underlying values change. The
  // default leaves the inputs alone so an edit-commit (e.g. tabbing from
  // score to comment) preserves focus and the just-typed value.
  function refresh({ resetInputs = false } = {}) {
    if (!isOpen()) return;
    if (!activeScroller.allEntries.includes(activeEntry)) { close(); return; }
    if (resetInputs) {
      el.innerHTML = renderHTML(activeEntry, activeScroller);
      wireFields();
      return;
    }
    const d = activeScroller._entryDisplayState(activeEntry);
    const sourceEl = el.querySelector('.atom-pop-source');
    const footEl = el.querySelector('.atom-pop-foot');
    if (sourceEl) sourceEl.innerHTML = renderSourceLinesHTML(activeEntry, activeScroller, d);
    if (footEl) {
      footEl.innerHTML = renderFooterHTML(activeEntry, activeScroller);
      wireDeleteButton();
    }
  }

  function wireDeleteButton() {
    const deleteBtn = el.querySelector('.atom-pop-delete');
    if (!deleteBtn) return;
    const scroller = activeScroller;
    const word = activeEntry.word;
    deleteBtn.addEventListener('click', () => {
      scroller._onDeleteRow?.(word);
      refresh({ resetInputs: true });
    });
  }

  function wireFields() {
    const popover = el;
    const scroller = activeScroller;
    const word = activeEntry.word;

    const scoreInp = popover.querySelector('.score-input');
    if (scoreInp) {
      let initial = scoreInp.value;
      const commit = () => {
        const parsed = parseInt(scoreInp.value, 10);
        if (!isNaN(parsed) && parsed >= 0 && String(parsed) !== initial) {
          scroller._onCellEdit?.(word, 'score', parsed);
          initial = String(parsed);
          refresh();
        }
      };
      scoreInp.addEventListener('blur', commit);
      scoreInp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); commit(); close(); }
        if (e.key === 'Escape') { e.preventDefault(); scoreInp.value = initial; close(); }
      });
    }

    const commentInp = popover.querySelector('.comment-input');
    if (commentInp) {
      let initial = commentInp.value;
      commentInp.addEventListener('beforeinput', blockSemicolon);
      const commit = () => {
        if (commentInp.value !== initial) {
          scroller._onCellEdit?.(word, 'comment', commentInp.value);
          initial = commentInp.value;
          refresh();
        }
      };
      commentInp.addEventListener('blur', commit);
      commentInp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); commit(); close(); }
        if (e.key === 'Escape') { e.preventDefault(); commentInp.value = initial; close(); }
      });
    }

    wireDeleteButton();
  }

  function position(rowEl) {
    const r = rowEl.getBoundingClientRect();
    el.style.top = (r.bottom + 4) + 'px';
    el.style.left = r.left + 'px';
    requestAnimationFrame(() => {
      const pw = el.offsetWidth, ph = el.offsetHeight;
      let left = r.left;
      if (left + pw > window.innerWidth - 8) left = window.innerWidth - 8 - pw;
      if (left < 8) left = 8;
      let top = r.bottom + 4;
      if (top + ph > window.innerHeight - 8) top = Math.max(8, r.top - ph - 4);
      el.style.top = top + 'px';
      el.style.left = left + 'px';
    });
  }

  function activeWord(scroller) {
    if (!isOpen()) return null;
    if (scroller && activeScroller !== scroller) return null;
    return activeEntry ? activeEntry.word : null;
  }

  function rebindRow(rowEl) {
    if (!isOpen()) return;
    if (activeRow) activeRow.classList.remove('active');
    activeRow = rowEl;
    rowEl.classList.add('active');
  }

  return { open, close, isOpen, activeWord, rebindRow };
})();

// ─── Update Summary Scroller ──────────────────────────────────────────────────

class UpdateSummaryScroller {
  constructor(container) {
    this.container = container;
    this.rows = [];

    this.sizer = document.createElement('div');
    this.sizer.className = 'usd-sizer';
    container.appendChild(this.sizer);

    container.addEventListener('scroll', () => this._render(), { passive: true });
    new ResizeObserver(() => this._render()).observe(container);
  }

  setRows(rows) {
    this.rows = rows;
    this.sizer.style.height = (rows.length * ROW_HEIGHT) + 'px';
    this.container.scrollTop = 0;
    this._render();
  }

  scrollToIndex(i) {
    this.container.scrollTop = i * ROW_HEIGHT;
  }

  _render() {
    const n = this.rows.length;
    const scrollTop = this.container.scrollTop;
    const viewH = this.container.clientHeight;
    const start = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - VS_BUFFER);
    const end   = Math.min(n, Math.ceil((scrollTop + viewH) / ROW_HEIGHT) + VS_BUFFER);

    this.sizer.innerHTML = '';
    const frag = document.createDocumentFragment();

    for (let i = start; i < end; i++) {
      const row = this.rows[i];
      const div = document.createElement('div');
      div.className = 'usd-row';
      div.style.top = (i * ROW_HEIGHT) + 'px';

      if (row.type === 'header') {
        div.classList.add('usd-section-header');
        div.textContent = row.label;
      } else {
        div.classList.add('usd-word-row', 'usd-' + row.kind);

        const wordSpan = document.createElement('span');
        wordSpan.className = 'usd-word-col';
        wordSpan.textContent = displayWord(row.word);
        div.appendChild(wordSpan);

        const scoreSpan = document.createElement('span');
        scoreSpan.className = 'usd-score-col';
        if (row.kind === 'rescored') {
          scoreSpan.innerHTML =
            `<span class="usd-old-score">${row.oldScore}</span>` +
            `<span class="usd-arrow">→</span>` +
            buildScoreBadgeHTML(row.score);
        } else {
          scoreSpan.innerHTML = buildScoreBadgeHTML(row.score);
        }
        div.appendChild(scoreSpan);
      }

      frag.appendChild(div);
    }

    this.sizer.appendChild(frag);
  }
}

// ─── Rescoring ────────────────────────────────────────────────────────────────

function parseRange(str) {
  str = (str || '').trim();
  if (!str) return null;
  const mPlus  = str.match(/^(\d+)\+$/);        if (mPlus)  return [{ min: +mPlus[1],  max: null }];
  const mRange = str.match(/^(\d+)[-–](\d+)$/); if (mRange) return [{ min: +mRange[1], max: +mRange[2] }];
  const mExact = str.match(/^(\d+)$/);          if (mExact) return [{ min: +mExact[1], max: +mExact[1] }];
  return null;
}

function matchesRange(value, intervals) {
  for (const { min, max } of intervals) {
    if ((min === null || value >= min) && (max === null || value <= max)) return true;
  }
  return false;
}

function scoresToRangeStr(scores) {
  if (!scores.length) return '';
  const sorted = [...scores].sort((a, b) => a - b);
  const min = sorted[0], max = sorted[sorted.length - 1];
  return min === max ? `${min}` : `${min}-${max}`;
}

function getRuleMaxScore(rule) {
  const intervals = parseRange(rule.input);
  if (!intervals) return -1;
  let max = -Infinity;
  for (const { max: imax } of intervals) {
    const m = imax === null ? Infinity : imax;
    if (m > max) max = m;
  }
  return max;
}

function outputSortKey(rule) {
  const s = parseRuleOutput(rule.output);
  if (typeof s === 'number') return s;
  if (s && typeof s === 'object') return s.max === null ? s.min : (s.min + s.max) / 2;
  if (s === 'ignore') return -1;
  return getRuleMaxScore(rule); // 'unchanged' sorts by input score
}

function rulesSig(rules) {
  return rules.map(r => `${r.input}|${r.length}|${r.output}|${r._catchAll ? 1 : 0}`).join(';');
}

// Any score not matched by a user rule is collected into a read-only catch-all row so the UI always shows complete coverage.
function updateCatchAll(wordlist) {
  const rules = wordlist.rescoreRules;
  const before = rulesSig(rules);

  // Remove existing auto catch-all
  const caIdx = rules.findIndex(r => r._catchAll);
  if (caIdx !== -1) rules.splice(caIdx, 1);

  // Sort user rules: primary = output score descending, then input score, then length
  rules.sort((a, b) => {
    const ao = outputSortKey(a), bo = outputSortKey(b);
    if (ao !== bo) return bo - ao;
    const am = getRuleMaxScore(a), bm = getRuleMaxScore(b);
    if (am !== bm) return bm - am;
    const aL = !!(a.length && a.length.trim()), bL = !!(b.length && b.length.trim());
    return (aL ? 0 : 1) - (bL ? 0 : 1);
  });

  // Find actual scores in the data not covered by any length-filter-free rule
  const actualScores = wordlist.rawEntries && wordlist.rawEntries.length
    ? [...new Set(wordlist.rawEntries.map(e => e.score))].sort((a, b) => a - b)
    : [];
  const uncovered = actualScores.filter(s => !rules.some(r => {
    if (r.length && r.length.trim()) return false;
    const intervals = parseRange(r.input);
    return intervals && matchesRange(s, intervals);
  }));

  if (uncovered.length > 0) {
    rules.push({ input: scoresToRangeStr(uncovered), length: '', output: '', _catchAll: true });
  }
  rules.forEach(compileRule);
  return rulesSig(rules) !== before;
}

function parseRuleOutput(str) {
  str = (str || '').trim().toLowerCase();
  if (!str || str === 'unchanged') return 'unchanged';
  if (str === 'ignore') return 'ignore';
  const mRange = str.match(/^(\d+)[-–](\d+)$/);
  if (mRange) return { min: +mRange[1], max: +mRange[2] };
  const mPlus  = str.match(/^(\d+)\+$/);
  if (mPlus)  return { min: +mPlus[1], max: null };
  const mExact = str.match(/^(\d+)$/);
  return mExact ? +mExact[1] : null;
}

function compileRule(rule) {
  rule._scoreIntervals = parseRange(rule.input);
  rule._lenIntervals   = (rule.length && rule.length.trim()) ? parseRange(rule.length) : null;
  rule._output         = parseRuleOutput(rule.output);
}

function applyRescoring(entries, rules) {
  return entries.flatMap(e => {
    const r = rescoreEntry(e, rules);
    if (!r.kept) return [];
    return [r.score !== e.score ? { ...e, score: r.score } : e];
  });
}

function getRescoredEntries(wordlist) {
  return wordlist._rescored ??= applyRescoring(wordlist.rawEntries, wordlist.rescoreRules);
}

function getRescoredMap(wordlist) {
  if (wordlist._rescoredMap) return wordlist._rescoredMap;
  const map = new Map();
  for (const e of getRescoredEntries(wordlist)) map.set(e.word.toUpperCase(), e);
  wordlist._rescoredMap = map;
  return map;
}

function rescoreEntry(entry, rules) {
  for (const rule of rules) {
    const scoreIntervals = rule._scoreIntervals !== undefined ? rule._scoreIntervals : parseRange(rule.input);
    if (!scoreIntervals || !matchesRange(entry.score, scoreIntervals)) continue;
    if (rule.length && rule.length.trim()) {
      const lenIntervals = rule._lenIntervals !== undefined ? rule._lenIntervals : parseRange(rule.length);
      if (!lenIntervals || !matchesRange(entry.word.length, lenIntervals)) continue;
    }
    const s = rule._output !== undefined ? rule._output : parseRuleOutput(rule.output);
    if (s === null) continue;
    if (s === 'ignore') return { kept: false };
    if (s === 'unchanged') return { kept: true, score: entry.score };
    if (s && typeof s === 'object') {
      const iv = scoreIntervals[0];
      if (iv.max === null && s.max === null) {
        // Both N+: shift by the difference
        return { kept: true, score: entry.score + (s.min - iv.min) };
      }
      // Bounded range: linearly scale; skip if shapes don't match or input is degenerate
      if (iv.min === null || iv.max === null || s.max === null || iv.min === iv.max) continue;
      const t = (entry.score - iv.min) / (iv.max - iv.min);
      return { kept: true, score: Math.round(s.min + t * (s.max - s.min)) };
    }
    return { kept: true, score: s }; // first matching rule wins
  }
  return { kept: true, score: entry.score };
}

// ─── Rescoring / Scoring section ─────────────────────────────────────────────

function renderRescoreSection() {
  // Per-source rescoring lives only inside the Wordlists dialog right pane now.
  WordlistsDialog.refreshRescoreSection();
}

// ─── Rendering ────────────────────────────────────────────────────────────────

let scroller = null;
let _dateTimer = null;

// The render dispatcher is two effects:
//   - render effect — reads `selected$` and `cacheVersion$`, dispatches the
//     panel render (full render on selection change, in-place scroller
//     update on cache-only change)
//   - cosmetic effect — subscribes to per-wordlist `name$`/`icon$`/`url$`/
//     `publisherId$` signals across all sources; cosmetic field changes
//     re-render the rail/dropdown/dialog and visible scroller rows without
//     touching the merged cache
// Helpers that want to repaint after a cache change bump `cacheVersion$` via
// `repaintAfterCacheChange`. Cosmetic field setters just write the signal —
// the cosmetic effect notices and repaints.
//
// `renderAll()` is the entry point: first call wires up the effects (the
// render effect's first run does the initial paint); subsequent calls bump
// `cacheVersion$` and let the effect dispatch.
let _renderedSelection;            // sentinel: undefined ≠ any signal value
let _renderEffectActive = false;
let _cosmeticEffectFirstRun = true;

function setupRenderEffect() {
  if (_renderEffectActive) return;
  _renderEffectActive = true;
  effect(() => {
    const sel = selected$.get();
    cacheVersion$.get();             // subscribe to cache-change bumps

    if (sel !== _renderedSelection) {
      _renderedSelection = sel;
      document.body.classList.toggle('merged-view', sel === MERGED_ID);
      renderSources();
      if (sel === MERGED_ID) renderMergedDetail();
      else renderDetail(sel);
      return;
    }

    // Cache change for the current selection — refresh derived state in
    // place rather than rebuilding the panel and the scroller.
    refreshSourceCounts();        // rebuild caches before any UI reads them
    renderSources();              // rail/dropdown/dialog with fresh meta
    refreshDerivedDisplays();     // scoring legend + main-panel stats bar
    if (!scroller) return;
    if (sel === MERGED_ID) {
      refreshMergedScroller();
    } else if (sel) {
      scroller.rescoreRules = sel.rescoreRules || [];
      scroller.overrideMap = buildOverrideMap(sel);
      scroller._sortScores = null;
      // rawEntries can be replaced (fetch/import); same array → just refilter.
      if (sel.rawEntries !== scroller.allEntries) {
        scroller.updateEntries(sel.rawEntries);
      } else {
        scroller._applyFilterAndSort(false);
      }
    }
  });

  // Cosmetic effect: re-renders rail/dropdown when any wordlist's name/icon/
  // url/publisher changes. Cache-affecting fields (enabled, rescoreRules)
  // route through `cacheVersion$` instead since changing them invalidates
  // derived state.
  //
  // Only repaints the scroller when it actually shows source names per row
  // (the merged view's source column). Regular wordlist views and My Edits
  // don't display per-row source labels, so cosmetic changes can't affect
  // their rendered rows.
  effect(() => {
    const sources = sources$.get();
    for (const wl of sources) {
      wl.name$.get();
      wl.icon$.get();
      wl.url$.get();
      wl.publisherId$.get();
    }
    if (_cosmeticEffectFirstRun) {
      _cosmeticEffectFirstRun = false;
      return;            // render effect's first run already painted everything
    }
    renderSources();
    if (state.selected === MERGED_ID && scroller) scroller._render();
  });
}

function renderAll() {
  if (!_renderEffectActive) setupRenderEffect();
  else bumpCacheVersion();
}

function wordlistCardMeta(wordlist, contribMap) {
  const total = wordlist.rawEntries.length;
  if (!total) return 'No data';
  if (!wordlist.enabled) return pluralize(total, 'entry', 'entries');
  const used = contribMap.get(wordlist) ?? 0;
  return used === total
    ? `${pluralize(used, 'entry', 'entries')} used`
    : `${used.toLocaleString()} of ${pluralize(total, 'entry', 'entries')} used`;
}

// Centralized "sources changed in some way" hook: repaint anything that
// displays per-source state (source dropdown trigger when name/icon may
// have changed, the Wordlists dialog rail/pane).
//
// Reads `_sourceCountsCache` for "X used" meta — populated lazily here when
// missing, so cosmetic-effect callers don't crash if a cache-affecting helper
// invalidated the merged cache earlier in the same drain. The render effect's
// cache branch has already rebuilt by the time it calls renderSources, so the
// lazy path is only hit when no cache rebuild is in flight.
function renderSources() {
  if (!_sourceCountsCache) _sourceCountsCache = buildMergedWordlist().sourceCounts;
  SourceDropdown?.renderTrigger();
  WordlistsDialog?.refresh();
}


// Pure cache rebuild — invalidate merged/override/stats caches and re-warm
// `_sourceCountsCache` so the next renderSources sees fresh meta. Does no
// rendering itself; the render effect's cache branch calls this and then
// `renderSources` to paint with the rebuilt counts.
function refreshSourceCounts() {
  invalidateSourceCounts();
  invalidateStatsCache(_mergedStatsKey);
  _sourceCountsCache = buildMergedWordlist().sourceCounts;
}

function createScroller() {
  AtomPopover.close();
  scroller?.destroy();
  scroller = new VirtualScroller(document.getElementById('vs-host'));
  return scroller;
}

// Refresh the merged scroller against the current `_mergedWordlistCache`.
// Two paths: same array reference → entry objects were mutated in place by the
// patch path, so just refilter/resort. Different array → full rebuild produced
// new entries; replace via `updateEntries`. Used by the render effect's cache
// branch and by the merged view's edit/delete handlers (which take the patch
// path explicitly).
function refreshMergedScroller() {
  if (!scroller) return;
  const { entries } = buildMergedWordlist();
  if (entries === scroller.allEntries) {
    scroller._sortScores = null;
    scroller._applyFilterAndSort(false);
  } else {
    scroller.updateEntries(entries);
  }
}

function mountDetailPanel(panel, stats, entries) {
  panel.innerHTML = `
    <div class="sticky-stack">
      ${buildStatsBarHTML(stats, { entries, ignoredCount: stats.ignoredCount }, getHistogramLayout())}
      ${ToolStack.buildHTML()}
      ${buildSearchBarHTML()}
      ${buildWordHeadersHTML()}
    </div>
    ${buildWordListPanelHTML()}
  `;
  ToolStack.refreshGalleryActive();
  repositionAllHistogramRects();
  createScroller();
  scroller.onFilterChange = () => refreshStatsBarFromScroller(panel);
  attachSearchHelpPopup();
}

// Recomputes the stats bar from the scroller's currently-visible entries.
// Called by the scroller's onFilterChange callback so search/score-range
// filtering, edits, and any other filter-affecting change keep the count,
// min/max/mean/median/mode, and histogram in sync with what's on screen.
function refreshStatsBarFromScroller(panel) {
  if (!scroller) return;
  const statsBar = panel.querySelector('.stats-bar');
  if (!statsBar) return;
  const { entries, ignoredCount } = scroller._filteredStatsViewEntries();
  const stats = computeStatsRaw(entries, ignoredCount);
  const hist = scroller._histogramViewEntries();
  statsBar.outerHTML = buildStatsBarHTML(stats, hist, getHistogramLayout());

// ─── Scoring (tier labels) ────────────────────────────────────────────────────

// Returns a `score → tier label` function. Specific rules win over the
// catch-all by iteration order (updateScoringCatchAll appends the catch-all
// last). Empty notes (including the catch-all's) collapse to '' so callers can
// skip the tooltip entirely.
function makeTierLookup() {
  const edits = getEditsWordlist();
  const rules = (edits?.scoring || [])
    .map(r => ({ note: r.note || '', intervals: parseRange(r.input) }))
    .filter(r => r.intervals);
  return score => {
    for (const r of rules) if (matchesRange(score, r.intervals)) return r.note;
    return '';
  };
}

function updateScoringCatchAll(scoring, entries) {
  const caIdx = scoring.findIndex(r => r._catchAll);
  if (caIdx !== -1) scoring.splice(caIdx, 1);
  const actualScores = entries.length
    ? [...new Set(entries.map(e => e.score))].sort((a, b) => a - b)
    : [];
  const uncovered = actualScores.filter(s => !scoring.some(r => {
    const intervals = parseRange(r.input);
    return intervals && matchesRange(s, intervals);
  }));

  // Sort rows by score range descending (highest scores first)
  scoring.sort((a, b) => getRuleMaxScore(b) - getRuleMaxScore(a));

  if (uncovered.length > 0) {
    scoring.push({ input: scoresToRangeStr(uncovered), note: '', _catchAll: true });
  }
}

// Repaint the editor in the Wordlists dialog's My Edits pane and refresh the

function upsertEdits(word, field, newValue) {
  const edits = getEditsWordlist();
  const upperWord = word.toUpperCase();
  const existing = edits.rawEntries.find(e => e.word.toUpperCase() === upperWord);
  let entry;
  if (existing) {
    existing[field] = newValue;
    entry = existing;
  } else {
    const orig = scroller?.allEntries?.find(e => e.word.toUpperCase() === upperWord);
    const score   = field === 'score'   ? newValue : (orig?.score   ?? 50);
    const comment = field === 'comment' ? newValue : (orig?.comment ?? '');
    entry = { word: word.toLowerCase(), score, comment };
    edits.rawEntries.push(entry);
  }
  patchCachesForEditsChange(upperWord, entry);
  updateCatchAll(edits);
  persistEdits(edits);
  refreshDerivedDisplays();
}

// ─── Histogram pointer interaction ───────────────────────────────────────────

let _histDrag = null;

function rangeStrFromBounds(lo, hi, layout) {
  if (lo === hi) return String(lo);
  const max = layout.slots.length ? layout.slots[layout.slots.length - 1].hi : null;
  if (max != null && hi >= max) return `${lo}+`;
  return `${lo}-${hi}`;
}

// Returns null when the cursor sits before the first regular bar (the ignored-bar zone).
function _slotAt(histEl, clientX) {
  const cols = histEl.querySelectorAll('.histogram-col:not(.histogram-col-ignored)');
  if (!cols.length) return null;
  const x = clientX - histEl.getBoundingClientRect().left;
  const first = cols[0];
  const stride = cols.length >= 2 ? (cols[1].offsetLeft - first.offsetLeft) : (first.offsetWidth + 3);
  if (x < first.offsetLeft) return null;
  let idx = Math.floor((x - first.offsetLeft) / stride);
  if (idx >= cols.length) idx = cols.length - 1;
  const bar = cols[idx].querySelector('.histogram-bar');
  return { idx, lo: +bar.dataset.lo, hi: +bar.dataset.hi };
}

function onHistogramPointerDown(event) {
  if (event.button !== 0 && event.pointerType === 'mouse') return;
  const hist = event.currentTarget;
  const slot = _slotAt(hist, event.clientX);
  if (!slot) return;
  event.preventDefault();
  hist.setPointerCapture?.(event.pointerId);
  _histDrag = {
    pointerId: event.pointerId,
    histEl: hist,
    startLo: slot.lo, startHi: slot.hi,
    curLo: slot.lo, curHi: slot.hi,
    moved: false,
  };
  // No rect update here — wait for first pointermove so a click-to-clear doesn't flash a one-bar preview.
}

function _onHistogramPointerMove(event) {
  if (!_histDrag || event.pointerId !== _histDrag.pointerId) return;
  const slot = _slotAt(_histDrag.histEl, event.clientX);
  if (!slot) return;
  if (slot.lo === _histDrag.curLo && slot.hi === _histDrag.curHi) return;
  _histDrag.curLo = slot.lo;
  _histDrag.curHi = slot.hi;
  if (slot.lo !== _histDrag.startLo || slot.hi !== _histDrag.startHi) _histDrag.moved = true;
  const rangeLo = Math.min(_histDrag.startLo, slot.lo);
  const rangeHi = Math.max(_histDrag.startHi, slot.hi);
  positionHistogramRect(_histDrag.histEl, [{ min: rangeLo, max: rangeHi }]);
}

function _onHistogramPointerUp(event) {
  if (!_histDrag || event.pointerId !== _histDrag.pointerId) return;
  const ds = _histDrag;
  _histDrag = null;
  const layout = getHistogramLayout();
  let next;
  if (!ds.moved && state.scoreRange) {
    const intervals = parseRange(state.scoreRange);
    const insideSelection = intervals && matchesRange(ds.startLo, intervals) && matchesRange(ds.startHi, intervals);
    next = insideSelection ? '' : rangeStrFromBounds(ds.startLo, ds.startHi, layout);
  } else {
    next = rangeStrFromBounds(Math.min(ds.startLo, ds.curLo), Math.max(ds.startHi, ds.curHi), layout);
  }
  document.querySelectorAll('#score-range-input').forEach(inp => { inp.value = next; });
  onScoreRange(next);
}

document.addEventListener('pointermove', _onHistogramPointerMove);
document.addEventListener('pointerup', _onHistogramPointerUp);
document.addEventListener('pointercancel', () => { _histDrag = null; repositionAllHistogramRects(); });

// Pass `intervals` to override the live filter (used during drag preview).
function positionHistogramRect(histEl, intervals = undefined) {
  const rect = histEl.querySelector('.histogram-rect');
  if (!rect) return;
  if (intervals === undefined) {
    intervals = state.scoreRange ? parseRange(state.scoreRange) : null;
  }
  if (!intervals) { rect.hidden = true; return; }
  const cols = [...histEl.querySelectorAll('.histogram-col:not(.histogram-col-ignored)')];
  const matching = cols.filter(c => {
    const bar = c.querySelector('.histogram-bar');
    return slotIntersectsRange(+bar.dataset.lo, +bar.dataset.hi, intervals);
  });
  if (!matching.length) { rect.hidden = true; return; }
  const first = matching[0], last = matching[matching.length - 1];
  const left = first.offsetLeft - 2;
  const right = last.offsetLeft + last.offsetWidth + 2;
  rect.hidden = false;
  rect.style.left = `${left}px`;
  rect.style.width = `${right - left}px`;
}

function repositionAllHistogramRects() {
  document.querySelectorAll('.histogram').forEach(h => positionHistogramRect(h));
}

async function applyWordlistText(wordlist, text, { fetchedSize = null, originalFilename = null, nameOverride = null, source = null, clearUrl = false, silent = false } = {}) {
  const dbKey = wordlist.dbKey;
  const wasEmpty = !wordlist.rawEntries.length;
  const oldEntries = wasEmpty ? null : wordlist.rawEntries;

  // Invalidate first, then mutate — so signal writes (name/url) don't fire
  // the cosmetic effect against still-stale caches mid-flight. Wrap in
  // batchUpdate to coalesce all writes + the cache bump into one render
  // effect run after the batch.
  batchUpdate(() => {
    invalidateWordlistCaches(wordlist);
    wordlist.rawEntries = parseWordlist(text);
    wordlist.lastUpdated = Date.now();
    if (fetchedSize !== null) { wordlist.fetchedSize = fetchedSize; wordlist._updateAvailable = false; }
    if (originalFilename !== null) wordlist.originalFilename = originalFilename;
    if (!wordlist.populated) { wordlist.populated = true; wordlist.enabled = true; }
    updateCatchAll(wordlist);
    if (nameOverride) wordlist.name = nameOverride;
    if (clearUrl) { wordlist.url = null; wordlist.fetchedSize = null; wordlist._updateAvailable = false; }
    persistMeta();
    repaintAfterCacheChange();
  });

  await persistData(dbKey, text);
  // The render effect drained inside batchUpdate already updated the rail,
  // dropdown, dialog, scoring legend, stats bar, and active scroller for the
  // current selection. Nothing else to repaint here.

  if (wasEmpty) {
    if (!silent) showToast(`Loaded ${pluralize(wordlist.rawEntries.length, 'entry', 'entries')} from ${esc(source)}`);
  } else {
    const oldMap = new Map(oldEntries.map(e => [e.word, e.score]));
    const newMap = new Map(wordlist.rawEntries.map(e => [e.word, e.score]));
    const added   = wordlist.rawEntries.filter(e => !oldMap.has(e.word)).sort((a, b) => a.word.localeCompare(b.word));
    const deleted = oldEntries.filter(e => !newMap.has(e.word)).sort((a, b) => a.word.localeCompare(b.word));
    const rescored = oldEntries
      .filter(e => newMap.has(e.word) && newMap.get(e.word) !== e.score)
      .map(e => ({ word: e.word, oldScore: e.score, score: newMap.get(e.word) }))
      .sort((a, b) => a.word.localeCompare(b.word));
    if (!added.length && !deleted.length && !rescored.length) {
      showAlert(`${buildWordlistNameHTML(wordlist)} is already up to date — no changes.`);
    } else {
      openUpdateSummaryDialog(wordlist, oldEntries.length, added, deleted, rescored);
    }
  }
}

async function fetchWordlist(wordlist, event, { silent = false } = {}) {
  if (event) event.stopPropagation();
  if (!wordlist || !wordlist.url || wordlist._loading) return;

  wordlist._loading = true;
  renderSources();
  if (state.selected === wordlist) renderDetail(wordlist);

  try {
    const resp = await fetch(wordlist.url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
    const text = await resp.text();
    const fetchedSize = resp.headers.get('content-length') || null;
    const originalFilename = new URL(wordlist.url).pathname.split('/').pop() || null;
    wordlist._loading = false;
    await applyWordlistText(wordlist, text, { fetchedSize, originalFilename, source: wordlist.url, silent });
  } catch (err) {
    wordlist._loading = false;
    renderSources();
    if (state.selected === wordlist) renderDetail(wordlist);
    const detail = err.message === 'Failed to fetch' ? '' : `: ${err.message}`;
    showToast(`Failed to fetch ${esc(wordlist.url)}${esc(detail)}`);
  }
}

const UPDATE_CHECK_INTERVAL = 60 * 60 * 1000; // 1 hour

async function checkForUpdates() {
  const candidates = state.sources.filter(l => l.url && l.rawEntries.length > 0 && l.fetchedSize);
  if (!candidates.length) return;

  let anyChanged = false;
  await Promise.all(candidates.map(async wordlist => {
    try {
      const resp = await fetch(wordlist.url, { method: 'HEAD' });
      if (!resp.ok) return;
      const size = resp.headers.get('content-length');
      if (size && size !== wordlist.fetchedSize && !wordlist._updateAvailable) {
        wordlist._updateAvailable = true;
        anyChanged = true;
      }
    } catch { /* offline or network error — silently ignore */ }
  }));

  if (anyChanged) {
    renderSources();
    const selected = getSelected();
    if (selected?.url && selected._updateAvailable) renderDetail(selected);
  }
}
