// pointer-events: none in CSS — clicks pass through, can't blur the anchor.
class PopupHelp {
  constructor(anchor, contentHTML, opts = {}) {
    this.anchor = anchor;
    this.placement = opts.placement || 'above';
    this.offset = opts.offset ?? 6;

    this.el = document.createElement('div');
    this.el.className = 'popup-help';
    this.el.innerHTML = contentHTML;
    document.body.appendChild(this.el);

    this._onFocus = () => this.show();
    this._onBlur  = () => this.hide();
    this._reflow  = () => { if (this._open) this._position(); };
    anchor.addEventListener('focus', this._onFocus);
    anchor.addEventListener('blur',  this._onBlur);
    window.addEventListener('resize', this._reflow);
    window.addEventListener('scroll', this._reflow, true);

    if (anchor === document.activeElement) this.show();
  }

  show() {
    this._open = true;
    this._position();
    this.el.classList.add('open');
  }

  hide() {
    this._open = false;
    this.el.classList.remove('open');
  }

  _position() {
    const aRect = this.anchor.getBoundingClientRect();
    const eRect = this.el.getBoundingClientRect();
    const top = this.placement === 'above'
      ? aRect.top - eRect.height - this.offset
      : aRect.bottom + this.offset;
    const maxLeft = window.innerWidth - eRect.width - 8;
    const left = Math.max(8, Math.min(aRect.left, maxLeft));
    this.el.style.top  = top  + 'px';
    this.el.style.left = left + 'px';
  }

  destroy() {
    this.anchor.removeEventListener('focus', this._onFocus);
    this.anchor.removeEventListener('blur',  this._onBlur);
    window.removeEventListener('resize', this._reflow);
    window.removeEventListener('scroll', this._reflow, true);
    this.el.remove();
  }
}

// `stats` drives the numeric readouts (count/min/max/mean/median/mode); `hist`
// ({ entries, ignoredCount }) drives the histogram bars. Splitting them lets
// the score-range filter shrink the numbers without making bars outside the
// selection vanish — those bars stay sourced from the pre-score-range set.
// `opts.readOnly` suppresses the click-to-filter behavior — used by Library
// histograms, which display the distribution but don't participate in
// score-range filtering.
function buildStatsBarHTML(stats, hist, layout, opts = {}) {
  // countLabel/countValue keep the label and number independent: the stats
  // aggregates run over flattened atoms, but the count is per row — and the
  // Workshop panel relabels it "Results" once a transform branches the rows.
  const { readOnly = false, countLabel = 'Entries', countValue = stats.count } = opts;
  const isEmpty = !countValue;
  const dash = '—';
  const fmt = v => isEmpty ? dash : v;
  const ignored = hist.ignoredCount || 0;
  const counts = bucketCounts(hist.entries || [], layout);
  const scale = Math.max(ignored, ...counts, 1);
  const barH = c => c === 0 ? 0 : Math.max(2, Math.round((c / scale) * 34));

  const ignoredTitle = ignored > 0 ? ` title="${pluralize(ignored, 'entry', 'entries')} ignored"` : '';
  const ignoredBar = `<div class="histogram-col histogram-col-ignored"${ignoredTitle}><div class="histogram-bar histogram-bar-ignored" style="height:${barH(ignored)}px"></div></div>`;

  const filterHint = readOnly ? '' : ' • Click to filter';
  const bars = layout.slots.map((s, i) => {
    const c = counts[i];
    const title = `${pluralize(c, 'entry', 'entries')} scored ${s.label}${filterHint}`;
    const { bg } = scoreColor((s.lo + s.hi) / 2);
    return `<div class="histogram-col" title="${title}"><div class="histogram-bar" data-lo="${s.lo}" data-hi="${s.hi}" style="--score-bg:${bg}; height:${barH(c)}px"></div></div>`;
  }).join('');

  const histTitle = readOnly ? 'Histogram' : 'Histogram • Click to filter';
  // If a histogram in the doc is currently hovered, the user's cursor is
  // inside one of these bbox regions — overwhelmingly the same one we're
  // about to replace. Bake .is-hovered into the new HTML so the fresh bars
  // are born colored (no class change after insertion = no transition replay).
  const hoveredClass = document.querySelector('.histogram.is-hovered') ? ' is-hovered' : '';
  const readOnlyClass = readOnly ? ' histogram-readonly' : '';
  const pointerHandler = readOnly ? '' : ' onpointerdown="onHistogramPointerDown(event)"';

  return `<div class="stats-bar${isEmpty ? ' stats-empty' : ''}">
      ${buildStatItemHTML(countLabel, countValue.toLocaleString())}
      ${buildStatItemHTML('Min', fmt(stats.min))}
      ${buildStatItemHTML('Max', fmt(stats.max))}
      <div class="stats-right">
        ${buildStatItemHTML('Mean', fmt(stats.mean), 'Average score')}
        ${buildStatItemHTML('Median', fmt(stats.median % 1 === 0 ? stats.median : stats.median.toFixed(1)), '50th percentile')}
        ${buildStatItemHTML('Mode', fmt(stats.mode), 'Most common score')}
        <div class="histogram${hoveredClass}${readOnlyClass}" title="${histTitle}"${pointerHandler}>${ignoredBar}${bars}<div class="histogram-rect" hidden></div></div>
      </div>
    </div>`;
}

function buildRulesListHTML(rules, { rulesId, saveFn, deleteFn, addFn = '', resetFn = '', uncovered = [], dirty = false, rescore = false, readOnly = false }) {
  // Uncovered scores surface as a banner above the list; rule authoring goes
  // through the `+ Add rule` button below. The two split off what used to be
  // a single dual-purpose row in the editor.
  const banner = (!readOnly && uncovered.length)
    ? buildRuleBannerHTML(uncovered)
    : '';

  let rulesHTML;
  if (!rules.length && rescore) {
    rulesHTML = '<div class="no-rules">No rules — entries kept as-is</div>';
  } else {
    rulesHTML = rules.map((r, i) => {
      const inputInvalid = !readOnly && parseRange((r.input || '').trim()) === null;
      const disabled = readOnly ? ' disabled' : '';
      const inputHandlers = readOnly ? '' : ` oninput="onRuleInput(this)" onchange="${saveFn}(${i},'input',this.value)"`;
      let fieldsHTML = `<input class="rule-in${inputInvalid ? ' invalid' : ''}" value="${esc(r.input)}"
            title="Score range: 50, 50-59, or 50+"${disabled}${inputHandlers}>`;
      if (rescore) {
        const lenVal = (r.length || '').trim();
        const lenInvalid = !readOnly && lenVal !== '' && parseRange(lenVal) === null;
        const outInvalid = !readOnly && isRuleOutputInvalid(r.input, r.output);
        const lenHandlers = readOnly ? '' : ` oninput="onRuleInput(this)" onchange="${saveFn}(${i},'length',this.value)"`;
        const outHandlers = readOnly ? '' : ` oninput="onRuleInput(this)" onchange="${saveFn}(${i},'output',this.value)"`;
        fieldsHTML += `
          <span class="rule-field-lbl">length</span><input class="rule-len${lenInvalid ? ' invalid' : ''}" value="${esc(r.length||'')}" placeholder="any"
            title="Entry length filter: 7, 7-10, or 7+ (blank = any length)"${disabled}${lenHandlers}>
          <span class="rule-arrow">→</span>
          <input class="rule-out${outInvalid ? ' invalid' : ''}" value="${esc(r.output)}" placeholder="unchanged"
            title="Output score, 'ignore', or blank for unchanged"${disabled}${outHandlers}>`;
      }
      return buildRuleRowHTML(i, fieldsHTML, r.note, deleteFn, readOnly);
    }).join('');
  }
  const addBtn = (!readOnly && addFn) ? `<button class="rule-add-btn" onclick="${addFn}()">+ Add rule</button>` : '';
  const resetBtn = (!readOnly && resetFn && dirty) ? `<button class="rule-reset-btn" onclick="${resetFn}()">Reset to defaults</button>` : '';
  const actionsRow = (addBtn || resetBtn) ? `<div class="rule-actions">${addBtn}${resetBtn}</div>` : '';
  return `${banner}<div id="${rulesId}">${rulesHTML}</div>${actionsRow}`;
}

const Collapsible = (() => {
  function buildHTML({ id = '', className = '', labelHTML, contentHTML, collapsed = false }) {
    const cls = ['collapsible', className, collapsed && 'collapsed'].filter(Boolean).join(' ');
    const idAttr = id ? ` id="${id}"` : '';
    return `<div${idAttr} class="${cls}">
        <button type="button" class="collapsible-toggle" aria-expanded="${!collapsed}">
          <span class="collapsible-chevron" aria-hidden="true">▾</span>
          ${labelHTML}
        </button>
        <div class="collapsible-content">${contentHTML}</div>
      </div>`;
  }

  // Caller wires persistence (localStorage, signal, etc.) by listening for
  // `collapsible:toggle` on the wrapper or any ancestor.
  document.addEventListener('click', e => {
    const toggle = e.target.closest('.collapsible-toggle');
    if (!toggle) return;
    const wrapper = toggle.closest('.collapsible');
    if (!wrapper) return;
    const collapsed = !wrapper.classList.contains('collapsed');
    wrapper.classList.toggle('collapsed', collapsed);
    toggle.setAttribute('aria-expanded', String(!collapsed));
    wrapper.dispatchEvent(new CustomEvent('collapsible:toggle', { detail: { collapsed }, bubbles: true }));
  });

  return { buildHTML };
})();

// ─── Router ───────────────────────────────────────────────────────────────────
// Keeps the URL in sync with the active view and the tool stack via
// history.replaceState. URL shape:
//   bare URL              → default view, no query
//   #/<view>              → named view, no query
//   #/<view>?<query>      → named view with query state
// The default view (Workshop today) gets the bare-URL form when its query is
// empty, so the most-shared case stays short. MainView owns the view registry;
// Router treats view names opaquely.
//
// Query encoding: each pipeline row in order — its tool name carries the
// first param's value (`tool=value`), and each successive param is its own
// adjacent key (a bare key for a true checkbox, `key=value` for a non-empty
// text param, omitted at default). The permanent Search bar is the final
// row. See docs/design.md § URL state. The score filter is intentionally
// *not* in the URL — it's per-user (scores aren't portable across wordlist
// setups) and lives in localStorage.
const Router = (() => {
  // One tool row → its URL key(s). The first param rides on the tool-name
  // key so the row always has an anchor (kept even when empty, so an
  // unfilled row survives reload); a param-less tool is a bare tool key.
  function encodeRow(row) {
    const tool = TOOLS[row.tool];
    const slug = encodeURIComponent(row.tool);
    if (!tool.params.length) return [slug];
    const parts = [slug + '=' + encodeURIComponent(row.params[tool.params[0].key] || '')];
    for (const p of tool.params.slice(1)) {
      const v = row.params[p.key];
      if (p.type === 'checkbox') { if (v) parts.push(encodeURIComponent(p.key)); }
      else if (v)                parts.push(encodeURIComponent(p.key) + '=' + encodeURIComponent(v));
    }
    return parts;
  }

  function rowIsDefault(row) {
    return TOOLS[row.tool].params.every(p => !row.params[p.key]);
  }

  function buildQuery() {
    // The full pipeline — user tools plus the permanent Search bar as its
    // last row. Each row serializes via encodeRow; empty values are kept
    // (`anagram=`) so an added-but-unfilled row survives reload. The lone
    // exception is the Search bar: its keys are elided when it's at default
    // state *and* not preceded by another Search row, so an untouched app
    // stays at a bare URL while an added Search tool still round-trips.
    const stack = ToolStack.getStack();
    const parts = [];
    stack.forEach((row, i) => {
      if (!TOOLS[row.tool]) return;
      const isBar = i === stack.length - 1;
      if (isBar && rowIsDefault(row) && stack[i - 1]?.tool !== 'search') return;
      parts.push(...encodeRow(row));
    });
    // Sort axis/direction. Each key drops out when it matches the default for
    // the current sort tier, so the common case (entry asc on filter-only
    // chains, min-score desc once a transform is in play) stays silent.
    // `sort-dir` may appear alone — parsing treats absent `sort` as the tier
    // default.
    const tier = chainSortTier(stack);
    const defaultAxis = WORKSHOP_DEFAULT_SORT_BY_TIER[tier];
    if (WorkshopView.sortKey !== defaultAxis)                  parts.push('sort=' + WorkshopView.sortKey);
    if (WorkshopView.sortDir !== defaultSortDir(WorkshopView.sortKey)) parts.push('sort-dir=' + WorkshopView.sortDir);
    return parts.join('&');
  }

  function buildHash() {
    const view = MainView.getCurrent();
    const def  = MainView.getDefault();
    // Query state belongs to the active view. Today the pipeline is Workshop's
    // (default view) and no other view has URL-bound state — so when we're on
    // Library, the URL is route-only and the pipeline lives in memory until
    // the user switches back. When another view gains URL state, give it its
    // own builder (e.g. per-view query-builders registered with MainView).
    const query = view === def ? buildQuery() : '';
    if (view === def && !query) return '';
    return '#/' + view + (query ? '?' + query : '');
  }

  function navigate() {
    const target = location.pathname + buildHash();
    if (location.pathname + location.hash !== target) {
      history.replaceState(null, '', target);
    }
  }

  // Returns the view to activate. State (tool stack, search) is applied as a
  // side effect. The score filter is loaded from localStorage in init() and
  // doesn't participate in URL routing.
  function applyURL() {
    let view = MainView.getDefault();
    let queryString = '';
    const hash = location.hash;
    if (hash.startsWith('#/')) {
      const rest  = hash.slice(2);
      const qIdx  = rest.indexOf('?');
      const route = qIdx >= 0 ? rest.slice(0, qIdx) : rest;
      if (MainView.hasView(route)) {
        view = route;
        queryString = qIdx >= 0 ? rest.slice(qIdx + 1) : '';
      }
      // Unknown route → fall through to default view; drop the query (it was
      // most likely intended for a view that has been renamed or removed).
    }

    const params = new URLSearchParams(queryString);
    const rows = [];
    let sortKey = null;
    let sortDir = null;
    let droppedUnknown = false;
    // All param names across the catalog — lets the decoder tell a genuinely
    // unknown key (likely a removed tool) from a merely misplaced param.
    const knownParam = new Set(Object.values(TOOLS).flatMap(t => t.params.map(p => p.key)));
    // Each key is one of three things: a tool name (starts a new row, its
    // value is the first param), a reserved view-config key, or a successive
    // param of the most recent row (a bare key sets a checkbox true).
    for (const [key, value] of params) {
      if (key === 'sort')     { if (isValidSortAxis(value)) sortKey = value; continue; }
      if (key === 'sort-dir') { if (value === 'asc' || value === 'desc') sortDir = value; continue; }
      const tool = TOOLS[key];
      if (tool) {
        // Only one group tool per pipeline — ignore any beyond the first.
        if (tool.kind === 'group' && rows.some(r => TOOLS[r.tool]?.kind === 'group')) continue;
        const row = { tool: key, params: {} };
        if (tool.params.length) row.params[tool.params[0].key] = value || '';
        rows.push(row);
        continue;
      }
      const cur = rows[rows.length - 1];
      const pdef = cur && TOOLS[cur.tool].params.find(p => p.key === key);
      if (pdef) { cur.params[key] = pdef.type === 'checkbox' ? true : (value || ''); continue; }
      // A key that's not a tool, not reserved, and not any tool's param name
      // is a genuinely unknown key — most likely a tool that's been removed.
      if (!knownParam.has(key)) droppedUnknown = true;
    }
    // The decoded rows are the full pipeline; ToolStack keeps the trailing
    // Search row as the permanent bar (appending an empty one if absent).
    // Stack is set first so applyURLState can derive the current atom count
    // when picking the sort default (a stacked-output URL with no explicit
    // sort= should pick min-score, not the 1-atom default entry).
    ToolStack.setStack(rows);
    WorkshopView.applyURLState({ sortKey, sortDir });
    if (droppedUnknown) {
      // Defer: showToast appends to the toast container which may not be in
      // the DOM yet during initial load.
      setTimeout(() => showToast("That link references a tool that's no longer available."), 0);
    }
    return view;
  }

  return { navigate, applyURL };
})();

// ─── State ────────────────────────────────────────────────────────────────────

// My Edits' default rescore rules mirror All's tier scale (state.scoring):
// one inert row per tier, carrying the tier's score and note. Inert because
// My Edits' scores are already in the unified scale — the rules just declare
// "these scores are recognized." Lets a fresh user edit a tier-covered score
// without tripping the misalignment bubble; the rule already covers it.
function getMyEditsDefaultRules() {
  return state.scoring.map(r => ({ input: r.input, length: '', output: '', note: r.note || '' }));
}

// Default tier labels for the unified score scale. Stored on `state.scoring`
// and surfaced as a read/write legend on the merged All view.
const DEFAULT_SCORING = [
  { input: '60', note: 'Great (colorful phrases, sayings, people, etc.)' },
  { input: '50', note: 'Good (dictionary words, phrases)' },
  { input: '40', note: 'Fine but watch crosses (proper names, abbreviations, prepositional phrases)' },
  { input: '30', note: 'Not good (plural names, crosswordese, contrived inflections)' },
  { input: '20', note: 'Junk (partials, variant spellings, Roman numerals)' },
  { input: '10', note: 'Offensive' },
  { input: '0',  note: 'Gibberish' },
];

// Top-level state. `sources$` is the array of wordlists, signal-backed so
// the cosmetic effect can subscribe; reorder/add/remove call `sources$.bump()`
// after splicing (signal equality is by reference, so plain mutation needs a
// bump). Per-view UI state (search/sort/score-range, focused wordlist, display
// mode) lives inside each view's IIFE — WorkshopView and LibraryView — not
// here.
const sources$  = signal([]);

// `cacheVersion$` is bumped whenever the imperative caches change (full
// invalidation or in-place patch). The render effect subscribes to it so
// cache-impacting changes trigger a repaint without manual dispatch.
const cacheVersion$ = signal(0);
function bumpCacheVersion() { cacheVersion$.set(cacheVersion$.peek() + 1); }

// Reads through `state.sources` are non-subscribing (peek). Effects that
// need to re-run on changes read the underlying signal explicitly with
// `.get()`. This keeps the imperative call sites unchanged while preventing
// accidental over-subscription from incidental reads inside effects.
const state = {
  get sources()  { return sources$.peek(); },
  set sources(v) { sources$.set(v); },
  // Tier labels for the unified score scale. Single source of truth for what
  // each score range means to the user; edited from All's pane and used
  // everywhere scores get a tooltip. No signal — mutators call
  // `persistScoring()` and `renderScoringRules()` explicitly.
  scoring: [],
  // True when state.scoring has been customized away from DEFAULT_SCORING.
  // Drives `propagateDefaults` at boot (pristine users silently pick up dev
  // updates) and the "Reset to defaults" button visibility.
  scoringDirty: false,
  // Transient: merged-output scores not covered by any tier label.
  // Recomputed by recomputeScoringUncovered; drives the Unhandled-scores
  // banner on All's pane and the warning bubble on the All card.
  _scoringUncovered: [],
};

// Per-wordlist cosmetic fields are signal-backed: each wordlist exposes both
// `wl.name`/`wl.icon`/etc. (peek getter, set setter) and `wl.name$`/`wl.icon$`
// for explicit subscriptions. The cosmetic effect subscribes to all four
// across every wordlist.
//
// Cache-affecting fields (`enabled`, `rescoreRules`, `rawEntries`) and
// transient fields (`_loading`, `_updateAvailable`, `lastUpdated`, etc.) are
// plain properties: their mutation goes through a helper that handles the
// invalidation/persistence/dispatch explicitly. See "Mutation helpers" below.
const REACTIVE_WORDLIST_FIELDS = ['name', 'icon', 'url', 'publisherId'];

function wrapWordlist(wl) {
  if (wl.name$) return wl;  // already wrapped
  for (const field of REACTIVE_WORDLIST_FIELDS) {
    const sig = signal(wl[field]);
    delete wl[field];
    Object.defineProperty(wl, field + '$', { value: sig });
    Object.defineProperty(wl, field, {
      get() { return sig.peek(); },
      set(v) { sig.set(v); },
      enumerable: true,
      configurable: false,
    });
  }
  return wl;
}

// ─── Parsing ─────────────────────────────────────────────────────────────────

function parseWordlistLine(line) {
  if (!line) return null;
  const semi = line.indexOf(';');
  if (semi === -1) return null;
  const entry = line.slice(0, semi).toLowerCase();
  if (!entry || entry.includes(';')) return null;
  const rest = line.slice(semi + 1);
  const semi2 = rest.indexOf(';');
  const score = parseInt(semi2 === -1 ? rest : rest.slice(0, semi2), 10);
  if (isNaN(score)) return null;
  const comment = semi2 === -1 ? '' : rest.slice(semi2 + 1).trim();
  return { entry, score, comment };
}

function parseWordlist(text) {
  const entries = [];
  for (const line of text.split('\n')) {
    const wlEntry = parseWordlistLine(line);
    if (wlEntry) entries.push(wlEntry);
  }
  return entries;
}

// Validates a chunk from a Range GET. Drops the last line (may be truncated
// at the Range boundary); skips semicolon-less lines as comments/headers.
function validateWordlistChunk(text) {
  const lines = text.split('\n').slice(0, -1).filter(l => l.length > 0);
  if (!lines.length) return false;
  const dataLines = lines.filter(l => l.includes(';'));
  if (!dataLines.length) return false;
  return dataLines.every(l => parseWordlistLine(l) !== null);
}

// ─── Storage ──────────────────────────────────────────────────────────────────

function lsSave(key, value) {
  try { localStorage.setItem(LS_PREFIX + key, value); return true; }
  catch { return false; }
}
function lsLoad(key) { return localStorage.getItem(LS_PREFIX + key); }
function lsDel(key)  { localStorage.removeItem(LS_PREFIX + key); }

// Bump when the shape of stored data (localStorage `meta`, IDB entries) changes
// in a way that older code can't read. Mismatch on load triggers a reset prompt.
//   v4 — drop state.outputScoring; tier labels live exclusively on My Edits' `scoring`.
//   v5 — tier labels move off My Edits to top-level `state.scoring` (its own
//        localStorage key); My Edits gains a normal rescoreRules editor.
const SCHEMA_VERSION = 5;

function readMergedSettings() {
  try { return JSON.parse(lsLoad('mergedSettings')) || {}; } catch { return {}; }
}
function writeMergedSettings(s) { lsSave('mergedSettings', JSON.stringify(s)); }

// IndexedDB for large wordlist data (localStorage has ~5MB limit)
const IDB_NAME  = 'grawlix';
const IDB_STORE = 'data';
let _db = null;

async function resetAllDataAndReload() {
  Object.keys(localStorage).filter(k => k.startsWith(LS_PREFIX)).forEach(k => localStorage.removeItem(k));
  if (_db) { _db.close(); _db = null; }
  await new Promise(resolve => {
    const req = indexedDB.deleteDatabase(IDB_NAME);
    req.onsuccess = resolve;
    req.onerror   = resolve;
    req.onblocked = resolve;
  });
  location.reload();
  // location.reload() is asynchronous — JS keeps running until the navigation
  // actually fires. Block the caller so it can't re-persist the state we just
  // wiped (init() in particular would write a fresh `meta` back to localStorage
  // and leave the SCHEMA_VERSION warning re-armed for the next load).
  await new Promise(() => {});
}

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess = e => { _db = e.target.result; resolve(); };
    req.onerror   = () => reject(req.error);
  });
}

function idbPut(key, val) {
  return new Promise(resolve => {
    const tx = _db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(val, key);
    tx.oncomplete = resolve;
    tx.onerror    = resolve;
  });
}

function idbGet(key) {
  return new Promise(resolve => {
    const tx  = _db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => resolve(req.result ?? null);
    req.onerror   = () => resolve(null);
  });
}

function idbDel(key) {
  return new Promise(resolve => {
    const tx = _db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete = resolve;
    tx.onerror    = resolve;
  });
}

// Opaque IDB key. Avoids crypto.randomUUID because WebKit gates it on
// secure contexts, which breaks local-network mobile testing over HTTP.
function newDbKey() {
  const hex = (n) => Array.from({ length: n }, () => Math.floor(Math.random() * 16).toString(16)).join('');
  return `${hex(8)}-${hex(4)}-${hex(4)}-${hex(4)}-${hex(12)}`;
}

function persistMeta() {
  if (_batchDepth > 0) { _persistPending = true; return; }
  _persistMetaNow();
}

function _persistMetaNow() {
  lsSave('meta', JSON.stringify(state.sources.map(l => ({
    ...(l.type ? { type: l.type } : {}),
    dbKey: l.dbKey,
    ...(l.icon ? { icon: l.icon } : {}),
    ...(l.publisherId ? { publisherId: l.publisherId } : {}),
    name: l.name, url: l.url || null,
    enabled: l.enabled, populated: l.populated, lastUpdated: l.lastUpdated || null,
    fetchedSize: l.fetchedSize || null,
    rescoreRules: l.rescoreRules || [],
    ...(l.dirty ? { dirty: true } : {}),
    originalFilename: l.originalFilename || null,
    ...(l.downloadCase ? { downloadCase: l.downloadCase } : {}),
    ...(l.downloadExt  ? { downloadExt:  l.downloadExt  } : {}),
    ...(l.downloadStem ? { downloadStem: l.downloadStem } : {}),
  }))));
}

function persistScoring() {
  lsSave('scoring', JSON.stringify(state.scoring));
  lsSave('scoringDirty', state.scoringDirty ? '1' : '0');
}

async function persistData(dbKey, text) {
  await idbPut('data_' + dbKey, text);
}

// ─── Dark mode ────────────────────────────────────────────────────────────────

const DARK_MODE_CYCLE = ['auto', 'light', 'dark'];
const DARK_MODE_LABELS = { auto: 'Auto', light: 'Light', dark: 'Dark' };

function applyDarkMode(val) {
  const dark = val === 'dark' || (val !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.classList.toggle('dark-mode', dark);
  document.documentElement.classList.toggle('light-mode', !dark);
}

function cycleDarkMode() {
  const current = lsLoad('darkMode') || 'auto';
  const next = DARK_MODE_CYCLE[(DARK_MODE_CYCLE.indexOf(current) + 1) % DARK_MODE_CYCLE.length];
  lsSave('darkMode', next);
  applyDarkMode(next);
  const seg = document.getElementById('dark-mode-seg');
  if (seg) seg.querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b.dataset.val === next));
  showToast(`Dark mode: ${DARK_MODE_LABELS[next]}`);
}

// ─── Display case ─────────────────────────────────────────────────────────────

function getDisplayCase() { return lsLoad('displayCase') || 'lower'; }

function displayEntry(entry) {
  return getDisplayCase() === 'upper' ? entry.toUpperCase() : entry.toLowerCase();
}

// ─── Dialog helpers ───────────────────────────────────────────────────────────

function enableDismissClicks(el) {
  el.addEventListener('click', e => {
    if (e.target === el || e.target.closest('.dialog-close-btn, .dialog-cancel-btn')) el.close();
  });
}

function showDialog(el, onClose = null) {
  const opener = document.activeElement;
  el.returnValue = '';
  el.addEventListener('close', () => {
    opener?.focus();
    onClose?.();
  }, { once: true });
  el.showModal();
  if (!el.querySelector('[autofocus]')) {
    el.tabIndex = -1;
    el.focus();
  }
}

function createDialog(id, { labelledby, label } = {}) {
  const el = document.createElement('dialog');
  el.id = id;
  if (labelledby) el.setAttribute('aria-labelledby', labelledby);
  if (label)      el.setAttribute('aria-label', label);
  enableDismissClicks(el);
  const body = document.createElement('div');
  body.className = 'dialog-body';
  el.appendChild(body);
  document.body.appendChild(el);
  return { el, body };
}

// ─── Settings dialog ──────────────────────────────────────────────────────────

const SettingsDialog = (() => {
  const { el, body } = createDialog('settings-dialog', { labelledby: 'settings-dialog-title' });
  body.innerHTML = `
    <button class="dialog-close-btn" aria-label="Close">✕</button>
    <h2 id="settings-dialog-title">Settings</h2>
    <div class="dialog-row">
      <span class="dialog-row-label">Dark mode</span>
      <div id="dark-mode-seg"></div>
    </div>
    <div class="dialog-row">
      <span class="dialog-row-label">Display case</span>
      <div id="display-case-ctrl"></div>
    </div>
    <div class="dialog-row">
      <div>
        <div class="dialog-row-label">Auto-update wordlists</div>
        <div class="dialog-row-sub">Update wordlists without asking</div>
      </div>
      <div id="auto-update-seg"></div>
    </div>
    <div class="dialog-row">
      <div>
        <div class="dialog-row-label">Reset all data</div>
        <div class="dialog-row-sub">Reset all wordlists and settings</div>
      </div>
      <button id="btn-reset" class="danger" title="Reset all wordlists and data"><svg class="icon-trash"><use href="#icon-trash"/></svg> Reset</button>
    </div>`;

  const seg  = el.querySelector('#dark-mode-seg');
  const ctrl = el.querySelector('#display-case-ctrl');

  const darkSaved = lsLoad('darkMode') || 'auto';
  applyDarkMode(darkSaved);
  seg.innerHTML = buildSegCtrlHTML(null, [
    { value: 'auto',  label: 'Auto' },
    { value: 'light', label: '☀ Light' },
    { value: 'dark',  label: '☽ Dark' },
  ], darkSaved);
  seg.querySelectorAll('.seg-btn').forEach(btn => {
    btn.onclick = () => {
      const val = btn.dataset.val;
      lsSave('darkMode', val);
      applyDarkMode(val);
      seg.querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b === btn));
    };
  });
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if ((lsLoad('darkMode') || 'auto') === 'auto') applyDarkMode('auto');
  });

  const caseSaved = getDisplayCase();
  ctrl.innerHTML = buildSegCtrlHTML(null, [
    { value: 'lower', label: 'lower' },
    { value: 'upper', label: 'UPPER' },
  ], caseSaved);
  ctrl.querySelectorAll('.seg-btn').forEach(btn => {
    btn.onclick = () => {
      ctrl.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      lsSave('displayCase', btn.dataset.val);
      if (workshopScroller) workshopScroller.updateEntries(workshopScroller.allEntries);
    };
  });

  const autoSeg = el.querySelector('#auto-update-seg');
  autoSeg.innerHTML = buildSegCtrlHTML(null, [
    { value: 'off', label: 'Off' },
    { value: 'on',  label: 'On' },
  ], getAutoUpdate() ? 'on' : 'off');
  autoSeg.querySelectorAll('.seg-btn').forEach(btn => {
    btn.onclick = () => {
      autoSeg.querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b === btn));
      lsSave('autoUpdate', btn.dataset.val);
      if (btn.dataset.val === 'on') checkForUpdates();
    };
  });

  el.querySelector('#btn-reset').onclick = async () => {
    if (!await showConfirm('Reset all wordlists and settings? This cannot be undone.', { confirmText: 'Reset' })) return;
    await resetAllDataAndReload();
  };

  function open() {
    showDialog(el);
  }

  return { open };
})();

// ─── Workshop view ────────────────────────────────────────────────────────────
// Top-level page (peer of Library in the brand-bar nav). Hosts the tool gallery,
// stack, and entries table — the construction-aid surface. Owns the show/hide
// lifecycle plus the search / whole-word / score-range / sort state and its
// handlers, mirroring LibraryView's shape (self-contained module, no shared
// state object between the two views).

const WorkshopView = (() => {
  const el = document.getElementById('workshop-view');

  // View-private state. Read externally via the getters in the returned
  // object; written either through the handlers below or through
  // `applyURLState` (Router) / `restoreScoreRange` (boot). The sort state
  // is mutated by WorkshopEntriesScroller's toolbar via `setSort`.
  // Search query / whole-word are *not* here — they live in the permanent
  // Search bar's ToolStack row params; the getters below read them from it.
  let _scoreRange      = '';
  let _sortKey         = 'entry';
  let _sortDir         = 'asc';

  function show() {
    el.hidden = false;
    // Histogram rect positioning reads live offsetLeft/offsetWidth, which are
    // 0 while the card is hidden. Any rect write during hidden corrupts the
    // saved position; reposition now that the bars have real dimensions.
    repositionAllHistogramRects();
  }
  function hide() { el.hidden = true; }
  function isVisible() { return !el.hidden; }

  // Search / sort / score-range handlers — wired from the inline oninput /
  // onclick attributes that buildSearchBarHTML emits, plus the Alt+W
  // keyboard shortcut and the histogram drag-up commit.
  // Search is the permanent final ToolStack row, so changing the query or
  // whole-word writes to that row's params and re-runs the pipeline. Score
  // range stays a scroller-side view filter.
  function onSearch(query) {
    ToolStack.getSearchBarRow().params.query = query;
    const btn = document.getElementById('search-clear');
    if (btn) btn.hidden = !query;
    refreshWorkshopMergedScroller();
    Router.navigate();
  }
  function onSearchWholeWord(checked) {
    ToolStack.getSearchBarRow().params['whole-word'] = checked;
    refreshWorkshopMergedScroller();
    Router.navigate();
  }
  function onScoreRange(value) {
    const trimmed = (value || '').trim();
    const intervals = trimmed === '' ? null : parseRange(trimmed);
    const inp = document.getElementById('score-range-input');
    if (inp) inp.classList.toggle('invalid', trimmed !== '' && intervals === null);
    _scoreRange = (trimmed && intervals) ? trimmed : '';
    if (_scoreRange) lsSave('scoreRange', _scoreRange);
    else             lsDel('scoreRange');
    const btn = document.getElementById('score-range-clear');
    if (btn) btn.hidden = trimmed === '';
    if (workshopScroller) refreshWorkshopMergedScroller();
    repositionAllHistogramRects();
  }
  function clearSearch() {
    const inp = document.getElementById('search-input');
    if (inp) { inp.value = ''; inp.focus(); }
    onSearch('');
  }
  function clearScoreRange() {
    const inp = document.getElementById('score-range-input');
    if (inp) { inp.value = ''; inp.classList.remove('invalid'); inp.focus(); }
    onScoreRange('');
  }

  // Sort state is mutated by WorkshopEntriesScroller's toolbar when the user
  // picks a new axis or flips the direction. No filter call here — the
  // scroller re-applies sort itself; this just keeps the canonical state.
  function setSort(key, dir) { _sortKey = key; _sortDir = dir; }

  // Bulk-apply URL sort state at boot. Router parses the query string, sets
  // the tool stack (including the Search bar row), then hands us the sort
  // axis/direction. The search query itself rides in the stack, not here.
  function applyURLState({ sortKey, sortDir }) {
    const tier = chainSortTier(ToolStack.getStack());
    _sortKey = sortKey || WORKSHOP_DEFAULT_SORT_BY_TIER[tier];
    _sortDir = sortDir || defaultSortDir(_sortKey);
    reconcileSort(ToolStack.getStack());
  }

  // Score-range is the lone state field that's localStorage-backed (it's a
  // standing preference, not a shared URL parameter — see design.md § Out of
  // scope for the URL). Boot restores the validated value via this setter.
  function restoreScoreRange(v) { _scoreRange = v; }

  return {
    show, hide, isVisible,
    onSearch, onSearchWholeWord, onScoreRange, clearSearch, clearScoreRange,
    setSort, applyURLState, restoreScoreRange,
    get searchQuery()     { return ToolStack.getSearchBarRow().params.query || ''; },
    get searchWholeWord() { return !!ToolStack.getSearchBarRow().params['whole-word']; },
    get scoreRange()      { return _scoreRange;      },
    get sortKey()         { return _sortKey;         },
    get sortDir()         { return _sortDir;         },
  };
})();

// ─── Library view ─────────────────────────────────────────────────────────────
// Top-level page (peer of Workshop in the brand-bar nav). Hosts the wordlist
// list and the focused-wordlist details pane.

const LibraryView = (() => {
  const el = document.getElementById('library-view');

  const onboarding = el.querySelector('#wld-onboarding');
  let _onboardingPage = lsLoad('onboarded')
    ? null
    : (parseInt(lsLoad('onboardingPage'), 10) || 1);

  function setOnboardingPage(page) {
    _onboardingPage = page;
    if (page === null) lsDel('onboardingPage');
    else               lsSave('onboardingPage', String(page));
  }

  function getXwiWordlist() {
    return state.sources.find(l => l.publisherId === 'xwi');
  }

  function buildOnboardingPageHTML(page) {
    const xwi = getXwiWordlist();
    const visiblePages = [1, 2];
    if (xwi && xwi.rawEntries.length === 0) visiblePages.push(3);
    const dots = visiblePages.map(n =>
      `<span${n === page ? ' class="active"' : ''}></span>`).join('');
    const dotsHTML = `<div class="wld-onboarding-dots">${dots}</div>`;

    if (page === 1) {
      return `
        <button class="dialog-close-btn" aria-label="Dismiss" data-onboard-action="dismiss">✕</button>
        <p>Some popular wordlists have been set up with suggested scoring rules.</p>
        <div class="wld-onboarding-actions">
          <button class="link-btn" data-onboard-action="blank">No thanks, remove them</button>
          <button class="primary" data-onboard-action="next">Sounds good</button>
        </div>
        ${dotsHTML}`;
    }
    if (page === 2) {
      return `
        <button class="dialog-close-btn" aria-label="Dismiss" data-onboard-action="dismiss">✕</button>
        <p>Got a personal wordlist? Import it into ${buildWordlistNameHTML(getEditsWordlist())}.</p>
        <div class="wld-onboarding-actions">
          <button class="link-btn" data-onboard-action="next">Skip</button>
          <button class="primary" data-onboard-action="import">Import…</button>
        </div>
        ${dotsHTML}`;
    }
    // page 3 — XWI
    return `
      <button class="dialog-close-btn" aria-label="Dismiss" data-onboard-action="dismiss">✕</button>
      <p>XWord Info subscriber? Import your ${buildWordlistNameHTML(getXwiWordlist())} wordlist.</p>
      <div class="wld-onboarding-actions">
        <button class="link-btn" data-onboard-action="next">Skip</button>
        <button class="primary" data-onboard-action="import">Import…</button>
      </div>
      ${dotsHTML}`;
  }

  function renderOnboarding() {
    if (_onboardingPage === null) { onboarding.hidden = true; return; }

    // Auto-advance: relevant wordlist already populated.
    if (_onboardingPage === 2 && (getEditsWordlist()?.rawEntries.length ?? 0) > 0) {
      setOnboardingPage(3);
    }
    // Page 3 requires XWI to exist and be unpopulated; otherwise end onboarding.
    if (_onboardingPage === 3) {
      const xwi = getXwiWordlist();
      if (!xwi || xwi.rawEntries.length > 0) {
        finishOnboarding();
        return;
      }
    }

    onboarding.hidden = false;
    onboarding.innerHTML = buildOnboardingPageHTML(_onboardingPage);
  }

  function finishOnboarding() {
    setOnboardingPage(null);
    onboarding.hidden = true;
    lsSave('onboarded', '1');
  }

  function advanceOnboarding() {
    if (_onboardingPage === 1)      setOnboardingPage(2);
    else if (_onboardingPage === 2) setOnboardingPage(3);
    else                            { finishOnboarding(); return; }
    renderOnboarding();
  }

  async function onboardingGoBlank() {
    // Invalidate every wordlist's caches first so the cosmetic effect that
    // fires on the `state.sources = …` assignment doesn't read a stale
    // merged cache (whether the wordlist is being removed or just having its
    // rules cleared).
    state.sources.forEach(l => invalidateWordlistCaches(l));
    const edits = getEditsWordlist();
    const toRemove = state.sources.filter(l => l !== edits);
    state.sources = [edits];
    state.scoring = [];
    edits.rescoreRules = [];
    recomputeUncovered(edits);
    persistMeta();
    persistScoring();
    await Promise.all(toRemove.map(l => idbDel('data_' + l.dbKey)));
    renderAll();
    advanceOnboarding();
  }

  function openOnboardingImport() {
    const target = _onboardingPage === 2 ? getEditsWordlist() : getXwiWordlist();
    if (!target) { advanceOnboarding(); return; }
    ImportGuideDialog.open(target);
    // A successful import inside the dialog calls ingestFile, which triggers
    // renderAll → renderOnboarding, auto-advancing once the import lands.
  }

  onboarding.addEventListener('click', e => {
    const action = e.target.closest('[data-onboard-action]')?.dataset.onboardAction;
    if (action === 'dismiss')     finishOnboarding();
    else if (action === 'next')   advanceOnboarding();
    else if (action === 'blank')  onboardingGoBlank();
    else if (action === 'import') openOnboardingImport();
  });

  const listBody = el.querySelector('#wld-list-body');
  const pane     = el.querySelector('#wld-pane');
  const addBtn   = el.querySelector('#wld-add-wordlist');

  let _focusedWordlist = null;
  let _dateTimer   = null;

  // Library-only view state — never persisted, never URL-routed. Survives
  // across wordlist switches inside a session so the user's last search
  // and sort stick around while they explore.
  let _displayMode      = 'rescored';  // 'rescored' | 'original'
  let _searchQuery      = '';
  let _searchWholeWord  = false;
  let _sortKey          = 'entry';
  let _sortDir          = 'asc';
  let _entriesScroller  = null;

  // ── HTML builders for pane internals ────────────────────────────────────────

  function buildModeToggleHTML() {
    return `<div class="seg-ctrl" role="group" aria-label="Display mode">
      <button type="button" class="seg-btn${_displayMode === 'rescored' ? ' active' : ''}" data-mode="rescored" onclick="LibraryView.setMode('rescored')">Rescored</button>
      <button type="button" class="seg-btn${_displayMode === 'original' ? ' active' : ''}" data-mode="original" onclick="LibraryView.setMode('original')">Original</button>
    </div>`;
  }

  function buildSearchBarHTML() {
    return `<div class="search-bar lib-search-bar">
      <div class="search-items">
        ${buildToolLabelHTML({ icon: '<svg width="16" height="16" aria-hidden="true"><use href="#icon-search"/></svg>', name: 'Search' })}
        ${buildSearchInputRowHTML({
          inputId: 'lib-search-input', clearId: 'lib-search-clear', wholeWordId: 'lib-search-whole-word',
          query: _searchQuery, wholeWord: _searchWholeWord,
          onInput: 'LibraryView.onSearch(this.value)', onClear: 'LibraryView.clearSearch()',
          onWholeWord: 'LibraryView.onWholeWord(this.checked)',
          wholeWordTitle: 'Whole word',
        })}
      </div>
      <div class="search-bar-end">
        <div class="search-bar-sort">${buildSortControlsHTML()}</div>
      </div>
      <button type="button" class="search-adjust-btn" title="Sort options" aria-label="Sort options"><svg width="16" height="16" aria-hidden="true"><use href="#icon-adjustments"/></svg></button>
    </div>`;
  }

  function buildSortControlsHTML() {
    const arrow = _sortDir === 'asc' ? '↑' : '↓';
    const options = Object.entries(LIBRARY_SORT_AXES)
      .map(([key, { label }]) => `<option value="${key}"${key === _sortKey ? ' selected' : ''}>${esc(label)}</option>`)
      .join('');
    return `Sort by
      <select class="sort-axis-select" onchange="LibraryView.onSortAxis(this.value)">${options}</select>
      <button class="sort-dir-btn" type="button" title="Toggle direction" aria-label="Toggle direction" onclick="LibraryView.toggleSortDir()">${arrow}</button>`;
  }

  function buildEntriesPanelHTML() {
    return `<div class="lib-entries-panel"><div class="lib-entries-host" id="lib-entries-host"></div></div>`;
  }

  // ── Rendering ─────────────────────────────────────────────────────────────────

  function renderList() {
    if (!_sourceCountsCache) _sourceCountsCache = buildMergedWordlist().sourceCounts;
    const contribMap = new Map(_sourceCountsCache.map(s => [s.wordlist, s.count]));

    const mergedCard = buildMergedCardHTML(_focusedWordlist === MERGED_ID, allSeverity());
    const sourceCards = state.sources.map(wordlist => {
      const icon = getWordlistIcon(wordlist);
      const meta = wordlistCardMeta(wordlist, contribMap);
      const severity = wordlistSeverity(wordlist);
      return buildWordlistCardHTML(icon, wordlist.name, meta, {
        selected:      _focusedWordlist === wordlist,
        enabled:       wordlist.enabled,
        populated:     wordlist.populated,
        severity,
        severityTitle: severityTitle(severity),
      });
    });
    listBody.innerHTML = [
      `<div class="wld-list-section-header">Merged</div>`,
      mergedCard,
      `<div class="wld-list-section-header">Sources</div>`,
      ...sourceCards,
    ].join('');

    const cards = listBody.querySelectorAll('.wordlist-card[data-wordlist]');
    state.sources.forEach((wordlist, i) => { if (cards[i]) cards[i]._wordlist = wordlist; });

    publishStickyCardHeight();
  }

  // In the narrow stacked layout the selected card pins to the top (see the
  // `display: contents` rule on the rail). Publish its measured height so
  // the pane's own sticky bars can offset cleanly below it.
  function publishStickyCardHeight() {
    const selCard = listBody.querySelector('.wordlist-card.selected');
    if (selCard) {
      document.documentElement.style.setProperty('--wld-pin-h', selCard.offsetHeight + 'px');
    }
  }

  function buildPane() {
    if (_dateTimer) { clearInterval(_dateTimer); _dateTimer = null; }
    destroyScroller();

    if (!_focusedWordlist) {
      pane.innerHTML = '<div class="wld-pane-empty">Select a wordlist to configure</div>';
      return;
    }
    if (_focusedWordlist === MERGED_ID) {
      renderMergedPane();
      return;
    }
    const wordlist = _focusedWordlist;
    const isEdits = wordlist.type === 'edits';
    const hasData = wordlist.rawEntries.length > 0;
    const hasRules = (wordlist.rescoreRules?.length ?? 0) > 0;

    // Stats source depends on display mode: rescored mode applies rules and
    // drops ignored entries; original mode shows the raw scores.
    const useOriginal = _displayMode === 'original';
    const sourceEntries = useOriginal ? wordlist.rawEntries : getRescoredEntries(wordlist);
    const ignoredCount = useOriginal ? 0 : wordlist.rawEntries.length - sourceEntries.length;
    const stats = computeStatsRaw(sourceEntries, ignoredCount);

    // Action row shape is unified across all wordlists: date slot, primary
    // action, optional mode toggle (sources only), Download, more menu. The
    // toggle governs stats, histogram, entries view, and what Download
    // produces — a single coupled "what version am I working with" knob.
    let actionBtn, dlBtn, moreMenu;
    if (isEdits) {
      actionBtn = `<button class="${hasData ? '' : 'primary'}" onclick="LibraryView.action('import')" ${wordlist._loading ? 'disabled' : ''}>${wordlist._loading ? 'Importing…' : 'Import'}</button>`;
      dlBtn = hasData ? `<button class="primary" onclick="LibraryView.action('download')">Download</button>` : '';
      moreMenu = hasData ? buildMoreMenuHTML([
        ['Clear', `LibraryView.action('clear')`],
      ]) : '';
    } else {
      const showBubble = wordlist._updateAvailable && !wordlist._loading;
      const dot = showBubble ? `&nbsp;${buildSeverityBubbleHTML('info')}` : '';
      const updateTitle = showBubble ? 'Update available' : '';
      const label = hasData ? 'Update' : (wordlist.url ? 'Fetch' : 'Import');

      if (wordlist.url) {
        const btnLabel = `${label}${dot}`;
        actionBtn = buildSplitBtn(btnLabel, `LibraryView.action('fetch')`,
          [['Import', `LibraryView.action('import')`]],
          { primary: true, disabled: !!wordlist._loading, title: updateTitle });
      } else {
        actionBtn = `<button class="primary"${updateTitle ? ` title="${updateTitle}"` : ''} onclick="LibraryView.action('import')" ${wordlist._loading ? 'disabled' : ''}>${wordlist._loading ? 'Importing…' : 'Import'}${dot}</button>`;
      }

      dlBtn = hasData ? `<button class="primary" onclick="LibraryView.action('download')">Download</button>` : '';

      moreMenu = buildMoreMenuHTML([
        ['Configure', `LibraryView.action('configure')`],
        ['Delete',    `LibraryView.action('delete')`],
      ]);
    }

    // Mode toggle: only meaningful when there are rules to apply.
    const toggleHTML = (hasData && hasRules) ? buildModeToggleHTML() : '';
    const dateSlot = (hasData && wordlist.lastUpdated) ? '<span class="detail-date"></span>' : '';
    // Toggle on the left (when present); date + buttons on the right.
    const actionsHTML = [toggleHTML, dateSlot, actionBtn, dlBtn, moreMenu].filter(Boolean).join('\n');

    const rulesHTML = `<div class="wld-pane-rescore" id="wld-rescore-section">${buildRescoreSectionHTML(wordlist)}</div>`;

    pane.innerHTML = `
      ${buildStatsBarHTML(stats, { entries: sourceEntries, ignoredCount }, getHistogramLayout(), { readOnly: true })}
      <div class="wld-pane-header">
        <div class="wld-pane-actions">${actionsHTML}</div>
      </div>
      ${rulesHTML}
      ${hasData ? buildSearchBarHTML() : ''}
      ${hasData ? buildEntriesPanelHTML() : ''}`;

    if (hasData) buildScrollerInPane(wordlist);

    if (hasData && wordlist.lastUpdated) {
      const setDate = () => {
        const dEl = pane.querySelector('.detail-date');
        if (!dEl) return;
        dEl.textContent = `Last updated ${timeAgo(wordlist.lastUpdated)}`;
        dEl.title = new Date(wordlist.lastUpdated).toLocaleString();
      };
      setDate();
      _dateTimer = setInterval(setDate, 60_000);
    }
  }

  // Public entry point: rebuild the pane, then (re)bind the wildcard-help
  // popup to the freshly rendered Library search input.
  function renderPane() {
    buildPane();
    attachSearchHelpPopups();
    SearchBarCompact.refresh();
  }

  // The All panel: a single Download button, merged stats + histogram, the
  // scoring (tier-label) rules editor, and a search-filtered view of the
  // merged entries. No Rescored/Original toggle — the merged view is the
  // synthesis of already-rescored sources; "Original" has no referent here.
  function renderMergedPane() {
    const { entries } = buildMergedWordlist();
    const stats = computeStats(_mergedStatsKey, entries);
    const hasData = entries.length > 0;
    const dlBtn = hasData ? `<button class="primary" onclick="LibraryView.action('download')">Download</button>` : '';

    pane.innerHTML = `
      ${buildStatsBarHTML(stats, { entries, ignoredCount: 0 }, getHistogramLayout(), { readOnly: true })}
      <div class="wld-pane-header">
        <div class="wld-pane-actions">${dlBtn}</div>
      </div>
      <div class="wld-pane-rescore" id="wld-scoring-section">${buildScoringSectionHTML()}</div>
      ${hasData ? buildSearchBarHTML() : ''}
      ${hasData ? buildEntriesPanelHTML() : ''}`;

    if (hasData) buildScrollerInPane(null);
  }

  function buildScrollerInPane(wordlist) {
    const host = pane.querySelector('#lib-entries-host');
    if (!host) return;
    _entriesScroller = new LibraryEntriesScroller(host, {
      wordlist,
      mode: _displayMode,
      query: _searchQuery,
      wholeWord: _searchWholeWord,
      sortKey: _sortKey,
      sortDir: _sortDir,
    });
  }

  function destroyScroller() {
    _entriesScroller?.destroy();
    _entriesScroller = null;
  }

  // In-place stats bar refresh for the mode toggle (whole-pane rebuild not needed).
  function refreshStatsBar() {
    if (!_focusedWordlist || _focusedWordlist === MERGED_ID) return;
    const wordlist = _focusedWordlist;
    const useOriginal = _displayMode === 'original';
    const sourceEntries = useOriginal ? wordlist.rawEntries : getRescoredEntries(wordlist);
    const ignoredCount = useOriginal ? 0 : wordlist.rawEntries.length - sourceEntries.length;
    const stats = computeStatsRaw(sourceEntries, ignoredCount);
    const statsBar = pane.querySelector('.stats-bar');
    if (statsBar) statsBar.outerHTML = buildStatsBarHTML(stats, { entries: sourceEntries, ignoredCount }, getHistogramLayout(), { readOnly: true });
  }

  function refresh() {
    if (el.hidden) return;
    if (_focusedWordlist && _focusedWordlist !== MERGED_ID && !state.sources.includes(_focusedWordlist)) {
      _focusedWordlist = MERGED_ID;
    }
    renderOnboarding();
    renderList();
    renderPane();
  }

  function focus(target) {
    _focusedWordlist = target;
    renderList();
    renderPane();
  }

  // ── Actions (called from inline onclick handlers in pane HTML) ───────────────

  const ACTIONS = {
    fetch:     () => fetchWordlist(_focusedWordlist),
    import:    () => importToWordlist(_focusedWordlist),
    delete:    async () => { await deleteWordlist(_focusedWordlist); },
    configure: () => ConfigureWordlistDialog.open(_focusedWordlist),
    clear:     () => clearEdits(),
    // Single Download: routes by focused wordlist + display mode. The
    // Rescored/Original toggle decides which version a source produces.
    download:  () => {
      if (_focusedWordlist === MERGED_ID) return downloadMergedWordlistFromPanel();
      if (_focusedWordlist?.type === 'edits') return downloadEdits();
      return _displayMode === 'original'
        ? downloadOriginalWordlist(_focusedWordlist)
        : downloadIndividualWordlistRescored(_focusedWordlist);
    },
  };

  function action(name) {
    const fn = ACTIONS[name];
    if (fn) fn();
  }

  // ── Search / sort / mode handlers (inline onclick/oninput → here) ────────────

  function setMode(mode) {
    if (mode !== 'rescored' && mode !== 'original') return;
    if (_displayMode === mode) return;
    _displayMode = mode;
    pane.querySelectorAll('.seg-ctrl .seg-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
    refreshStatsBar();
    _entriesScroller?.setMode(mode);
  }

  function onSearch(value) {
    _searchQuery = value || '';
    const clear = pane.querySelector('#lib-search-clear');
    if (clear) clear.hidden = !_searchQuery;
    _entriesScroller?.setQuery(_searchQuery, _searchWholeWord);
  }

  function clearSearch() {
    const input = pane.querySelector('#lib-search-input');
    if (input) input.value = '';
    onSearch('');
    input?.focus();
  }

  function onWholeWord(checked) {
    _searchWholeWord = !!checked;
    _entriesScroller?.setQuery(_searchQuery, _searchWholeWord);
  }

  function onSortAxis(key) {
    if (!LIBRARY_SORT_AXES[key] || _sortKey === key) return;
    _sortKey = key;
    _sortDir = defaultSortDir(key);
    refreshSortControls();
    _entriesScroller?.setSort(_sortKey, _sortDir);
  }

  function toggleSortDir() {
    _sortDir = _sortDir === 'asc' ? 'desc' : 'asc';
    refreshSortControls();
    _entriesScroller?.setSort(_sortKey, _sortDir);
  }

  function refreshSortControls() {
    const slot = pane.querySelector('.search-bar-sort');
    if (slot) slot.innerHTML = buildSortControlsHTML();
  }

  // Called from updateRescorePreview as the user types in the rules editor.
  // Applies uncommitted rules to the entries view so rule tuning is live.
  function previewRescoreRules(rules) {
    if (!_entriesScroller) return;
    if (_focusedWordlist === MERGED_ID) return;
    _entriesScroller.setRescorePreview(rules);
  }

  function startCardRename(wordlist) {
    if (!wordlist) return;
    const card = [...listBody.querySelectorAll('.wordlist-card[data-wordlist]')].find(c => c._wordlist === wordlist);
    const nameEl = card?.querySelector('.card-name');
    if (!nameEl || nameEl.querySelector('input')) return;
    const originalName = wordlist.name;
    nameEl.textContent = '';
    const input = document.createElement('input');
    input.className = 'card-name-edit';
    input.value = originalName;
    nameEl.appendChild(input);
    input.focus();
    input.select();
    input.onclick = e => e.stopPropagation();
    startInlineRename(input, originalName, {
      onCommit(newName) {
        setWordlistName(wordlist, newName);
        nameEl.textContent = newName;
      },
      onCancel() {
        nameEl.textContent = originalName;
      },
    });
  }

  // ── List event delegation ─────────────────────────────────────────────────────

  listBody.addEventListener('click', e => {
    if (e.target.closest('.wordlist-card[data-merged]')) {
      focus(MERGED_ID);
      return;
    }
    const toggleLabel = e.target.closest('label.toggle');
    if (toggleLabel) {
      const card = toggleLabel.closest('.wordlist-card[data-wordlist]');
      if (card?._wordlist && !card._wordlist.populated) {
        e.stopPropagation();
        triggerImportForWordlist(card._wordlist, e);
      }
      return;
    }
    const card = e.target.closest('.wordlist-card[data-wordlist]');
    if (!card?._wordlist) return;
    focus(card._wordlist);
  });

  listBody.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.target.closest('.wordlist-card[data-merged]')) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        focus(MERGED_ID);
      }
      return;
    }
    const card = e.target.closest('.wordlist-card[data-wordlist]');
    if (!card?._wordlist) return;
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      focus(card._wordlist);
    } else if (e.key === 'F2') {
      e.preventDefault();
      startCardRename(card._wordlist);
    }
  });

  listBody.addEventListener('change', e => {
    const toggle = e.target.closest('.toggle input[type="checkbox"]');
    if (!toggle) return;
    const card = toggle.closest('.wordlist-card[data-wordlist]');
    if (!card?._wordlist) return;
    toggleWordlist(card._wordlist, e);
  });

  // Drag-to-reorder (mouse)
  let _dragWordlist = null;
  listBody.addEventListener('dragstart', e => {
    const card = e.target.closest('.wordlist-card[data-wordlist]');
    if (!card?._wordlist) return;
    _dragWordlist = card._wordlist;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', '');
    e.dataTransfer.setDragImage(card, 0, 0);
    setTimeout(() => card.classList.add('dragging'), 0);
  });
  listBody.addEventListener('dragend', () => {
    listBody.querySelectorAll('.wordlist-card.dragging, .wordlist-card.drag-over')
      .forEach(c => c.classList.remove('dragging', 'drag-over'));
    _dragWordlist = null;
  });
  listBody.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const card = e.target.closest('.wordlist-card[data-wordlist]');
    if (!card || card._wordlist === _dragWordlist) return;
    listBody.querySelectorAll('.wordlist-card.drag-over').forEach(c => c.classList.remove('drag-over'));
    card.classList.add('drag-over');
  });
  listBody.addEventListener('dragleave', e => {
    const card = e.target.closest('.wordlist-card');
    if (card && !card.contains(e.relatedTarget)) card.classList.remove('drag-over');
  });
  listBody.addEventListener('drop', e => {
    e.preventDefault();
    const card = e.target.closest('.wordlist-card[data-wordlist]');
    const toWordlist = card?._wordlist;
    if (!_dragWordlist || !toWordlist || _dragWordlist === toWordlist) return;
    const fromIdx = state.sources.indexOf(_dragWordlist);
    const toIdx   = state.sources.indexOf(toWordlist);
    reorderSources(fromIdx, toIdx);
  });

  // ── + Add wordlist ────────────────────────────────────────────────────────────────

  addBtn.addEventListener('click', () => ConfigureWordlistDialog.openAdd());

  // ── Show / hide ───────────────────────────────────────────────────────────────

  function show(target = null) {
    _focusedWordlist = target ?? _focusedWordlist ?? MERGED_ID;
    el.hidden = false;
    renderOnboarding();
    renderList();
    renderPane();
  }

  function hide() {
    if (_dateTimer) { clearInterval(_dateTimer); _dateTimer = null; }
    destroyScroller();
    el.hidden = true;
  }

  function getFocusedWordlist() { return _focusedWordlist; }

  // In-place so a pending edit isn't wiped out mid-keystroke.
  function refreshRescoreSection() {
    const section = el.querySelector('#wld-rescore-section');
    if (section) section.innerHTML = buildRescoreSectionHTML(_focusedWordlist);
  }

  // Counterpart for the scoring (tier-label) editor on All.
  function refreshScoringSection() {
    const section = el.querySelector('#wld-scoring-section');
    if (section) section.innerHTML = buildScoringSectionHTML();
  }

  // Update the "X used" meta text on each wordlist card in place. Avoids rebuilding
  // the whole list (which would lose drag/hover state mid-interaction).
  function updateListMeta(contribMap) {
    for (const card of listBody.querySelectorAll('.wordlist-card[data-wordlist]')) {
      const wordlist = card._wordlist;
      if (!wordlist) continue;
      const metaEl = card.querySelector('.card-meta');
      if (metaEl) metaEl.textContent = wordlistCardMeta(wordlist, contribMap);
    }
    const mergedMetaEl = listBody.querySelector('.wld-merged-card .card-meta');
    if (mergedMetaEl) mergedMetaEl.textContent = pluralize(buildMergedWordlist().entries.length, 'entry', 'entries');
  }

  return {
    show, hide, refresh, focus, action, getFocusedWordlist,
    refreshRescoreSection, refreshScoringSection, updateListMeta,
    isVisible: () => !el.hidden,
    setMode, onSearch, clearSearch, onWholeWord, onSortAxis, toggleSortDir,
    previewRescoreRules,
  };
})();

// ─── Main view nav (Workshop / Library) ──────────────────────────────────────
// Switches the active top-level page. Treats Workshop and Library as peers —
// each owns its own show/hide lifecycle; this just routes the choice to them
// and updates the brand-bar nav state.

const MainView = (() => {
  // Adding a new top-level view: register it here and add a matching
  // `.header-nav-item[data-view="…"]` button. The Router picks up the route
  // automatically — see docs/design.md § URL state.
  const VIEWS = { workshop: WorkshopView, library: LibraryView };
  const DEFAULT_VIEW = 'workshop';
  const navButtons = document.querySelectorAll('.header-nav-item[data-view]');
  const navEl = document.querySelector('.header-nav');
  const navTrigger = navEl.querySelector('.header-nav-trigger');
  const navTriggerIcon = navTrigger.querySelector('.header-nav-trigger-icon use');
  const navTriggerLabel = navTrigger.querySelector('.header-nav-trigger-label');
  const scrollEl = document.querySelector('main');
  let _current = DEFAULT_VIEW;
  // Per-view scroll positions. Both views share the same <main> scroll
  // container (body has overflow:hidden, main has overflow-y:auto), so
  // toggling `hidden` would otherwise clamp scrollTop to whichever view is
  // shorter and lose the user's place when they tab back.
  const _scrollByView = Object.create(null);

  function activate(view, target = null) {
    if (!VIEWS[view]) view = DEFAULT_VIEW;
    const changed = view !== _current;
    if (changed) _scrollByView[_current] = scrollEl.scrollTop;
    _current = view;
    for (const [name, ctrl] of Object.entries(VIEWS)) {
      if (name === view) ctrl.show(target);
      else               ctrl.hide();
    }
    let activeBtn = null;
    for (const btn of navButtons) {
      const match = btn.dataset.view === view;
      btn.classList.toggle('active', match);
      if (match) { btn.setAttribute('aria-current', 'page'); activeBtn = btn; }
      else        btn.removeAttribute('aria-current');
    }
    if (activeBtn) {
      navTriggerIcon.setAttribute('href', activeBtn.querySelector('use').getAttribute('href'));
      navTriggerLabel.textContent = activeBtn.textContent.trim();
    }
    // Restore after show() so the new view's content has been laid out and
    // <main> is tall enough to accept the saved scrollTop. Skip on the
    // initial activate so a URL-driven jump (if any) isn't clobbered.
    if (changed) scrollEl.scrollTop = _scrollByView[view] ?? 0;
    Router.navigate();
  }

  // When the user clicks Library via the nav tab, prefer focusing whichever
  // card has the most severe bubble — that's almost certainly what they came
  // to look at. Higher severity wins; ties break by rail order (All first,
  // then sources in priority order). Returns null if nothing is bubbled.
  function pickBubbledWordlist() {
    let best = null;
    let bestPri = 0;
    const consider = (target, severity) => {
      const p = SEVERITY_PRIORITY[severity] ?? 0;
      if (p > bestPri) { best = target; bestPri = p; }
    };
    const allSev = allSeverity();
    if (allSev) consider(MERGED_ID, allSev);
    for (const wordlist of state.sources) {
      const sev = wordlistSeverity(wordlist);
      if (sev) consider(wordlist, sev);
    }
    return best;
  }

  function closeNav() {
    if (!navEl.classList.contains('open')) return;
    navEl.classList.remove('open');
    navTrigger.setAttribute('aria-expanded', 'false');
    document.removeEventListener('click', onOutsideNavClick);
  }
  function onOutsideNavClick(e) {
    if (!navEl.contains(e.target)) closeNav();
  }
  navTrigger.addEventListener('click', () => {
    if (navEl.classList.contains('open')) { closeNav(); return; }
    navEl.classList.add('open');
    navTrigger.setAttribute('aria-expanded', 'true');
    document.addEventListener('click', onOutsideNavClick);
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeNav(); });

  for (const btn of navButtons) {
    btn.addEventListener('click', () => {
      const view = btn.dataset.view;
      // Re-clicking the active nav scrolls back to the top — a common
      // affordance and an easy way to bail out of a long scroll.
      if (view === _current) scrollEl.scrollTo({ top: 0, behavior: 'smooth' });
      else                   activate(view, view === 'library' ? pickBubbledWordlist() : null);
      closeNav();
    });
  }

  // Toggle a per-view severity bubble on the nav button — the same dot the
  // Library uses on individual wordlist cards, bubbled up so the user sees
  // there's something to look at without opening the view. Callers decide
  // the severity by reducing the underlying causes (e.g. via maxSeverity).
  function syncTriggerBubble() {
    let bestSev = null, bestPri = 0, bestTitle = '';
    for (const btn of navButtons) {
      const b = btn.querySelector(':scope > .severity-bubble');
      if (!b) continue;
      const pri = SEVERITY_PRIORITY[b.dataset.severity] ?? 0;
      if (pri > bestPri) { bestPri = pri; bestSev = b.dataset.severity; bestTitle = b.title; }
    }
    let tb = navTrigger.querySelector(':scope > .severity-bubble');
    if (bestSev) {
      if (!tb) {
        tb = document.createElement('span');
        tb.className = 'severity-bubble';
        navTrigger.appendChild(tb);
      }
      tb.dataset.severity = bestSev;
      if (bestTitle) tb.title = bestTitle;
      else tb.removeAttribute('title');
    } else if (tb) {
      tb.remove();
    }
  }

  function setSeverityBubble(view, severity, title = '') {
    const btn = [...navButtons].find(b => b.dataset.view === view);
    if (!btn) return;
    let bubble = btn.querySelector(':scope > .severity-bubble');
    if (severity) {
      if (!bubble) {
        bubble = document.createElement('span');
        bubble.className = 'severity-bubble';
        btn.appendChild(bubble);
      }
      bubble.dataset.severity = severity;
      if (title) bubble.title = title;
      else bubble.removeAttribute('title');
    } else if (bubble) {
      bubble.remove();
    }
    syncTriggerBubble();
  }

  // The HTML body's initial state matches DEFAULT_VIEW (Workshop visible,
  // Library hidden). init() calls activate() with the URL-derived view after
  // Router.applyURL() so the JS is the source of truth from that point on.

  return {
    activate,
    getCurrent: () => _current,
    getDefault: () => DEFAULT_VIEW,
    hasView: name => Object.hasOwn(VIEWS, name),
    setSeverityBubble,
  };
})();

// ─── Init ─────────────────────────────────────────────────────────────────────

async function init() {
  const storedSchema = parseInt(lsLoad('schemaVersion'), 10);
  const hasOldData   = lsLoad('meta') !== null;
  if (hasOldData && storedSchema !== SCHEMA_VERSION) {
    const reset = await showConfirm(
      `Grawlix's data format has changed since your last visit. The site may not work correctly until reset.`,
      { confirmText: 'Reset', cancelText: 'I\'ll take my chances' }
    );
    if (reset) {
      await resetAllDataAndReload();
    }
  } else if (!hasOldData) {
    lsSave('schemaVersion', String(SCHEMA_VERSION));
  }

  await openDB();

  const raw = lsLoad('meta');
  if (raw) {
    try {
      const meta = JSON.parse(raw);
      state.sources = await Promise.all(meta.map(async m => {
        const dbKey = m.dbKey || newDbKey();
        const text = await idbGet('data_' + dbKey) ?? await idbGet('data_' + m.id);
        const wordlist = wrapWordlist({
          ...(m.type     ? { type: m.type }         : {}),
          dbKey,
          icon:            m.icon || null,
          publisherId:     m.publisherId || null,
          name: m.name, url: m.url || null,
          enabled: !!m.enabled,
          populated: !!(m.populated || m.type === 'edits' || text || m.lastUpdated),
          lastUpdated: m.lastUpdated || null,
          fetchedSize: m.fetchedSize || null,
          rescoreRules: (m.rescoreRules || []).map(r => ({ length: '', ...r })),
          dirty: !!m.dirty,
          originalFilename: m.originalFilename || null,
          ...(m.downloadCase ? { downloadCase: m.downloadCase } : {}),
          ...(m.downloadExt  ? { downloadExt:  m.downloadExt  } : {}),
          ...(m.downloadStem ? { downloadStem: m.downloadStem } : {}),
          rawEntries: text ? parseWordlist(text) : [],
          _loading: false,
        });
        recomputeUncovered(wordlist);
        return wordlist;
      }));
    } catch { state.sources = defaultSources(); }
  } else {
    state.sources = defaultSources();
    persistMeta();
  }

  // Score filter persists across visits — see docs/design.md § Out of scope
  // for the URL. Validate the stored value; drop silently if corrupt.
  const storedScoreRange = lsLoad('scoreRange');
  if (storedScoreRange !== null && parseRange(storedScoreRange.trim()) !== null) {
    WorkshopView.restoreScoreRange(storedScoreRange.trim());
  }

  const initialView = Router.applyURL();

  ensureScoring();
  ensureEdits();
  propagateDefaults();
  MainView.activate(initialView);
  renderAll();
  await _firstPaint;
  const _overlay = document.getElementById('busy-overlay');
  if (_overlay) {
    _overlay.classList.add('done');
    _overlay.addEventListener('transitionend', () => _overlay.remove(), { once: true });
  }
  bindEvents();
  checkForUpdates();
  setInterval(checkForUpdates, UPDATE_CHECK_INTERVAL);

  state.sources
    .filter(l => l.url && !l.populated)
    .forEach(l => fetchWordlist(l, null, { silent: true }));
}

function defaultSources() {
  return WORDLIST_PUBLISHERS.map(t => {
    const wordlist = wrapWordlist({
      dbKey: newDbKey(),
      icon: t.icon ? { ...t.icon } : null,
      publisherId: t.id,
      name: t.name,
      url: t.url || null,
      enabled: false,
      populated: false,
      rawEntries: [],
      lastUpdated: null,
      _loading: false,
      rescoreRules: t.defaultRules ? JSON.parse(JSON.stringify(t.defaultRules)) : [],
    });
    recomputeUncovered(wordlist);
    return wordlist;
  });
}

// ─── My Edits helpers ─────────────────────────────────────────────────────────

function getEditsWordlist() {
  return state.sources.find(l => l.type === 'edits');
}

function ensureEdits() {
  const edits = getEditsWordlist();
  if (edits) {
    if (!edits.icon) edits.icon = EDITS_ICON;
  } else {
    const newEdits = wrapWordlist({
      type: 'edits',
      dbKey: newDbKey(),
      icon: EDITS_ICON,
      name: 'My Edits',
      url: null,
      enabled: true,
      populated: true,
      rawEntries: [],
      lastUpdated: null,
      _loading: false,
      rescoreRules: getMyEditsDefaultRules(),
    });
    recomputeUncovered(newEdits);
    state.sources.unshift(newEdits);
    sources$.bump();
    persistMeta();
  }
}

// Load tier labels from storage, or seed defaults on first boot.
function ensureScoring() {
  const raw = lsLoad('scoring');
  if (raw) {
    try {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed)) {
        state.scoring = parsed;
        state.scoringDirty = lsLoad('scoringDirty') === '1';
        return;
      }
    } catch {}
  }
  state.scoring = DEFAULT_SCORING.map(r => ({ ...r }));
  state.scoringDirty = false;
  persistScoring();
}

function entriesToText(entries) {
  return entries.map(e => e.comment ? `${e.entry};${e.score};${e.comment}` : `${e.entry};${e.score}`).join('\n') + (entries.length ? '\n' : '');
}

async function persistEdits(edits) {
  await persistData(edits.dbKey, entriesToText(edits.rawEntries));
  persistMeta();
}

async function downloadEdits() {
  const edits = getEditsWordlist();
  await downloadWithDialog(edits.name, edits, edits.rawEntries);
}

async function clearEdits() {
  const edits = getEditsWordlist();
  if (!edits.rawEntries.length) return;
  if (!await showConfirm(`Clear all ${pluralize(edits.rawEntries.length, 'entry', 'entries')} from "${esc(edits.name)}"?`, { confirmText: 'Clear' })) return;
  batchUpdate(() => {
    edits.rawEntries = [];
    invalidateActualScoresCache(edits);
    invalidateWordlistCaches(edits);
    recomputeUncovered(edits);
    repaintAfterCacheChange();
  });
  await persistEdits(edits);
}

// ─── Stats ────────────────────────────────────────────────────────────────────

const _statsCache = new WeakMap();
const _mergedStatsKey = {};
let _sourceCountsCache = null;
let _mergedWordlistCache = null;

function invalidateRescoredCache(wordlist) { wordlist._rescored = null; wordlist._rescoredMap = null; invalidateHistogramLayout(); }
function invalidateStatsCache(key) { _statsCache.delete(key); }
function invalidateSourceCounts() {
  _sourceCountsCache = null;
  _mergedWordlistCache = null;
  invalidateHistogramLayout();
  for (const l of state.sources) l._overrideMap = null;
}
function invalidateWordlistCaches(wordlist) {
  invalidateRescoredCache(wordlist);
  invalidateStatsCache(wordlist);
  invalidateSourceCounts();
  invalidateStatsCache(_mergedStatsKey);
}

function computeStatsRaw(entries, ignoredCount = 0) {
  // Empty state: return an all-zero shape so buildStatsBarHTML can render the
  // bar with dashes and an empty histogram.
  if (!entries.length) {
    return { count: 0, min: 0, max: 0, mean: 0, median: 0, mode: 0, distinctScores: [], ignoredCount };
  }
  let min = Infinity, max = -Infinity;
  const freq = {};
  const scores = [];
  for (const { score } of entries) {
    if (score < min) min = score;
    if (score > max) max = score;
    scores.push(score);
    freq[score] = (freq[score] || 0) + 1;
  }
  scores.sort((a, b) => a - b);
  const mid = Math.floor(scores.length / 2);
  const median = scores.length % 2 === 0 ? (scores[mid - 1] + scores[mid]) / 2 : scores[mid];
  let mode = null, modeCount = 0;
  for (const [s, c] of Object.entries(freq)) {
    if (c > modeCount) { modeCount = c; mode = +s; }
  }
  const mean = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
  const distinctScores = Object.keys(freq).map(Number).sort((a, b) => a - b);
  return { count: entries.length, min, max, mean, median, mode, distinctScores, ignoredCount };
}

function computeStats(key, entries, ignoredCount = 0) {
  if (_statsCache.has(key)) return _statsCache.get(key);
  const result = computeStatsRaw(entries, ignoredCount);
  _statsCache.set(key, result);
  return result;
}

function statsForWordlist(wordlist) {
  const isEdits = wordlist.type === 'edits';
  const entries = isEdits ? wordlist.rawEntries : getRescoredEntries(wordlist);
  const ignoredCount = isEdits ? 0 : wordlist.rawEntries.length - entries.length;
  return { stats: computeStats(wordlist, entries, ignoredCount), entries };
}

// ─── Histogram layout ─────────────────────────────────────────────────────────

const HIST_DISCRETE_THRESHOLD = 12;
const HIST_BINNED_BUCKETS = 11;

let _layoutCache = null;
function invalidateHistogramLayout() { _layoutCache = null; }

function getHistogramLayout() {
  if (_layoutCache) return _layoutCache;
  const distinct = new Set();
  let min = Infinity, max = -Infinity;
  for (const wl of state.sources) {
    for (const { score } of getRescoredEntries(wl)) {
      distinct.add(score);
      if (score < min) min = score;
      if (score > max) max = score;
    }
  }
  if (!distinct.size) {
    // No data → empty layout. Don't cache: as soon as data arrives, the next
    // call should recompute. (Caching here would also burn the cache if
    // anything calls into the layout before sources finish loading.)
    return { mode: 'empty', slots: [], min: null, max: null };
  }
  const distinctScores = [...distinct].sort((a, b) => a - b);
  if (distinctScores.length <= HIST_DISCRETE_THRESHOLD) {
    _layoutCache = {
      mode: 'discrete',
      slots: distinctScores.map(s => ({ score: s, lo: s, hi: s, label: String(s) })),
      min, max,
    };
    return _layoutCache;
  }
  const N = HIST_BINNED_BUCKETS;
  const bucketSize = Math.max(1, Math.ceil((max - min + 1) / N));
  const slots = [];
  for (let i = 0; i < N; i++) {
    const lo = min + i * bucketSize;
    if (lo > max) break;
    const hi = Math.min(max, lo + bucketSize - 1);
    slots.push({ lo, hi, label: lo === hi ? String(lo) : `${lo}–${hi}` });
  }
  _layoutCache = { mode: 'binned', slots, min, max };
  return _layoutCache;
}

function bucketCounts(entries, layout) {
  const counts = layout.slots.map(() => 0);
  if (layout.mode === 'discrete') {
    const idxByScore = new Map(layout.slots.map((s, i) => [s.score, i]));
    for (const { score } of entries) {
      const idx = idxByScore.get(score);
      if (idx !== undefined) counts[idx]++;
    }
  } else if (layout.slots.length) {
    const min0 = layout.slots[0].lo;
    const bs = layout.slots[0].hi - layout.slots[0].lo + 1;
    const last = layout.slots.length - 1;
    for (const { score } of entries) {
      const idx = Math.min(last, Math.max(0, Math.floor((score - min0) / bs)));
      counts[idx]++;
    }
  }
  return counts;
}

function slotIntersectsRange(lo, hi, intervals) {
  for (const { min, max } of intervals) {
    const m = max === null ? Infinity : max;
    const n = min === null ? -Infinity : min;
    if (lo <= m && hi >= n) return true;
  }
  return false;
}

// ─── Score colors ─────────────────────────────────────────────────────────────

// t positions are hand-picked so that on the canonical 0–60 scale, scores
// 30/40/50/60 land directly on stops (orange/yellow/green/blue).
const SCORE_COLOR_STOPS = [
  { t: 0,   bg: '--score-0-bg', fg: '--score-0-fg' },
  { t: 1/6, bg: '--score-0-bg', fg: '--score-0-fg' },
  { t: 1/3, bg: '--score-1-bg', fg: '--score-1-fg' },
  { t: 1/2, bg: '--score-2-bg', fg: '--score-2-fg' },
