// t positions are hand-picked so that on the canonical 0–60 scale, scores
// 30/40/50/60 land directly on stops (orange/yellow/green/blue).
const SCORE_COLOR_STOPS = [
  { t: 0,   bg: '--score-0-bg', fg: '--score-0-fg' },
  { t: 1/6, bg: '--score-0-bg', fg: '--score-0-fg' },
  { t: 1/3, bg: '--score-1-bg', fg: '--score-1-fg' },
  { t: 1/2, bg: '--score-2-bg', fg: '--score-2-fg' },
  { t: 2/3, bg: '--score-3-bg', fg: '--score-3-fg' },
  { t: 5/6, bg: '--score-4-bg', fg: '--score-4-fg' },
  { t: 1,   bg: '--score-5-bg', fg: '--score-5-fg' },
];

// Out-of-range scores clamp to the nearest endpoint. With no data loaded,
// falls back to the middle stop (a gradient is meaningless without a range).
function scoreColor(score) {
  const { min, max } = getHistogramLayout();
  if (min == null || max == null || max <= min) {
    const s = SCORE_COLOR_STOPS[Math.floor(SCORE_COLOR_STOPS.length / 2)];
    return { bg: `var(${s.bg})`, fg: `var(${s.fg})` };
  }
  const t = Math.max(0, Math.min(1, (score - min) / (max - min)));
  let i = 0;
  while (i < SCORE_COLOR_STOPS.length - 1 && SCORE_COLOR_STOPS[i + 1].t < t) i++;
  const lo = SCORE_COLOR_STOPS[i];
  const hi = SCORE_COLOR_STOPS[i + 1];
  const localT = (t - lo.t) / (hi.t - lo.t);
  const pct = (localT * 100).toFixed(1);
  return {
    bg: `color-mix(in lch, var(${lo.bg}), var(${hi.bg}) ${pct}%)`,
    fg: `color-mix(in lch, var(${lo.fg}), var(${hi.fg}) ${pct}%)`,
  };
}

// Sort axes per output kind. Each axis declares its primary projection and a
// fixed-direction tiebreaker chain — when the primary ties, fall to whichever
// direction surfaces the most interesting entries first (longer > shorter,
// higher score > lower), with alphabetical asc as the final stable
// tiebreaker. Flipping the user-level sort direction (asc/desc) reverses only
// the primary axis; tiebreakers keep their declared direction, so "score
// asc" still shows the longest among the lowest-scoring entries first
// instead of letting short junk float to the top of the tied bucket.
const SORT_AXES_BY_KIND = {
  words: {
    entry: {
      label: 'Entry',
      primary: e => e.entry,
      // Defensive — the merged view dedupes by entryLower so ties shouldn't
      // happen here, but length desc + score desc keeps "more interesting"
      // duplicates first if a pre-merge scope ever lands.
      tiebreakers: [
        { project: e => e.entry.length, dir: 'desc' },
        { project: e => e.score,        dir: 'desc' },
      ],
    },
    length: {
      label: 'Length',
      primary: e => e.entry.length,
      tiebreakers: [
        { project: e => e.score, dir: 'desc' },
        { project: e => e.entry, dir: 'asc'  },
      ],
    },
    score: {
      label: 'Score',
      primary: e => e.score,
      tiebreakers: [
        { project: e => e.entry.length, dir: 'desc' },
        { project: e => e.entry,        dir: 'asc'  },
      ],
    },
  },
  pairs: {
    'min-score': {
      label: 'Min score',
      primary: p => Math.min(p.a.score, p.b.score),
      tiebreakers: [
        { project: p => p.a.entry.length, dir: 'desc' },
        { project: p => p.a.entry,        dir: 'asc'  },
      ],
    },
    'max-score': {
      label: 'Max score',
      primary: p => Math.max(p.a.score, p.b.score),
      tiebreakers: [
        { project: p => p.a.entry.length, dir: 'desc' },
        { project: p => p.a.entry,        dir: 'asc'  },
      ],
    },
    length: {
      label: 'Length',
      primary: p => p.a.entry.length,
      tiebreakers: [
        { project: p => Math.min(p.a.score, p.b.score), dir: 'desc' },
        { project: p => p.a.entry,                       dir: 'asc'  },
      ],
    },
    entry: {
      label: 'Alphabetical',
      primary: p => p.a.entry,
      // Semordnilap has a 1:1 a→b mapping so no real ties; pair tools where
      // the same `a` maps to multiple `b`s (anagram_with, replace_anything)
      // benefit from b.entry asc keeping the output deterministic.
      tiebreakers: [
        { project: p => p.b.entry, dir: 'asc' },
      ],
    },
  },
};
const DEFAULT_SORT_KEY_BY_KIND = { words: 'entry', pairs: 'min-score' };
const DEFAULT_SORT_KEY = DEFAULT_SORT_KEY_BY_KIND.words;
function sortAxesFor(kind) { return SORT_AXES_BY_KIND[kind] || SORT_AXES_BY_KIND.words; }
function isValidSortAxis(key) { return key in SORT_AXES_BY_KIND.words || key in SORT_AXES_BY_KIND.pairs; }
// Score axes sort descending — top-down reads as "best first". Others ascending.
function defaultSortDir(key) {
  return (key === 'score' || key === 'min-score' || key === 'max-score') ? 'desc' : 'asc';
}

// Compare two items along an axis, falling through tiebreakers when the
// primary projection is equal. Primary direction is the user's pick;
// tiebreakers keep their declared direction regardless.
function compareItems(a, b, axis, primaryDir) {
  const primCmp = compareValues(axis.primary(a), axis.primary(b)) * (primaryDir === 'asc' ? 1 : -1);
  if (primCmp !== 0) return primCmp;
  for (const tb of axis.tiebreakers) {
    const cmp = compareValues(tb.project(a), tb.project(b)) * (tb.dir === 'asc' ? 1 : -1);
    if (cmp !== 0) return cmp;
  }
  return 0;
}

function compareValues(a, b) {
  if (typeof a === 'number' && typeof b === 'number') return a - b;
  return String(a).localeCompare(String(b));
}

// Output kind that the current stack produces — used by the Router to pick
// the right default sort axis (so URLs stay quiet when sort matches the
// per-kind default). The last tool with a `run` decides the kind; no-run rows
// are transparent, mirroring the executor's semantics.
function currentOutputKind(stack) {
  for (let i = stack.length - 1; i >= 0; i--) {
    const tool = TOOLS[stack[i].tool];
    if (tool?.run) return tool.output;
  }
  return 'words';
}
const ENTRY_SLOT_CAP = 20;

// Cached glyph width — row font/size is fixed. Slots use px (not `ch`) so the
// header's sans font and the row's mono font see the same track widths.
let _monoChPx = null;
function measureMonoChPx() {
  if (_monoChPx !== null) return _monoChPx;
  const probe = document.createElement('span');
  probe.style.cssText = 'position:absolute;visibility:hidden;font-family:var(--font-mono);font-size:13px;white-space:pre;';
  probe.textContent = '0'.repeat(100);
  document.body.appendChild(probe);
  _monoChPx = probe.getBoundingClientRect().width / 100;
  probe.remove();
  return _monoChPx;
}

// Capture-mode scroll listener catches events from any ancestor — the app's
// scroll container is <main>, not the window, and scroll events don't bubble.
class BaseVirtualScroller {
  constructor(host, sizerClassName) {
    this.host = host;
    this.sizer = document.createElement('div');
    this.sizer.className = sizerClassName;
    host.innerHTML = '';
    host.appendChild(this.sizer);

    this._onWinScroll = () => this._onScroll();
    this._onWinResize = () => this._render();
    window.addEventListener('scroll', this._onWinScroll, { capture: true, passive: true });
    window.addEventListener('resize', this._onWinResize);
    this._resizeObserver = new ResizeObserver(() => this._render());
    this._resizeObserver.observe(host);
  }

  // Subclasses can override to react to scroll (e.g., close any open popover).
  _onScroll() { this._render(); }

  // Visible item-index range [start, end) for a list of `itemCount` rows. Same
  // viewport-relative math whether the scroll container is <main> or document.
  _visibleRange(itemCount) {
    const rect = this.host.getBoundingClientRect();
    const viewH = window.innerHeight;
    const visTop = Math.max(0, -rect.top);
    const visBottom = Math.max(0, Math.min(rect.height, viewH - rect.top));
    const start = Math.max(0, Math.floor(visTop / ROW_HEIGHT) - VS_BUFFER);
    const end   = Math.min(itemCount, Math.ceil(visBottom / ROW_HEIGHT) + VS_BUFFER);
    return { start, end };
  }

  _clearSizer() {
    while (this.sizer.firstChild) this.sizer.removeChild(this.sizer.firstChild);
  }

  destroy() {
    window.removeEventListener('scroll', this._onWinScroll, { capture: true });
    window.removeEventListener('resize', this._onWinResize);
    this._resizeObserver.disconnect();
  }

  _render() { throw new Error('subclass must implement _render'); }
}

class WorkshopEntriesScroller extends BaseVirtualScroller {
  constructor(host) {
    super(host, 'entries-table-rows');
    this.toolbar = document.getElementById('search-bar-sort');
    // `allEntries` / `entries` hold either wlEntry[] (when `kind === 'words'`)
    // or `{a, b}[]` (when `kind === 'pairs'`). The names persist for v1; if a
    // third kind lands they'll be worth renaming to `allItems` / `items`.
    this.kind = 'words';
    this.allEntries = [];
    this.entries = [];
    this.sortKey = WorkshopView.sortKey;
    this.sortDir = WorkshopView.sortDir;
    this._lastQuery = '';
    this._wholeWord = false;
    this._scoreIntervals = null;
    this._searchRanges = null;
    this.showSource = false;
    this.showDeleteCol = false;
    this.showEditDeleteCol = false;
    this.editsWordlist = null;
    this.currentWordlist = null;
    this._onCellEdit = null;
    this._onDeleteRow = null;
    this.onFilterChange = null;
    // Sorted view of allEntries cached across keystrokes. Filter preserves
    // order, so a sorted source means the filter result is already sorted —
    // no per-keystroke re-sort needed. Invalidated when allEntries change.
    this._sortedSource = null;
    this._sortedSourceKey = null;
    this._sortedSourceDir = null;

    this.sizer.addEventListener('click', e => {
      const target = e.target.closest('.atom-entry, .atom-score, .atom-comment');
      if (!target) return;
      const row = target.closest('.entry-row');
      if (!row) return;
      const i = parseInt(row.dataset.idx, 10);
      const item = this.entries[i];
      if (!item) return;
      let wlEntry;
      if (this.kind === 'pairs') {
        const side = target.dataset.side || target.closest('[data-side]')?.dataset.side;
        wlEntry = side === 'b' ? item.b : item.a;
      } else {
        wlEntry = item;
      }
      const field = target.classList.contains('atom-score') ? 'score'
                  : target.classList.contains('atom-comment') ? 'comment'
                  : null;
      AtomPopover.open(wlEntry, row, this, target, field);
    });

    this._buildToolbar();
  }

  // Scroll closes the click-driven AtomPopover so it doesn't anchor to a row
  // that's scrolling out from under it — but only when the popover isn't the
  // focus owner. On iOS, focusing the popover's input scroll-into-views it
  // above the soft keyboard, which fires this handler; closing then would
  // tear down the popover one frame after open.
  _onScroll() {
    this._render();
    if (AtomPopover.containsFocus()) return;
    AtomPopover.close();
  }

  // kind defaults to the current value so callers that only update the items
  // (e.g. display-case re-render) don't need to know what's loaded. When kind
  // does change, snapKindSort makes sure the current sort axis is valid for
  // the new kind — if not, it falls back to the kind default (asymmetric
  // axes like 'score' belong to words, 'min-score' to pairs).
  setEntries(allEntries, query, wholeWord = false, scoreRange = '', kind = this.kind) {
    AtomPopover.close();
    this._setKind(kind);
    this.allEntries = allEntries;
    this._invalidateSortCache();
    this._buildToolbar();
    this.filter(query, wholeWord, scoreRange);
  }

  updateEntries(allEntries, kind = this.kind) {
    AtomPopover.close();
    const kindChanged = this._setKind(kind);
    this.allEntries = allEntries;
    this._invalidateSortCache();
    if (kindChanged) this._buildToolbar();
    this._applyFilterAndSort();
  }

  _setKind(kind) {
    const oldKind = this.kind;
    const changed = kind !== oldKind;
    this.kind = kind;
    const axes = sortAxesFor(kind);
    // Snap to the new kind's default in two cases: (1) the current axis isn't
    // valid for the new kind ('score' on pairs, 'min-score' on words), or (2)
    // kind changed and the current axis was the *old* kind's default — i.e.
    // the user hadn't explicitly picked it, so the new kind's default is the
    // right thing to use. An explicit pick (e.g. user chose 'length' on
    // words, or 'max-score' on pairs) survives the kind flip as long as it's
    // still a valid axis for the new kind.
    const wasOldDefault = changed && this.sortKey === DEFAULT_SORT_KEY_BY_KIND[oldKind];
    if (!(this.sortKey in axes) || wasOldDefault) {
      this.sortKey = DEFAULT_SORT_KEY_BY_KIND[kind];
      this.sortDir = defaultSortDir(this.sortKey);
      WorkshopView.setSort(this.sortKey, this.sortDir);
    }
    return changed;
  }

  _invalidateSortCache() {
    this._sortedSource = null;
  }

  filter(query, wholeWord = false, scoreRange = '') {
    AtomPopover.close();
    this._lastQuery = query || '';
    this._wholeWord = wholeWord;
    this._scoreIntervals = scoreRange ? parseRange(scoreRange) : null;
    this._applyFilterAndSort();
  }

  _buildToolbar() {
    if (!this.toolbar) return;
    const arrow = this.sortDir === 'asc' ? '↑' : '↓';
    const options = Object.entries(sortAxesFor(this.kind))
      .map(([key, { label }]) => `<option value="${key}"${key === this.sortKey ? ' selected' : ''}>${label}</option>`)
      .join('');
    this.toolbar.innerHTML = `
      Sort by
      <select class="sort-axis-select">${options}</select>
      <button class="sort-dir-btn" type="button" title="Toggle direction" aria-label="Toggle direction">${arrow}</button>`;
    this.toolbar.querySelector('.sort-axis-select').addEventListener('change', e => {
      const key = e.target.value;
      if (this.sortKey !== key) {
        this.sortKey = key;
        this.sortDir = defaultSortDir(key);
        WorkshopView.setSort(this.sortKey, this.sortDir);
        this._buildToolbar();
        this._applyFilterAndSort();
        Router.navigate();
      }
    });
    this.toolbar.querySelector('.sort-dir-btn').addEventListener('click', () => {
      this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
      WorkshopView.setSort(this.sortKey, this.sortDir);
      this._buildToolbar();
      this._applyFilterAndSort();
      Router.navigate();
    });
  }

  _applyFilterAndSort() {
    const source = this._getSortedSource();

    const q = this._lastQuery.toLowerCase();
    let entries;
    if (!q) {
      this._searchRanges = null;
      entries = source;
    } else {
      const { filterRe, searchRanges } = buildSearchPattern(q, this._wholeWord);
      this._searchRanges = searchRanges;
      // Pair filter: a row qualifies if either side matches. Highlights apply
      // to whichever side(s) contain matches — `searchRanges` returns an empty
      // list when nothing matches, so a row where only one side hit lights up
      // just that side.
      entries = this.kind === 'pairs'
        ? source.filter(p => filterRe.test(p.a.entryLower) || filterRe.test(p.b.entryLower))
        : source.filter(e => filterRe.test(e.entryLower));
    }

    this._entriesPreScoreRange = entries;

    if (this._scoreIntervals) {
      const intervals = this._scoreIntervals;
      // For pairs, filter on min(score) — a row qualifies if its worse-scoring
      // atom falls in range. Matches plan-doc § "Score range filters the
      // displayed output, not the pipeline".
      entries = this.kind === 'pairs'
        ? entries.filter(p => matchesRange(Math.min(p.a.score, p.b.score), intervals))
        : entries.filter(e => matchesRange(e.score, intervals));
    }

    this.entries = entries;
    this._computeSlotWidths();
    this._render();
    this.onFilterChange?.();
  }

  // Returns allEntries sorted by current sortKey/sortDir, cached across
  // keystrokes. `.filter()` preserves order, so callers can filter the
  // result and skip a per-keystroke re-sort.
  _getSortedSource() {
    if (this._sortedSource
        && this._sortedSourceKey === this.sortKey
        && this._sortedSourceDir === this.sortDir) {
      return this._sortedSource;
    }

    let sorted;
    if (!this.sortKey) {
      sorted = this.allEntries;
    } else {
      const axis = sortAxesFor(this.kind)[this.sortKey];
      const dir = this.sortDir;
      sorted = [...this.allEntries].sort((a, b) => compareItems(a, b, axis, dir));
    }

    this._sortedSource = sorted;
    this._sortedSourceKey = this.sortKey;
    this._sortedSourceDir = this.sortDir;
    return sorted;
  }

  // Slot widths derived from the longest values across the full result set, then
  // fixed during scroll. Capping the entry slot at ENTRY_SLOT_CAP keeps one outlier
  // from blowing out layout for every other row; longer entries truncate with an
  // ellipsis (full text in the row's title attribute). Min widths floor each
  // track to its column-header label so the sticky headers fit ("Entry", "Len",
  // "Score"). Widths are emitted in pixels (measured against the row's mono
  // 13px font) instead of `ch` so they resolve identically in the header's
  // sans font and the row's mono font — different fonts have different `ch`
  // sizes, which would make column tracks misalign. Vars are written to
  // #detail-panel so both .entry-row and the .entry-headers (which lives in
  // .sticky-stack, a sibling of the scroller's host) inherit the same values.
  _computeSlotWidths() {
    // Count and entry slot widths track the unfiltered wordlist so columns
    // don't shift sideways when a search or score filter cuts the visible
    // set down. Len/score slots stay tied to the filtered view since their
    // widths are tiny and effectively constant in practice. Pair rows
    // measure both sides' lengths and scores against the same tracks — they
    // appear twice per row but share width vars so the eye reads down them.
    const total = this.allEntries.length;
    const countDigits = total > 0 ? String(total).length : 1;
    let maxLen = 0, maxLenDigits = 1, maxScoreDigits = 1;
    for (const item of this.allEntries) {
      if (this.kind === 'pairs') {
        if (item.a.entry.length > maxLen) maxLen = item.a.entry.length;
        if (item.b.entry.length > maxLen) maxLen = item.b.entry.length;
      } else if (item.entry.length > maxLen) {
        maxLen = item.entry.length;
      }
    }
    for (const item of this.entries) {
      const sides = this.kind === 'pairs' ? [item.a, item.b] : [item];
      for (const side of sides) {
        const d = String(side.entry.length).length;
        if (d > maxLenDigits) maxLenDigits = d;
        const sd = String(side.score).length;
        if (sd > maxScoreDigits) maxScoreDigits = sd;
      }
    }
    const entryChars = Math.max(Math.min(maxLen, ENTRY_SLOT_CAP), 4);
    const lenChars = Math.max(maxLenDigits, 3);
    const scoreChars = Math.max(maxScoreDigits, 5);
    const ch = measureMonoChPx();
    const target = this.host.closest('#detail-panel') || this.sizer;
    target.style.setProperty('--count-w', `${(countDigits + 1) * ch}px`);
    target.style.setProperty('--len-w', `${lenChars * ch}px`);
    target.style.setProperty('--entry-w', `${entryChars * ch}px`);
    // +12px covers the score badge's 5px-each-side padding plus a bit of safety.
    target.style.setProperty('--score-w', `${scoreChars * ch + 12}px`);
    target.style.setProperty('--source-max', `${22 * ch}px`);
  }

  // Post-filter entries drive the stats bar. For pairs, flatten to atoms so
  // count goes per-word and min/max/mean/median/mode read over participating
  // words. The count label is overridden to "N pairs" in the bar HTML —
  // these flattened atoms feed the histogram and aggregates, not the count.
  _filteredStatsViewEntries() {
    return this.kind === 'pairs' ? flattenPairs(this.entries) : this.entries;
  }

  _histogramViewEntries() {
    const base = this._entriesPreScoreRange || this.entries;
    return this.kind === 'pairs' ? flattenPairs(base) : base;
  }

  _render() {
    const n = this.entries.length;
    this.sizer.style.height = (n * ROW_HEIGHT) + 'px';

    const { start, end } = this._visibleRange(n);
    this._clearSizer();

    const tierFor = makeTierLookup();
    const activeEntry = AtomPopover.activeEntry(this);
    let nextActiveRow = null;
    const frag = document.createDocumentFragment();
    for (let i = start; i < end; i++) {
      const item = this.entries[i];
      const row = this.kind === 'pairs'
        ? this._renderPairRow(item, i, tierFor, activeEntry)
        : this._renderWordRow(item, i, tierFor, activeEntry);
      if (row.classList.contains('active')) nextActiveRow = row;
      frag.appendChild(row);
    }
    this.sizer.appendChild(frag);
    if (nextActiveRow) AtomPopover.rebindRow(nextActiveRow);
  }

  _renderWordRow(wlEntry, i, tierFor, activeEntry) {
    const { entry, score } = wlEntry;
    const displayed = displayEntry(entry);
    const entryHtml = renderHighlightedText(displayed, this._searchRanges?.(displayed) || []);

    const scoreInner = buildScoreBadgeHTML(score);
    const tierLabel = tierFor(score);
    const scoreTitle = tierLabel ? ` title="${esc(tierLabel)}"` : '';

    const commentText = wlEntry.comment || '';
    const sourceWl = wlEntry.wordlist;
    const sourceHTML = sourceWl ? buildWordlistNameHTML(sourceWl, { bold: false }) : '';
    const sourceTitle = sourceWl ? ` title="${esc(sourceWl.name)}"` : '';

    const row = document.createElement('div');
    let cls = 'entry-row';
    if (activeEntry && entry === activeEntry) cls += ' active';
    row.className = cls;
    row.dataset.entry = entry;
    row.dataset.idx = i;
    row.style.top = (i * ROW_HEIGHT) + 'px';
    if (displayed.length > ENTRY_SLOT_CAP) row.title = displayed;
    row.innerHTML =
      `<span class="atom-count">${i + 1}.</span>` +
      `<span class="atom-entry">${entryHtml}</span>` +
      `<span class="atom-len">${entry.length}</span>` +
      `<span class="atom-score"${scoreTitle}>${scoreInner}</span>` +
      `<span class="atom-comment"${commentText ? ` title="${esc(commentText)}"` : ''}>${esc(commentText)}</span>` +
      `<span class="atom-source"${sourceTitle}>${sourceHTML}</span>`;
    return row;
  }

  _renderPairRow(pair, i, tierFor, activeEntry) {
    const relation = this._currentRelation();
    const row = document.createElement('div');
    let cls = 'entry-row pair-row';
    // Active row when either side is the popover's anchor.
    if (activeEntry && (pair.a.entry === activeEntry || pair.b.entry === activeEntry)) cls += ' active';
    row.className = cls;
    row.dataset.idx = i;
    row.style.top = (i * ROW_HEIGHT) + 'px';
    row.innerHTML =
      `<span class="atom-count">${i + 1}.</span>` +
      this._renderPairSideHTML(pair.a, 'a', tierFor, pair.highlights?.a) +
      `<span class="atom-relation" aria-hidden="true">${relation}</span>` +
      this._renderPairSideHTML(pair.b, 'b', tierFor, pair.highlights?.b);
    return row;
  }

  _renderPairSideHTML(wlEntry, side, tierFor, toolHighlights) {
    const { entry, score } = wlEntry;
    const displayed = displayEntry(entry);
    // Tool highlights first in the merged list so they win order ties on
    // shared starts; renderHighlightedText skips later overlapping ranges,
    // so when a search hit happens to start at the same position as a tool
    // highlight, the tool's annotation (more informative — explains why the
    // pair exists) is the one that renders.
    const ranges = [...(toolHighlights || []), ...(this._searchRanges?.(displayed) || [])];
    const entryHtml = renderHighlightedText(displayed, ranges);
    const scoreInner = buildScoreBadgeHTML(score);
    const tierLabel = tierFor(score);
    const scoreTitle = tierLabel ? ` title="${esc(tierLabel)}"` : '';
    const truncTitle = displayed.length > ENTRY_SLOT_CAP ? ` title="${esc(displayed)}"` : '';
    return `<span class="atom-len" data-side="${side}">${entry.length}</span>` +
           `<span class="atom-entry" data-side="${side}"${truncTitle}>${entryHtml}</span>` +
           `<span class="atom-score" data-side="${side}"${scoreTitle}>${scoreInner}</span>`;
  }

  // Relation glyph for the active stack's last pair-producing tool. Falls
  // back to a thin dot for unknown relations — the producing tool always sets
  // one, this is just defensive.
  _currentRelation() {
    const stack = ToolStack.getStack();
    for (let i = stack.length - 1; i >= 0; i--) {
      const tool = TOOLS[stack[i].tool];
      if (tool?.output === 'pairs' && tool.run) {
        return PAIR_RELATION_GLYPHS[tool.relation] || '·';
      }
    }
    return '·';
  }
}

const PAIR_RELATION_GLYPHS = {
  transform: '→',
  symmetric: '·',
  contains:  '⊃',
};

// Flatten a pair list to its constituent wlEntry atoms in row order
// (a-then-b per row). Used for stats / histogram aggregation. Does not
// dedupe — the same word can legitimately appear in multiple pairs.
function flattenPairs(pairs) {
  const out = [];
  for (const p of pairs) { out.push(p.a); out.push(p.b); }
  return out;
}

// Library column-width cache. Computed once across every source's data and
// every rescore rule's effect, so the entry and score columns stay the same
// width as the user navigates between wordlists. Invalidated whenever caches
// bump (rescore rules, source order, imports, etc.).
let _libraryColumnWidthsCache = null;
let _libraryColumnWidthsCacheVersion = -1;

function libraryEntryColumnWidths() {
  const cv = cacheVersion$.peek();
  if (_libraryColumnWidthsCache && _libraryColumnWidthsCacheVersion === cv) {
    return _libraryColumnWidthsCache;
  }
  let maxEntryLen = 0;
  let maxScoreChars = 0;
  for (const wl of state.sources) {
    const rules = wl.rescoreRules || [];
    for (const wlE of wl.rawEntries) {
      if (wlE.entry.length > maxEntryLen) maxEntryLen = wlE.entry.length;
      const inLen = String(wlE.score).length;
      let scoreChars = inLen;
      if (rules.length) {
        const r = rescoreEntry(wlE, rules);
        // Ignored rows render just the input score (struck through via CSS),
        // so they don't expand the score column.
        if (r.kept && r.score !== wlE.score) scoreChars = inLen + 3 + String(r.score).length;
      }
      if (scoreChars > maxScoreChars) maxScoreChars = scoreChars;
    }
  }
  // Also consider the merged All view, in case it carries entries (or scores)
  // wider than any single source after override resolution.
  const merged = buildMergedWordlist().entries;
  for (const wlE of merged) {
    if (wlE.entry.length > maxEntryLen) maxEntryLen = wlE.entry.length;
    const inLen = String(wlE.score).length;
    if (inLen > maxScoreChars) maxScoreChars = inLen;
  }
  _libraryColumnWidthsCache = {
    entryChars: Math.max(Math.min(maxEntryLen, ENTRY_SLOT_CAP), 4),
    scoreChars: Math.max(maxScoreChars, 5),
  };
  _libraryColumnWidthsCacheVersion = cv;
  return _libraryColumnWidthsCache;
}

// Library entries scroller — read-only counterpart to WorkshopEntriesScroller,
// used in the Library view to show a wordlist's contents alongside its
// rescore-rules editor. Renders monospace text-flavored rows with inline `→`
// annotations rather than the Workshop's atom-grid layout, and has no click-
// to-edit / popover / override-resolution machinery. Shares scrolling
// mechanics via BaseVirtualScroller.
class LibraryEntriesScroller extends BaseVirtualScroller {
  constructor(host, opts = {}) {
    super(host, 'lib-entries-rows');
    this.wordlist = opts.wordlist ?? null;         // null = merged All view
    this.mode = opts.mode ?? 'rescored';           // 'rescored' | 'original'
    this.sortKey = opts.sortKey ?? 'entry';
    this.sortDir = opts.sortDir ?? 'asc';
    this.query = opts.query ?? '';
    this.wholeWord = !!opts.wholeWord;
    this.allRows = [];
    this.rows = [];
    this._searchRanges = null;
    // Row-rescore output cached across keystrokes — only the search query is
    // changing as the user types, and rows don't depend on the query. Sorted
    // view is similarly memoized so `.filter()` preserves order and the
    // post-filter sort can be skipped on every keystroke.
    this._baseRows = null;
    this._sortedBaseRows = null;
    this._sortedBaseRowsKey = null;
    this._sortedBaseRowsDir = null;
    this._applyFilterAndSort();
  }

  // wordlist = null => merged-all view. Otherwise the focused source wordlist.
  setWordlist(wordlist) {
    this.wordlist = wordlist;
    this._invalidateRowsCache();
    this._applyFilterAndSort();
  }

  setMode(mode) {
    if (this.mode === mode) return;
    this.mode = mode;
    this._invalidateRowsCache();
    this._applyFilterAndSort();
  }

  // Live rescore preview as the user types in the rules editor — rules come
  // straight from the DOM, not from the (uncommitted) wordlist. Cleared by
  // the next renderPane, which rebuilds the scroller from committed rules.
  setRescorePreview(rules) {
    this._previewRules = rules;
    this._invalidateRowsCache();
    this._applyFilterAndSort();
  }

  setQuery(query, wholeWord) {
    this.query = query || '';
    this.wholeWord = !!wholeWord;
    this._applyFilterAndSort();
  }

  setSort(key, dir) {
    this.sortKey = key;
    this.sortDir = dir;
    this._applyFilterAndSort();
  }

  _invalidateRowsCache() {
    this._baseRows = null;
    this._sortedBaseRows = null;
  }

  // Produce the unfiltered row data. For source wordlists, walks rawEntries
  // and (in rescored mode) applies rescoreEntry to get the transformation.
  // Three states per row: unchanged (input only), rescored (input → output),
  // ignored (input → ✕).
  _buildRows() {
    const wl = this.wordlist;
    if (!wl) {
      const { entries } = buildMergedWordlist();
      return entries.map(e => ({
        entry: e.entry,
        entryLower: e.entryLower,
        len: e.entry.length,
        inputScore: e.score,
        outputScore: e.score,
        rescored: false,
        ignored: false,
        comment: e.comment || '',
      }));
    }
    const rules = this._previewRules ?? wl.rescoreRules ?? [];
    const annotate = this.mode === 'rescored' && rules.length > 0;
    return wl.rawEntries.map(wlE => {
      let outputScore = wlE.score;
      let rescored = false;
      let ignored = false;
      if (annotate) {
        const r = rescoreEntry(wlE, rules);
        if (!r.kept) ignored = true;
        else if (r.score !== wlE.score) { outputScore = r.score; rescored = true; }
        else outputScore = r.score;
      }
      return {
        entry: wlE.entry,
        entryLower: wlE.entryLower,
        len: wlE.entry.length,
        inputScore: wlE.score,
        outputScore,
        rescored,
        ignored,
        comment: wlE.comment || '',
      };
    });
  }

  _getSortedBaseRows() {
    if (this._sortedBaseRows
        && this._sortedBaseRowsKey === this.sortKey
        && this._sortedBaseRowsDir === this.sortDir) {
      return this._sortedBaseRows;
    }
    if (!this._baseRows) {
      this._baseRows = this._buildRows();
      this.allRows = this._baseRows;
    }
    const dir = this.sortDir === 'asc' ? 1 : -1;
    const key = this.sortKey;
    const sorted = [...this._baseRows].sort((a, b) => {
      if (key === 'score') {
        // Ignored rows have no meaningful score; sink them to the bottom in
        // both directions rather than letting them anchor either extreme.
        if (a.ignored !== b.ignored) return a.ignored ? 1 : -1;
        return dir * (a.outputScore - b.outputScore);
      }
      const av = key === 'length' ? a.len : a.entry;
      const bv = key === 'length' ? b.len : b.entry;
      if (typeof av === 'number' && typeof bv === 'number') return dir * (av - bv);
      return dir * String(av).localeCompare(String(bv));
    });
    this._sortedBaseRows = sorted;
    this._sortedBaseRowsKey = this.sortKey;
    this._sortedBaseRowsDir = this.sortDir;
    return sorted;
  }

  _applyFilterAndSort() {
    const source = this._getSortedBaseRows();

    const q = this.query.toLowerCase();
    let rows;
    if (q) {
      const { filterRe, searchRanges } = buildSearchPattern(q, this.wholeWord);
      this._searchRanges = searchRanges;
      rows = source.filter(r => filterRe.test(r.entryLower));
    } else {
      this._searchRanges = null;
      rows = source;
    }

    this.rows = rows;
    this._computeSlotWidths();
    this._render();
  }

  // Column widths come from the global cache (computed across every source +
  // merged), so they stay stable as the user navigates between wordlists or
  // flips Rescored/Original. The score slot is sized for the widest variant —
  // `input → output` or `input → ✕` — which means Original mode has some slack
  // on the right; that's the cost of stability.
  _computeSlotWidths() {
    const { entryChars, scoreChars } = libraryEntryColumnWidths();
    const ch = measureMonoChPx();
    this.host.style.setProperty('--lib-entry-w', `${entryChars * ch}px`);
    this.host.style.setProperty('--lib-score-w', `${scoreChars * ch}px`);
  }

  _render() {
    const n = this.rows.length;
    this.sizer.style.height = (n * ROW_HEIGHT) + 'px';

    // Empty-state placeholder when a search has filtered everything out.
    let emptyEl = this.host.querySelector('.lib-entries-empty');
    if (n === 0 && this.allRows.length > 0) {
      if (!emptyEl) {
        emptyEl = document.createElement('div');
        emptyEl.className = 'lib-entries-empty';
        emptyEl.textContent = 'No entries match the search.';
        this.host.appendChild(emptyEl);
      }
    } else if (emptyEl) {
      emptyEl.remove();
    }

    const { start, end } = this._visibleRange(n);
    this._clearSizer();

    const frag = document.createDocumentFragment();
    for (let i = start; i < end; i++) {
      const r = this.rows[i];
      const entryHtml = renderHighlightedText(r.entry, this._searchRanges?.(r.entry) || []);

      // Ignored rows show the input score struck through (CSS via .lib-ignored);
      // no `→ ✕` annotation needed.
      const showArrow = this.mode === 'rescored' && r.rescored && !r.ignored;
      const scoreHTML = showArrow
        ? `${r.inputScore}<span class="lib-atom-arrow">→</span><span class="lib-atom-out">${r.outputScore}</span>`
        : String(r.inputScore);

      const row = document.createElement('div');
      let cls = 'lib-entry-row';
      if (r.ignored) cls += ' lib-ignored';
      row.className = cls;
      row.style.top = (i * ROW_HEIGHT) + 'px';
      if (r.entry.length > ENTRY_SLOT_CAP) row.title = r.entry;
      row.innerHTML =
        `<span class="lib-atom-entry">${entryHtml}</span>` +
        `<span class="lib-atom-score">${scoreHTML}</span>` +
        `<span class="lib-atom-comment"${r.comment ? ` title="${esc(r.comment)}"` : ''}>${esc(r.comment)}</span>`;
      frag.appendChild(row);
    }
    this.sizer.appendChild(frag);
  }

  destroy() {
    super.destroy();
    this.host.innerHTML = '';
  }
}

// ─── Atom popover ─────────────────────────────────────────────────────────────
// Click-driven editor anchored to the clicked word atom. Universal editing
// surface: shows source wordlist + rescore/override info, edits score + comment,
// and (on My Edits-sourced rows) deletes. Edits route through the scroller's
// _onCellEdit (which lands them in My Edits regardless of the active wordlist).

const AtomPopover = (() => {
  let el = null;
  let activeRow = null;
  let activeWlEntry = null;
  let activeScroller = null;

  function ensureElement() {
    if (el) return el;
    el = document.createElement('div');
    el.id = 'atom-popover';
    el.setAttribute('hidden', '');
    el.addEventListener('click', e => {
      if (e.target.closest('.dialog-close-btn')) close();
    });
    document.body.appendChild(el);
    return el;
  }

  function isOpen() { return el && !el.hasAttribute('hidden'); }

  function close() {
    if (!el || el.hasAttribute('hidden')) return;
    el.setAttribute('hidden', '');
    if (activeRow) activeRow.classList.remove('active');
    activeRow = null;
    activeWlEntry = null;
    activeScroller = null;
    document.removeEventListener('mousedown', onDocMouseDown, true);
    document.removeEventListener('keydown', onKeydown, true);
    window.removeEventListener('resize', onWinResize);
  }

  function onWinResize() {
    if (containsFocus()) return;
    close();
  }

  function containsFocus() {
    return isOpen() && el.contains(document.activeElement);
  }

  function onDocMouseDown(e) {
    if (!isOpen()) return;
    if (el.contains(e.target)) return;
    if (activeRow && activeRow.contains(e.target)) return;
    close();
  }

  function onKeydown(e) {
    if (e.key === 'Escape') { e.preventDefault(); close(); }
  }

  function open(wlEntry, rowEl, scroller, anchorEl, focusField = 'score') {
    const popover = ensureElement();
    if (activeRow) activeRow.classList.remove('active');
    activeWlEntry = wlEntry;
    activeRow = rowEl;
    activeScroller = scroller;
    rowEl.classList.add('active');

    popover.innerHTML = renderHTML(wlEntry, scroller);
    popover.removeAttribute('hidden');
    position(anchorEl ?? rowEl);
    wireFields();
    const focusSel = focusField === 'comment' ? '.comment-input' : '.score-input';
    const input = popover.querySelector(focusSel);
    input?.focus();
    if (focusField !== null) input?.select();

    document.addEventListener('mousedown', onDocMouseDown, true);
    document.addEventListener('keydown', onKeydown, true);
    window.addEventListener('resize', onWinResize);
  }

  function renderFooterHTML(wlEntry, scroller) {
    const rowWordlist = wlEntry.wordlist || scroller.currentWordlist;
    const editsWordlist = scroller.editsWordlist || getEditsWordlist();
    const rowIsEdits = rowWordlist === editsWordlist;
    const showDelete = scroller.showDeleteCol || (scroller.showEditDeleteCol && rowIsEdits);
    const deleteBtn = showDelete ? `<button class="atom-pop-delete" type="button">Delete edit</button>` : '';
    const editsName = editsWordlist ? buildWordlistNameHTML(editsWordlist, { bold: false }) : 'My Edits';
    const isEditsView = scroller.currentWordlist === editsWordlist;
    const savesNote = isEditsView ? `Editing ${editsName}` : `Saves to ${editsName}`;
    return `<span class="atom-pop-saves">${savesNote}</span>${deleteBtn}`;
  }

  function renderHTML(wlEntry, scroller) {
    return `
      <button class="dialog-close-btn" type="button" aria-label="Close">✕</button>
      <div class="atom-pop-fields">
        <label for="atom-pop-score">Score</label>
        <input id="atom-pop-score" class="score-input" type="number" min="0" value="${wlEntry.score}">
        <label for="atom-pop-comment">Comment</label>
        <input id="atom-pop-comment" class="comment-input" type="text" value="${esc(wlEntry.comment || '')}">
      </div>
      <div class="atom-pop-foot">${renderFooterHTML(wlEntry, scroller)}</div>`;
  }

  // Re-render after an edit/delete commits so the popover reflects the new
  // state. If the entry has been fully removed from the underlying data (e.g.
  // deleting an entry that only My Edits had, or any delete from the My Edits
  // view), there's nothing left to show — close.
  //
  // `resetInputs: true` re-renders everything (including the score/comment
  // inputs) — used after Delete, where the underlying values change. The
  // default leaves the inputs alone so an edit-commit (e.g. tabbing from
  // score to comment) preserves focus and the just-typed value.
  function refresh({ resetInputs = false } = {}) {
    if (!isOpen()) return;
    if (!activeScroller.allEntries.includes(activeWlEntry)) { close(); return; }
    if (resetInputs) {
      el.innerHTML = renderHTML(activeWlEntry, activeScroller);
      wireFields();
      return;
    }
    const footEl = el.querySelector('.atom-pop-foot');
    if (footEl) {
      footEl.innerHTML = renderFooterHTML(activeWlEntry, activeScroller);
      wireDeleteButton();
    }
  }

  function wireDeleteButton() {
    const deleteBtn = el.querySelector('.atom-pop-delete');
    if (!deleteBtn) return;
    const scroller = activeScroller;
    const entry = activeWlEntry.entry;
    deleteBtn.addEventListener('click', () => {
      scroller._onDeleteRow?.(entry);
      refresh({ resetInputs: true });
    });
  }

  function wireFields() {
    const popover = el;
    const scroller = activeScroller;
    const entry = activeWlEntry.entry;

    const scoreInp = popover.querySelector('.score-input');
    if (scoreInp) {
      let initial = scoreInp.value;
      const commit = () => {
        const parsed = parseInt(scoreInp.value, 10);
        if (!isNaN(parsed) && parsed >= 0 && String(parsed) !== initial) {
          scroller._onCellEdit?.(entry, 'score', parsed);
          initial = String(parsed);
          refresh();
        }
      };
      scoreInp.addEventListener('blur', commit);
      scoreInp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); commit(); close(); }
        if (e.key === 'Escape') { e.preventDefault(); scoreInp.value = initial; close(); }
      });
    }

    const commentInp = popover.querySelector('.comment-input');
    if (commentInp) {
      let initial = commentInp.value;
      commentInp.addEventListener('beforeinput', blockSemicolon);
      const commit = () => {
        if (commentInp.value !== initial) {
          scroller._onCellEdit?.(entry, 'comment', commentInp.value);
          initial = commentInp.value;
          refresh();
        }
      };
      commentInp.addEventListener('blur', commit);
      commentInp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); commit(); close(); }
        if (e.key === 'Escape') { e.preventDefault(); commentInp.value = initial; close(); }
      });
    }

    wireDeleteButton();
  }

  function position(rowEl) {
    const r = rowEl.getBoundingClientRect();
    el.style.top = (r.bottom + 4) + 'px';
    el.style.left = r.left + 'px';
    requestAnimationFrame(() => {
      const pw = el.offsetWidth, ph = el.offsetHeight;
      let left = r.left;
      if (left + pw > window.innerWidth - 8) left = window.innerWidth - 8 - pw;
      if (left < 8) left = 8;
      let top = r.bottom + 4;
      if (top + ph > window.innerHeight - 8) top = Math.max(8, r.top - ph - 4);
      el.style.top = top + 'px';
      el.style.left = left + 'px';
    });
  }

  function activeEntry(scroller) {
    if (!isOpen()) return null;
    if (scroller && activeScroller !== scroller) return null;
    return activeWlEntry ? activeWlEntry.entry : null;
  }

  function rebindRow(rowEl) {
    if (!isOpen()) return;
    if (activeRow) activeRow.classList.remove('active');
    activeRow = rowEl;
    rowEl.classList.add('active');
  }

  return { open, close, isOpen, containsFocus, activeEntry, rebindRow };
})();

// ─── Update Summary Scroller ──────────────────────────────────────────────────

class UpdateSummaryScroller {
  constructor(container) {
    this.container = container;
    this.rows = [];

    this.sizer = document.createElement('div');
    this.sizer.className = 'usd-sizer';
    container.appendChild(this.sizer);

    container.addEventListener('scroll', () => this._render(), { passive: true });
    new ResizeObserver(() => this._render()).observe(container);
  }

  setRows(rows) {
    this.rows = rows;
    this.sizer.style.height = (rows.length * ROW_HEIGHT) + 'px';
    this.container.scrollTop = 0;
    this._render();
  }

  scrollToIndex(i) {
    this.container.scrollTop = i * ROW_HEIGHT;
  }

  _render() {
    const n = this.rows.length;
    const scrollTop = this.container.scrollTop;
    const viewH = this.container.clientHeight;
    const start = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - VS_BUFFER);
    const end   = Math.min(n, Math.ceil((scrollTop + viewH) / ROW_HEIGHT) + VS_BUFFER);

    this.sizer.innerHTML = '';
    const frag = document.createDocumentFragment();

    for (let i = start; i < end; i++) {
      const row = this.rows[i];
      const div = document.createElement('div');
      div.className = 'usd-row';
      div.style.top = (i * ROW_HEIGHT) + 'px';

      if (row.type === 'header') {
        div.classList.add('usd-section-header');
        div.textContent = row.label;
      } else {
        div.classList.add('usd-entry-row', 'usd-' + row.kind);

        const entrySpan = document.createElement('span');
        entrySpan.className = 'usd-entry-col';
        entrySpan.textContent = displayEntry(row.entry);
        div.appendChild(entrySpan);

        const scoreSpan = document.createElement('span');
        scoreSpan.className = 'usd-score-col';
        if (row.kind === 'rescored') {
          scoreSpan.innerHTML =
            `<span class="usd-old-score">${row.oldScore}</span>` +
            `<span class="usd-arrow">→</span>` +
            buildScoreBadgeHTML(row.score);
        } else {
          scoreSpan.innerHTML = buildScoreBadgeHTML(row.score);
        }
        div.appendChild(scoreSpan);
      }

      frag.appendChild(div);
    }

    this.sizer.appendChild(frag);
  }
}

// ─── Rescoring ────────────────────────────────────────────────────────────────

function parseRange(str) {
  str = (str || '').trim();
  if (!str) return null;
  const mPlus  = str.match(/^(\d+)\+$/);        if (mPlus)  return [{ min: +mPlus[1],  max: null }];
  const mRange = str.match(/^(\d+)[-–](\d+)$/); if (mRange) return [{ min: +mRange[1], max: +mRange[2] }];
  const mExact = str.match(/^(\d+)$/);          if (mExact) return [{ min: +mExact[1], max: +mExact[1] }];
  return null;
}

function matchesRange(value, intervals) {
  for (const { min, max } of intervals) {
    if ((min === null || value >= min) && (max === null || value <= max)) return true;
  }
  return false;
}

function scoresToRangeStr(scores) {
  if (!scores.length) return '';
  const sorted = [...scores].sort((a, b) => a - b);
  const min = sorted[0], max = sorted[sorted.length - 1];
  return min === max ? `${min}` : `${min}-${max}`;
}

// Format a list of integer scores, collapsing runs of consecutive scores
// into ranges: [25, 45, 46, 47, 48, 49, 75] → "25, 45-49, 75".
function scoresToGroupedList(scores) {
  if (!scores.length) return '';
  const sorted = [...scores].sort((a, b) => a - b);
  const groups = [];
  let start = sorted[0], end = sorted[0];
  const flush = () => groups.push(start === end ? `${start}` : `${start}-${end}`);
  for (let i = 1; i < sorted.length; i++) {
    if (sorted[i] === end + 1) end = sorted[i];
    else { flush(); start = end = sorted[i]; }
  }
  flush();
  return groups.join(', ');
}

function getRuleMaxScore(rule) {
  const intervals = parseRange(rule.input);
  if (!intervals) return -1;
  let max = -Infinity;
  for (const { max: imax } of intervals) {
    const m = imax === null ? Infinity : imax;
    if (m > max) max = m;
  }
  return max;
}

function outputSortKey(rule) {
  const s = parseRuleOutput(rule.output);
  if (typeof s === 'number') return s;
  if (s && typeof s === 'object') return s.max === null ? s.min : (s.min + s.max) / 2;
  if (s === 'ignore') return -1;
  return getRuleMaxScore(rule); // 'unchanged' sorts by input score
}

// Equality for rule arrays. Drives the dirty flag and the boot-time silent
// propagation of dev-shipped default updates.
function rescoreRulesEqual(a, b) {
  const au = a || [];
  const bu = b || [];
  if (au.length !== bu.length) return false;
  return au.every((r, i) => {
    const o = bu[i];
    return r.input === o.input
      && (r.length || '') === (o.length || '')
      && (r.output || '') === (o.output || '')
      && (r.note   || '') === (o.note   || '');
  });
}

function scoringRulesEqual(a, b) {
  const au = a || [];
  const bu = b || [];
  if (au.length !== bu.length) return false;
  return au.every((r, i) => {
    const o = bu[i];
    return r.input === o.input && (r.note || '') === (o.note || '');
  });
}

// The current "default rescore rules" for a wordlist that has them. Returns
// null for custom wordlists with no canonical baseline (no publisher, not
// My Edits). dirty/propagation logic short-circuits on null.
function getWordlistDefaultRules(wordlist) {
  if (wordlist.type === 'edits') return getMyEditsDefaultRules();
  const publisher = getPublisher(wordlist);
  return publisher?.defaultRules ?? null;
}

// Recompute the dirty flag after a rule mutation. Custom wordlists (no
// defaults) keep `dirty` undefined and don't participate in propagation.
function updateWordlistDirty(wordlist) {
  const defaults = getWordlistDefaultRules(wordlist);
  if (defaults === null) return;
  wordlist.dirty = !rescoreRulesEqual(wordlist.rescoreRules, defaults);
}

function updateScoringDirty() {
  state.scoringDirty = !scoringRulesEqual(state.scoring, DEFAULT_SCORING);
}

// For any rule set with defaults, if persisted rules differ but `dirty` is
// false, silently overwrite with defaults. At boot this picks up dev-shipped
// updates for users who haven't customized; within a session it keeps My
// Edits' inert defaults in lockstep with state.scoring when the user edits
// tier labels. Scoring runs first because My Edits' defaults derive from
// state.scoring (via getMyEditsDefaultRules).
// See docs/design.md § Rescore rules & tier alignment.
function propagateDefaults() {
  if (!scoringRulesEqual(state.scoring, DEFAULT_SCORING) && !state.scoringDirty) {
    state.scoring = DEFAULT_SCORING.map(r => ({ ...r }));
    persistScoring();
  }
  let metaTouched = false;
  for (const wordlist of state.sources) {
    const defaults = getWordlistDefaultRules(wordlist);
    if (defaults === null) continue;
    if (!rescoreRulesEqual(wordlist.rescoreRules, defaults) && !wordlist.dirty) {
      wordlist.rescoreRules = defaults.map(r => ({ ...r }));
      recomputeUncovered(wordlist);
      invalidateWordlistCaches(wordlist);
      metaTouched = true;
    }
  }
  if (metaTouched) {
    persistMeta();
    repaintAfterCacheChange();
  }
}

// On fetch/import of a custom wordlist (no publisherId) with empty rescore
// rules and ≤10 distinct scores, seed one inert row per distinct score —
// blank output, so scores pass through unchanged. Lays the source's scale
// out as concrete rows next to All's tier scale; the user can fill in
// output mappings if they want to translate into the unified scale.
// See docs/design.md § Rescore rules & tier alignment.
const AUTO_SEED_SCORE_LIMIT = 10;

function maybeAutoSeedRescoreRules(wordlist) {
  if (wordlist.publisherId) return;
  if (wordlist.rescoreRules?.length) return;
  const scores = [...new Set(wordlist.rawEntries.map(e => e.score))];
  if (!scores.length || scores.length > AUTO_SEED_SCORE_LIMIT) return;
  scores.sort((a, b) => a - b);
  wordlist.rescoreRules = scores.map(s => ({ input: String(s), length: '', output: '', note: '' }));
}

// Sort the wordlist's rescore rules into editor display order and recompute
// `wordlist._uncovered` — the list of raw scores in the data not covered by
// any length-filter-free rule. The Unhandled-scores banner in the editor and
// the warning severity bubble on the card both key off this field.
function recomputeUncovered(wordlist) {
  const rules = wordlist.rescoreRules;

  // Sort: primary = output score descending, then input score, then length.
  rules.sort((a, b) => {
    const ao = outputSortKey(a), bo = outputSortKey(b);
    if (ao !== bo) return bo - ao;
    const am = getRuleMaxScore(a), bm = getRuleMaxScore(b);
    if (am !== bm) return bm - am;
    const aL = !!(a.length && a.length.trim()), bL = !!(b.length && b.length.trim());
    return (aL ? 0 : 1) - (bL ? 0 : 1);
  });
  rules.forEach(compileRule);

  const actualScores = getActualScores(wordlist);
  wordlist._uncovered = actualScores.filter(s => !rules.some(r => {
    if (r.length && r.length.trim()) return false;
    return r._scoreIntervals && matchesRange(s, r._scoreIntervals);
  }));
}

// Sorted distinct raw scores for a wordlist. Depends only on rawEntries, so
// it survives rule edits — invalidated only when entries change. For Broda-
// sized wordlists (~500K entries) this scan would otherwise run on every
// rule keystroke commit.
function getActualScores(wordlist) {
  if (wordlist._actualScores) return wordlist._actualScores;
  const entries = wordlist.rawEntries;
  if (!entries || !entries.length) return wordlist._actualScores = [];
  return wordlist._actualScores = [...new Set(entries.map(e => e.score))].sort((a, b) => a - b);
}

function invalidateActualScoresCache(wordlist) { wordlist._actualScores = null; }

function parseRuleOutput(str) {
  str = (str || '').trim().toLowerCase();
  if (!str || str === 'unchanged') return 'unchanged';
  if (str === 'ignore') return 'ignore';
  const mRange = str.match(/^(\d+)[-–](\d+)$/);
  if (mRange) return { min: +mRange[1], max: +mRange[2] };
  const mPlus  = str.match(/^(\d+)\+$/);
  if (mPlus)  return { min: +mPlus[1], max: null };
  const mExact = str.match(/^(\d+)$/);
  return mExact ? +mExact[1] : null;
}

function compileRule(rule) {
  rule._scoreIntervals = parseRange(rule.input);
  rule._lenIntervals   = (rule.length && rule.length.trim()) ? parseRange(rule.length) : null;
  rule._output         = parseRuleOutput(rule.output);
}

function applyRescoring(entries, rules) {
  return entries.flatMap(e => {
    const r = rescoreEntry(e, rules);
    if (!r.kept) return [];
    return [r.score !== e.score ? { ...e, score: r.score } : e];
  });
}

function getRescoredEntries(wordlist) {
  return wordlist._rescored ??= applyRescoring(wordlist.rawEntries, wordlist.rescoreRules);
}

function getRescoredMap(wordlist) {
  if (wordlist._rescoredMap) return wordlist._rescoredMap;
  const map = new Map();
  for (const e of getRescoredEntries(wordlist)) map.set(e.entryLower, e);
  wordlist._rescoredMap = map;
  return map;
}

function rescoreEntry(wlEntry, rules) {
  for (const rule of rules) {
    const scoreIntervals = rule._scoreIntervals !== undefined ? rule._scoreIntervals : parseRange(rule.input);
    if (!scoreIntervals || !matchesRange(wlEntry.score, scoreIntervals)) continue;
    if (rule.length && rule.length.trim()) {
      const lenIntervals = rule._lenIntervals !== undefined ? rule._lenIntervals : parseRange(rule.length);
      if (!lenIntervals || !matchesRange(wlEntry.entry.length, lenIntervals)) continue;
    }
    const s = rule._output !== undefined ? rule._output : parseRuleOutput(rule.output);
    if (s === null) continue;
    if (s === 'ignore') return { kept: false };
    if (s === 'unchanged') return { kept: true, score: wlEntry.score };
    if (s && typeof s === 'object') {
      const iv = scoreIntervals[0];
      if (iv.max === null && s.max === null) {
        // Both N+: shift by the difference
        return { kept: true, score: wlEntry.score + (s.min - iv.min) };
      }
      // Bounded range: linearly scale; skip if shapes don't match or input is degenerate
      if (iv.min === null || iv.max === null || s.max === null || iv.min === iv.max) continue;
      const t = (wlEntry.score - iv.min) / (iv.max - iv.min);
      return { kept: true, score: Math.round(s.min + t * (s.max - s.min)) };
    }
    return { kept: true, score: s }; // first matching rule wins
  }
  return { kept: true, score: wlEntry.score };
}

// ─── Rescoring / Scoring section ─────────────────────────────────────────────

function renderRescoreSection() {
  // Per-source rescoring lives only inside the Library view's right pane now.
  LibraryView.refreshRescoreSection();
}

// ─── Rendering ────────────────────────────────────────────────────────────────

let workshopScroller = null;

// The render dispatcher is two effects:
//   - render effect — reads `cacheVersion$`, dispatches the panel render
//     (full render on first run, in-place scroller update on subsequent
//     cache bumps). Workshop always shows the merged view, so there's no
//     selection to dispatch on.
//   - cosmetic effect — subscribes to per-wordlist `name$`/`icon$`/`url$`/
//     `publisherId$` signals across all sources; cosmetic field changes
//     re-render the list/dropdown/dialog and visible scroller rows without
//     touching the merged cache
// Helpers that want to repaint after a cache change bump `cacheVersion$` via
// `repaintAfterCacheChange`. Cosmetic field setters just write the signal —
// the cosmetic effect notices and repaints.
//
// `renderAll()` is the entry point: first call wires up the effects (the
// render effect's first run does the initial paint); subsequent calls bump
// `cacheVersion$` and let the effect dispatch.
let _renderEffectActive = false;
let _firstRenderDone = false;
let _cosmeticEffectFirstRun = true;

function setupRenderEffect() {
  if (_renderEffectActive) return;
  _renderEffectActive = true;
  effect(() => {
    cacheVersion$.get();             // subscribe to cache-change bumps

    if (!_firstRenderDone) {
      _firstRenderDone = true;
      renderSources();
      renderWorkshopMergedDetail();
      return;
    }

    // Cache change — refresh derived state in place rather than rebuilding
    // the panel and the scroller.
    refreshSourceCounts();        // rebuild caches before any UI reads them
    renderSources();              // list/dialog with fresh meta
    refreshDerivedDisplays();     // scoring legend + main-panel stats bar
    if (workshopScroller) refreshWorkshopMergedScroller();
  });

  // Cosmetic effect: re-renders the Library list and the merged scroller's
  // per-row source column when any wordlist's name/icon/url/publisher
  // changes. Cache-affecting fields (enabled, rescoreRules) route through
  // `cacheVersion$` instead since changing them invalidates derived state.
  effect(() => {
    const sources = sources$.get();
    for (const wl of sources) {
      wl.name$.get();
      wl.icon$.get();
      wl.url$.get();
      wl.publisherId$.get();
    }
    if (_cosmeticEffectFirstRun) {
      _cosmeticEffectFirstRun = false;
      return;            // render effect's first run already painted everything
    }
    renderSources();
    if (workshopScroller) workshopScroller._render();
  });
}

function renderAll() {
  if (!_renderEffectActive) setupRenderEffect();
  else bumpCacheVersion();
}

function wordlistCardMeta(wordlist, contribMap) {
  const total = wordlist.rawEntries.length;
  if (!total) return 'No data';
  if (!wordlist.enabled) return pluralize(total, 'entry', 'entries');
  const used = contribMap.get(wordlist) ?? 0;
  return used === total
    ? `${pluralize(used, 'entry', 'entries')} used`
    : `${used.toLocaleString()} of ${pluralize(total, 'entry', 'entries')} used`;
}

// Centralized "sources changed in some way" hook: repaint anything that
// displays per-source state (source dropdown trigger when name/icon may
// have changed, the Library view's list/pane).
//
// Reads `_sourceCountsCache` for "X used" meta — populated lazily here when
// missing, so cosmetic-effect callers don't crash if a cache-affecting helper
// invalidated the merged cache earlier in the same drain. The render effect's
// cache branch has already rebuilt by the time it calls renderSources, so the
// lazy path is only hit when no cache rebuild is in flight.
function renderSources() {
  if (!_sourceCountsCache) _sourceCountsCache = buildMergedWordlist().sourceCounts;
  // Refresh state._scoringUncovered so the All card's severity bubble reads
  // fresh data. (renderScoringRules also recomputes — idempotent.)
  recomputeScoringUncovered(buildMergedWordlist().entries);
  LibraryView?.refresh();
  const severity = maxSeverity(...state.sources.map(wordlistSeverity), allSeverity());
  MainView?.setSeverityBubble('library', severity, severityTitle(severity));
}


// Pure cache rebuild — invalidate merged/override/stats caches and re-warm
// `_sourceCountsCache` so the next renderSources sees fresh meta. Does no
// rendering itself; the render effect's cache branch calls this and then
// `renderSources` to paint with the rebuilt counts.
function refreshSourceCounts() {
  invalidateSourceCounts();
  invalidateStatsCache(_mergedStatsKey);
  _sourceCountsCache = buildMergedWordlist().sourceCounts;
}

function createScroller() {
  AtomPopover.close();
  workshopScroller?.destroy();
  workshopScroller = new WorkshopEntriesScroller(document.getElementById('vs-host'));
  return workshopScroller;
}

// Refresh the merged scroller against the current `_mergedWordlistCache` and
// the active tool stack. With no tools (or only no-op tools) in the stack,
// `executePipeline` returns the merged cache's `entries` array unchanged —
// identity is preserved, so the patch-path optimization survives (merged
// cache patched in place, scroller refilters without closing the popover).
// With a transforming tool in the stack, the pipeline produces a fresh array
// and the scroller takes the full `updateEntries` path; chained edits
// against a tool-filtered view will close the open popover, which is
// acceptable for v1.
function refreshWorkshopMergedScroller() {
  if (!workshopScroller) return;
  const merged = buildMergedWordlist().entries;
  const { kind, items } = executePipeline(merged, ToolStack.getStack());
  if (items === workshopScroller.allEntries && kind === workshopScroller.kind) {
    workshopScroller._invalidateSortCache();
    workshopScroller._applyFilterAndSort(false);
  } else {
    workshopScroller.updateEntries(items, kind);
  }
}

function mountWorkshopPanel(panel, stats, entries, opts = {}) {
  const statsOpts = opts.kind === 'pairs' ? { countLabel: 'Pairs', countValue: opts.itemCount } : {};
  document.getElementById('workshop-stats').innerHTML =
    buildStatsBarHTML(stats, { entries, ignoredCount: stats.ignoredCount }, getHistogramLayout(), statsOpts);
  panel.innerHTML = `
    <div class="sticky-stack">
      ${ToolStack.buildHTML()}
      ${buildSearchBarHTML()}
      ${buildEntryHeadersHTML()}
    </div>
    ${buildEntriesTablePanelHTML()}
  `;
  ToolStack.refreshGalleryActive();
  repositionAllHistogramRects();
  createScroller();
  workshopScroller.onFilterChange = refreshWorkshopStatsBarFromScroller;
  attachSearchHelpPopup();
}

// Recomputes the stats bar from the scroller's currently-visible entries.
// Called by the scroller's onFilterChange callback so search/score-range
// filtering, edits, and any other filter-affecting change keep the count,
// min/max/mean/median/mode, and histogram in sync with what's on screen.
function refreshWorkshopStatsBarFromScroller() {
  if (!workshopScroller) return;
  const statsBar = document.querySelector('#workshop-stats .stats-bar');
  if (!statsBar) return;
  const entries = workshopScroller._filteredStatsViewEntries();
  const stats = computeStatsRaw(entries);
  const hist = { entries: workshopScroller._histogramViewEntries(), ignoredCount: 0 };
  // _filteredStatsViewEntries flattens pairs to atoms, so stats.count counts
  // atoms; for the bar's count we want pairs. Pass the row count explicitly.
  const statsOpts = workshopScroller.kind === 'pairs'
    ? { countLabel: 'Pairs', countValue: workshopScroller.entries.length }
    : {};
  statsBar.outerHTML = buildStatsBarHTML(stats, hist, getHistogramLayout(), statsOpts);
  repositionAllHistogramRects();
}

// Hide the stats bar's right-side stats (Mean · Median · Mode) when the
// bar's content would overflow. Driven by actual overflow rather than a
// hardcoded breakpoint, so the Library bar reacts to its own width (after
// the wordlist rail takes its slice) rather than the whole window's.
// Strip the class first so scrollWidth reflects the natural content width.
function refreshStatsBarOverflow() {
  for (const bar of document.querySelectorAll('.stats-bar')) {
    bar.classList.remove('stats-overflow');
    if (bar.scrollWidth > bar.clientWidth) bar.classList.add('stats-overflow');
  }
}
// RO fires on viewport/pane resize; MO fires when a bar is added or swapped
// (innerHTML / outerHTML). Both parents exist in the static body, so
// attaching at module load is safe.
for (const id of ['workshop-stats', 'wld-pane']) {
  const parent = document.getElementById(id);
  new ResizeObserver(refreshStatsBarOverflow).observe(parent);
  new MutationObserver(refreshStatsBarOverflow).observe(parent, { childList: true });
}

// mountWorkshopPanel rebuilds the search-input on every render — the prior
// popup's anchor reference is dead, so destroy before rebinding.
let _searchHelpPopup = null;
function attachSearchHelpPopup() {
  _searchHelpPopup?.destroy();
  _searchHelpPopup = null;
  const input = document.getElementById('search-input');
  if (input) _searchHelpPopup = new PopupHelp(input, buildWildcardSpansHTML());
}

function renderWorkshopMergedDetail() {
  const panel = document.getElementById('detail-panel');
  const merged = buildMergedWordlist().entries;
  const { kind, items } = executePipeline(merged, ToolStack.getStack());
  // Stats hit the merged cache when no tool transformed the entries; otherwise
  // the initial placeholder is computed raw — the scroller's onFilterChange
  // refresh kicks in immediately after setEntries and replaces it anyway. For
  // pairs, flatten to atoms for the stats aggregates; the count label switches
  // to "N pairs" in mountWorkshopPanel.
  const statsSource = kind === 'pairs' ? flattenPairs(items) : items;
  const stats = (kind === 'words' && items === merged)
    ? computeStats(_mergedStatsKey, statsSource)
    : computeStatsRaw(statsSource);
  mountWorkshopPanel(panel, stats, statsSource, { kind, itemCount: items.length });

  workshopScroller.showSource = true;
  workshopScroller.editsWordlist = getEditsWordlist() ?? null;
  workshopScroller.showEditDeleteCol = true;
  workshopScroller.setEntries(items, WorkshopView.searchQuery, WorkshopView.searchWholeWord, WorkshopView.scoreRange, kind);

  workshopScroller._onDeleteRow = entry => deleteFromEdits(entry, refreshWorkshopMergedScroller);
  attachExternalEditHandlers(workshopScroller, refreshWorkshopMergedScroller);
}

async function downloadMergedWordlistFromPanel() {
  const { entries } = buildMergedWordlist();
  await downloadWithDialog('Grawlix Wordlist', null, entries, 'Download Merged Wordlist');
}

// ─── Scoring (tier labels) ────────────────────────────────────────────────────

// Returns a `score → tier label` function. First matching rule wins; an
// empty note collapses to '' so callers can skip the tooltip entirely.
function makeTierLookup() {
  const rules = state.scoring
    .map(r => ({ note: r.note || '', intervals: parseRange(r.input) }))
    .filter(r => r.intervals);
  return score => {
    for (const r of rules) if (matchesRange(score, r.intervals)) return r.note;
    return '';
  };
}

// Sort state.scoring into editor display order and recompute
// `state._scoringUncovered` — the list of merged-output scores not covered
// by any tier label. Counterpart to recomputeUncovered for the tier scale.
function recomputeScoringUncovered(entries) {
  // Sort rows by score range descending (highest scores first).
  state.scoring.sort((a, b) => getRuleMaxScore(b) - getRuleMaxScore(a));

  const actualScores = entries.length
    ? [...new Set(entries.map(e => e.score))].sort((a, b) => a - b)
    : [];
  state._scoringUncovered = actualScores.filter(s => !state.scoring.some(r => {
    const intervals = parseRange(r.input);
    return intervals && matchesRange(s, intervals);
  }));
}

// Repaint the editor in the Library view's All pane and refresh the
// score-atom tooltips on the main panel. The scroller's rendered rows carry
// the tier label as a `title=`; rules changes don't affect data so a cheap
// re-render of the visible rows is enough. Also refreshes the misalignment
// bubbles on the All card and the Library nav tab (state._scoringUncovered
// drives both).
function renderScoringRules() {
  recomputeScoringUncovered(buildMergedWordlist().entries);
  LibraryView.refreshScoringSection();
  workshopScroller?._render?.();
  refreshLibrarySeverityBubbles();
}

// Update every Library-rail card bubble + the nav-tab bubble in place. Used

// ─── Histogram pointer interaction ───────────────────────────────────────────

let _histDrag = null;

function rangeStrFromBounds(lo, hi, layout) {
  if (lo === hi) return String(lo);
  const max = layout.slots.length ? layout.slots[layout.slots.length - 1].hi : null;
  if (max != null && hi >= max) return `${lo}+`;
  return `${lo}-${hi}`;
}

// Returns null when the cursor sits before the first regular bar (the ignored-bar zone).
function _slotAt(histEl, clientX) {
  const cols = histEl.querySelectorAll('.histogram-col:not(.histogram-col-ignored)');
  if (!cols.length) return null;
  const x = clientX - histEl.getBoundingClientRect().left;
  const first = cols[0];
  const stride = cols.length >= 2 ? (cols[1].offsetLeft - first.offsetLeft) : (first.offsetWidth + 3);
  if (x < first.offsetLeft) return null;
  let idx = Math.floor((x - first.offsetLeft) / stride);
  if (idx >= cols.length) idx = cols.length - 1;
  const bar = cols[idx].querySelector('.histogram-bar');
  return { idx, lo: +bar.dataset.lo, hi: +bar.dataset.hi };
}

function onHistogramPointerDown(event) {
  if (event.button !== 0 && event.pointerType === 'mouse') return;
  const hist = event.currentTarget;
  const slot = _slotAt(hist, event.clientX);
  if (!slot) return;
  event.preventDefault();
  hist.setPointerCapture?.(event.pointerId);
  _histDrag = {
    pointerId: event.pointerId,
    histEl: hist,
    startLo: slot.lo, startHi: slot.hi,
    curLo: slot.lo, curHi: slot.hi,
    moved: false,
  };
  // No rect update here — wait for first pointermove so a click-to-clear doesn't flash a one-bar preview.
}

function _onHistogramPointerMove(event) {
  if (!_histDrag || event.pointerId !== _histDrag.pointerId) return;
  const slot = _slotAt(_histDrag.histEl, event.clientX);
  if (!slot) return;
  if (slot.lo === _histDrag.curLo && slot.hi === _histDrag.curHi) return;
  _histDrag.curLo = slot.lo;
  _histDrag.curHi = slot.hi;
  if (slot.lo !== _histDrag.startLo || slot.hi !== _histDrag.startHi) _histDrag.moved = true;
  const rangeLo = Math.min(_histDrag.startLo, slot.lo);
  const rangeHi = Math.max(_histDrag.startHi, slot.hi);
  positionHistogramRect(_histDrag.histEl, [{ min: rangeLo, max: rangeHi }]);
}

function _onHistogramPointerUp(event) {
  if (!_histDrag || event.pointerId !== _histDrag.pointerId) return;
  const ds = _histDrag;
  _histDrag = null;
  const layout = getHistogramLayout();
  let next;
  if (!ds.moved && WorkshopView.scoreRange) {
    const intervals = parseRange(WorkshopView.scoreRange);
    const insideSelection = intervals && matchesRange(ds.startLo, intervals) && matchesRange(ds.startHi, intervals);
    next = insideSelection ? '' : rangeStrFromBounds(ds.startLo, ds.startHi, layout);
  } else {
    next = rangeStrFromBounds(Math.min(ds.startLo, ds.curLo), Math.max(ds.startHi, ds.curHi), layout);
  }
  document.querySelectorAll('#score-range-input').forEach(inp => { inp.value = next; });
  WorkshopView.onScoreRange(next);
}

document.addEventListener('pointermove', _onHistogramPointerMove);
document.addEventListener('pointerup', _onHistogramPointerUp);
document.addEventListener('pointercancel', () => { _histDrag = null; repositionAllHistogramRects(); });

// Track cursor for cross-render hover continuity. Native :hover doesn't apply
// to a freshly inserted element until the next pointer event, so after a
// click commits a selection and the stats bar is replaced, the new bars
// would briefly render monochrome before :hover caught up — replaying the
// fade-to-color animation. We mirror :hover via a JS class applied
// synchronously on render, so new bars paint already-colored.
const _histCursor = { x: -Infinity, y: -Infinity };

function syncHistogramHover() {
  document.querySelectorAll('.histogram').forEach(h => {
    const r = h.getBoundingClientRect();
    const inside = _histCursor.x >= r.left && _histCursor.x <= r.right && _histCursor.y >= r.top && _histCursor.y <= r.bottom;
    h.classList.toggle('is-hovered', inside);
  });
}

document.addEventListener('pointermove', e => {
  _histCursor.x = e.clientX;
  _histCursor.y = e.clientY;
  syncHistogramHover();
}, { passive: true });

// Pass `intervals` to override the live filter (used during drag preview).
function positionHistogramRect(histEl, intervals = undefined) {
  const rect = histEl.querySelector('.histogram-rect');
  if (!rect) return;
  if (intervals === undefined) {
    intervals = WorkshopView.scoreRange ? parseRange(WorkshopView.scoreRange) : null;
  }
  if (!intervals) { rect.hidden = true; return; }
  const cols = [...histEl.querySelectorAll('.histogram-col:not(.histogram-col-ignored)')];
  const matching = cols.filter(c => {
    const bar = c.querySelector('.histogram-bar');
    return slotIntersectsRange(+bar.dataset.lo, +bar.dataset.hi, intervals);
  });
  if (!matching.length) { rect.hidden = true; return; }
  const first = matching[0], last = matching[matching.length - 1];
  const left = first.offsetLeft - 2;
  const right = last.offsetLeft + last.offsetWidth + 2;
  rect.hidden = false;
  rect.style.left = `${left}px`;
  rect.style.width = `${right - left}px`;
}

function repositionAllHistogramRects() {
  // The score-range selection rect is a Workshop concept (the filter belongs
  // to the entries table). Library histograms render the same chrome but
  // never paint a selection — scope the query to #workshop-view so they stay clean.
  document.querySelectorAll('#workshop-view .histogram').forEach(h => positionHistogramRect(h));
  syncHistogramHover();
}

async function applyWordlistText(wordlist, text, { fetchedSize = null, originalFilename = null, nameOverride = null, source = null, clearUrl = false, silent = false } = {}) {
  const dbKey = wordlist.dbKey;
  const wasEmpty = !wordlist.rawEntries.length;
  const oldEntries = wasEmpty ? null : wordlist.rawEntries;

  // Invalidate first, then mutate — so signal writes (name/url) don't fire
  // the cosmetic effect against still-stale caches mid-flight. Wrap in
  // batchUpdate to coalesce all writes + the cache bump into one render
  // effect run after the batch.
  batchUpdate(() => {
    invalidateWordlistCaches(wordlist);
    wordlist.rawEntries = parseWordlist(text);
    invalidateActualScoresCache(wordlist);
    wordlist.lastUpdated = Date.now();
    if (fetchedSize !== null) { wordlist.fetchedSize = fetchedSize; wordlist._updateAvailable = false; }
    if (originalFilename !== null) wordlist.originalFilename = originalFilename;
    if (!wordlist.populated) { wordlist.populated = true; wordlist.enabled = true; }
    maybeAutoSeedRescoreRules(wordlist);
    recomputeUncovered(wordlist);
    if (nameOverride) wordlist.name = nameOverride;
    if (clearUrl) { wordlist.url = null; wordlist.fetchedSize = null; wordlist._updateAvailable = false; }
    persistMeta();
    repaintAfterCacheChange();
  });

  await persistData(dbKey, text);
  // The render effect drained inside batchUpdate already updated the Library
  // list, dropdown, scoring legend, stats bar, and active scroller for the
  // current selection. Nothing else to repaint here.

  if (wasEmpty) {
    if (!silent) showToast(`Loaded ${pluralize(wordlist.rawEntries.length, 'entry', 'entries')} from ${esc(source)}`);
  } else {
    const oldMap = new Map(oldEntries.map(e => [e.entry, e.score]));
    const newMap = new Map(wordlist.rawEntries.map(e => [e.entry, e.score]));
    const added   = wordlist.rawEntries.filter(e => !oldMap.has(e.entry)).sort((a, b) => a.entry.localeCompare(b.entry));
    const deleted = oldEntries.filter(e => !newMap.has(e.entry)).sort((a, b) => a.entry.localeCompare(b.entry));
    const rescored = oldEntries
      .filter(e => newMap.has(e.entry) && newMap.get(e.entry) !== e.score)
      .map(e => ({ entry: e.entry, oldScore: e.score, score: newMap.get(e.entry) }))
      .sort((a, b) => a.entry.localeCompare(b.entry));
    if (!added.length && !deleted.length && !rescored.length) {
      showAlert(`${buildWordlistNameHTML(wordlist)} is already up to date — no changes.`);
    } else {
      openUpdateSummaryDialog(wordlist, oldEntries.length, added, deleted, rescored);
    }
  }
}

async function fetchWordlist(wordlist, event, { silent = false } = {}) {
  if (event) event.stopPropagation();
  if (!wordlist || !wordlist.url || wordlist._loading) return;

  wordlist._loading = true;
  renderSources();

  try {
    const resp = await fetch(wordlist.url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
    const text = await resp.text();
    const fetchedSize = resp.headers.get('content-length') || null;
    const originalFilename = new URL(wordlist.url).pathname.split('/').pop() || null;
    wordlist._loading = false;
    await applyWordlistText(wordlist, text, { fetchedSize, originalFilename, source: wordlist.url, silent });
  } catch (err) {
    wordlist._loading = false;
    renderSources();
    const detail = err.message === 'Failed to fetch' ? '' : `: ${err.message}`;
    showToast(`Failed to fetch ${esc(wordlist.url)}${esc(detail)}`);
  }
}

const UPDATE_CHECK_INTERVAL = 60 * 60 * 1000; // 1 hour

async function checkForUpdates() {
  const candidates = state.sources.filter(l => l.url && l.rawEntries.length > 0 && l.fetchedSize);
  if (!candidates.length) return;

  let anyChanged = false;
  await Promise.all(candidates.map(async wordlist => {
    try {
      const resp = await fetch(wordlist.url, { method: 'HEAD' });
      if (!resp.ok) return;
      const size = resp.headers.get('content-length');
      if (size && size !== wordlist.fetchedSize && !wordlist._updateAvailable) {
        wordlist._updateAvailable = true;
        anyChanged = true;
      }
    } catch { /* offline or network error — silently ignore */ }
  }));

  if (anyChanged) {
    renderSources();
  }
}

function triggerImportForWordlist(wordlist, event) {
