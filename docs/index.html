// ─── Init ─────────────────────────────────────────────────────────────────────

async function init() {
  await openDB();

  const raw = lsLoad('meta');
  if (raw) {
    try {
      const meta = JSON.parse(raw);
      state.sources = await Promise.all(meta.map(async m => {
        const dbKey = m.dbKey || crypto.randomUUID();
        const text = await idbGet('data_' + dbKey) ?? await idbGet('data_' + m.id);
        const list = {
          ...(m.type     ? { type: m.type }         : {}),
          dbKey,
          icon:            m.icon || '',
          ...(m.publisherId ? { publisherId: m.publisherId } : {}),
          name: m.name, url: m.url || null,
          enabled: m.enabled, lastUpdated: m.lastUpdated || null,
          fetchedSize: m.fetchedSize || null,
          rescoreRules: (m.rescoreRules || []).map(r => ({ length: '', ...r })),
          originalFilename: m.originalFilename || null,
          ...(m.scoring      ? { scoring: m.scoring }           : {}),
          ...(m.downloadCase ? { downloadCase: m.downloadCase } : {}),
          ...(m.downloadExt  ? { downloadExt:  m.downloadExt  } : {}),
          ...(m.downloadStem ? { downloadStem: m.downloadStem } : {}),
          rawEntries: text ? parseWordlist(text) : [],
          _loading: false,
        };
        updateCatchAll(list);
        return list;
      }));
    } catch { state.sources = defaultSources(); }
  } else {
    state.sources = defaultSources();
    persistMeta();
  }

  const rawMs = lsLoad('outputScoring');
  if (rawMs) { try { state.outputScoring = JSON.parse(rawMs); } catch {} }
  else { lsSave('outputScoring', JSON.stringify(state.outputScoring.filter(r => !r._catchAll))); }

  const rawMinScore = lsLoad('minScore');
  if (rawMinScore !== null) {
    const ms = parseInt(rawMinScore, 10);
    if (!isNaN(ms) && ms >= 0) state.minScore = ms;
  }

  state.selected = MERGED_ID;

  ensureEdits();
  renderAll();
  const _overlay = document.getElementById('busy-overlay');
  if (_overlay) {
    _overlay.classList.add('done');
    _overlay.addEventListener('transitionend', () => _overlay.remove(), { once: true });
  }
  bindEvents();
  checkForUpdates();
  _updateCheckInterval = setInterval(checkForUpdates, UPDATE_CHECK_INTERVAL);

  state.sources
    .filter(l => l.url && !l.rawEntries.length)
    .forEach(l => fetchList(l));

  if (!lsLoad('visited')) {
    lsSave('visited', '1');
    HelpModal.open();
    OnboardingBanner.show();
  } else if (!lsLoad('onboarded')) {
    OnboardingBanner.show();
  }
}

function defaultSources() {
  return LIST_PUBLISHERS.map(t => {
    const list = {
      dbKey: crypto.randomUUID(),
      icon: t.icon,
      publisherId: t.id,
      name: t.name,
      url: t.url || null,
      enabled: true,
      rawEntries: [],
      lastUpdated: null,
      _loading: false,
      rescoreRules: t.defaultRules ? JSON.parse(JSON.stringify(t.defaultRules)) : [],
    };
    updateCatchAll(list);
    return list;
  });
}

// ─── My Edits helpers ─────────────────────────────────────────────────────────

function getEditsList() {
  return state.sources.find(l => l.type === 'edits');
}

function ensureEdits() {
  const edits = getEditsList();
  if (edits) {
    if (!edits.scoring) edits.scoring = DEFAULT_OUTPUT_SCORING.map(r => ({ ...r }));
    if (!edits.icon) edits.icon = EDITS_ICON;
  } else {
    const newEdits = {
      type: 'edits',
      dbKey: crypto.randomUUID(),
      icon: EDITS_ICON,
      name: 'My Edits',
      url: null,
      enabled: true,
      rawEntries: [],
      lastUpdated: null,
      _loading: false,
      rescoreRules: [],
      scoring: DEFAULT_OUTPUT_SCORING.map(r => ({ ...r })),
    };
    updateCatchAll(newEdits);
    state.sources.unshift(newEdits);
    persistMeta();
  }
}

function entriesToText(entries) {
  return entries.map(e => e.comment ? `${e.word};${e.score};${e.comment}` : `${e.word};${e.score}`).join('\n') + (entries.length ? '\n' : '');
}

function entriesToDownloadText(entries, { upper, comments }) {
  return entries.map(e => {
    const w = upper ? e.word.toUpperCase() : e.word.toLowerCase();
    return (comments && e.comment) ? `${w};${e.score};${e.comment}` : `${w};${e.score}`;
  }).join('\n') + '\n';
}

async function downloadWithDialog(defaultStem, list, entries, title = 'Download') {
  const result = await showDownloadDialog(defaultStem, list, title);
  if (!result) return;
  const { stem, ext, caseMode, comments } = result;
  triggerDownload(entriesToDownloadText(entries, { upper: caseMode === 'upper', comments }), `${stem}.${ext}`);
  showToast(`Downloaded ${pluralize(entries.length, 'entry', 'entries')}`);
}

async function copyVisibleEntries() {
  if (!scroller || !scroller.entries.length) return;
  const text = entriesToDownloadText(scroller.entries, { upper: false, comments: getDownloadComments() });
  try {
    await navigator.clipboard.writeText(text);
  } catch {
    return;
  }
  showToast('Copied to clipboard');
}

async function persistEdits(edits) {
  await persistData(edits.dbKey, entriesToText(edits.rawEntries));
  persistMeta();
}

async function downloadEdits() {
  const edits = getEditsList();
  await downloadWithDialog(edits.name, edits, edits.rawEntries);
}

async function clearEdits() {
  const edits = getEditsList();
  if (!edits.rawEntries.length) return;
  if (!await showConfirm(`Clear all ${pluralize(edits.rawEntries.length, 'entry', 'entries')} from "${esc(edits.name)}"?`, { confirmText: 'Clear' })) return;
  edits.rawEntries = [];
  invalidateListCaches(edits);
  updateCatchAll(edits);
  await persistEdits(edits);
  refreshSourceCounts();
  renderEditsDetail(edits);
}

// ─── Stats ────────────────────────────────────────────────────────────────────

const _statsCache = new WeakMap();
const _mergedStatsKey = {};
let _sourceCountsCache = null;
let _mergedListCache = null;

function invalidateRescoredCache(list) { list._rescored = null; }
function invalidateStatsCache(key) { _statsCache.delete(key); }
function invalidateSourceCounts() { _sourceCountsCache = null; _mergedListCache = null; }
function invalidateListCaches(list) {
  invalidateRescoredCache(list);
  invalidateStatsCache(list);
  invalidateSourceCounts();
  invalidateStatsCache(_mergedStatsKey);
}

function computeStats(key, entries) {
  if (_statsCache.has(key)) return _statsCache.get(key);
  if (!entries.length) { _statsCache.set(key, null); return null; }
  let min = Infinity, max = -Infinity;
  const buckets = new Array(11).fill(0);
  const freq = {};
  const scores = [];
  for (const { score } of entries) {
    if (score < min) min = score;
    if (score > max) max = score;
    buckets[Math.min(10, Math.max(0, Math.floor(score / 10)))]++;
    scores.push(score);
    freq[score] = (freq[score] || 0) + 1;
  }
  scores.sort((a, b) => a - b);
  const mid = Math.floor(scores.length / 2);
  const median = scores.length % 2 === 0 ? (scores[mid - 1] + scores[mid]) / 2 : scores[mid];
  let mode = null, modeCount = 0;
  for (const [s, c] of Object.entries(freq)) {
    if (c > modeCount) { modeCount = c; mode = +s; }
  }
  const mean = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
  const result = { count: entries.length, min, max, mean, median, mode, buckets, maxBucket: Math.max(...buckets) };
  _statsCache.set(key, result);
  return result;
}

// ─── Search ───────────────────────────────────────────────────────────────────

const CONSONANTS = 'bcdfghjklmnpqrstvwxyz';
const VOWELS = 'aeiou';

function markSpan(text, colorIdx) {
  return `<mark class="search-match search-match-${colorIdx % 5}">${text}</mark>`;
}

function segmentToPat(str) {
  let pat = '';
  for (let i = 0; i < str.length; i++) {
    const ch = str[i];
    if (ch === '?')      { pat += '.'; }
    else if (ch === '#') { pat += `[${CONSONANTS}]`; }
    else if (ch === '@') { pat += `[${VOWELS}]`; }
    else if (ch === '[') {
      const end = str.indexOf(']', i);
      if (end === -1) { pat += '\\['; }
      else { pat += str.slice(i, end + 1); i = end; }
    } else {
      pat += ch.replace(/[.+^${}()|[\]\\]/g, '\\$&');
    }
  }
  return pat;
}

function buildSearchPattern(query, wholeWord = false) {
  const q = query.toLowerCase();
  const segs    = q.split('*');
  const segPats = segs.map(segmentToPat);
  const hlParts = segPats.map(p => p ? '(' + p + ')' : '');
  const joined  = segPats.join('.*');
  return {
    filterRe: new RegExp(wholeWord ? '^' + joined + '$' : joined),
    highlight: w => highlightSegments(w, new RegExp(hlParts.join('.*'), 'id')),
  };
}

function highlightSegments(word, hlRe) {
  const m = hlRe.exec(word);
  if (!m?.indices) return word;
  let result = '', pos = 0, colorIdx = 0;
  for (let g = 1; g < m.indices.length; g++) {
    if (!m.indices[g]) continue;
    const [start, end] = m.indices[g];
    result += word.slice(pos, start) + markSpan(word.slice(start, end), colorIdx++);
    pos = end;
  }
  return result + word.slice(pos);
}

// ─── Input helpers ────────────────────────────────────────────────────────────

function blockSemicolon(e) {
  if (!e.data?.includes(';')) return;
  e.preventDefault();
  const el = e.target;
  el.classList.remove('shake');
  void el.offsetWidth; // force reflow so re-triggering restarts the animation
  el.classList.add('shake');
  el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
  showToast('Semicolons are not allowed');
}

// ─── Virtual Scroller ─────────────────────────────────────────────────────────

function scoreTier(s) {
  if (s >= 60) return 'great';
  if (s >= 50) return 'good';
  if (s >= 40) return 'fair';
  if (s >= 30) return 'meh';
  return 'bad';
}

class VirtualScroller {
  constructor(container) {
    this.container = container;
    this.allEntries = [];
    this.entries = [];
    this.hasComments = false;
    this.sortKey = null;
    this.sortDir = 'asc';
    this._lastQuery = '';
    this._minScore = null;
    this._highlight = null;
    this._colEls = {};
    this.rescoreRules = [];
    this.overrideMap = new Map();
    this._currentCols = [];
    this.showSource = false;
    this.showDeleteCol = false;
    this.editsList = null;
    this.currentListName = '';
    this._onCellEdit = null;  // (word, field, newValue) => void
    this._onEditStart = null; // (word, field, tdEl) => void
    this._onEditEnd = null;   // () => void
    this._onDeleteRow = null; // (word) => void
    this._editingCell = null;
    this._sortScores = null;

    container.style.overflowY = 'auto';

    this.table = document.createElement('table');
    this.table.className = 'word-table';

    this.colgroup = document.createElement('colgroup');
    this.table.appendChild(this.colgroup);

    const thead = document.createElement('thead');
    this.theadRow = document.createElement('tr');
    thead.appendChild(this.theadRow);
    this.table.appendChild(thead);

    this.tbody = document.createElement('tbody');
    this.table.appendChild(this.tbody);

    this.topRow = document.createElement('tr');
    this.topRow.className = 'vs-spacer';
    this.topRow.innerHTML = '<td colspan="2"></td>';
    this.botRow = document.createElement('tr');
    this.botRow.className = 'vs-spacer';
    this.botRow.innerHTML = '<td colspan="2"></td>';
    this.tbody.appendChild(this.topRow);
    this.tbody.appendChild(this.botRow);

    container.appendChild(this.table);
    container.addEventListener('scroll', () => this._render(), { passive: true });
    new ResizeObserver(() => this._render()).observe(container);

    this.table.addEventListener('click', e => {
      if (this._editingCell) return;
      const td = e.target.closest('td');
      if (!td) return;
      const tr = td.closest('tr[data-word]');
      if (!tr) return;
      const word = tr.dataset.word;
      if (td.classList.contains('col-trash') || e.target.closest('.source-trash')) {
        this._onDeleteRow?.(word);
      } else if (this._onCellEdit && (td.classList.contains('score-cell') || td.classList.contains('comment-cell'))) {
        this._openCellEdit(td, word, td.classList.contains('score-cell') ? 'score' : 'comment');
      }
    });

    // Cell popovers
    let _popTd = null;
    this.table.addEventListener('mouseover', e => {
      const td = e.target.closest('td');
      if (td === _popTd) return;
      _popTd = td;
      if (td && (td.dataset.scoreRaw !== undefined || td.dataset.commentOvName !== undefined)) {
        showCellPopover(td);
      } else {
        hideCellPopover();
      }
    });
    this.table.addEventListener('mouseleave', () => { _popTd = null; hideCellPopover(); });
  }

  setEntries(allEntries, query, rescoreRules, overrideMap, wholeWord = false, minScore = null, rescoredEntries = null) {
    this.allEntries = allEntries;
    this.hasComments = allEntries.some(e => e.comment);
    this.rescoreRules = rescoreRules || [];
    this.overrideMap = overrideMap || new Map();
    this.sortKey = 'word';
    this.sortDir = 'asc';
    this._buildSortScores(rescoredEntries);
    this._buildHeader();
    this.filter(query, wholeWord, minScore);
  }

  updateEntries(allEntries) {
    this.allEntries = allEntries;
    this.hasComments = allEntries.some(e => e.comment);
    this._sortScores = null;
    this._buildHeader();
    this._applyFilterAndSort(false);
  }

  setRescore(rules) {
    this.rescoreRules = rules || [];
    this._sortScores = null;
    this._buildHeader();
    this._applyFilterAndSort(false);
  }

  _cols() {
    const cols = ['length', 'word', 'score'];
    cols.push('comment');
    if (this.showSource) cols.push('source');
    if (this.showDeleteCol) cols.push('delete');
    return cols;
  }

  _buildHeader() {
    const LABELS = { length: 'Len', word: 'Word', score: 'Score', comment: 'Comment', source: 'Source', delete: '' };
    const ALIGN  = { length: 'right', word: 'left', score: 'left', comment: 'left', source: 'left', delete: 'center' };
    const cols = this._cols();
    this._currentCols = cols;

    this.topRow.firstElementChild.colSpan = cols.length;
    this.botRow.firstElementChild.colSpan = cols.length;

    this.colgroup.innerHTML = '';
    this._colEls = {};
    for (const key of cols) {
      const col = document.createElement('col');
      if (colWidths[key] != null) col.style.width = colWidths[key] + 'px';
      this.colgroup.appendChild(col);
      this._colEls[key] = col;
    }

    this.theadRow.innerHTML = '';
    for (let i = 0; i < cols.length; i++) {
      const key = cols[i];
      const isLast = i === cols.length - 1;
      const th = document.createElement('th');
      th.style.textAlign = ALIGN[key];

      const isDeleteCol = key === 'delete';

      if (!isDeleteCol) {
        th.setAttribute('aria-sort', this.sortKey === key ? (this.sortDir === 'asc' ? 'ascending' : 'descending') : 'none');
        const labelSpan = document.createElement('span');
        labelSpan.textContent = LABELS[key];
        th.appendChild(labelSpan);

        if (this.sortKey === key) {
          const arrow = document.createElement('span');
          arrow.className = 'sort-arrow';
          arrow.textContent = this.sortDir === 'asc' ? ' ▲' : ' ▼';
          th.appendChild(arrow);
        }

        th.addEventListener('click', e => {
          if (e.target.classList.contains('col-resize-handle')) return;
          if (this.sortKey === key) {
            this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
          } else {
            this.sortKey = key;
            this.sortDir = (key === 'score') ? 'desc' : 'asc';
          }
          this._buildHeader();
          this._applyFilterAndSort();
        });
      }

      if (isDeleteCol) th.className = 'col-trash';

      if (!isLast && !isDeleteCol) {
        const handle = document.createElement('div');
        handle.className = 'col-resize-handle';
        th.appendChild(handle);

        handle.addEventListener('pointerdown', e => {
          e.preventDefault();
          e.stopPropagation();
          const colEl = this._colEls[key];
          const startX = e.clientX;
          const startW = th.offsetWidth;
          handle.classList.add('active');
          handle.setPointerCapture(e.pointerId);
          const onMove = mv => {
            const w = Math.max(50, startW + mv.clientX - startX);
            colEl.style.width = w + 'px';
            colWidths[key] = w;
          };
          const onUp = () => {
            handle.classList.remove('active');
            handle.removeEventListener('pointermove', onMove);
            handle.removeEventListener('pointerup', onUp);
          };
          handle.addEventListener('pointermove', onMove);
          handle.addEventListener('pointerup', onUp);
        });
      }

      this.theadRow.appendChild(th);
    }
  }

  filter(query, wholeWord = false, minScore = null) {
    this._lastQuery = query || '';
    this._wholeWord = wholeWord;
    this._minScore = minScore;
    this._applyFilterAndSort();
  }

  _applyFilterAndSort(resetScroll = true) {
    const q = this._lastQuery.toLowerCase();
    let entries;
    if (!q) {
      this._highlight = null;
      entries = this.allEntries;
    } else {
      const { filterRe, highlight } = buildSearchPattern(q, this._wholeWord);
      this._highlight = highlight;
      entries = this.allEntries.filter(e => filterRe.test(e.word.toLowerCase()));
    }

    if (this._minScore !== null) {
      const ms = this._minScore;
      entries = entries.filter(e => {
        if (this.rescoreRules.length) {
          const r = rescoreEntry(e, this.rescoreRules);
          if (!r.kept) return false;
          const ov = this.overrideMap.get(e.word.toUpperCase());
          return (ov ? ov.score : r.score) >= ms;
        }
        const ov = this.overrideMap.get(e.word.toUpperCase());
        return (ov ? ov.score : e.score) >= ms;
      });
    }

    if (this.sortKey) {
      const key = this.sortKey;
      const dir = this.sortDir === 'asc' ? 1 : -1;
      if (key === 'score' && (this.rescoreRules.length || this.overrideMap.size)) {
        if (!this._sortScores) this._buildSortScores(null);
        entries = [...entries].sort((a, b) => dir * (this._sortScores.get(a) - this._sortScores.get(b)));
      } else {
        entries = [...entries].sort((a, b) => {
          const av = key === 'length' ? a.word.length : (a[key] ?? '');
          const bv = key === 'length' ? b.word.length : (b[key] ?? '');
          if (typeof av === 'number' && typeof bv === 'number') return dir * (av - bv);
          return dir * String(av).localeCompare(String(bv));
        });
      }
    }

    this.entries = entries;
    if (resetScroll) this.container.scrollTop = 0;
    const countEl = document.getElementById('search-count');
    const copyBtn = document.getElementById('search-copy');
    const filtered = !!(q || this._minScore !== null);
    if (countEl) countEl.textContent = filtered ? entries.length.toLocaleString() + (entries.length === 1 ? ' match' : ' matches') : '';
    if (copyBtn) copyBtn.hidden = !filtered;
    this._render();
  }

  _buildSortScores(rescoredEntries) {
    if (!this.rescoreRules.length && !this.overrideMap.size) { this._sortScores = null; return; }
    const map = new Map();
    const hasOverrides = this.overrideMap.size > 0;
    if (rescoredEntries) {
      const rescoreMap = new Map();
      for (const e of rescoredEntries) rescoreMap.set(e.word, e.score);
      for (const e of this.allEntries) {
        const ov = hasOverrides && this.overrideMap.get(e.word.toUpperCase());
        map.set(e, ov ? ov.score : (rescoreMap.get(e.word) ?? -1));
      }
    } else {
      const rescoreCache = new Map();
      for (const e of this.allEntries) {
        const d = this._entryDisplayState(e, rescoreCache);
        map.set(e, d.ignored ? -1 : d.effectiveScore);
      }
    }
    this._sortScores = map;
  }

  _entryDisplayState(entry, rescoreCache) {
    let rescoredScore = entry.score;
    let wasRescored = false;
    let ignored = false;
    if (this.rescoreRules.length) {
      const cacheKey = rescoreCache !== undefined ? `${entry.score}:${entry.word.length}` : null;
      let r;
      if (cacheKey !== null) {
        r = rescoreCache.get(cacheKey);
        if (r === undefined) { r = rescoreEntry(entry, this.rescoreRules); rescoreCache.set(cacheKey, r); }
      } else {
        r = rescoreEntry(entry, this.rescoreRules);
      }
      if (!r.kept) {
        ignored = true;
      } else {
        rescoredScore = r.score;
        wasRescored = r.score !== entry.score;
      }
    }
    const ov = !ignored && this.overrideMap.get(entry.word.toUpperCase());
    const effectiveScore = ov ? ov.score : rescoredScore;
    const effectiveComment = (ov && ov.comment) ? ov.comment : (entry.comment || '');
    return { ignored, rescoredScore, wasRescored, ov, effectiveScore, effectiveComment };
  }

  _render() {
    if (this._editingCell) return;
    const n = this.entries.length;
    const scrollTop = this.container.scrollTop;
    const viewH = this.container.clientHeight;

    const start = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - VS_BUFFER);
    const end   = Math.min(n, Math.ceil((scrollTop + viewH) / ROW_HEIGHT) + VS_BUFFER);

    this.topRow.firstElementChild.style.height = (start * ROW_HEIGHT) + 'px';
    this.botRow.firstElementChild.style.height = ((n - end) * ROW_HEIGHT) + 'px';

    while (this.topRow.nextSibling !== this.botRow) {
      this.tbody.removeChild(this.topRow.nextSibling);
    }

    const frag = document.createDocumentFragment();
    for (let i = start; i < end; i++) {
      const entry = this.entries[i];
      const { word, score, comment, listName: entryListName, listRef } = entry;
      const listName = entryListName || this.currentListName;
      const tier = scoreTier(score);
      const tr = document.createElement('tr');
      tr.style.height = ROW_HEIGHT + 'px';
      tr.dataset.word = word;

      const displayed = displayWord(word);
      const wordHtml = this._highlight ? this._highlight(displayed) : displayed;
      let wordCell  = `<td class="col-word" title="${displayed}">${wordHtml}</td>`;
      const { ignored, rescoredScore, wasRescored, ov, effectiveScore, effectiveComment } = this._entryDisplayState(entry);
      if (ignored) tr.classList.add('entry-ignored');
      const commentOverridden = !!(ov && ov.comment && ov.comment !== (comment || ''));
      const scoreOv = ov && ov.score !== rescoredScore;

      let innerScore;
      if (ignored) {
        innerScore = buildScoreBadgeHTML(score);
      } else {
        innerScore = buildScoreBadgeHTML(effectiveScore);
        if (wasRescored || scoreOv) innerScore += `<sup class="effective-asterisk">*</sup>`;
      }

      let scoreAttrs = '';
      if (!ignored && (wasRescored || scoreOv)) {
        scoreAttrs = ` data-score-raw="${score}" data-score-list-name="${esc(listName)}"`;
        if (wasRescored) scoreAttrs += ` data-score-rescaled="${rescoredScore}"`;
        if (scoreOv) scoreAttrs += ` data-score-ov-name="${esc(ov.listName)}" data-score-ov-val="${ov.score}"`;
      }
      let commentAttrs = '';
      if (commentOverridden) {
        commentAttrs = ` data-comment-list-name="${esc(listName)}" data-comment-raw="${esc(comment || '')}" data-comment-ov-name="${esc(ov.listName)}" data-comment-ov-val="${esc(ov.comment)}"`;
      }
      const commentInner = esc(effectiveComment) + (commentOverridden ? '<sup class="effective-asterisk">*</sup>' : '');

      const lengthCell = `<td class="col-length">${word.length}</td>`;
      const scoreCell = `<td class="score-cell"${scoreAttrs}>${innerScore}</td>`;
      const commentCell = `<td class="comment-cell"${commentAttrs}>${commentInner}</td>`;

      let sourceCell = '';
      if (this.showSource) {
        const listLabel = listRef ? buildListNameHTML(listRef, { bold: false }) : esc(listName || '');
        const editTrash = (this.showEditDeleteCol && listRef === this.editsList)
          ? `<span class="source-trash" title="Delete edit">${buildTrashIconHTML()}</span>`
          : '';
        sourceCell = `<td class="comment-cell col-source">${listLabel}${editTrash}</td>`;
      }

      tr.innerHTML =
        lengthCell +
        wordCell +
        scoreCell +
        commentCell +
        sourceCell +
        (this.showDeleteCol ? `<td class="col-trash" title="Delete">${buildTrashIconHTML()}</td>` : '');
      frag.appendChild(tr);
    }
    this.tbody.insertBefore(frag, this.botRow);
  }

  _openCellEdit(td, word, field) {
    const entry = this.allEntries.find(e => e.word.toUpperCase() === word.toUpperCase());
    if (!entry) return;

    const originalContent = td.innerHTML;
    let currentVal;
    if (field === 'score') {
      const ov = this.overrideMap.get(word.toUpperCase());
      if (ov) {
        currentVal = String(ov.score);
      } else if (this.rescoreRules.length) {
        const r = rescoreEntry(entry, this.rescoreRules);
        currentVal = r.kept ? String(r.score) : String(entry.score);
      } else {
        currentVal = String(entry.score);
      }
    } else {
      const ov = this.overrideMap.get(word.toUpperCase());
      currentVal = (ov && ov.comment) ? ov.comment : (entry.comment || '');
    }

    this._editingCell = td;
    this._onEditStart?.(word, field, td);

    const input = document.createElement('input');
    input.className = 'cell-edit' + (field === 'score' ? ' score-edit' : '');
    input.type = field === 'score' ? 'number' : 'text';
    input.value = currentVal;
    if (field === 'score') { input.min = '0'; }
    if (field === 'comment') { input.addEventListener('beforeinput', blockSemicolon); }
    td.innerHTML = '';
    td.appendChild(input);
    input.focus();
    input.select();

    let saved = false;
    const save = () => {
      if (saved) return;
      saved = true;
      this._editingCell = null;
      const raw = input.value;
      if (field === 'score') {
        const parsed = parseInt(raw, 10);
        if (!isNaN(parsed) && parsed >= 0 && parsed !== parseInt(currentVal, 10)) {
          this._onCellEdit?.(word, field, parsed, td);
        }
      } else {
        if (raw !== currentVal) {
          this._onCellEdit?.(word, field, raw, td);
        }
      }
      if (td.isConnected) td.innerHTML = originalContent;
      this._onEditEnd?.();
    };
    const cancel = () => {
      if (saved) return;
      saved = true;
      this._editingCell = null;
      if (td.isConnected) td.innerHTML = originalContent;
      this._onEditEnd?.();
    };

    input.addEventListener('blur', save);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); save(); }
      if (e.key === 'Escape') { input.removeEventListener('blur', save); cancel(); }
    });
  }
}

// ─── Update Summary Scroller ──────────────────────────────────────────────────

class UpdateSummaryScroller {
  constructor(container) {
    this.container = container;
    this.rows = [];

    this.sizer = document.createElement('div');
    this.sizer.className = 'usd-sizer';
    container.appendChild(this.sizer);

    container.addEventListener('scroll', () => this._render(), { passive: true });
    new ResizeObserver(() => this._render()).observe(container);
  }

  setRows(rows) {
    this.rows = rows;
    this.sizer.style.height = (rows.length * ROW_HEIGHT) + 'px';
    this.container.scrollTop = 0;
    this._render();
  }

  scrollToIndex(i) {
    this.container.scrollTop = i * ROW_HEIGHT;
  }

  _render() {
    const n = this.rows.length;
    const scrollTop = this.container.scrollTop;
    const viewH = this.container.clientHeight;
    const start = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - VS_BUFFER);
    const end   = Math.min(n, Math.ceil((scrollTop + viewH) / ROW_HEIGHT) + VS_BUFFER);

    this.sizer.innerHTML = '';
    const frag = document.createDocumentFragment();

    for (let i = start; i < end; i++) {
      const row = this.rows[i];
      const div = document.createElement('div');
      div.className = 'usd-row';
      div.style.top = (i * ROW_HEIGHT) + 'px';

      if (row.type === 'header') {
        div.classList.add('usd-section-header');
        div.textContent = row.label;
      } else {
        div.classList.add('usd-word-row', 'usd-' + row.kind);

        const wordSpan = document.createElement('span');
        wordSpan.className = 'usd-word-col';
        wordSpan.textContent = displayWord(row.word);
        div.appendChild(wordSpan);

        const scoreSpan = document.createElement('span');
        scoreSpan.className = 'usd-score-col';
        if (row.kind === 'rescored') {
          scoreSpan.innerHTML =
            `<span class="usd-old-score">${row.oldScore}</span>` +
            `<span class="usd-arrow">→</span>` +
            buildScoreBadgeHTML(row.score);
        } else {
          scoreSpan.innerHTML = buildScoreBadgeHTML(row.score);
        }
        div.appendChild(scoreSpan);
      }

      frag.appendChild(div);
    }

    this.sizer.appendChild(frag);
  }
}

// ─── Rescoring ────────────────────────────────────────────────────────────────

function parseRange(str) {
  str = (str || '').trim();
  if (!str) return null;
  const mPlus  = str.match(/^(\d+)\+$/);        if (mPlus)  return [{ min: +mPlus[1],  max: null }];
  const mRange = str.match(/^(\d+)[-–](\d+)$/); if (mRange) return [{ min: +mRange[1], max: +mRange[2] }];
  const mExact = str.match(/^(\d+)$/);          if (mExact) return [{ min: +mExact[1], max: +mExact[1] }];
  return null;
}

function matchesRange(value, intervals) {
  for (const { min, max } of intervals) {
    if ((min === null || value >= min) && (max === null || value <= max)) return true;
  }
  return false;
}

function scoresToRangeStr(scores) {
  if (!scores.length) return '';
  const sorted = [...scores].sort((a, b) => a - b);
  const min = sorted[0], max = sorted[sorted.length - 1];
  return min === max ? `${min}` : `${min}-${max}`;
}

function getRuleMaxScore(rule) {
  const intervals = parseRange(rule.input);
  if (!intervals) return -1;
  let max = -Infinity;
  for (const { max: imax } of intervals) {
    const m = imax === null ? Infinity : imax;
    if (m > max) max = m;
  }
  return max;
}

function outputSortKey(rule) {
  const s = parseRuleOutput(rule.output);
  if (typeof s === 'number') return s;
  if (s && typeof s === 'object') return s.max === null ? s.min : (s.min + s.max) / 2;
  if (s === 'ignore') return -1;
  return getRuleMaxScore(rule); // 'unchanged' sorts by input score
}

function rulesSig(rules) {
  return rules.map(r => `${r.input}|${r.length}|${r.output}|${r._catchAll ? 1 : 0}`).join(';');
}

// Any score not matched by a user rule is collected into a read-only catch-all row so the UI always shows complete coverage.
function updateCatchAll(list) {
  const rules = list.rescoreRules;
  const before = rulesSig(rules);

  // Remove existing auto catch-all
  const caIdx = rules.findIndex(r => r._catchAll);
  if (caIdx !== -1) rules.splice(caIdx, 1);

  // Sort user rules: primary = output score descending, then input score, then length
  rules.sort((a, b) => {
    const ao = outputSortKey(a), bo = outputSortKey(b);
    if (ao !== bo) return bo - ao;
    const am = getRuleMaxScore(a), bm = getRuleMaxScore(b);
    if (am !== bm) return bm - am;
    const aL = !!(a.length && a.length.trim()), bL = !!(b.length && b.length.trim());
    return (aL ? 0 : 1) - (bL ? 0 : 1);
  });

  // Find actual scores in the data not covered by any length-filter-free rule
  const actualScores = list.rawEntries && list.rawEntries.length
    ? [...new Set(list.rawEntries.map(e => e.score))].sort((a, b) => a - b)
    : [];
  const uncovered = actualScores.filter(s => !rules.some(r => {
    if (r.length && r.length.trim()) return false;
    const intervals = parseRange(r.input);
    return intervals && matchesRange(s, intervals);
  }));

  if (uncovered.length > 0) {
    rules.push({ input: scoresToRangeStr(uncovered), length: '', output: '', _catchAll: true });
  }
  rules.forEach(compileRule);
  return rulesSig(rules) !== before;
}

function parseRuleOutput(str) {
  str = (str || '').trim().toLowerCase();
  if (!str || str === 'unchanged') return 'unchanged';
  if (str === 'ignore') return 'ignore';
  const mRange = str.match(/^(\d+)[-–](\d+)$/);
  if (mRange) return { min: +mRange[1], max: +mRange[2] };
  const mPlus  = str.match(/^(\d+)\+$/);
  if (mPlus)  return { min: +mPlus[1], max: null };
  const mExact = str.match(/^(\d+)$/);
  return mExact ? +mExact[1] : null;
}

function compileRule(rule) {
  rule._scoreIntervals = parseRange(rule.input);
  rule._lenIntervals   = (rule.length && rule.length.trim()) ? parseRange(rule.length) : null;
  rule._output         = parseRuleOutput(rule.output);
}

function applyRescoring(entries, rules) {
  return entries.flatMap(e => {
    const r = rescoreEntry(e, rules);
    if (!r.kept) return [];
    return [r.score !== e.score ? { ...e, score: r.score } : e];
  });
}

function getRescoredEntries(list) {
  return list._rescored ??= applyRescoring(list.rawEntries, list.rescoreRules);
}

function rescoreEntry(entry, rules) {
  for (const rule of rules) {
    const scoreIntervals = rule._scoreIntervals !== undefined ? rule._scoreIntervals : parseRange(rule.input);
    if (!scoreIntervals || !matchesRange(entry.score, scoreIntervals)) continue;
    if (rule.length && rule.length.trim()) {
      const lenIntervals = rule._lenIntervals !== undefined ? rule._lenIntervals : parseRange(rule.length);
      if (!lenIntervals || !matchesRange(entry.word.length, lenIntervals)) continue;
    }
    const s = rule._output !== undefined ? rule._output : parseRuleOutput(rule.output);
    if (s === null) continue;
    if (s === 'ignore') return { kept: false };
    if (s === 'unchanged') return { kept: true, score: entry.score };
    if (s && typeof s === 'object') {
      const iv = scoreIntervals[0];
      if (iv.max === null && s.max === null) {
        // Both N+: shift by the difference
        return { kept: true, score: entry.score + (s.min - iv.min) };
      }
      // Bounded range: linearly scale; skip if shapes don't match or input is degenerate
      if (iv.min === null || iv.max === null || s.max === null || iv.min === iv.max) continue;
      const t = (entry.score - iv.min) / (iv.max - iv.min);
      return { kept: true, score: Math.round(s.min + t * (s.max - s.min)) };
    }
    return { kept: true, score: s }; // first matching rule wins
  }
  return { kept: true, score: entry.score };
}

function listCardMeta(list, contribMap) {
  const total = list.rawEntries.length;
  if (!total) return 'No data';

  const used = contribMap.get(list) ?? 0;
  return used === total
    ? `${pluralize(used, 'entry', 'entries')} used`
    : `${used.toLocaleString()} of ${pluralize(total, 'entry', 'entries')} used`;

  renderMergedCard(totalMerged ? pluralize(totalMerged, 'entry', 'entries') : 'No data', state.selected === MERGED_ID);

function updateScoringCatchAll(scoring, entries) {
  const caIdx = scoring.findIndex(r => r._catchAll);
  if (caIdx !== -1) scoring.splice(caIdx, 1);
  const actualScores = entries.length
    ? [...new Set(entries.map(e => e.score))].sort((a, b) => a - b)
    : [];
  const uncovered = actualScores.filter(s => !scoring.some(r => {
    const intervals = parseRange(r.input);
    return intervals && matchesRange(s, intervals);
  }));

  // Sort rows by score range descending (highest scores first)
  scoring.sort((a, b) => getRuleMaxScore(b) - getRuleMaxScore(a));

  if (uncovered.length > 0) {
    scoring.push({ input: scoresToRangeStr(uncovered), note: '', _catchAll: true });
  }
}

function updateOutputCatchAll() {
  const { entries } = buildMergedList();
  updateScoringCatchAll(state.outputScoring, entries);
}

function renderOutputScoring() {

  if (el) el.innerHTML = buildOutputScoringSectionHTML();
}


function deleteOutputScoringRow(i) {
  const [deleted] = state.outputScoring.splice(i, 1);
  updateOutputCatchAll();
  persistOutputScoring();
  renderOutputScoring();
  showUndoToast('Deleted scoring row', () => {
    state.outputScoring.push(deleted);
    updateOutputCatchAll();
    persistOutputScoring();
    renderOutputScoring();
  });
}

function saveOutputScoringField(i, field, val) {
  if (!state.outputScoring[i]) return;
  state.outputScoring[i][field] = val;
  delete state.outputScoring[i]._catchAll;
  updateOutputCatchAll();
  persistOutputScoring();
  renderOutputScoring();
}

function renderDetail(list) {
  const panel = document.getElementById('detail-panel');

  clearInterval(_dateTimer);
  _dateTimer = null;

  if (!list) {
    panel.innerHTML = '<div class="no-selection"><p>No list selected</p><small>Select a list from the left panel</small></div>';
    scroller = null;
    return;
  }

  if (list.type === 'edits') {
    renderEditsDetail(list);
    return;
  }

  _detailList = list;

  const stats = computeStats(list, list.rawEntries);

  const hasData = list.rawEntries.length > 0;
  const emptyMsg = list.url ? 'No data loaded — use the Fetch button to load this list'
                            : 'No data loaded — use the Import button to load this list';
  const statsHtml = buildStatsBarHTML(stats, emptyMsg);

  const label = hasData ? 'Update' : (list.url ? 'Fetch' : 'Import');
  const dot = list._updateAvailable && !list._loading ? ` <span class="update-dot"></span>` : '';
  const title = list._updateAvailable && !list._loading ? 'Update available' : '';

  let actionBtn;
  if (list.url) {
    const loadingLabel = hasData ? 'Updating…' : 'Fetching…';
    const btnLabel = `${list._loading ? loadingLabel : label}${dot}`;
    actionBtn = buildSplitBtn(btnLabel, `fetchCurrentList()`,
      [['Import', `importCurrentList()`]],
      { primary: true, disabled: !!list._loading, title });
  } else {
    actionBtn = `<button class="primary"${title ? ` title="${title}"` : ''} onclick="importCurrentList()" ${list._loading ? 'disabled' : ''}>${list._loading ? 'Importing…' : 'Import'}${dot}</button>`;
  }

  const moreMenu = buildMoreMenuHTML([
    ['Configure list', 'configureCurrentList()'],
    ['Delete list',    'deleteCurrentList()'],
  ]);

  const dlBtn = hasData ? buildSplitBtn('Download', `downloadCurrentListRescored()`,
    [['Download rescored list', `downloadCurrentListRescored()`],
     ['Download original',      `downloadCurrentListOriginal()`]]) : '';

  const detailButtons = [
    ...(hasData && list.lastUpdated ? ['<span class="detail-date"></span>'] : []),
    actionBtn,
    ...(dlBtn ? [dlBtn] : []),
    moreMenu,
  ];

  panel.innerHTML = `
    ${buildDetailHeaderHTML(esc(list.name), detailButtons, { editable: true })}
    ${statsHtml}
    <div id="rescore-section" class="rescore-section">${buildRescoreSectionHTML(list)}</div>
    ${buildTableContainerHTML()}
  `;

  createScroller();
  scroller.currentListName = list.name;
  scroller.setEntries(list.rawEntries, state.searchQuery, list.rescoreRules, buildOverrideMap(list), state.searchWholeWord, state.minScore, getRescoredEntries(list));

  attachExternalEditHandlers(scroller, () => {
    scroller.overrideMap = buildOverrideMap(list);
    scroller._sortScores = null;
    scroller._render();
  });

  if (list.lastUpdated) {
    setDetailDate(list.lastUpdated);
    _dateTimer = setInterval(() => setDetailDate(list.lastUpdated), 60_000);
  }
}

function renderEditsDetail(list) {
  const panel = document.getElementById('detail-panel');
  _detailList = list;
  updateScoringCatchAll(list.scoring, list.rawEntries);
  const stats = computeStats(list, list.rawEntries);
  const statsHtml = buildStatsBarHTML(stats, 'No edits yet — click a score or comment in any list to start editing');

  const editsButtons = [
    `<button onclick="importCurrentList()">Import</button>`,

  ];

  panel.innerHTML = `

    ${buildTableContainerHTML()}
  `;

  createScroller();
  scroller.showDeleteCol = true;
  scroller.setEntries(list.rawEntries, state.searchQuery, [], new Map(), state.searchWholeWord, state.minScore);

  scroller._onCellEdit = (word, field, newValue) => {
    const entry = list.rawEntries.find(e => e.word.toUpperCase() === word.toUpperCase());
    if (!entry) return;
    entry[field] = newValue;
    invalidateListCaches(list);
    updateCatchAll(list);
    persistEdits(list);
    refreshSourceCounts();
    scroller.setEntries(list.rawEntries, state.searchQuery, [], new Map(), state.searchWholeWord, state.minScore);
  };

  scroller._onDeleteRow = word => deleteFromEdits(word);
}

// ─── Actions ──────────────────────────────────────────────────────────────────

function attachExternalEditHandlers(s, refreshFn) {
  s._onCellEdit = (word, field, newValue, sourceTd) => {
    upsertEdits(word, field, newValue);
    if (sourceTd) flyToEdits(sourceTd, field === 'score' ? newValue : '✎');
    refreshFn?.();
  };
  s._onEditStart = (word, field, td) => showEditInfoNote(td);
  s._onEditEnd   = () => hideEditInfoNote();
}

function upsertEdits(word, field, newValue) {
  const edits = getEditsList();
  const upperWord = word.toUpperCase();
  const existing = edits.rawEntries.find(e => e.word.toUpperCase() === upperWord);
  if (existing) {
    existing[field] = newValue;
  } else {
    // Find original entry from current scroller for the other field's value
    const orig = scroller?.allEntries?.find(e => e.word.toUpperCase() === upperWord);
    const score   = field === 'score'   ? newValue : (orig?.score   ?? 50);
    const comment = field === 'comment' ? newValue : (orig?.comment ?? '');
    edits.rawEntries.push({ word: word.toLowerCase(), score, comment });
  }
  invalidateListCaches(edits);
  updateCatchAll(edits);
  persistEdits(edits);
  // Refresh merged or individual view if active
  if (state.selected === MERGED_ID) {
    clearTimeout(_refreshCountsTimer);
    _refreshCountsTimer = setTimeout(refreshSourceCounts, 0);
  } else {
    refreshSourceCounts();
  }
}

function showEditInfoNote(td) {
  let tip = document.getElementById('edit-cell-tip');
  if (!tip) {
    tip = document.createElement('div');
    tip.id = 'edit-cell-tip';
    document.body.appendChild(tip);
  }
  tip.innerHTML = `Edits are saved to ${buildListNameHTML(getEditsList())}`;
  tip.style.opacity = '0';
  requestAnimationFrame(() => {
    const input = td.querySelector('input.cell-edit');
    const r = (input ?? td).getBoundingClientRect();
    tip.style.top  = (r.bottom + 4) + 'px';
    tip.style.left = r.left + 'px';
    tip.style.opacity = '1';
  });
}

function hideEditInfoNote() {
  const tip = document.getElementById('edit-cell-tip');
  if (tip) tip.style.opacity = '0';
}

function pulseEditsCard() {
  const targetCard = document.getElementById('edits-card');
  if (!targetCard) return;
  targetCard.classList.remove('pulse');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => targetCard.classList.add('pulse'));
  });
  setTimeout(() => targetCard.classList.remove('pulse'), 1500);
}

function flyToEdits(sourceTd, value) {
  const targetCard = document.getElementById('edits-card');
  if (!targetCard || !sourceTd?.isConnected) return;

  const srcRect  = sourceTd.getBoundingClientRect();
  const dstRect  = targetCard.getBoundingClientRect();

  let clone;
  if (typeof value === 'number') {
    const t = document.createElement('template');
    t.innerHTML = buildScoreBadgeHTML(value);
    clone = t.content.firstElementChild;
    clone.classList.add('fly-clone');
  } else {
    clone = document.createElement('span');
    clone.className = 'fly-clone fly-badge';
    clone.textContent = value;
  }
  clone.style.left = srcRect.left + 'px';
  clone.style.top  = srcRect.top  + 'px';
  document.body.appendChild(clone);

  const cloneRect = clone.getBoundingClientRect();
  const dx = dstRect.left + dstRect.width  / 2 - (cloneRect.left + cloneRect.width  / 2);
  const dy = dstRect.top  + dstRect.height / 2 - (cloneRect.top  + cloneRect.height / 2);
  clone.style.setProperty('--fly-dx', dx + 'px');
  clone.style.setProperty('--fly-dy', dy + 'px');

  pulseEditsCard();

  clone.addEventListener('animationend', () => clone.remove(), { once: true });
}

const openUpdateSummaryDialog = (() => {
  const el = document.createElement('dialog');
  el.id = 'update-summary-dialog';

  document.body.appendChild(el);
  el.innerHTML = `

    <div class="usd-scroll" id="update-summary-scroll"></div>`;
  const titleEl   = el.querySelector('#update-summary-title');
  const countEl   = el.querySelector('#update-summary-count');

    if (added.length) {

      rows.push({ type: 'header', label: `Added (${added.length.toLocaleString()})` });
      for (const e of added) rows.push({ type: 'word', word: e.word, score: e.score, kind: 'added' });

      sectionIndices.deleted = rows.length;
      rows.push({ type: 'header', label: `Deleted (${deleted.length.toLocaleString()})` });
      for (const e of deleted) rows.push({ type: 'word', word: e.word, score: e.score, kind: 'deleted' });
    }
    if (rescored.length) {
      sectionIndices.rescored = rows.length;
      rows.push({ type: 'header', label: `Rescored (${rescored.length.toLocaleString()})` });
      for (const e of rescored) rows.push({ type: 'word', word: e.word, score: e.score, kind: 'rescored', oldScore: e.oldScore });
    }

    pillsEl.innerHTML = '';
    const pillDefs = [
      { key: 'added',    label: `+${added.length.toLocaleString()}`,   cls: 'usd-pill-added'   },
      { key: 'deleted',  label: `−${deleted.length.toLocaleString()}`,  cls: 'usd-pill-deleted'  },
      { key: 'rescored', label: `~${rescored.length.toLocaleString()}`, cls: 'usd-pill-rescored' },
    ];
    for (const { key, label, cls } of pillDefs) {
      if (sectionIndices[key] == null) continue;
      const btn = document.createElement('button');
      btn.className = 'usd-pill ' + cls;
      btn.textContent = label;
      btn.onclick = () => _updateScroller.scrollToIndex(sectionIndices[key]);
      pillsEl.appendChild(btn);
    }

    scrollEl.innerHTML = '';
    _updateScroller = new UpdateSummaryScroller(scrollEl);
    _updateScroller.setRows(rows);

    const opener = document.activeElement;
    el.addEventListener('close', () => opener?.focus(), { once: true });
    el.showModal();
  };
})();

async function applyWordlistText(list, text, { fetchedSize = null, originalFilename = null, nameOverride = null, source = null, clearUrl = false } = {}) {
  const dbKey = list.dbKey;
  const wasEmpty = !list.rawEntries.length;
  const oldEntries = wasEmpty ? null : list.rawEntries;

  if (nameOverride) list.name = nameOverride;
  list.rawEntries = parseWordlist(text);
  list.lastUpdated = Date.now();
  if (fetchedSize !== null) { list.fetchedSize = fetchedSize; list._updateAvailable = false; }
  if (originalFilename !== null) list.originalFilename = originalFilename;
  if (clearUrl) { list.url = null; list.fetchedSize = null; list._updateAvailable = false; }
  if (wasEmpty) list.enabled = true;
  invalidateListCaches(list);
  updateCatchAll(list);

  await persistData(dbKey, text);
  persistMeta();

  renderSources();
  if (state.selected === list) renderDetail(list);
  if (state.selected === MERGED_ID) renderMergedDetail();

  if (wasEmpty) {
    showToast(`Loaded ${pluralize(list.rawEntries.length, 'entry', 'entries')} from ${esc(source)}`);
  } else {
    const oldMap = new Map(oldEntries.map(e => [e.word, e.score]));
    const newMap = new Map(list.rawEntries.map(e => [e.word, e.score]));
    const added   = list.rawEntries.filter(e => !oldMap.has(e.word)).sort((a, b) => a.word.localeCompare(b.word));
    const deleted = oldEntries.filter(e => !newMap.has(e.word)).sort((a, b) => a.word.localeCompare(b.word));
    const rescored = oldEntries
      .filter(e => newMap.has(e.word) && newMap.get(e.word) !== e.score)
      .map(e => ({ word: e.word, oldScore: e.score, score: newMap.get(e.word) }))
      .sort((a, b) => a.word.localeCompare(b.word));
    if (!added.length && !deleted.length && !rescored.length) {
      showAlert(`${buildListNameHTML(list)} is already up to date — no changes.`);
    } else {
      openUpdateSummaryDialog(list, oldEntries.length, added, deleted, rescored);
    }
  }
}

async function fetchList(list, event) {
  if (event) event.stopPropagation();
  if (!list || !list.url || list._loading) return;

  list._loading = true;
  renderSources();
  if (state.selected === list) renderDetail(list);

  try {
    const resp = await fetch(list.url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
    const text = await resp.text();
    const fetchedSize = resp.headers.get('content-length') || null;
    const originalFilename = new URL(list.url).pathname.split('/').pop() || null;
    list._loading = false;
    await applyWordlistText(list, text, { fetchedSize, originalFilename, source: list.url });
  } catch (err) {
    list._loading = false;
    renderSources();
    if (state.selected === list) renderDetail(list);
    const detail = err.message === 'Failed to fetch' ? '' : `: ${err.message}`;
    showToast(`Failed to fetch ${esc(list.url)}${esc(detail)}`);
  }
}

const UPDATE_CHECK_INTERVAL = 60 * 60 * 1000; // 1 hour

async function checkForUpdates() {
  const candidates = state.sources.filter(l => l.url && l.rawEntries.length > 0 && l.fetchedSize);
  if (!candidates.length) return;

  let anyChanged = false;
  await Promise.all(candidates.map(async list => {
    try {
      const resp = await fetch(list.url, { method: 'HEAD' });
      if (!resp.ok) return;
      const size = resp.headers.get('content-length');
      if (size && size !== list.fetchedSize && !list._updateAvailable) {
        list._updateAvailable = true;
        anyChanged = true;
      }
    } catch { /* offline or network error — silently ignore */ }
  }));

  if (anyChanged) {
    renderSources();
    const selected = getSelected();
    if (selected?.url && selected._updateAvailable) renderDetail(selected);
  }
}

function triggerImportForList(list, event) {
  if (event) event.stopPropagation();
  if (!list) return;
  if (list.url) fetchList(list, event);
  else importToList(list);
}

function importToList(list, event) {
  if (event) event.stopPropagation();
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.txt,.csv';
  input.onchange = () => { if (input.files[0]) ingestFile(input.files[0], list); };
  input.click();
}

function ingestFile(file, list, nameOverride) {
  const reader = new FileReader();
  reader.onerror = () => showToast('Error reading file');
  reader.onabort = () => showToast('File read cancelled');
  reader.onload = async e => {
    const text = e.target.result;
    if (!list) return;

    const entries = parseWordlist(text);
    if (!entries.length && text.trim()) {
      showToast('No valid wordlist entries found — check the file format');
      return;
    }

    // My Edits: always combine instead of replace
    if (list.type === 'edits' && list.rawEntries.length > 0) {
      const existingMap = new Map(list.rawEntries.map(e => [e.word.toUpperCase(), e]));
      const newEntries = [], conflicts = [];
      let unchanged = 0;

      for (const entry of entries) {
        const existing = existingMap.get(entry.word.toUpperCase());
        if (!existing) {
          newEntries.push(entry);
        } else if (existing.score !== entry.score || existing.comment !== entry.comment) {
          conflicts.push({ existing, incoming: entry });
        } else {
          unchanged++;
        }
      }

      let conflictResolution = null;
      if (conflicts.length > 0) {
        conflictResolution = await showMergeConflict(conflicts.length);
        if (conflictResolution === null) return; // cancelled

        if (conflictResolution === 'file') {
          for (const { existing, incoming } of conflicts) {
            existing.score   = incoming.score;
            existing.comment = incoming.comment;
          }
        }
      }

      list.rawEntries.push(...newEntries);
      list.lastUpdated = Date.now();
      invalidateListCaches(list);
      updateCatchAll(list);

      await persistData(list.dbKey, entriesToText(list.rawEntries));
      persistMeta();

      renderSources();
      if (state.selected === list) {
        if (scroller) scroller.updateEntries(list.rawEntries);
        else renderDetail(list);
      }
      if (state.selected === MERGED_ID) renderMergedDetail();

      const parts = [];
      if (newEntries.length) parts.push(`${newEntries.length.toLocaleString()} new`);
      if (conflicts.length) parts.push(`${conflicts.length.toLocaleString()} ${conflictResolution === 'file' ? 'updated from file' : 'conflicts kept'}`);
      if (unchanged)        parts.push(`${unchanged.toLocaleString()} unchanged`);
      showToast(parts.length ? `Merged — ${parts.join(', ')}` : 'File already merged — no changes');
      return;
    }

    await applyWordlistText(list, text, { originalFilename: file.name, nameOverride, source: file.name });
  };
  reader.readAsText(file);
}

const ADD_WORD_TRIGGER_HTML = '<div class="add-row-trigger" onclick="openAddWordBar()">＋ Add word</div>';

function openAddWordBar() {
  const footer = document.getElementById('add-row-footer');
  if (!footer || footer.querySelector('.add-word-bar')) return;

  footer.innerHTML = '';
  const bar = document.createElement('div');
  bar.className = 'add-word-bar';
  bar.innerHTML = `
    <input class="aw-word"    placeholder="Word"    autocomplete="off" spellcheck="false">
    <input class="aw-score"   placeholder="Score"   type="number" min="0">
    <input class="aw-comment" placeholder="Comment (optional)">
    <span class="aw-hint">Enter to save · Esc to cancel</span>`;
  footer.appendChild(bar);

  const wordInput    = bar.querySelector('.aw-word');
  const scoreInput   = bar.querySelector('.aw-score');
  const commentInput = bar.querySelector('.aw-comment');
  wordInput.addEventListener('beforeinput', blockSemicolon);
  commentInput.addEventListener('beforeinput', blockSemicolon);
  wordInput.focus();

  function restoreTrigger() {
    bar.remove();
    footer.innerHTML = ADD_WORD_TRIGGER_HTML;
  }

  function commit() {
    const word = wordInput.value.trim().toUpperCase();
    const score = parseInt(scoreInput.value.trim(), 10);
    const comment = commentInput.value.trim();

    wordInput.classList.toggle('invalid', !word || word.includes(';'));
    commentInput.classList.toggle('invalid', comment.includes(';'));
    scoreInput.classList.toggle('invalid', isNaN(score) || score < 0);
    if (wordInput.classList.contains('invalid') || commentInput.classList.contains('invalid') || scoreInput.classList.contains('invalid')) return;

    const edits = getEditsList();

    const existing = edits.rawEntries.find(e => e.word.toUpperCase() === word);
    if (existing) {
      existing.score = score;
      existing.comment = comment;
      showToast(`Updated ${displayWord(word)}`);
    } else {
      edits.rawEntries.push({ word: word.toLowerCase(), score, comment });
      showToast(`Added ${displayWord(word)}`);
    }

    invalidateListCaches(edits);
    updateCatchAll(edits);
    persistEdits(edits);
    refreshSourceCounts();

    if (state.selected === edits) {
      renderEditsDetail(edits);
    } else {
      flyToEdits(bar, score);
      restoreTrigger();
    }
  }

  bar.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') restoreTrigger();
  });
}

function deleteFromEdits(word, refreshFn) {
  const edits = getEditsList();
  const idx = edits.rawEntries.findIndex(e => e.word.toUpperCase() === word.toUpperCase());
  if (idx === -1) return;

  const refresh = refreshFn ?? (() => {
    scroller.setEntries(edits.rawEntries, state.searchQuery, [], new Map(), state.searchWholeWord, state.minScore);
  });

  const [deleted] = edits.rawEntries.splice(idx, 1);
  invalidateListCaches(edits);
  updateCatchAll(edits);
  persistEdits(edits);
  refresh();
  setTimeout(refreshSourceCounts, 0);

  showUndoToast(`Deleted ${esc(displayWord(deleted.word))} from ${buildListNameHTML(edits)}`, () => {
    edits.rawEntries.splice(idx, 0, deleted);
    invalidateListCaches(edits);
    updateCatchAll(edits);
    persistEdits(edits);
    refresh();
    setTimeout(refreshSourceCounts, 0);
  });
}

async function deleteList(list, event) {
  if (event) event.stopPropagation();
  if (!list) return;
  if (!await showConfirm('', { confirmText: 'Delete', html: `Delete ${buildListNameHTML(list)}?` })) return;
  state.sources = state.sources.filter(l => l !== list);
  invalidateListCaches(list);
  await idbDel('data_' + list.dbKey);
  persistMeta();
  if (state.selected === list) {
    state.selected = null;
    scroller = null;
  }
  renderAll();
}

function toggleList(list, event) {
  if (event) event.stopPropagation();
  if (!list || (!list.rawEntries.length && list.type !== 'edits')) return;
  list.enabled = !list.enabled;
  persistMeta();
  renderSources();
  refreshSourceCounts();
  if (state.selected === MERGED_ID && scroller) {
    scroller.updateEntries(buildMergedList().entries);
  } else if (scroller) {
    scroller.overrideMap = buildOverrideMap(getSelected());
    scroller._sortScores = null;
    scroller._applyFilterAndSort(false);
  }
}

function addNewList(listDef) {
  const list = { rescoreRules: [], ...listDef, rawEntries: [], lastUpdated: null, _loading: false };
  updateCatchAll(list);
  state.sources.push(list);
  invalidateSourceCounts();
  invalidateStatsCache(_mergedStatsKey);
  persistMeta();
  renderSources();
  return list;
}

  // Popup lives inside the dialog so it's in the top layer with it
  const pickerPopup = document.createElement('div');
