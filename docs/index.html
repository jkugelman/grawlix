  el.appendChild(pickerPopup);

  // State
  let _mode           = 'configure';
  let _list           = null;
  let _pickerOpen     = false;
  let _selectedPublisher = null;
  let _originalPublisher = null;
  let _pendingIcon    = '';
  let _pendingName    = '';
  let _rulesOption    = 'none';
  let _pendingFile    = null;

  // Elements
  const titleEl          = el.querySelector('#configure-list-title');
  const publisherChipsEl = el.querySelector('#publisher-chips');
  const rulesOptionRow   = el.querySelector('#rules-option-row');
  const rulesSelect      = el.querySelector('#rules-select');
  const rulesPreviewWrap = el.querySelector('#rules-preview-wrap');
  const iconPreview      = el.querySelector('#config-icon-preview');
  const pickerTrigger    = el.querySelector('#icon-picker-trigger');
  const imgUrlInput      = el.querySelector('#icon-img-url-input');
  const nameInput        = el.querySelector('#config-name-input');
  const urlInput         = el.querySelector('#config-url-input');
  const urlCheckIcon     = el.querySelector('#url-check-icon');
  const urlMetaEl        = el.querySelector('#source-url-meta');
  const importSection    = el.querySelector('#source-import-section');
  const btnSave          = el.querySelector('#btn-cfg-save');
  const importZoneLabel  = el.querySelector('#cfg-import-zone-label');

  // ── Icon picker ──────────────────────────────────────────────────────────────

  function colorSeedObj() {
    return _list || { url: urlInput.value.trim(), name: _pendingName };
  }

  function setBufferedIcon(icon) {
    _pendingIcon = icon;
    iconPreview.innerHTML = icon || buildInitialsIconHTML(_pendingName, colorSeed(colorSeedObj()));
  }

  function syncEmojiGrid() {
    const emojiM = _pendingIcon?.match(/<svg class="[^"]*list-icon-emoji[^"]*"[^>]*>[^<]*<text[^>]*>([^<]+)<\/text>/);
    const cur = emojiM ? emojiM[1] : null;
    pickerPopup.querySelectorAll('.icon-emoji-btn').forEach(btn => {
      if (btn.hasAttribute('data-auto')) {
        btn.classList.toggle('selected', !_pendingIcon);
      } else {
        btn.classList.toggle('selected', btn.dataset.emoji === cur);
      }
    });
  }

  function showPickerMode(mode) {
    pickerPopup.querySelectorAll('.icon-picker-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
    pickerPopup.querySelectorAll('.icon-picker-pane').forEach(p => p.classList.toggle('active', p.dataset.pane === mode));
    if (mode === 'emoji') syncEmojiGrid();
    if (mode === 'url')   setTimeout(() => imgUrlInput.focus(), 30);
  }

  function openPicker() {
    _pickerOpen = true;
    pickerPopup.querySelector('[data-auto]').innerHTML = buildInitialsIconHTML(_pendingName, colorSeed(colorSeedObj()));
    const tr = pickerTrigger.getBoundingClientRect();
    const dr = el.getBoundingClientRect();
    pickerPopup.style.top  = (tr.bottom - dr.top + 4) + 'px';
    pickerPopup.style.left = (tr.left - dr.left) + 'px';
    pickerPopup.hidden = false;
    const imgM = _pendingIcon?.match(/^<img src="([^"]+)"/);
    if (imgM) { imgUrlInput.value = imgM[1]; showPickerMode('url'); }
    else      { imgUrlInput.value = ''; showPickerMode('emoji'); }
  }

  function closePicker() {
    _pickerOpen = false;
    pickerPopup.hidden = true;
  }

  pickerTrigger.addEventListener('click',   () => { _pickerOpen ? closePicker() : openPicker(); });
  pickerTrigger.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); _pickerOpen ? closePicker() : openPicker(); } });

  el.addEventListener('mousedown', e => {
    if (!_pickerOpen) return;
    if (pickerPopup.contains(e.target) || pickerTrigger.contains(e.target)) return;
    closePicker();
  });

  pickerPopup.querySelectorAll('.icon-picker-tab').forEach(tab => {
    tab.addEventListener('click', () => showPickerMode(tab.dataset.mode));
  });

  pickerPopup.querySelector('#icon-emoji-grid').addEventListener('click', e => {
    const btn = e.target.closest('.icon-emoji-btn');
    if (!btn) return;
    if (btn.hasAttribute('data-auto')) {
      setBufferedIcon('');
    } else {
      const emoji = btn.dataset.emoji;
      setBufferedIcon(_pendingIcon?.includes(`>${esc(emoji)}<`) ? '' : buildEmojiIconHTML(emoji));
    }
    syncEmojiGrid();
    closePicker();
  });

  imgUrlInput.addEventListener('input', () => {
    const url = imgUrlInput.value.trim();
    setBufferedIcon(url ? `<img src="${esc(url)}" class="list-icon list-icon-img" onerror="this.style.display='none'" alt="">` : '');
  });

  // ── Publisher chips ──────────────────────────────────────────────────────────

  function renderPublisherChips() {
    const chips = [...LIST_PUBLISHERS].sort((a, b) => a.popularity - b.popularity).map(p => {
      const icon = p.icon || buildInitialsIconHTML(p.name, colorSeed(p));
      return `<button class="publisher-chip${_selectedPublisher === p ? ' active' : ''}" data-publisher-id="${p.id}">${icon}${esc(p.name)}</button>`;
    });
    chips.push(`<button class="publisher-chip${!_selectedPublisher ? ' active' : ''}" data-publisher-id="">Custom</button>`);
    publisherChipsEl.innerHTML = chips.join('');
  }

  function selectPublisher(publisher) {
    _selectedPublisher = publisher;
    renderPublisherChips();
    if (publisher) {
      if (_mode === 'add') {
        _pendingName = publisher.name;
        nameInput.value = publisher.name;
        setBufferedIcon(publisher.icon);
        if (publisher.url) {
          urlInput.value = publisher.url;
        }
      }
      _rulesOption = _mode === 'add' ? 'recommended' : 'none';
    }
    updateRulesOptionRow();
    updateRulesPreview();
  }

  publisherChipsEl.addEventListener('click', e => {
    const chip = e.target.closest('.publisher-chip');
    if (!chip) return;
    const publisher = chip.dataset.publisherId ? LIST_PUBLISHERS.find(p => p.id === chip.dataset.publisherId) : null;
    selectPublisher(publisher);
  });

  // ── Rules option ─────────────────────────────────────────────────────────────

  function updateRulesOptionRow() {
    if (!_selectedPublisher) { rulesOptionRow.hidden = true; return; }
    const isAdd = _mode === 'add';
    const publisherUnchanged = !isAdd && _selectedPublisher?.id === _originalPublisher?.id;
    const recommendedIsNoop  = publisherUnchanged && rulesMatchDefaultRules(_list, _selectedPublisher);
    const applyVerb = isAdd ? 'Use' : publisherUnchanged ? 'Reapply' : 'Apply';
    const opts = [{ value: 'recommended', label: `${applyVerb} recommended rules`, disabled: recommendedIsNoop }];
    if (_selectedPublisher.defaultRules?.some(r => r.note))
      opts.push({ value: 'levels', label: `${applyVerb} scoring levels only` });
    opts.push({ value: 'none', label: isAdd ? 'None' : 'Do not change rules' });
    rulesSelect.innerHTML = opts.map(o =>
      `<option value="${o.value}"${_rulesOption === o.value ? ' selected' : ''}${o.disabled ? ' disabled' : ''}>${o.label}</option>`
    ).join('');
    rulesOptionRow.hidden = false;
  }

  function rulesMatchDefaultRules(list, publisher) {
    const publisherRules = publisher?.defaultRules || [];
    const listRules      = (list?.rescoreRules || []).filter(r => !r._catchAll);
    if (listRules.length !== publisherRules.length) return false;
    return listRules.every((r, i) => {
      const p = publisherRules[i];
      return r.input === p.input && r.length === p.length && r.output === p.output && (r.note ?? '') === (p.note ?? '');
    });
  }

  function updateRulesPreview() {
    if (!_selectedPublisher || _rulesOption === 'none') { rulesPreviewWrap.hidden = true; return; }
    const rules = _rulesOption === 'levels'
      ? _selectedPublisher.defaultRules.map(r => ({ ...r, length: '', output: '' }))
      : _selectedPublisher.defaultRules;
    rulesPreviewWrap.hidden = false;
    rulesPreviewWrap.innerHTML = buildRulesListHTML(rules || [], {
      rulesId: 'preview-rules',
      saveFn: '', deleteFn: '',
      rescore: true,
      readOnly: true,
    });
  }

  rulesSelect.addEventListener('change', () => {
    _rulesOption = rulesSelect.value;
    updateRulesPreview();
  });

  // ── Name input ────────────────────────────────────────────────────────────────

  nameInput.addEventListener('input', () => {
    _pendingName = nameInput.value;
    if (!_pendingIcon) {
      iconPreview.innerHTML = buildInitialsIconHTML(_pendingName, colorSeed(colorSeedObj()));
      if (_pickerOpen) pickerPopup.querySelector('[data-auto]').innerHTML = buildInitialsIconHTML(_pendingName, colorSeed(colorSeedObj()));
    }
  });

  nameInput.addEventListener('focus', () => nameInput.classList.remove('invalid'));

  // ── Auto-update URL / file areas ─────────────────────────────────────────────


  // ── URL guardrail check ───────────────────────────────────────────────────────

  let _urlCheckTimer = null;
  let _urlCheckAbort = null;

  const HTTP_REASON = { 400:'Bad Request', 401:'Unauthorized', 403:'Forbidden', 404:'Not Found',
    405:'Method Not Allowed', 410:'Gone', 429:'Too Many Requests', 500:'Internal Server Error',
    502:'Bad Gateway', 503:'Service Unavailable', 504:'Gateway Timeout' };

  function setUrlCheckError(msg) {
    urlCheckIcon.innerHTML = '<span class="url-check-err-icon">✗</span>';
    urlCheckIcon.hidden = false;
    urlMetaEl.innerHTML = `<span class="url-check-error">${msg}</span>`;
    urlMetaEl.classList.add('visible');
  }
  function setUrlCheckWarn(msg) {
    urlCheckIcon.textContent = '⚠️';
    urlCheckIcon.hidden = false;
    urlMetaEl.innerHTML = `<span class="url-check-warn">${msg}</span>`;
    urlMetaEl.classList.add('visible');
  }
  function setUrlCheckOk() {
    urlCheckIcon.innerHTML = '<span class="url-check-ok-icon">✓</span>';
    urlCheckIcon.hidden = false;
    urlMetaEl.classList.remove('visible');
  }

  async function checkUrl(url, signal) {
    // Step 1: HEAD — reachability + content-length (needed for update checking)
    let hasContentLength = false;
    try {
      const headResp = await fetch(url, { method: 'HEAD', signal });
      if (!headResp.ok) {
        const reason = headResp.statusText || HTTP_REASON[headResp.status] || '';
        setUrlCheckError(`Server returned ${headResp.status}${reason ? ' ' + esc(reason) : ''}`);
        return;
      }
      hasContentLength = !!headResp.headers.get('content-length');
    } catch (err) {
      if (err.name === 'AbortError') return;
      setUrlCheckError('Unreachable — possible CORS restriction');
      return;
    }

    // Step 2: Range GET — fetch first 1 KB and validate content
    let chunkText = '';
    try {
      const rangeResp = await fetch(url, { method: 'GET', headers: { 'Range': 'bytes=0-1023' }, signal });
      if (rangeResp.body) {
        const reader = rangeResp.body.getReader();
        try {
          const { value } = await reader.read();
          if (value) chunkText = new TextDecoder().decode(value);
        } finally {
          reader.cancel();
        }
      }
    } catch (err) {
      if (err.name === 'AbortError') return;
      setUrlCheckWarn("Can't verify content");
      return;
    }

    if (!validateWordlistChunk(chunkText)) {
      setUrlCheckError('Not a wordlist file');
      return;
    }

    if (hasContentLength) {
      setUrlCheckOk();
    } else {
      setUrlCheckWarn('Update checking unavailable (no content-length)');
    }
  }

  urlInput.addEventListener('input', () => {
    clearTimeout(_urlCheckTimer);
    if (_urlCheckAbort) { _urlCheckAbort.abort(); _urlCheckAbort = null; }
    const url = urlInput.value.trim();
    if (!url) { urlCheckIcon.hidden = true; urlMetaEl.classList.remove('visible'); return; }
    urlCheckIcon.innerHTML = '<div class="url-check-spinner"></div>';
    urlCheckIcon.hidden = false;
    urlMetaEl.classList.remove('visible');
    _urlCheckTimer = setTimeout(() => {
      _urlCheckAbort = new AbortController();
      checkUrl(url, _urlCheckAbort.signal);
    }, 600);
  });

  bindDropZone(el.querySelector('#cfg-drop-zone'), el.querySelector('#cfg-file-input'), file => {
    _pendingFile = file;
    importZoneLabel.textContent = file.name;
    if (!nameInput.value.trim()) {
      _pendingName = nameFromPath(file.name);
      nameInput.value = _pendingName;
      if (!_pendingIcon) iconPreview.innerHTML = buildInitialsIconHTML(_pendingName, colorSeed(colorSeedObj()));
    }
  });

  // ── Save / Add ────────────────────────────────────────────────────────────────

  function computeRulesToApply() {
    if (!_selectedPublisher) return _mode === 'add' ? [] : null;
    if (_rulesOption === 'recommended') return JSON.parse(JSON.stringify(_selectedPublisher.defaultRules || []));
    if (_rulesOption === 'levels')      return _selectedPublisher.defaultRules.map(r => ({ ...r, output: '' }));
    return _mode === 'add' ? [] : null;
  }

  btnSave.onclick = () => {
    const name = nameInput.value.trim();
    if (!name) { nameInput.focus(); nameInput.classList.add('invalid'); return; }
    const rules = computeRulesToApply();
    const url   = urlInput.value.trim() || null;

    if (_mode === 'add') {
      const list = addNewList({
        dbKey: crypto.randomUUID(), icon: _pendingIcon, name,
        url, enabled: true,
        ...(_selectedPublisher ? { publisherId: _selectedPublisher.id } : {}),
        rescoreRules: rules || [],
      });
      el.close();
      if (url) {
        fetchList(list).then(() => selectList(list));
      } else if (_pendingFile) {
        ingestFile(_pendingFile, list, name);
        selectList(list);
      } else {
        selectList(list);
      }
    } else {
      _list.icon = _pendingIcon;
      _list.name = name;
      _list.url  = url;
      if (_selectedPublisher) { _list.publisherId = _selectedPublisher.id; } else { delete _list.publisherId; }
      if (rules !== null) { _list.rescoreRules = rules; updateCatchAll(_list); }
      persistMeta();
      invalidateListCaches(_list);
      refreshSourceCounts();
      renderSources();
      renderDetail(_list);
      el.close();
    }
  };

  // ── Cancel / close ────────────────────────────────────────────────────────────

  el.querySelector('#btn-cfg-cancel').onclick = () => el.close();
  el.querySelector('.dialog-close-btn').onclick  = () => el.close();
  el.addEventListener('click',  e => { if (e.target === el) el.close(); });
  el.addEventListener('cancel', e => { if (_pickerOpen) { e.preventDefault(); closePicker(); } });
  el.addEventListener('close',  () => {
    closePicker();
    clearTimeout(_urlCheckTimer);
    if (_urlCheckAbort) { _urlCheckAbort.abort(); _urlCheckAbort = null; }
  });

  // ── open (configure mode) ─────────────────────────────────────────────────────

  function open(list) {
    _mode           = 'configure';
    _list           = list;
    _pickerOpen     = false;
    _selectedPublisher = getPublisher(list);
    _originalPublisher = _selectedPublisher;
    _pendingIcon    = list.icon || '';
    _pendingName    = list.name || '';
    _pendingFile    = null;
    _rulesOption    = 'none';

    titleEl.textContent = 'Configure List';
    btnSave.textContent = 'Save';
    pickerPopup.hidden = true;
    nameInput.classList.remove('invalid');
    iconPreview.innerHTML = list.icon || buildInitialsIconHTML(list.name, colorSeed(list));
    nameInput.value = list.name || '';
    urlInput.value  = list.url  || '';

    renderPublisherChips();
    updateRulesOptionRow();
    updateRulesPreview();
    if (list.url) {
      urlCheckIcon.innerHTML = '<div class="url-check-spinner"></div>';
      urlCheckIcon.hidden = false;
      urlMetaEl.classList.remove('visible');
      _urlCheckAbort = new AbortController();
      checkUrl(list.url, _urlCheckAbort.signal);
    } else {
      urlCheckIcon.hidden = true;
      urlMetaEl.classList.remove('visible');
    }
    importSection.hidden = true;

    const opener = document.activeElement;
    el.addEventListener('close', () => opener?.focus(), { once: true });
    el.showModal();
  }

  // ── openAdd (add mode) ────────────────────────────────────────────────────────

  function openAdd() {
    _mode           = 'add';
    _list           = null;
    _pickerOpen     = false;
    _selectedPublisher = null;
    _originalPublisher = null;
    _pendingIcon    = '';
    _pendingName    = '';
    _pendingFile    = null;
    _rulesOption    = 'none';

    titleEl.textContent = 'Add List';
    btnSave.textContent = 'Add';
    pickerPopup.hidden = true;
    nameInput.classList.remove('invalid');
    iconPreview.innerHTML = buildInitialsIconHTML('', colorSeed({ name: '' }));
    nameInput.value = '';
    urlInput.value  = '';
    urlCheckIcon.hidden = true;
    urlMetaEl.classList.remove('visible');
    importZoneLabel.textContent = 'Drop file here or click to browse';

    renderPublisherChips();
    updateRulesOptionRow();
    updateRulesPreview();

    importSection.hidden = false;

    const opener = document.activeElement;
    el.addEventListener('close', () => opener?.focus(), { once: true });
    el.showModal();
  }

  return { open, openAdd };
})();

// ─── Event wiring ─────────────────────────────────────────────────────────────

function bindEvents() {
  // Header chrome
  document.querySelector('.header-logo-link').href = location.pathname;
  document.getElementById('btn-settings').onclick = () => SettingsDialog.open();

  // Output card
  const mergedCard = document.getElementById('merged-card');
  mergedCard.onclick = selectMergedList;
  mergedCard.onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectMergedList(); } };

  // Delegated click/keydown/change for source cards
  const listsContainer = document.getElementById('lists-container');

  listsContainer.addEventListener('click', e => {
    const toggleLabel = e.target.closest('label.toggle');
    if (toggleLabel) {
      const card = toggleLabel.closest('.list-card[data-list]');
      if (card?._list && !card._list.rawEntries.length && card._list.type !== 'edits') {
        e.stopPropagation();
        triggerImportForList(card._list, e);
      }
      return;
    }
    const card = e.target.closest('.list-card[data-list]');
    if (!card?._list) return;
    selectList(card._list);
  });

  listsContainer.addEventListener('keydown', e => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    const card = e.target.closest('.list-card[data-list]');
    if (!card?._list) return;
    e.preventDefault();
    selectList(card._list);
  });

  listsContainer.addEventListener('change', e => {
    const toggle = e.target.closest('.toggle input[type="checkbox"]');
    if (!toggle) return;
    const card = toggle.closest('.list-card[data-list]');
    if (!card?._list) return;
    toggleList(card._list, e);
  });

  // Mouse drag-to-reorder
  let _dragList = null;

  listsContainer.addEventListener('dragstart', e => {
    const card = e.target.closest('.list-card[data-list]');
    if (!card?._list) return;
    _dragList = card._list;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', '');
    setTimeout(() => card.classList.add('dragging'), 0);
  });

  listsContainer.addEventListener('dragend', () => {
    document.querySelectorAll('.list-card.dragging, .list-card.drag-over')
      .forEach(el => el.classList.remove('dragging', 'drag-over'));
    _dragList = null;
  });

  listsContainer.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const card = e.target.closest('.list-card[data-list]');
    if (!card || card._list === _dragList) return;
    document.querySelectorAll('.list-card.drag-over').forEach(el => el.classList.remove('drag-over'));
    card.classList.add('drag-over');
  });

  listsContainer.addEventListener('dragleave', e => {
    const card = e.target.closest('.list-card');
    if (card && !card.contains(e.relatedTarget)) card.classList.remove('drag-over');
  });

  listsContainer.addEventListener('drop', e => {
    e.preventDefault();
    const card = e.target.closest('.list-card[data-list]');
    const toList = card?._list;
    if (!_dragList || !toList || _dragList === toList) return;
    const fromIdx = state.sources.indexOf(_dragList);
    const toIdx   = state.sources.indexOf(toList);
    if (fromIdx === -1 || toIdx === -1) return;
    const [item] = state.sources.splice(fromIdx, 1);
    state.sources.splice(toIdx, 0, item);
    persistMeta();
    renderSources();
    clearTimeout(_refreshCountsTimer);
    _refreshCountsTimer = setTimeout(refreshSourceCounts, 0);
  });

  // Touch drag-to-reorder (mobile/touch screens)
  let _touchDragList = null;

  const commitTouchReorder = toList => {
    if (!toList || toList === _touchDragList) return;
    const fromIdx = state.sources.indexOf(_touchDragList);
    const toIdx   = state.sources.indexOf(toList);
    if (fromIdx === -1 || toIdx === -1) return;
    const [item] = state.sources.splice(fromIdx, 1);
    state.sources.splice(toIdx, 0, item);
    persistMeta();
    renderSources();
    clearTimeout(_refreshCountsTimer);
    _refreshCountsTimer = setTimeout(refreshSourceCounts, 0);
  };

  listsContainer.addEventListener('touchstart', e => {
    if (!e.target.closest('.drag-handle')) return;
    const card = e.target.closest('.list-card[data-list]');
    if (!card?._list) return;
    e.preventDefault();
    _touchDragList = card._list;
    card.classList.add('dragging');
  }, { passive: false });

  listsContainer.addEventListener('touchmove', e => {
    if (!_touchDragList) return;
    e.preventDefault();
    const touch = e.touches[0];
    const overCard = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.list-card[data-list]');
    listsContainer.querySelectorAll('.list-card.drag-over').forEach(c => c.classList.remove('drag-over'));
    if (overCard && overCard._list !== _touchDragList) overCard.classList.add('drag-over');
  }, { passive: false });

  const endTouchDrag = () => {
    if (!_touchDragList) return;
    const overCard = listsContainer.querySelector('.list-card.drag-over');
    const toList = overCard?._list;
    listsContainer.querySelectorAll('.list-card.dragging, .list-card.drag-over')
      .forEach(el => el.classList.remove('dragging', 'drag-over'));
    commitTouchReorder(toList);
    _touchDragList = null;
  };
  listsContainer.addEventListener('touchend', endTouchDrag);
  listsContainer.addEventListener('touchcancel', endTouchDrag);

  // Global keyboard shortcuts
  document.addEventListener('keydown', e => {
    const active = document.activeElement;
    const inField = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable);

    if (e.key === 'F2') {
      if (inField) return;
      if (state.selected && state.selected !== MERGED_ID) { e.preventDefault(); startCardRename(state.selected); }
      return;
    }

    if (e.altKey && !e.ctrlKey && !e.metaKey && !e.shiftKey) {
      const k = e.key.toLowerCase();
      if (k === 's') {
        const el = document.getElementById('search-input');
        if (el) { e.preventDefault(); el.focus(); el.select(); }
      } else if (k === 'w') {
        const el = document.getElementById('search-whole-word');
        if (el) { e.preventDefault(); el.checked = !el.checked; onSearchWholeWord(el.checked); }
      } else if (k === 'm') {
        const el = document.getElementById('score-min-input');
        if (el) { e.preventDefault(); el.focus(); el.select(); }
      }
    }
  });

}

  pop.style.left = rect.left + 'px';

    if (left + pw > window.innerWidth - 8) pop.style.left = (window.innerWidth - 8 - pw) + 'px';
  });

function buildCellPopoverHTML(td) {
  const { scoreRaw, scoreRescaled, scoreOvName, scoreOvVal, scoreListName,
          commentRaw, commentOvName, commentOvVal, commentListName } = td.dataset;

  let html = '';

  if (scoreRaw !== undefined) {
    const thisScore = scoreRescaled ? `${scoreRaw} → ${scoreRescaled}` : scoreRaw;
    html += `<div><b>${esc(scoreListName)}:</b> ${thisScore}</div>`;
    if (scoreOvName) html += `<div>Overridden by <b>${esc(scoreOvName)}:</b> ${scoreOvVal}</div>`;
  }

  if (commentOvName !== undefined) {
    if (commentRaw) {
      html += `<div><b>${esc(commentListName)}:</b> ${esc(commentRaw)}</div>`;
      html += `<div>Overridden by <b>${esc(commentOvName)}:</b> ${esc(commentOvVal)}</div>`;
    } else {
      html += `<div>From <b>${esc(commentOvName)}</b></div>`;
    }
  }

  return html;
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function pluralize(n, singular, plural = singular + 's') {
  return `${n.toLocaleString()} ${n === 1 ? singular : plural}`;
}

function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60)  return 'just now';
  const m = Math.floor(s / 60);
  if (m < 60)  return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24)  return `${h}h ago`;
  const d = Math.floor(h / 24);
  if (d < 30)  return `${d} day${d === 1 ? '' : 's'} ago`;
  const mo = Math.floor(d / 30);
  if (mo < 12) return `${mo} month${mo === 1 ? '' : 's'} ago`;
  const yr = Math.floor(d / 365);
  return `${yr} year${yr === 1 ? '' : 's'} ago`;
}

function nameToInitials(name) {
  const words = name.trim().split(/\s+/).map(w => w.replace(/[^a-zA-Z0-9]/g, '')).filter(Boolean);
  if (!words.length) return '?';
  if (words.length === 1) return words[0].slice(0, 2).toUpperCase();
  return (words[0][0] + words[words.length - 1][0]).toUpperCase();
}

function nameColorIndex(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (Math.imul(31, h) + name.charCodeAt(i)) | 0;
  return Math.abs(h) % INITIALS_PALETTE.length;
}

function buildInitialsIconHTML(name, colorSeed = name) {

function afterRuleChange(list) {

function deleteRule(idx) {
  const list = getSelected();
  if (!list) return;
  const [deleted] = list.rescoreRules.splice(idx, 1);
  afterRuleChange(list);
  showUndoToast('Deleted rescore rule', () => {

    afterRuleChange(list);
  });
}

function saveRuleField(idx, field, value) {
  const list = getSelected();
  if (!list || !list.rescoreRules[idx]) return;
  if (field === 'length' && value.trim().toLowerCase() === 'any') value = '';
  if (field === 'output' && value.trim().toLowerCase() === 'unchanged') value = '';
  list.rescoreRules[idx][field] = value;
  // User explicitly edited this rule — promote it from catch-all to regular rule
  delete list.rescoreRules[idx]._catchAll;
  afterRuleChange(list);
}

function noteDisplayHTML(note) {
  return `<span class="rule-note-text">${esc(note)}</span><span class="edit-hint rule-note-pencil" aria-hidden="true">✏️</span>`;
}

function startNoteEdit(wrapEl) {
  if (wrapEl.querySelector('.rule-note-input')) return;
  const i = parseInt(wrapEl.closest('.rule-row').dataset.i, 10);
  const isOutput = !!wrapEl.closest('#output-scoring-section');
  const isEdits  = !!wrapEl.closest('#edits-scoring-section');

  let currentNote, onSave;
  if (isOutput) {
    if (!state.outputScoring[i]) return;
    currentNote = state.outputScoring[i].note || '';
    onSave = note => saveOutputScoringField(i, 'note', note);
  } else if (isEdits) {
    const edits = getEditsList();
    if (!edits.scoring[i]) return;
    currentNote = edits.scoring[i].note || '';
    onSave = note => saveEditsScoringField(i, 'note', note);
  } else {
    const list = getSelected();
    if (!list?.rescoreRules[i]) return;
    currentNote = list.rescoreRules[i].note || '';
    onSave = note => saveRuleField(i, 'note', note);
  }

  wrapEl.innerHTML = `<input class="rule-note-input" value="${esc(currentNote)}" placeholder="note…">`;
  const input = wrapEl.querySelector('input');
  input.focus();
  input.select();

  let committed = false;
  function commit() {
    if (committed) return;
    committed = true;
    const newNote = input.value;
    onSave(newNote);
    if (wrapEl.isConnected) {
      wrapEl.innerHTML = noteDisplayHTML(newNote);
      wrapEl.classList.toggle('has-note', !!newNote.trim());
    }
  }
  input.addEventListener('blur', commit, { once: true });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { input.blur(); }
    if (e.key === 'Escape') {
      committed = true;
      if (wrapEl.isConnected) {
        wrapEl.innerHTML = noteDisplayHTML(currentNote);
        wrapEl.classList.toggle('has-note', !!currentNote.trim());
      }
    }
  });
}

function isRuleOutputInvalid(inputVal, outputVal) {
  const v = (outputVal || '').trim();
  if (!v) return false;
  const parsed = parseRuleOutput(v);
  if (parsed === null) return true;
  if (parsed && typeof parsed === 'object') {
    const iv = parseRange((inputVal || '').trim())?.[0];
    if (parsed.max === null) {
      // N+ output requires N+ input
      if (!iv || iv.max !== null) return true;
    } else {
      // Bounded range output requires bounded non-degenerate input range
      if (!iv || iv.min === null || iv.max === null || iv.min === iv.max) return true;
    }
  }
  return false;
}

function validateRulesContainer(container) {
  if (!container) return;
  container.querySelectorAll('.rule-in').forEach(inp => {
    inp.classList.toggle('invalid', parseRange(inp.value.trim()) === null);
  });
  container.querySelectorAll('.rule-len').forEach(inp => {
    const v = inp.value.trim();
    inp.classList.toggle('invalid', v !== '' && parseRange(v) === null);
  });
  container.querySelectorAll('.rule-out').forEach(inp => {
    const inEl = inp.closest('.rule-row')?.querySelector('.rule-in');
    inp.classList.toggle('invalid', isRuleOutputInvalid(inEl?.value, inp.value));
  });
}

function onRuleInput(el) {
  if (el.classList.contains('rule-len') && el.value.trim().toLowerCase() === 'any') el.value = '';
  if (el.classList.contains('rule-out') && el.value.trim().toLowerCase() === 'unchanged') el.value = '';
  const container = el.closest('#rescore-rules, #output-scoring-rules, #edits-scoring-rules');
  if (!container) return;
  validateRulesContainer(container);
  if (container.id === 'rescore-rules') updateRescorePreview();

function startInlineRename(inputEl, originalName, { onCommit, onCancel, onInput }) {
  let done = false;
  function commit() {
    if (done) return;
    done = true;
    onCommit(inputEl.value.trim() || originalName);
  }
  function cancel() {
    if (done) return;
    done = true;
    onCancel();
  }
  if (onInput) inputEl.oninput = () => onInput(inputEl.value || originalName);
  inputEl.onblur = commit;
  inputEl.onkeydown = e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { inputEl.onblur = null; cancel(); }
  };
}

function startHeaderRename() {
  const list = getSelected();
  if (!list) return;
  const h2 = document.querySelector('.detail-header h2');
  if (!h2 || h2.querySelector('input')) return;

  const container = document.getElementById('lists-container');
  const findCardNameEl = () => {
    const card = [...container.querySelectorAll('.list-card[data-list]')].find(c => c._list === list);
    return card?.querySelector('.card-name') ?? null;
  };

  const input = document.createElement('input');
  input.className = 'name-edit-input';
  input.value = list.name;

  const originalName = list.name;
  h2.textContent = '';
  h2.appendChild(input);
  input.select();

  startInlineRename(input, originalName, {
    onCommit(newName) {
      h2.textContent = newName;
      if (newName !== originalName) {
        list.name = newName;
        persistMeta();
        const cardNameEl = findCardNameEl();
        if (cardNameEl) cardNameEl.textContent = newName;
      }
    },
    onCancel() {
      h2.textContent = originalName;
      const cardNameEl = findCardNameEl();
      if (cardNameEl && !cardNameEl.querySelector('input')) cardNameEl.textContent = originalName;
    },
    onInput(val) {
      const cardNameEl = findCardNameEl();
      if (cardNameEl && !cardNameEl.querySelector('input')) cardNameEl.textContent = val;
    },
  });
}

function startCardRename(list) {
  if (!list) return;
  const container = document.getElementById('lists-container');
  const card = [...container.querySelectorAll('.list-card[data-list]')].find(c => c._list === list);
  if (!card) return;
  const nameEl = card.querySelector('.card-name');
  if (!nameEl || nameEl.querySelector('input')) return;

  const input = document.createElement('input');
  input.className = 'card-name-edit';
  input.value = list.name;

  const originalName = list.name;
  nameEl.textContent = '';
  nameEl.appendChild(input);
  input.focus();
  input.select();
  input.onclick = e => e.stopPropagation();

  startInlineRename(input, originalName, {
    onCommit(newName) {
      if (newName !== originalName) {
        list.name = newName;
        persistMeta();
        nameEl.textContent = newName;
        if (state.selected === list) {
          const h2 = document.querySelector('.detail-header h2');
          if (h2 && !h2.querySelector('input')) h2.textContent = newName;
        }
      } else {
        nameEl.textContent = originalName;

    onCancel() {
      nameEl.textContent = originalName;
      const h2 = document.querySelector('.detail-header h2');
      if (h2 && !h2.querySelector('input')) h2.textContent = originalName;
    },
    onInput(val) {
      const h2 = document.querySelector('.detail-header h2');
      if (h2 && !h2.querySelector('input')) h2.textContent = val;
    },
  });
}

// List order determines merge priority: higher-priority lists appear earlier in state.sources; the loop breaks at the target list's position.
function buildOverrideMap(list) {
  const map = new Map();
  for (const l of state.sources) {
    if (l === list) break;
    if (!l.enabled || !l.rawEntries.length) continue;
    for (const { word, score, comment } of getRescoredEntries(l)) {
      const w = word.toUpperCase();
      if (!map.has(w)) map.set(w, { listName: l.name, score, comment: comment || '' });
    }
  }
  return map;
}

function buildMergedList() {
  if (_mergedListCache) return _mergedListCache;

  const mergedMap = new Map(); // UPPERCASE_KEY → {word, score}
  const sourceCounts = [];

  for (const list of state.sources) {
    if (!list.enabled || !list.rawEntries.length) continue;
    let count = 0;
    for (const { word, score, comment } of getRescoredEntries(list)) {
      const key = word.toUpperCase();
      if (!mergedMap.has(key)) {
        mergedMap.set(key, { word: word.toLowerCase(), score, comment: comment || '', listName: list.name, listRef: list });
        count++;
      }
    }
    sourceCounts.push({ list, count });
  }

  const entries = [...mergedMap.values()]
    .sort((a, b) => a.word.localeCompare(b.word));

  _mergedListCache = { entries, sourceCounts };
  return _mergedListCache;
}


function triggerDownload(text, filename) {
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function downloadOriginalList(list) {
  if (!list || !list.rawEntries.length) return;
  const withComments = getDownloadComments();
  const text = list.rawEntries.map(e =>
    (withComments && e.comment) ? `${e.word};${e.score};${e.comment}` : `${e.word};${e.score}`
  ).join('\n') + '\n';
  const filename = list.originalFilename || `${list.name}.txt`;
  triggerDownload(text, filename);
  showToast(`Downloaded ${pluralize(list.rawEntries.length, 'entry', 'entries')}`);
}

async function downloadIndividualListRescored(list) {
  if (!list || !list.rawEntries.length) return;
  await downloadWithDialog(`Grawlix ${list.name}`, list, getRescoredEntries(list), 'Download Rescored List');
}

  function prev() { if (currentSlide > 0) goTo(currentSlide - 1); }

  function stopDemo() { demoTimers.forEach(clearTimeout); demoTimers = []; }

  function after(ms, fn) { demoTimers.push(setTimeout(fn, ms)); }

  function startDemo(index) {
    if (index === 2) runScoreEditDemo();
    if (index === 3) runSearchDemo();
  }

  const DEMO_CURSOR_SVG = `<svg viewBox="0 0 11 16" width="11" height="16" xmlns="http://www.w3.org/2000/svg"><path d="M0 0L0 13.5L3.5 10.5L6 15L8 14L5.5 9.5L9.5 9.5Z" fill="white" stroke="rgba(0,0,0,0.7)" stroke-width="1" stroke-linejoin="round"/></svg>`;

  function makeDemoCaret(container) {
    const el = document.createElement('span');
    el.className = 'demo-caret';
    el.style.opacity = '0';
    el.style.animation = 'none';
    container.appendChild(el);
    return el;
  }

  function showDemoCaret(caretEl, inputEl, container) {
    const cr = container.getBoundingClientRect();
    const ir = inputEl.getBoundingClientRect();
    const cs = getComputedStyle(inputEl);
    const mirror = document.createElement('span');
    mirror.style.cssText = `position:fixed;visibility:hidden;white-space:pre;font:${cs.font};letter-spacing:${cs.letterSpacing};padding:0`;
    mirror.textContent = inputEl.value;
    document.body.appendChild(mirror);
    const textW = mirror.getBoundingClientRect().width;
    mirror.remove();
    caretEl.style.left = (ir.left - cr.left + parseFloat(cs.paddingLeft) + textW) + 'px';
    caretEl.style.top  = (ir.top  - cr.top  + (ir.height - 13) / 2) + 'px';
    caretEl.style.opacity = '';
    caretEl.style.animation = '';
  }

  function hideDemoCaret(caretEl) {
    caretEl.style.opacity = '0';
    caretEl.style.animation = 'none';
  }

  function makeDemoMouse(container) {
    const el = document.createElement('div');
    el.className = 'demo-mouse';
    el.innerHTML = DEMO_CURSOR_SVG;
    container.appendChild(el);
    return el;
  }

  function moveDemoMouse(mouseEl, targetEl, container, offX = 0, offY = 0) {
    const cr = container.getBoundingClientRect();
    const tr = targetEl.getBoundingClientRect();
    mouseEl.style.left = (tr.left - cr.left + tr.width  / 2 + offX) + 'px';
    mouseEl.style.top  = (tr.top  - cr.top  + tr.height / 2 + offY) + 'px';
  }

  function clickDemoMouse(mouseEl) {
    mouseEl.classList.add('clicking');
    after(100, () => mouseEl.classList.remove('clicking'));
  }

  function runScoreEditDemo() {
    const slide = document.getElementById('help-slide-2');
    const demoRow = slide.querySelector('.demo-row');
    const scoreCell = slide.querySelector('.demo-score-cell');
    const demoContainer = slide.querySelector('.help-demo');

    scoreCell.innerHTML = buildScoreBadgeHTML(40);
    demoRow.style.background = '';
    demoContainer.querySelectorAll('.demo-caret, .demo-mouse').forEach(el => el.remove());

    const mouse = makeDemoMouse(demoContainer);
    const caret = makeDemoCaret(demoContainer);

    after(0, () => {
      const sc = scoreCell.getBoundingClientRect();
      const cr = demoContainer.getBoundingClientRect();
      mouse.style.transition = 'none';
      mouse.style.left = (sc.left - cr.left + sc.width / 2) + 'px';
      mouse.style.top  = '-10px';
    });
    after(300, () => {
      mouse.style.transition = 'left 0.4s ease-out, top 0.4s ease-out, opacity 0.25s';
      mouse.classList.add('visible');
      moveDemoMouse(mouse, scoreCell, demoContainer);
    });
    after(1000, () => {
      demoRow.style.background = 'var(--row-hover)';
      clickDemoMouse(mouse);
    });
    after(1500, () => {
      scoreCell.innerHTML = '<input class="cell-edit score-edit" value="40" readonly>';
      const inp = scoreCell.querySelector('input');
      inp.style.borderColor = 'var(--accent)';
      showDemoCaret(caret, inp, demoContainer);
    });
    after(2000, () => { const inp = scoreCell.querySelector('input'); if (inp) { inp.value = ''; showDemoCaret(caret, inp, demoContainer); } });
    after(2200, () => { const inp = scoreCell.querySelector('input'); if (inp) { inp.value = '6'; showDemoCaret(caret, inp, demoContainer); } });
    after(2400, () => { const inp = scoreCell.querySelector('input'); if (inp) { inp.value = '60'; showDemoCaret(caret, inp, demoContainer); } });
    after(2700, () => {
      demoRow.style.background = '';
      scoreCell.innerHTML = buildScoreBadgeHTML(60);
      hideDemoCaret(caret);
      mouse.classList.remove('visible');
    });
    after(5200, () => { runScoreEditDemo(); });
  }

  const SEARCH_WORDS = [
    { word: 'WORDPLAY',  score: 60, tier: 'great', cross: false },
    { word: 'CROSSWORD', score: 60, tier: 'great', cross: true  },
    { word: 'PUZZLE',    score: 50, tier: 'good',  cross: false },
    { word: 'THEME',     score: 50, tier: 'good',  cross: false },
    { word: 'CROSSFIRE', score: 50, tier: 'good',  cross: true  },
    { word: 'CROSSBOW',  score: 50, tier: 'good',  cross: true  },
    { word: 'GRID',      score: 50, tier: 'good',  cross: false },
    { word: 'CLUE',      score: 50, tier: 'good',  cross: false },
    { word: 'CROSSLET',  score: 40, tier: 'fair',  cross: true  },
    { word: 'RECROSS',   score: 30, tier: 'meh',   cross: true  },
  ];

  function wordHtml(word, highlight) {
    const displayed = displayWord(word);
    if (!highlight) return displayed;
    const dc = displayWord(highlight);
    const idx = displayed.indexOf(dc);
    if (idx === -1) return displayed;
    return displayed.slice(0, idx) + '<mark class="search-match search-match-0">' + dc + '</mark>' + displayed.slice(idx + dc.length);
  }

  function buildSearchRows(tbody, query, minScore) {
    const filter = query.toUpperCase();
    tbody.innerHTML = '';
    SEARCH_WORDS.forEach(({ word, score }) => {
      if (filter && !word.includes(filter)) return;
      if (score < minScore) return;
      const tr = document.createElement('tr');
      tr.innerHTML =
        `<td class="col-word">${wordHtml(word, filter)}</td>` +
        `<td class="score-cell">${buildScoreBadgeHTML(score)}</td>`;
      tbody.appendChild(tr);
    });
  }

  function runSearchDemo() {
    const slide = document.getElementById('help-slide-3');
    const searchInput = slide.querySelector('#help-search-input');
    const scoreMin = slide.querySelector('#help-score-min-input');
    const tbody = slide.querySelector('#help-word-tbody');
    const demoContainer = slide.querySelector('.help-demo');

    searchInput.value = '';
    searchInput.style.borderColor = '';
    scoreMin.value = '0';
    scoreMin.style.borderColor = '';
    buildSearchRows(tbody, '', 0);
    demoContainer.querySelectorAll('.demo-caret, .demo-mouse').forEach(el => el.remove());

    const mouse = makeDemoMouse(demoContainer);
    const caret = makeDemoCaret(demoContainer);

    after(0, () => {
      const sr = searchInput.getBoundingClientRect();
      const cr = demoContainer.getBoundingClientRect();
      mouse.style.transition = 'none';
      mouse.style.left = (sr.left - cr.left + sr.width / 2) + 'px';
      mouse.style.top  = '-10px';
    });
    after(300, () => {
      mouse.style.transition = 'left 0.4s ease-out, top 0.4s ease-out, opacity 0.25s';
      mouse.classList.add('visible');
      moveDemoMouse(mouse, searchInput, demoContainer);
    });
    after(700,  () => { clickDemoMouse(mouse); });
    after(800,  () => { searchInput.style.borderColor = 'var(--accent)'; });
    after(1200, () => { searchInput.value = displayWord('C');     buildSearchRows(tbody, 'C', 0);     showDemoCaret(caret, searchInput, demoContainer); });
    after(1450, () => { searchInput.value = displayWord('CR');    buildSearchRows(tbody, 'CR', 0);    showDemoCaret(caret, searchInput, demoContainer); });
    after(1700, () => { searchInput.value = displayWord('CRO');   buildSearchRows(tbody, 'CRO', 0);   showDemoCaret(caret, searchInput, demoContainer); });
    after(1950, () => { searchInput.value = displayWord('CROS');  buildSearchRows(tbody, 'CROS', 0);  showDemoCaret(caret, searchInput, demoContainer); });
    after(2200, () => { searchInput.value = displayWord('CROSS'); buildSearchRows(tbody, 'CROSS', 0); showDemoCaret(caret, searchInput, demoContainer); });
    after(2400, () => {
      mouse.style.transition = 'left 0.55s ease-out, top 0.55s ease-out, opacity 0.25s';
      moveDemoMouse(mouse, scoreMin, demoContainer);
    });
    after(3200, () => {
      searchInput.style.borderColor = '';
      scoreMin.style.borderColor = 'var(--accent)';
      hideDemoCaret(caret);
      clickDemoMouse(mouse);
      showDemoCaret(caret, scoreMin, demoContainer);
    });
    after(3800, () => { scoreMin.value = '';   showDemoCaret(caret, scoreMin, demoContainer); });
    after(4100, () => { scoreMin.value = '5';  showDemoCaret(caret, scoreMin, demoContainer); });
    after(4400, () => { scoreMin.value = '50'; buildSearchRows(tbody, 'CROSS', 50); showDemoCaret(caret, scoreMin, demoContainer); });
    after(5800, () => {
      searchInput.value = '';
      searchInput.style.borderColor = '';
      scoreMin.value = '0';
      scoreMin.style.borderColor = '';
      buildSearchRows(tbody, '', 0);
      hideDemoCaret(caret);
      mouse.classList.remove('visible');
    });
    after(6600, () => { runSearchDemo(); });
  }

  const DEMO_JK_ICON = buildInitialsIconHTML('John Kugelman', colorSeed(LIST_PUBLISHERS.find(p => p.id === 'jkugelman')));
  const DEMO_PB_ICON = buildInitialsIconHTML('Peter Broda',   colorSeed(LIST_PUBLISHERS.find(p => p.id === 'broda')));

  function initDemoSlides() {
    // Slide 0: two-panel overview
    document.getElementById('help-slide0-lists').innerHTML = buildListSidebarHTML([
      { icon: DEMO_JK_ICON, name: 'John Kugelman', meta: '47,000 entries', enabled: true },
      { icon: DEMO_PB_ICON, name: 'Peter Broda',   meta: '68,000 entries', enabled: true },
    ]);
    document.getElementById('help-slide0-search').innerHTML =
      buildSearchBarHTML({ idPrefix: 'help0', readonly: true, showHints: false })
      + `<table class="word-table"><tbody>`
      + buildWordRowHTML('WORDPLAY',  60)
      + buildWordRowHTML('CROSSWORD', 60)
      + buildWordRowHTML('CROSSFIRE', 50)
      + `</tbody></table>`;

    // Slide 2: Making It Yours — word cell
    document.getElementById('help-slide2-word').textContent = displayWord('WORDPLAY');

    // Slide 1: list sidebar with enabled JK and disabled PB
    document.getElementById('help-slide1-demo').innerHTML = buildListSidebarHTML([
      { icon: DEMO_JK_ICON, name: 'John Kugelman', meta: '47,000 entries', enabled: true },
      { icon: DEMO_PB_ICON, name: 'Peter Broda',   meta: '68,000 entries', enabled: false },
    ]);

    // Slide 3: search bar (word rows are populated by runSearchDemo)
    document.getElementById('help-slide3-bar').innerHTML =
      buildSearchBarHTML({ idPrefix: 'help', readonly: true, showHints: false });

  }

  initDemoSlides();

  document.getElementById('btn-help').addEventListener('click', () => open());
  document.addEventListener('keydown', e => {
    if (e.key === '?' && !e.target.closest('input, textarea, [contenteditable]')) open();
  });
  dialog.querySelector('.dialog-close-btn').addEventListener('click', close);
  dialog.addEventListener('click', e => { if (e.target === dialog) close(); });
  dialog.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); next(); }
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prev(); }
    else if (e.key === 'Home') { e.preventDefault(); goTo(0); }
    else if (e.key === 'End') { e.preventDefault(); goTo(totalSlides - 1); }
  });
  dialog.addEventListener('close', () => {
    stopDemo();
    document.getElementById('btn-help').focus();
  });
  dialog.querySelector('.help-prev').addEventListener('click', prev);
  dialog.querySelector('.help-next').addEventListener('click', next);
  dialog.querySelectorAll('.help-dot').forEach((dot, i) => dot.addEventListener('click', () => goTo(i)));

  return { open, close, goTo };
})();

// ─── Onboarding Banner ────────────────────────────────────────────────────────

const OnboardingBanner = (() => {
  const banner = document.createElement('div');
  banner.id = 'onboarding-banner';
  banner.hidden = true;
  banner.innerHTML = `
    <button class="dialog-close-btn" aria-label="Dismiss">✕</button>
    <p>Some popular wordlists have been set up with suggested scoring rules.</p>
    <div class="onboarding-banner-actions">
      <button class="link-btn">Start with a blank slate instead</button>
      <button class="primary">Sounds good</button>
    </div>`;

  function show() {
    if (!banner.isConnected) {
      const listsContainer = document.getElementById('lists-container');
      listsContainer.parentNode.insertBefore(banner, listsContainer);
    }
    banner.hidden = false;
  }

  function dismiss() {
    banner.hidden = true;
    lsSave('onboarded', '1');
  }

  async function goBlank() {
    const toRemove = state.sources.filter(l => l.type !== 'edits');
    state.sources = state.sources.filter(l => l.type === 'edits');
    toRemove.forEach(l => invalidateListCaches(l));
    if (state.selected !== MERGED_ID && toRemove.includes(state.selected)) {
      state.selected = MERGED_ID;
    }
    state.outputScoring = [];
    persistOutputScoring();
    const edits = getEditsList();
    if (edits) edits.scoring = [];
    persistMeta();
    await Promise.all(toRemove.map(l => idbDel('data_' + l.dbKey)));
    renderAll();
    dismiss();
  }

  banner.querySelector('.primary').addEventListener('click', dismiss);
  banner.querySelector('.dialog-close-btn').addEventListener('click', dismiss);
  banner.querySelector('.link-btn').addEventListener('click', goBlank);

  return { show, dismiss };
})();

// ─── Boot ─────────────────────────────────────────────────────────────────────

document.addEventListener('click', () => document.querySelectorAll('.split-btn.open').forEach(b => b.classList.remove('open')));
// Hide the busy overlay immediately if no lists have data.
{ let _m; try { _m = JSON.parse(lsLoad('meta') || '[]'); } catch { _m = []; }
  if (!_m.some(l => l.lastUpdated)) document.getElementById('busy-overlay').remove(); }
init();
</script>
</body>
