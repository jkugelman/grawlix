<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grawlix - Use your words!</title>

<!-- Prevents FOUC: must run synchronously before first paint. -->
<script>
  const LS_PREFIX = 'grawlix_';
  const _dm    = localStorage.getItem(LS_PREFIX + 'darkMode');
  const _dark  = _dm === 'dark' || (_dm !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.classList.add(_dark ? 'dark-mode' : 'light-mode');
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
[hidden] { display: none !important; }

:root {
  --accent:      #7b6db8;
  --accent-hover:#6558a0;
  --hdr-bg:      var(--accent);
}
html.dark-mode {
  --bg:        #1e1e1e;
  --surface:   #282828;
  --surface2:  #232323;
  --border:    #525252;
  --border2:   #3e3e3e;
  --border3:   #3a3a3a;
  --text:      #e0e0e0;
  --muted:     #a0a0a0;
  --faint:     #6c6c6c;
  --hover:     #303030;
  --sel:       #383838;
  --row-hover: #2c2c2c;
  --input-bg:  #2e2e2e;
  --btn-bg:    #363636;
  --error-bg:  #361818;
  --del-hover: #361818;
  --shadow:    0 8px 40px rgba(0,0,0,0.5);
  --backdrop:  rgba(0,0,0,0.5);
  --score-great-bg: #1e4a8f; --score-great-fg: #cce4ff;
  --score-good-bg:  #2a6b42; --score-good-fg:  #d4f9e5;
  --score-fair-bg:  #615b0d; --score-fair-fg:  #fef7c0;
  --score-meh-bg:   #6b3d00; --score-meh-fg:   #fddcaa;
  --score-bad-bg:   #6b1d1d; --score-bad-fg:   #fdd8d8;
  --callout-bg: #201d09; --callout-border: #3d3410; --callout-fg: #b09840;
  --usd-added-bg:    #1a3d2a; --usd-added-fg:    #6ee89a;
  --usd-deleted-bg:  #3d1a1a; --usd-deleted-fg:  #f07070;
  --usd-rescored-bg: #2a2a2a; --usd-rescored-fg: #909090;
  --ok-fg: #6ee89a; --warn-fg: #b09840; --err-fg: #f07070;
}
html.light-mode {
  --bg:        #f5f5f5;
  --surface:   #ffffff;
  --surface2:  #fafafa;
  --border:    #dddddd;
  --border2:   #eeeeee;
  --border3:   #f0f0f0;
  --text:      #222222;
  --muted:     #888888;
  --faint:     #bbbbbb;
  --hover:     #f8f8f8;
  --sel:       #e8e8e8;
  --row-hover: #f0f0f0;
  --input-bg:  #ffffff;
  --btn-bg:    #ffffff;
  --error-bg:  #fff8f8;
  --del-hover: #fdecea;
  --shadow:    0 8px 40px rgba(0,0,0,0.18);
  --backdrop:  rgba(0,0,0,0.3);
  --score-great-bg: #cce5ff; --score-great-fg: #004085;
  --score-good-bg:  #d4edda; --score-good-fg:  #155724;
  --score-fair-bg:  #fff3cd; --score-fair-fg:  #856404;
  --score-meh-bg:   #fde9c8; --score-meh-fg:   #7a3d00;
  --score-bad-bg:   #f8d7da; --score-bad-fg:   #721c24;
  --callout-bg: #fff3cd; --callout-border: #ffc107; --callout-fg: #856404;
  --usd-added-bg:    #e6f4ea; --usd-added-fg:    #2d7a3f;
  --usd-deleted-bg:  #fce8e6; --usd-deleted-fg:  #b71c1c;
  --usd-rescored-bg: #f0f0f0; --usd-rescored-fg: #666666;
  --ok-fg: #2d7a3f; --warn-fg: #856404; --err-fg: #b71c1c;
}

html.dark-mode { scrollbar-color: var(--border) var(--bg); }
html.light-mode { scrollbar-color: var(--border) var(--bg); }
html.dark-mode ::-webkit-scrollbar { background: var(--bg); }
html.dark-mode ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
html.light-mode ::-webkit-scrollbar { background: var(--bg); }
html.light-mode ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

body { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

header { background: var(--hdr-bg); color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
.header-logo-link { color: inherit; text-decoration: none; }
.header-center { flex: 1; display: flex; justify-content: center; align-items: center; gap: 7px; font-size: 14px; opacity: 0.75; }
.header-tagline { font-style: italic; }
.header-sep { opacity: 0.35; }
.header-feedback a { color: white; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.35); transition: opacity 0.15s; }
.header-feedback a:hover { opacity: 1; border-bottom-color: white; }
.bubble { display: inline-flex; align-items: center; background: white; color: var(--accent); border-radius: 8px; padding: 1px 7px 2px; font-size: 15px; font-weight: 800; position: relative; margin-left: 9px; line-height: 1.5; vertical-align: middle; }
.bubble::before { content: ''; position: absolute; left: -15px; top: 50%; transform: translateY(-50%); border: 9px solid transparent; border-right-color: white; }

main { display: flex; flex: 1; overflow: hidden; position: relative; }

/* Busy overlay */
#busy-overlay { position: absolute; inset: 0; z-index: 200; background: var(--bg); display: flex; align-items: center; justify-content: center; transition: opacity 0.2s; }
#busy-overlay.done { opacity: 0; pointer-events: none; }
.busy-spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: busy-spin 0.7s linear infinite; }
@keyframes busy-spin { to { transform: rotate(360deg); } }

/* Lists panel */
#lists-panel { width: 320px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
#lists-panel h2 { padding: 10px 14px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border2); }
#lists-container { flex: 1; overflow-y: auto; }
/* #add-list-area removed — replaced by inline .add-list-row */
.add-list-row { padding: 9px 14px; cursor: pointer; color: var(--faint); font-size: 13px; display: flex; align-items: center; gap: 9px; transition: background 0.1s, color 0.1s; user-select: none; }
.add-list-row:hover { background: var(--hover); color: var(--accent); }
.add-list-icon { font-size: 15px; line-height: 1; width: 16px; text-align: center; flex-shrink: 0; }

/* List card */
.list-card { padding: 10px 14px; border-bottom: 1px solid var(--border3); cursor: pointer; display: flex; align-items: center; gap: 9px; transition: background 0.1s; }
.list-card:hover { background: var(--hover); }
.list-card.selected { background: var(--sel); border-left: 3px solid var(--accent); padding-left: 11px; }
.card-info { flex: 1; min-width: 0; }
.card-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13px; }
.card-meta { color: var(--muted); font-size: 11px; margin-top: 2px; display: flex; align-items: center; gap: 5px; }
.card-actions { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }

/* Buttons */
button { font-size: 13px; padding: 7px 11px; border-radius: 4px; border: 1px solid var(--border); background: var(--btn-bg); color: var(--text); cursor: pointer; font-family: inherit; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
button:hover:not(:disabled) { background: var(--hover); }
button.primary { background: var(--accent); color: white; border-color: var(--accent); gap: 5px; }
button.primary:hover:not(:disabled) { background: var(--accent-hover); }
button:disabled { opacity: 0.45; cursor: not-allowed; }
button.danger { background: #c0392b; color: white; border-color: #922b21; }
button.danger:hover:not(:disabled) { background: #e74c3c; border-color: #c0392b; }

/* Split button */
.split-btn { position: relative; display: inline-flex; }
.split-btn-main { border-top-right-radius: 0; border-bottom-right-radius: 0; border-right: none; }
.split-btn-arrow { border-top-left-radius: 0; border-bottom-left-radius: 0; padding: 5px 8px; display: inline-flex; align-items: center; justify-content: center; }
.split-btn.primary .split-btn-main { background: var(--accent); color: white; border-color: var(--accent); }
.split-btn.primary .split-btn-main:hover:not(:disabled) { background: var(--accent-hover); }
.split-btn.primary .split-btn-arrow { background: var(--accent); color: white; border-color: var(--accent); border-left: 1px solid rgba(255,255,255,0.35); }
.split-btn.primary .split-btn-arrow:hover:not(:disabled) { background: var(--accent-hover); }
.split-btn-menu { display: none; position: absolute; top: 100%; right: 0; margin-top: 3px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 200; padding: 4px 0; white-space: nowrap; }
.split-btn.open .split-btn-menu { display: block; }
.split-btn-menu button { display: block; width: 100%; text-align: left; border: none; background: none; border-radius: 0; padding: 6px 13px; color: var(--text); }

/* Detail panel */
#detail-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.no-selection { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--faint); background: var(--bg); }
.no-selection p { font-size: 15px; margin-bottom: 6px; }
.no-selection small { font-size: 13px; }

.detail-header { background: var(--surface); padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.detail-header h2 { font-size: 15px; font-weight: 600; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: text; }
.detail-source { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }

/* Stats bar */
.stats-bar { background: var(--surface2); border-bottom: 1px solid var(--border2); padding: 10px 18px; display: flex; align-items: center; gap: 22px; flex-shrink: 0; }
.stat { display: flex; flex-direction: column; gap: 2px; }
.stat-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.stat-value { font-size: 15px; font-weight: 700; line-height: 1; }
.score-dist { display: flex; gap: 3px; align-items: flex-end; height: 36px; }
.stats-right { display: flex; align-items: center; gap: 22px; margin-left: auto; }
.score-bar { width: 7px; background: var(--accent); border-radius: 2px 2px 0 0; min-height: 2px; }

/* Search */
.search-bar { padding: 7px 14px 6px; background: var(--surface); border-bottom: 1px solid var(--border2); flex-shrink: 0; }
.search-row { display: flex; align-items: center; gap: 10px; }
.search-input-wrap { position: relative; flex: 1; display: flex; align-items: center; }
.search-input-wrap > svg { position: absolute; left: 9px; pointer-events: none; color: var(--muted); }
.search-row input[type="text"] { width: 100%; padding: 5px 24px 5px 28px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; font-family: inherit; background: var(--input-bg); color: var(--text); }
.search-row input[type="text"]:focus { outline: none; border-color: var(--accent); }
.search-whole-word-label { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); white-space: nowrap; cursor: pointer; user-select: none; }
.score-min-label { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); white-space: nowrap; margin-left: 8px; }
.clear-btn { background: none; border: none; padding: 2px 3px; cursor: pointer; color: var(--muted); display: flex; align-items: center; line-height: 1; border-radius: 3px; flex-shrink: 0; }
.clear-btn:hover { color: var(--text); background: var(--hover); }
.clear-btn[hidden] { display: none; }
.search-input-wrap .clear-btn, .score-min-wrap .clear-btn { position: absolute; right: 4px; }
.score-min-wrap { position: relative; display: inline-flex; align-items: center; }
input[type="number"] { appearance: textfield; -moz-appearance: textfield; }
.score-min-label input[type="number"] { width: 56px; padding: 4px 20px 4px 6px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; font-family: inherit; background: var(--input-bg); color: var(--text); }
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
.score-min-label input[type="number"]:focus { outline: none; border-color: var(--accent); }
.search-help { margin-bottom: 5px; font-size: 11px; color: transparent; line-height: 1.6; display: flex; flex-wrap: wrap; gap: 0 14px; transition: color 0.15s; }
.search-help kbd { font-family: ui-monospace, 'Cascadia Code', monospace; font-size: 11px; }
.search-bar:has(#search-input:focus) .search-help { color: var(--faint); }
.search-bar:has(#search-input:focus) .search-help kbd { color: var(--muted); }
mark.search-match { border-radius: 2px; padding: 0 1px; font-style: normal; }
html.light-mode .search-match-0 { background: #ddd6fe; color: rgba(0,0,0,0.72); }
html.light-mode .search-match-1 { background: #99f6e4; color: rgba(0,0,0,0.72); }
html.light-mode .search-match-2 { background: #fde68a; color: rgba(0,0,0,0.72); }
html.light-mode .search-match-3 { background: #fbcfe8; color: rgba(0,0,0,0.72); }
html.light-mode .search-match-4 { background: #bbf7d0; color: rgba(0,0,0,0.72); }
html.dark-mode .search-match-0 { background: #4a1d96; color: #e9d5ff; }
html.dark-mode .search-match-1 { background: #065f46; color: #a7f3d0; }
html.dark-mode .search-match-2 { background: #78350f; color: #fef3c7; }
html.dark-mode .search-match-3 { background: #831843; color: #fce7f3; }
html.dark-mode .search-match-4 { background: #14532d; color: #d1fae5; }
.search-count-wrap { margin-left: auto; }
#search-count { font-size: 11px; color: var(--faint); }
.copy-btn { background: none; border: none; padding: 0; cursor: pointer; color: var(--faint); display: inline-flex; align-items: center; line-height: 1; vertical-align: middle; }
.copy-btn:hover { color: var(--muted); }

/* Virtual scroll table */
#table-container { flex: 1; overflow: hidden; display: flex; flex-direction: column; background: var(--surface); }
#vs-host { flex: 1; min-height: 0; }
.word-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.word-table th { position: sticky; top: 0; background: var(--surface2); padding: 7px 16px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 2px solid var(--border2); z-index: 1; cursor: pointer; user-select: none; white-space: nowrap; overflow: hidden; }
.word-table th:hover { background: var(--hover); }
.word-table td { padding: 0 16px; font-size: 13px; border-bottom: 1px solid var(--border3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.word-table td.col-word, .word-table td.score-cell { font-family: ui-monospace, 'Cascadia Code', monospace; }
.word-table td.comment-cell { font-size: 12px; }
.word-table tr:hover td { background: var(--row-hover); }
.vs-spacer td { padding: 0; border: none; }
.score-badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 11px; font-weight: 700; }
.score-badge[data-tier="great"] { background: var(--score-great-bg); color: var(--score-great-fg); }
.score-badge[data-tier="good"]  { background: var(--score-good-bg);  color: var(--score-good-fg);  }
.score-badge[data-tier="fair"]  { background: var(--score-fair-bg);  color: var(--score-fair-fg);  }
.score-badge[data-tier="meh"]   { background: var(--score-meh-bg);   color: var(--score-meh-fg);   }
.score-badge[data-tier="bad"]   { background: var(--score-bad-bg);   color: var(--score-bad-fg);   }
.sort-arrow { font-size: 9px; opacity: 0.7; }
.col-resize-handle { position: absolute; right: 0; top: 0; bottom: 0; width: 5px; cursor: col-resize; z-index: 2; }
.col-resize-handle:hover, .col-resize-handle.active { background: rgba(123, 109, 184, 0.35); background: color-mix(in srgb, var(--accent) 35%, transparent); }

/* Inline name editing */
.detail-name-wrap { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; overflow: hidden; }
.detail-date { font-size: 11px; color: var(--muted); white-space: nowrap; }
.edit-hint { opacity: 0; flex-shrink: 0; cursor: pointer; user-select: none; transition: opacity 0.15s; }
.detail-edit-hint { font-size: 13px; }
.detail-name-wrap:hover .detail-edit-hint { opacity: 0.85; }
.detail-name-wrap:has(input) .detail-edit-hint { display: none; }
.name-edit-input { font-family: inherit; width: 100%; padding: 1px 5px; border: 1px solid var(--accent); border-radius: 3px; background: var(--input-bg); color: var(--text); font-size: 15px; font-weight: 600; outline: none; }
.card-name-edit { font-family: inherit; width: 100%; padding: 0 3px; border: 1px solid var(--accent); border-radius: 3px; background: var(--input-bg); color: var(--text); font-size: 13px; font-weight: 600; outline: none; }

/* Drag handle */
.drag-handle { color: var(--faint); cursor: grab; font-size: 13px; flex-shrink: 0; padding: 0 1px; user-select: none; }
.drag-handle:hover { color: var(--muted); }
.drag-handle[aria-hidden] { visibility: hidden; }
.list-card[draggable]:active .drag-handle { cursor: grabbing; }
.list-card.dragging { opacity: 0.4; }
.list-card.drag-over { background: var(--sel) !important; box-shadow: inset 0 0 0 2px var(--accent); }

/* Toggle switch */
.toggle { position: relative; display: inline-block; width: 28px; height: 16px; flex-shrink: 0; cursor: pointer; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-slider { position: absolute; inset: 0; background: var(--faint); border-radius: 16px; transition: background 0.2s; }
.toggle-slider::before { content: ''; position: absolute; height: 12px; width: 12px; left: 2px; bottom: 2px; background: white; border-radius: 50%; transition: transform 0.2s; }
.toggle input:checked + .toggle-slider { background: var(--accent); }
.toggle input:checked + .toggle-slider::before { transform: translateX(12px); }


/* Settings and help buttons */
.header-icon-btn { background: none; border: none; color: white; font-size: 19px; padding: 4px 8px; border-radius: 4px; cursor: pointer; line-height: 1; font-family: inherit; position: relative; display: inline-flex; align-items: center; justify-content: center; }
button.header-icon-btn:hover { background: none; color: rgba(255,255,255,0.65); }
#btn-settings svg { position: relative; top: 1px; }
#btn-help { width: 32px; height: 32px; padding: 0; border-radius: 4px; background: none; }
.help-circle { width: 20px; height: 20px; border-radius: 50%; background: white; color: var(--accent); font-size: 12px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; }
#btn-help:hover .help-circle { background: rgba(255,255,255,0.65); }
.help-dot:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

/* Tooltips — add a .tooltip child to any position:relative element */
.tooltip { position: absolute; top: calc(100% + 8px); left: 50%; transform: translateX(-50%); font-size: 14px; font-weight: 600; white-space: nowrap; padding: 7px 13px; border-radius: 8px; pointer-events: none; opacity: 0; transition: opacity 0.15s ease; z-index: 100; border: 1px solid; }
:hover > .tooltip { opacity: 1; }
.tooltip::before,
.tooltip::after { content: ''; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); display: block; width: 0; height: 0; border: 8px solid transparent; }
.tooltip::after { bottom: calc(100% - 1px); }
html.light-mode .tooltip { background: #fff; color: #060607; box-shadow: 0 4px 20px rgba(0,0,0,0.18); border-color: rgba(0,0,0,0.12); }
html.light-mode .tooltip::before { border-bottom-color: rgba(0,0,0,0.12); }
html.light-mode .tooltip::after { border-bottom-color: #fff; }
html.dark-mode .tooltip { background: #111214; color: #dbdee1; box-shadow: 0 4px 20px rgba(0,0,0,0.6); border-color: rgba(255,255,255,0.1); }
html.dark-mode .tooltip::before { border-bottom-color: rgba(255,255,255,0.1); }
html.dark-mode .tooltip::after { border-bottom-color: #111214; }

/* Settings dialog */
#settings-dialog { width: 340px; }
#confirm-dialog, #alert-dialog { width: 320px; }
#download-dialog { width: 340px; }
#download-dialog .dialog-footer { margin-top: 0; padding-top: 30px; border-top: none; }
#merge-conflict-dialog { width: 380px; }
.dialog-body > p { margin-bottom: 4px; line-height: 1.5; padding-right: 24px; }
.settings-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 13px 0; border-bottom: 1px solid var(--border2); }
.settings-row:first-of-type { border-top: 1px solid var(--border2); margin-top: 4px; }
.settings-row-label { font-size: 13px; font-weight: 600; }
.settings-row-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* Disabled list */
.list-card.disabled .card-info { opacity: 0.45; }

/* No-data list */
.list-card.no-data .toggle { opacity: 0.35; }
.list-card.no-data .toggle input { pointer-events: none; }


/* Status dot */
.card-name-row { display: flex; align-items: center; gap: 5px; min-width: 0; }
.update-dot { width: 7px; height: 7px; border-radius: 50%; background: #7add9e; flex-shrink: 0; display: inline-block; }

/* Import zone */
.import-zone { border: 2px dashed var(--border); border-radius: 6px; padding: 24px 16px; text-align: center; color: var(--faint); cursor: pointer; transition: border-color 0.15s, color 0.15s; user-select: none; }
.import-zone:hover, .import-zone.drag-over { border-color: var(--accent); color: var(--accent); }

/* Dialog */
dialog { width: 420px; border-radius: 10px; border: none; box-shadow: var(--shadow); font-family: system-ui, sans-serif; background: var(--surface); color: var(--text); position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); max-height: 90vh; overflow-y: auto; }
.dialog-body { padding: 22px; }
dialog::backdrop { background: var(--backdrop); }
dialog h2 { font-size: 16px; margin-bottom: 14px; padding-right: 24px; }
.dialog-close-btn { position: absolute; top: 10px; right: 12px; background: none; border: none; font-size: 18px; line-height: 1; color: var(--muted); cursor: pointer; padding: 2px 6px; border-radius: 4px; z-index: 1; }
.dialog-close-btn:hover { background: var(--hover); color: var(--text); }
.tabs { display: flex; border: 1px solid var(--border); border-radius: 5px; overflow: hidden; margin-bottom: 16px; }
.tab-btn { flex: 1; border: none; border-radius: 0; padding: 7px; font-size: 12px; font-weight: 600; color: var(--muted); background: var(--btn-bg); cursor: pointer; }
.tab-btn + .tab-btn { border-left: 1px solid var(--border); }
.tab-btn.active { background: var(--sel); color: var(--accent); }
.tab-btn:hover:not(.active) { background: var(--hover); }
.form-field { margin-bottom: 10px; }
.form-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.form-field input { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; font-family: inherit; background: var(--input-bg); color: var(--text); }
.form-field input:focus { outline: none; border-color: var(--accent); }
.known-list { display: flex; align-items: center; justify-content: space-between; gap: 9px; padding: 9px 12px; border: 1px solid var(--border2); border-radius: 6px; margin-bottom: 7px; }
.known-list-info { flex: 1; }
.known-list-name { font-size: 13px; font-weight: 600; }
.known-list-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }
.dialog-footer { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border2); display: flex; justify-content: flex-end; gap: 8px; }

/* Configure / Add list dialog */
#configure-list-dialog { width: 520px; overflow: visible; }
.configure-section { margin-bottom: 18px; }
.configure-section:last-child { margin-bottom: 0; }
.configure-section-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.configure-icon-name-row { display: grid; grid-template-columns: auto 1fr; column-gap: 12px; row-gap: 8px; }
.configure-icon-name-row .configure-section-label { margin-bottom: 0; }
.config-name-input { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; font-family: inherit; background: var(--input-bg); color: var(--text); box-sizing: border-box; }
.config-name-input:focus { outline: none; border-color: var(--accent); }
.config-name-input.invalid { border-color: #ea4335; background: var(--error-bg); }
.publisher-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.publisher-chip { border: 1px solid var(--border); border-radius: 16px; padding: 4px 12px; font-size: 12px; font-weight: 600; background: var(--btn-bg); color: var(--muted); cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 5px; line-height: 1; }
.publisher-chip:hover:not(.active) { background: var(--hover); color: var(--text); }
.publisher-chip.active { background: var(--accent); color: white; border-color: var(--accent); }
.publisher-chip .list-icon { width: 13px; height: 13px; }
.rules-option-row { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
.rules-option-lbl { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
.rules-option-row select { padding: 5px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; font-family: inherit; background: var(--input-bg); color: var(--text); cursor: pointer; }
.rules-option-row select:focus { outline: none; border-color: var(--accent); }
.rules-preview-wrap { margin-top: 10px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; padding: 8px 14px; }
#url-check-icon { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 14px; line-height: 1; pointer-events: none; }
#config-url-input { padding-right: 26px; }
.source-meta { font-size: 11px; color: var(--muted); margin-top: 6px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
#source-url-meta { max-height: 0; opacity: 0; overflow: hidden; margin-top: 0; transition: max-height 0.2s ease, opacity 0.2s ease, margin-top 0.2s ease; }
#source-url-meta.visible { max-height: 40px; opacity: 1; margin-top: 6px; }
.url-check-warn    { color: var(--warn-fg); }
.url-check-error   { color: var(--err-fg); }
.url-check-ok-icon  { color: var(--ok-fg);  font-weight: 700; }
.url-check-err-icon { color: var(--err-fg); font-weight: 700; }
.url-check-spinner { width: 13px; height: 13px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: url-check-spin 0.6s linear infinite; }
@keyframes url-check-spin { to { transform: rotate(360deg); } }

/* Icon picker */
.icon-picker-trigger { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface2); user-select: none; }
.icon-picker-trigger:hover { background: var(--hover); }
.icon-picker-trigger:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.icon-preview-box { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
#icon-picker-popup { position: absolute; z-index: 10; width: 280px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface2); box-shadow: 0 4px 20px rgba(0,0,0,0.18); overflow: hidden; }
.icon-picker-tabs { display: flex; border-bottom: 1px solid var(--border); }
.icon-picker-tab { flex: 1; border: none; border-radius: 0; padding: 6px; font-size: 12px; font-weight: 600; color: var(--muted); background: var(--surface2); cursor: pointer; font-family: inherit; }
.icon-picker-tab.active { color: var(--accent); background: var(--sel); }
.icon-picker-tab:hover:not(.active) { background: var(--hover); }
.icon-picker-pane { padding: 10px 12px; display: none; }
.icon-picker-pane.active { display: block; }
.icon-emoji-btn[data-auto] .list-icon-initials { width: 22px; height: 22px; }
.icon-emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; }
.icon-emoji-btn { background: none; border: 1px solid transparent; border-radius: 4px; font-size: 18px; line-height: 1; padding: 4px 2px; cursor: pointer; text-align: center; font-family: inherit; }
.icon-emoji-btn:hover { background: var(--hover); border-color: var(--border); }
.icon-emoji-btn.selected { background: var(--sel); border-color: var(--accent); }

/* URL input component */
.url-input-wrap { position: relative; display: flex; align-items: center; }
.url-input-icon { position: absolute; left: 8px; color: var(--muted); pointer-events: none; flex-shrink: 0; }
.url-input { width: 100%; padding: 6px 8px 6px 28px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; font-family: inherit; background: var(--input-bg); color: var(--text); box-sizing: border-box; }
.url-input:focus { outline: none; border-color: var(--accent); }

/* Initials icon */
.list-icon-initials text { fill: white; }
.ic-0  { fill: #5C6BC0; }
.ic-1  { fill: #1E88E5; }
.ic-2  { fill: #00ACC1; }
.ic-3  { fill: #00897B; }
.ic-4  { fill: #43A047; }
.ic-5  { fill: #FB8C00; }
.ic-6  { fill: #E53935; }
.ic-7  { fill: #D81B60; }
.ic-8  { fill: #8E24AA; }
.ic-9  { fill: #5E35B1; }
.ic-10 { fill: #3949AB; }
.ic-11 { fill: #0277BD; }
/* More menu (⋮ button in detail header) */
.more-menu-btn { padding-left: 8px; padding-right: 8px; }

/* Update Summary dialog */
#update-summary-dialog { width: 480px; overflow: hidden; padding: 0; max-height: min(560px, 85vh); }
#update-summary-dialog[open] { display: flex; flex-direction: column; }
.usd-header { padding: 18px 22px 14px; flex-shrink: 0; }
.usd-header h2 { margin-bottom: 4px; padding-right: 24px; }
.usd-count { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
.usd-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.usd-pill { padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid transparent; background: none; font-family: inherit; transition: opacity 0.15s; }
.usd-pill:hover { opacity: 0.75; }
.usd-pill-added    { background: var(--usd-added-bg);    color: var(--usd-added-fg);    }
.usd-pill-deleted  { background: var(--usd-deleted-bg);  color: var(--usd-deleted-fg);  }
.usd-pill-rescored { background: var(--usd-rescored-bg); color: var(--usd-rescored-fg); }
.usd-scroll { flex: 1; min-height: 0; overflow-y: auto; border-top: 1px solid var(--border2); padding-bottom: 12px; }
.usd-sizer { position: relative; }
.usd-row { position: absolute; left: 0; right: 0; height: 24px; display: flex; align-items: center; }
.usd-section-header { padding: 0 22px; color: var(--muted); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; background: var(--surface2); border-bottom: 1px solid var(--border3); }
.usd-word-row { padding: 0 22px 0 19px; border-left: 3px solid transparent; }
.usd-word-row:hover { background: var(--row-hover); }
.usd-word-col { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: monospace; font-size: 12px; }
.usd-score-col { flex-shrink: 0; display: flex; align-items: center; gap: 4px; }
.usd-added    { border-left-color: var(--usd-added-fg);    }
.usd-deleted  { border-left-color: var(--usd-deleted-fg);  }
.usd-rescored { border-left-color: var(--usd-rescored-fg); }
.usd-deleted .usd-word-col { text-decoration: line-through; color: var(--muted); }
.usd-old-score { color: var(--muted); font-size: 12px; }
.usd-arrow { color: var(--faint); font-size: 11px; }

/* Toast */
#toast-container { position: fixed; bottom: 18px; right: 18px; display: flex; flex-direction: column; gap: 8px; z-index: 1000; pointer-events: none; align-items: flex-end; }
.toast { background: #333; color: white; padding: 9px 15px; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity 0.25s; max-width: 360px; overflow-wrap: break-word; pointer-events: none; }
.toast.show { opacity: 1; pointer-events: auto; cursor: pointer; }

a.get-file { font-size: 12px; color: var(--accent); text-decoration: none; white-space: nowrap; }
a.get-file:hover { text-decoration: underline; }

/* ── Rescore section ──────────────────────────────────────────────────────── */
.rescore-section { background: var(--surface2); border-bottom: 1px solid var(--border2); padding: 9px 18px; flex-shrink: 0; max-height: 240px; overflow-y: auto; }
.rescore-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.rescore-lbl { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.rule-row { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
.rule-in, .rule-len, .rule-out { padding: 2px 6px; border: 1px solid var(--border); border-radius: 3px; font-size: 12px; font-family: ui-monospace, 'Cascadia Code', monospace; text-align: center; background: var(--input-bg); color: var(--text); }
.rule-in  { width: 80px; }
.rule-len { width: 60px; }
.rule-out { width: 80px; }
.rule-in:focus, .rule-len:focus, .rule-out:focus { outline: none; border-color: var(--accent); }
.rule-in::placeholder, .rule-len::placeholder, .rule-out::placeholder { color: var(--faint); }
.rule-in.invalid, .rule-len.invalid, .rule-out.invalid { border-color: #ea4335; background: var(--error-bg); }
.rule-field-lbl { font-size: 10px; color: var(--faint); font-family: inherit; flex-shrink: 0; }
.rule-arrow { color: var(--faint); font-size: 14px; width: 14px; text-align: center; flex-shrink: 0; }
.rule-note-wrap { flex: 1; min-width: 0; display: flex; align-items: center; cursor: text; border-radius: 3px; padding: 2px 3px; gap: 3px; }
.rule-note-wrap:hover { background: var(--surface); }
.rule-note-text { flex: 0 1 auto; min-width: 0; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; }
.rule-note-text:empty::before { content: 'add note…'; font-style: italic; color: transparent; pointer-events: none; }
.rule-row:hover .rule-note-text:empty::before { color: var(--faint); }
.rule-note-pencil { font-size: 11px; color: var(--faint); }
.rule-row:hover .rule-note-wrap.has-note .rule-note-pencil { opacity: 1; }
.rule-note-input { flex: 1; padding: 1px 4px; border: 1px solid var(--accent); border-radius: 3px; font-size: 12px; background: var(--input-bg); color: var(--text); outline: none; min-width: 0; }
.rule-del { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border: none; background: none; cursor: pointer; font-size: 15px; padding: 0; line-height: 1; border-radius: 3px; font-family: inherit; color: transparent; }
.rule-row:hover .rule-del { color: var(--faint); }
.rule-del:hover { color: #e53935 !important; background: var(--del-hover); }

/* Header */
.header-controls { display: flex; gap: 12px; align-items: center; }
.header-github-link { display: inline-flex; vertical-align: middle; margin-left: 4px; opacity: 0.75; color: white; text-decoration: none; border-bottom: none; }
.header-github-link:hover { opacity: 1; }

/* Segmented control */
.seg-ctrl { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.seg-btn { border: none; border-radius: 0; padding: 4px 10px; font-size: 12px; font-weight: 600; color: var(--muted); background: var(--btn-bg); cursor: pointer; font-family: inherit; }
.seg-btn + .seg-btn { border-left: 1px solid var(--border); }
.seg-btn.active { background: var(--sel); color: var(--accent); }
.seg-btn:hover:not(.active) { background: var(--hover); }

/* Lists panel */
#list-count { font-weight: 400; color: var(--muted); }

/* Empty states */
.no-rules { font-size: 12px; color: var(--faint); font-style: italic; margin-bottom: 3px; }
.stats-bar.stats-empty { color: var(--muted); font-size: 13px; }

/* List icons */
.list-icon { width: 16px; height: 16px; flex-shrink: 0; vertical-align: middle; }
.list-icon-img { border-radius: 3px; display: inline-block; }
/* List name icon: inline icon preceding a list name in toasts, alerts, help text, and source column */
.list-name-icon { display: inline; }
.list-name-icon .list-icon { width: 1em; height: 1em; vertical-align: -0.1em; }

/* Score display */
.entry-ignored { opacity: 0.4; }
.entry-ignored td, .entry-ignored td span { text-decoration: line-through; }
.col-length { text-align: right; }
.effective-asterisk { color: #e53; font-size: 9px; vertical-align: super; margin-left: 2px; pointer-events: none; line-height: 0; }

/* Cell popover */
#cell-popover { position: fixed; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 12px; line-height: 1.6; max-width: 300px; z-index: 9999; box-shadow: 0 4px 16px rgba(0,0,0,0.18); pointer-events: none; }

/* Dialog helpers */
.dialog-actions { text-align: right; }
.form-field-gap { margin-top: 10px; }
.link-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: inherit; font-family: inherit; padding: 0; text-decoration: underline; }
.link-btn:hover { opacity: 0.8; }
.dialog-divider { text-align: center; color: var(--muted); font-size: 12px; margin: 12px 0; }
input[type="file"] { display: none; }
.annotation { position: absolute; border: 3px solid #e53935; border-radius: 50px; pointer-events: none; box-shadow: 0 0 6px rgba(229,57,53,0.4); }

/* Merged list card */
#merged-card { flex-shrink: 0; user-select: none; }
#merged-card .list-icon { width: 22px; height: 22px; margin: 0 -3px; }

/* Inline cell editing */
.word-table td.score-cell,
.word-table td.comment-cell { cursor: pointer; }
.word-table td.score-cell:hover,
.word-table td.comment-cell:hover { background: color-mix(in srgb, var(--accent) 8%, var(--row-hover)); }
input.cell-edit { font-family: inherit; font-size: 12px; padding: 1px 4px; border: 1px solid var(--accent); border-radius: 3px; background: var(--input-bg); color: var(--text); outline: none; width: 100%; box-sizing: border-box; }
input.cell-edit.score-edit { font-family: ui-monospace, 'Cascadia Code', monospace; width: 60px; }

/* Inline edit tip */
#edit-cell-tip { position: fixed; font-size: 11px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border2); border-radius: 4px; padding: 2px 7px; pointer-events: none; z-index: 400; opacity: 0; transition: opacity 0.15s; white-space: nowrap; }

/* Fly animation */
.fly-clone { position: fixed; pointer-events: none; z-index: 300; font-size: 11px; font-weight: 700; border-radius: 3px; padding: 1px 5px; animation: fly-to-target 0.4s ease-in forwards; }
.fly-badge { background: var(--accent); color: white; }
@keyframes fly-to-target {
  0%   { opacity: 1; transform: translate(0, 0) scale(1); }
  60%  { opacity: 0.9; }
  100% { opacity: 0; transform: translate(var(--fly-dx), var(--fly-dy)) scale(0.6); }
}
@keyframes edits-pulse {
  0%   { background: color-mix(in srgb, var(--accent) 35%, transparent); }
  100% { background: transparent; }
}
@keyframes shake {
  0%, 100%  { transform: translateX( 0px); }
  20%       { transform: translateX(-4px); }
  60%       { transform: translateX( 4px); }
  80%       { transform: translateX(-2px); }
}
.shake { animation: shake 0.3s ease; }
#edits-card.pulse { animation: edits-pulse 1.4s ease-out; }

/* Add word footer row */
#add-row-footer { flex-shrink: 0; border-top: 1px solid var(--border2); }
.add-row-trigger { display: flex; align-items: center; padding: 5px 16px; height: 29px; cursor: pointer; color: var(--faint); font-size: 12px; user-select: none; background: var(--surface); }
.add-row-trigger:hover { background: var(--hover); color: var(--accent); }
.add-word-bar { display: flex; align-items: center; gap: 8px; padding: 5px 16px; background: var(--surface2); }
.add-word-bar input { font-family: inherit; font-size: 12px; padding: 2px 6px; border: 1px solid var(--border); border-radius: 3px; background: var(--input-bg); color: var(--text); outline: none; }
.add-word-bar input:focus { border-color: var(--accent); }
.add-word-bar input.invalid { border-color: #ea4335; }
.add-word-bar .aw-word { font-family: ui-monospace, 'Cascadia Code', monospace; width: 120px; }
.add-word-bar .aw-score { width: 60px; }
.add-word-bar .aw-comment { flex: 1; }
.add-word-bar .aw-hint { font-size: 11px; color: var(--faint); white-space: nowrap; }

/* Shared icons */
.icon-trash  { width: 14px; height: 14px; display: inline-block; vertical-align: middle; }

/* Trash / delete column */
.word-table th.col-trash { width: 26px; padding: 0; }
.word-table td.col-trash { width: 26px; padding: 0 3px; text-align: center; color: transparent; cursor: pointer; }
.word-table tr:hover td.col-trash { color: var(--faint); }
.word-table td.col-trash:hover { color: #e53935 !important; }

/* Inline edit-delete button inside source cell */
.source-trash { color: transparent; cursor: pointer; margin-left: 4px; vertical-align: middle; }
.word-table tr:hover .source-trash { color: var(--faint); }
.source-trash:hover { color: #e53935 !important; }

/* Toast undo link */
.toast .undo-link { margin-left: 10px; color: #90caf9; text-decoration: underline; cursor: pointer; }

/* ── Onboarding banner ────────────────────────────────────────────────────────── */
html.light-mode #onboarding-banner {
  background: color-mix(in srgb, var(--accent) 7%, var(--surface));
  border: 1px solid color-mix(in srgb, var(--accent) 28%, var(--border));
}
html.dark-mode #onboarding-banner {
  background: color-mix(in srgb, var(--accent) 15%, var(--surface));
  border: 1px solid color-mix(in srgb, var(--accent) 40%, var(--border));
}
#onboarding-banner {
  margin: 6px 10px 2px;
  padding: 11px 13px;
  border-radius: 6px;
  font-size: 13px;
  position: relative;
}
#onboarding-banner p { margin: 0 18px 10px 0; line-height: 1.5; color: var(--text); }
#onboarding-banner button { font-size: 12px; }
#onboarding-banner button.primary { padding: 4px 10px; }
#onboarding-banner .dialog-close-btn { font-size: 12px; top: 7px; right: 8px; }
.onboarding-banner-actions { display: flex; align-items: center; justify-content: space-between; gap: 8px; }

/* ── Help modal ───────────────────────────────────────────────────────────────── */
#help-dialog {
  width: 760px; height: 680px; max-height: 88vh; padding: 0;
  border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg); overflow: hidden; outline: none;
}
.help-modal { display: flex; flex-direction: column; height: 100%; }
.help-slides { flex: 1; overflow: hidden; position: relative; }
.help-slide { display: none; padding: 36px 44px 28px; }
.help-slide.active { display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
.help-slide h2 { font-size: 20px; font-weight: 700; color: var(--text); margin: 0; }
.help-slide p { font-size: 14px; line-height: 1.65; color: var(--text); margin: 0; }
.help-slide p strong { color: var(--text); }
.help-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; border-top: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.help-prev, .help-next {
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--text); font-size: 16px; padding: 5px 14px; cursor: pointer;
}
.help-prev:hover, .help-next:hover { background: var(--hover); }
.help-prev:disabled, .help-next:disabled { opacity: 0.3; cursor: default; }
.help-dots { display: flex; gap: 8px; }
.help-dot { width: 8px; height: 8px; border-radius: 50%; border: none; background: var(--border); cursor: pointer; padding: 0; }
.help-dot.active { background: var(--accent); }
.help-demo { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 16px; margin-top: 4px; flex-shrink: 0; }
.help-demo.flush { padding: 0; overflow: hidden; }
.help-demo-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
/* Slide 1 two-panel overview */
.help-demo-panels { display: flex; }
.help-demo-panel { flex: 1; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
.help-demo-vbar { width: 1px; background: var(--border); flex-shrink: 0; }
.help-mini-section { padding: 4px 12px 3px; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; background: var(--surface2); border-bottom: 1px solid var(--border2); }
.help-demo-panel-content { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; flex: 1; min-height: 0; }
.help-demo-panel-label { text-align: center; flex-shrink: 0; }
/* Slide 3 score-edit demo table */
#help-slide-2 .word-table td { padding: 6px 16px; }
#help-slide-2 .word-table td:nth-child(2) { width: 130px; }
#help-slide-2 .score-cell { cursor: default; }
#help-slide-2 .comment-cell { color: var(--faint); }
/* Slide 4 search demo table */
#help-slide-3 .word-table td { padding: 4px 14px; }
#help-slide-3 .word-table td:nth-child(2) { width: 80px; }
/* Slide 4 wildcard reference */
#help-slide-3 .help-wildcards { display: inline-grid; align-self: flex-start; grid-template-columns: auto auto; grid-template-rows: repeat(4, auto); grid-auto-flow: column; gap: 5px 28px; }
#help-slide-3 .help-wildcards span { font-size: 11px; color: var(--text); display: flex; align-items: baseline; gap: 5px; }
#help-slide-3 .help-wildcards kbd { font-family: ui-monospace, 'Cascadia Code', monospace; font-size: 11px; color: var(--muted); }
/* Demo slides: non-interactive */
#help-slide-0 .list-card,
#help-slide-0 .search-bar,
#help-slide-1 .list-card,
#help-slide-3 .search-bar,
#help-slide-3 .word-table tr { pointer-events: none; }
#help-slide-1 .list-card { cursor: default; }
#help-slide-1 .list-card:last-child { border-bottom: none; }
/* Slide 5 download demo */
.help-demo-dl { display: flex; flex-direction: column; gap: 12px; align-items: flex-start; }
.help-demo-dl-opts { display: flex; flex-direction: column; gap: 8px; }
.help-demo-dl-row { display: flex; align-items: center; gap: 10px; }
.help-demo-dl-lbl { font-size: 12px; color: var(--muted); min-width: 55px; }
/* Demo overlays: fake text caret and mouse cursor */
.demo-caret { position: absolute; width: 1.5px; height: 13px; background: var(--text); pointer-events: none; z-index: 5; animation: demo-caret-blink 1s step-end infinite; }
@keyframes demo-caret-blink { 50% { opacity: 0; } }
.demo-mouse { position: absolute; pointer-events: none; opacity: 0; z-index: 10; transition: left 0.35s ease-out, top 0.35s ease-out, opacity 0.2s; }
.demo-mouse.visible { opacity: 1; }
.demo-mouse svg { transition: transform 0.06s; }
.demo-mouse.clicking svg { transform: scale(0.8); transform-origin: 0 0; }
#help-slide-2 .help-demo, #help-slide-3 .help-demo { position: relative; }

</style>
</head>

<script>

// ─── Constants ────────────────────────────────────────────────────────────────

// LS_PREFIX defined in <head> so the FOUC-prevention script can share it.

const MERGED_NAME  = 'Master List';
const EDITS_ICON  = buildEmojiIconHTML('✏️');
const MERGED_ICON  = buildEmojiIconHTML('⭐');

// ─── Components ──────────────────────────────────────────────────────────────

function buildScoreBadgeHTML(score) {
  return `<span class="score-badge" data-tier="${scoreTier(score)}">${score}</span>`;
}

function buildToggleHTML(checked, disabled) {
  return `<label class="toggle">
    <input type="checkbox"${checked ? ' checked' : ''}${disabled ? ' disabled' : ''}>
    <span class="toggle-slider"></span>
  </label>`;
}

// options: array of { value, label }
function buildSegCtrlHTML(id, options, activeValue) {
  const buttons = options.map(({ value, label }) =>
    `<button class="seg-btn${value === activeValue ? ' active' : ''}" data-val="${value}">${label}</button>`
  ).join('');
  return `<div class="seg-ctrl"${id ? ` id="${id}"` : ''}>${buttons}</div>`;
}

function buildStatItemHTML(label, value, title) {
  return `<div class="stat"${title ? ` title="${title}"` : ''}>
    <span class="stat-label">${label}</span>
    <span class="stat-value">${value}</span>
  </div>`;
}

// opts: { editable } — adds onclick rename handler and pencil hint
function buildDetailHeaderHTML(nameHTML, buttons, { editable = false } = {}) {
  const h2Attrs = editable ? ' onclick="startHeaderRename()" title="Click to rename"' : '';
  const pencil  = editable
    ? buildEditHintHTML('detail-edit-hint', 'startHeaderRename()')
    : '';
  return `<div class="detail-header">
    <div class="detail-name-wrap">
      <h2${h2Attrs}>${nameHTML}</h2>
      ${pencil}
    </div>
    ${buttons.join('\n    ')}
  </div>`;
}

// opts: { isMerged, enabled, selected, isEdits, hasData, hasUpdate, interactive }
// interactive: true  → adds draggable, tabindex, role, data-list marker for event delegation
// interactive: false → static display card (default — safe for demos)
function buildListCardHTML(icon, name, meta, opts = {}) {
  const {
    isMerged    = false,
    enabled     = true,
    selected    = false,
    isEdits     = false,
    hasData     = true,
    hasUpdate   = false,
    interactive = false,
  } = opts;

  const classes = ['list-card'];
  if (selected)                        classes.push('selected');
  if (!enabled)                        classes.push('disabled');
  if (!hasData && !isEdits && !isMerged) classes.push('no-data');

  const dragHandle = buildDragHandleHTML(!isMerged);

  const updateDot = hasUpdate
    ? `<span class="update-dot" title="Update available" aria-label="Update available"></span>`
    : '';

  const cardInfo = `<div class="card-info">
      <div class="card-name-row"><div class="card-name">${esc(name)}</div>${updateDot}</div>
      <div class="card-meta">${meta}</div>
    </div>`;

  if (isMerged) {
    return `<div class="${classes.join(' ')}">${dragHandle}${icon}${cardInfo}</div>`;
  }

  let wrapAttrs = '';
  let cardActions;
  if (interactive) {
    const toggleEnabled = hasData || isEdits;
    const toggleTitle = !toggleEnabled ? 'Click to import'
      : enabled ? 'Enabled — click to disable' : 'Disabled — click to enable';
    const idAttr = isEdits ? ' id="edits-card"' : '';
    wrapAttrs = ` data-list draggable="true" tabindex="0" role="option"${idAttr}`;
    cardActions = `<div class="card-actions">
      <label class="toggle" title="${toggleTitle}" aria-label="Toggle ${esc(name)}">
        <input type="checkbox"${toggleEnabled && enabled ? ' checked' : ''}${toggleEnabled ? '' : ' disabled'}>
        <span class="toggle-slider"></span>
      </label>
    </div>`;
  } else {
    cardActions = `<div class="card-actions">${buildToggleHTML(enabled, !hasData && !isEdits)}</div>`;
  }

  return `<div class="${classes.join(' ')}"${wrapAttrs}>${dragHandle}${icon}${cardInfo}${cardActions}</div>`;
}

const WILDCARD_HINTS = [
  { key: '?',       desc: 'any letter' },
  { key: '*',       desc: 'any number of letters' },
  { key: '#',       desc: 'consonant' },
  { key: '@',       desc: 'vowel' },
  { key: '[jqxz]',  desc: 'any of these letters' },
  { key: '[^jqxz]', desc: 'none of these letters' },
  { key: '[a-m]',   desc: 'letter range' },
];

function buildWildcardSpansHTML() {
  return WILDCARD_HINTS.map(({ key, desc }) => `<span><kbd>${key}</kbd> ${desc}</span>`).join('\n        ');
}

function buildSearchBarHTML(opts = {}) {
  const {
    idPrefix        = '',
    readonly        = false,
    showHints       = true,
    searchQuery     = idPrefix ? '' : esc(state.searchQuery),
    searchWholeWord = idPrefix ? false : (state.searchWholeWord || false),
    minScore        = idPrefix ? null : state.minScore,
  } = opts;
  const pre = idPrefix ? `${idPrefix}-` : '';
  const ro  = readonly ? ' readonly' : '';

  const hintsHtml = showHints ? `
      <div class="search-help">
        ${buildWildcardSpansHTML()}
        <span class="search-count-wrap"><span id="${pre}search-count"></span>${readonly ? '' : ` <button class="copy-btn" id="${pre}search-copy" onclick="copyVisibleEntries()" title="Copy to clipboard" aria-label="Copy matches to clipboard" hidden><svg width="13" height="13" aria-hidden="true"><use href="#icon-clipboard"/></svg></button>`}</span>
      </div>` : '';

  const inputHandlers = readonly ? '' : ` oninput="onSearch(this.value)"`;
  const clearSearchBtn = readonly ? '' :
    `<button class="clear-btn" id="${pre}search-clear" onclick="clearSearch()" title="Clear search" aria-label="Clear search" ${searchQuery ? '' : 'hidden'}><svg width="10" height="10"><use href="#icon-x"/></svg></button>`;
  const wholeWordHandler = readonly ? '' : ` onchange="onSearchWholeWord(this.checked)"`;
  const minScoreHandler  = readonly ? '' : ` oninput="onMinScore(this.value)"`;
  const clearMinBtn = readonly ? '' :
    `<button class="clear-btn" id="${pre}score-min-clear" onclick="clearMinScore()" title="Clear min score" aria-label="Clear min score" ${minScore !== null ? '' : 'hidden'}><svg width="10" height="10"><use href="#icon-x"/></svg></button>`;

  return `<div class="search-bar">${hintsHtml}
      <div class="search-row">
        <div class="search-input-wrap">
          <svg width="13" height="13"><use href="#icon-search"/></svg>
          <input type="text" id="${pre}search-input" placeholder="Search" value="${searchQuery}"${ro}${inputHandlers}${readonly ? '' : ' title="Search (Alt+S)"'}>
          ${clearSearchBtn}
        </div>
        <label class="search-whole-word-label"${readonly ? '' : ' title="Whole word (Alt+W)"'}><input type="checkbox" id="${pre}search-whole-word"${wholeWordHandler} ${searchWholeWord ? 'checked' : ''}${ro}> Whole word</label>
        <label class="score-min-label"${readonly ? '' : ' title="Min score (Alt+M)"'}>Min score <span class="score-min-wrap"><input type="number" id="${pre}score-min-input" min="0" value="${minScore ?? ''}"${ro}${minScoreHandler}>${clearMinBtn}</span></label>
      </div>
    </div>`;
}

function buildStatsBarHTML(stats, emptyMsg) {
  if (!stats) return `<div class="stats-bar stats-empty">${emptyMsg}</div>`;
  const bars = stats.buckets.map((b, i) => {
    const h = stats.maxBucket ? Math.max(2, Math.round((b / stats.maxBucket) * 34)) : 2;
    return `<div class="score-bar" style="height:${h}px" title="${i*10}–${i===10?'100':i*10+9}: ${b.toLocaleString()}"></div>`;
  }).join('');
  return `<div class="stats-bar">
      ${buildStatItemHTML('Entries', stats.count.toLocaleString())}
      ${buildStatItemHTML('Min', stats.min)}
      ${buildStatItemHTML('Max', stats.max)}
      <div class="stats-right">
        ${buildStatItemHTML('Mean', stats.mean, 'Average score')}
        ${buildStatItemHTML('Median', stats.median % 1 === 0 ? stats.median : stats.median.toFixed(1), '50th percentile')}
        ${buildStatItemHTML('Mode', stats.mode, 'Most common score')}

// ─── Parsing ─────────────────────────────────────────────────────────────────

function parseWordlistLine(line) {
  if (!line) return null;
  const semi = line.indexOf(';');
  if (semi === -1) return null;
  const word = line.slice(0, semi);
  if (!word || word.includes(';')) return null;
  const rest = line.slice(semi + 1);
  const semi2 = rest.indexOf(';');
  const score = parseInt(semi2 === -1 ? rest : rest.slice(0, semi2), 10);
  if (isNaN(score)) return null;
  const comment = semi2 === -1 ? '' : rest.slice(semi2 + 1).trim();
  return { word, score, comment };
}

function parseWordlist(text) {
  const entries = [];
  for (const line of text.split('\n')) {
    const entry = parseWordlistLine(line);
    if (entry) entries.push(entry);
  }
  return entries;
}

// Validates a chunk of wordlist text (e.g., from a Range GET).
// Drops the last line (may be truncated at a Range boundary).
// Lines without semicolons are skipped (comments/headers). Returns false if
// there are no data lines, or any semicolon-containing line fails to parse.
function validateWordlistChunk(text) {
  const lines = text.split('\n').slice(0, -1).filter(l => l.length > 0);
  if (!lines.length) return false;
  const dataLines = lines.filter(l => l.includes(';'));
  if (!dataLines.length) return false;
  return dataLines.every(l => parseWordlistLine(l) !== null);
}

// ─── Storage ──────────────────────────────────────────────────────────────────

function lsSave(key, value) {
  try { localStorage.setItem(LS_PREFIX + key, value); return true; }
  catch { return false; }
}
function lsLoad(key) { return localStorage.getItem(LS_PREFIX + key); }
function lsDel(key)  { localStorage.removeItem(LS_PREFIX + key); }

// IndexedDB for large word list data (localStorage has ~5MB limit)
const IDB_NAME  = 'grawlix';
const IDB_STORE = 'data';
let _db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess = e => { _db = e.target.result; resolve(); };
    req.onerror   = () => reject(req.error);
  });
}

function idbPut(key, val) {
  return new Promise(resolve => {
    const tx = _db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(val, key);
    tx.oncomplete = resolve;
    tx.onerror    = resolve;
  });
}

function idbGet(key) {
  return new Promise(resolve => {
    const tx  = _db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => resolve(req.result ?? null);
    req.onerror   = () => resolve(null);
  });
}

function idbDel(key) {
  return new Promise(resolve => {
    const tx = _db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete = resolve;
    tx.onerror    = resolve;
  });
}

function persistMeta() {
  lsSave('meta', JSON.stringify(state.sources.map(l => ({
    ...(l.type     ? { type: l.type }         : {}),
    dbKey:           l.dbKey,
    icon:            l.icon || '',
    ...(l.publisherId ? { publisherId: l.publisherId } : {}),
    name: l.name, url: l.url || null,
    enabled: l.enabled, lastUpdated: l.lastUpdated || null,
    fetchedSize: l.fetchedSize || null,
    rescoreRules: l.rescoreRules || [],
    originalFilename: l.originalFilename || null,
    ...(l.scoring ? { scoring: l.scoring.filter(r => !r._catchAll) } : {}),
    ...(l.downloadCase ? { downloadCase: l.downloadCase } : {}),
    ...(l.downloadExt  ? { downloadExt:  l.downloadExt  } : {}),
    ...(l.downloadStem ? { downloadStem: l.downloadStem } : {}),
  }))));
}

function persistOutputScoring() {
  lsSave('outputScoring', JSON.stringify(state.outputScoring.filter(r => !r._catchAll)));
}

async function persistData(dbKey, text) {
  await idbPut('data_' + dbKey, text);
}

// ─── Dark mode ────────────────────────────────────────────────────────────────

function applyDarkMode(val) {
  const dark = val === 'dark' || (val !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.classList.toggle('dark-mode', dark);
  document.documentElement.classList.toggle('light-mode', !dark);
}

// ─── Display case ─────────────────────────────────────────────────────────────

function getDisplayCase() { return lsLoad('displayCase') || 'lower'; }

function getDownloadComments() { return lsLoad('downloadComments') !== 'no'; }

function displayWord(word) {
  return getDisplayCase() === 'upper' ? word.toUpperCase() : word.toLowerCase();
}

function createDialog(id, { labelledby, label } = {}) {
  const el = document.createElement('dialog');
  el.id = id;
  if (labelledby) el.setAttribute('aria-labelledby', labelledby);
  if (label)      el.setAttribute('aria-label', label);
  const body = document.createElement('div');
  body.className = 'dialog-body';
  el.appendChild(body);
  document.body.appendChild(el);
  return { el, body };
}
